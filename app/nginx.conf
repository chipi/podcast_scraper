# SPA + API proxy for the Learning Player container (RFC-099 §10).
# - SPA: history-mode fallback to index.html.
# - /api/*: proxied to the consumer API service. Override the upstream at deploy time;
#   default targets the compose service name. No audio is proxied here — the client plays
#   origin enclosure URLs directly (bridge-never-rehost).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Don't cache the SW or the app entry; hashed assets are immutable.
  location = /sw.js { add_header Cache-Control "no-cache"; }
  location = /index.html { add_header Cache-Control "no-cache"; }
  location /assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }

  location /api/ {
    proxy_pass http://api:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
