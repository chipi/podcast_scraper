# Grafana Agent config — pre-prod observability sink (RFC-081 §Layer 2).
#
# Scrapes:
#   * api ``/metrics`` every 30s via the compose ``default`` network
#   * Docker container logs (api, viewer, pipeline-llm) via the
#     ``docker_sd`` discovery
# Ships to:
#   * Grafana Cloud Prometheus remote_write (URL from env)
#   * Grafana Cloud Loki push (URL from env)
#
# Default behaviour: agent stays running but does NOT ship anything if
# any of GRAFANA_CLOUD_PROM_URL / GRAFANA_CLOUD_LOKI_URL /
# GRAFANA_CLOUD_PROM_USER / GRAFANA_CLOUD_LOKI_USER /
# GRAFANA_CLOUD_API_KEY is unset (the remote_write / clients blocks
# resolve to empty strings; the agent logs once and continues idle).
# Prom and Loki have separate instance IDs in Grafana Cloud (shown as
# "Username / Instance ID" on each service's Send Metrics / Send Logs
# page); a single Access Policy token with metrics:write + logs:write
# scopes authenticates both.

server:
  log_level: info

metrics:
  global:
    scrape_interval: 30s
    external_labels:
      # Grafana Agent runs with -config.expand-env=true which uses
      # Go's os.ExpandEnv. ExpandEnv processes the WHOLE file as a
      # string before YAML parsing — including comments — and only
      # supports plain $VAR / curly-brace forms with no default
      # syntax. Do not write bash-style fallback expressions in
      # this file (in either values OR comments) because ExpandEnv
      # treats the literal text as a variable reference and crashes
      # with "unable to parse variable name". Compose-side defaulting
      # now sets these to non-empty values via the prod overlay
      # (PODCAST_ENV always populated; PODCAST_RELEASE may be empty
      # in dev).
      env: "${PODCAST_ENV}"
      release: "${PODCAST_RELEASE}"

  configs:
    - name: api
      scrape_configs:
        - job_name: api-metrics
          static_configs:
            - targets: ['api:8000']
              labels:
                component: api
                service: podcast-scraper-api
          metrics_path: /metrics

        # DGX observability (#943): three exporters on the operator's
        # GB10 box, scraped over Tailnet. Sized to stay well under the
        # Grafana Cloud free tier (10k active series, 50 GB ingest/mo).
        # See docs/guides/DGX_RUNBOOK.md § DGX observability for budget.

        - job_name: dgx-gpu
          static_configs:
            - targets: ['dgx-llm-1.tail6d0ed4.ts.net:9400']
              labels:
                host: dgx
                kind: gpu
          metrics_path: /metrics
          scrape_interval: 30s
          scrape_timeout: 10s

        - job_name: dgx-system
          static_configs:
            - targets: ['dgx-llm-1.tail6d0ed4.ts.net:9100']
              labels:
                host: dgx
                kind: system
          metrics_path: /metrics
          scrape_interval: 60s
          scrape_timeout: 10s

        - job_name: dgx-containers
          static_configs:
            - targets: ['dgx-llm-1.tail6d0ed4.ts.net:8080']
              labels:
                host: dgx
                kind: container
          metrics_path: /metrics
          scrape_interval: 60s
          scrape_timeout: 10s
          # Cardinality discipline: cAdvisor emits ~150 metric names per
          # container by default. Keep ~10 high-signal metrics + drop the
          # `id` label (full cgroup path — unstable across restarts,
          # blows cardinality). `name` is enough to identify a container.
          metric_relabel_configs:
            - source_labels: [__name__]
              regex: 'container_(cpu_usage_seconds_total|memory_usage_bytes|memory_working_set_bytes|network_receive_bytes_total|network_transmit_bytes_total|fs_usage_bytes|fs_writes_total|fs_reads_total|last_seen|start_time_seconds)'
              action: keep
            - regex: '(id|pod|namespace|container_label_.*)'
              action: labeldrop

        # Pyannote-server application metrics (#943; #942 sibling adds
        # Sentry). Exposed at /metrics via prometheus-fastapi-instrumentator
        # — request rate / latency histo / status code. Scrape only when
        # the service is up (Grafana Agent drops on failure, no retries).
        - job_name: dgx-pyannote-app
          static_configs:
            - targets: ['dgx-llm-1.tail6d0ed4.ts.net:8001']
              labels:
                host: dgx
                kind: app
                service: pyannote-server
          metrics_path: /metrics
          scrape_interval: 60s
          scrape_timeout: 10s

        # vLLM autoresearch native /metrics (#996 follow-up; deployed
        # 2026-06-14 at homelab infra/vllm/autoresearch/). vLLM exposes
        # Prometheus-format metrics natively at /metrics — request rate,
        # latency histograms, TTFT, queue depth, KV-cache utilization,
        # GPU memory tracking. ~30 series at the default config; well
        # within the existing ~175-series budget on the DGX side.
        # Only scrapeable while `gpu-mode-swap.sh research` is the
        # active mode — Grafana Agent drops the target cleanly when
        # port :8003 isn't listening, no retries, no log spam. Pair
        # with #996 contention sweeps so vLLM-side TTFT and queue
        # depth land next to whisper-side WER and latency in the same
        # dashboard window.
        - job_name: dgx-vllm-autoresearch
          static_configs:
            - targets: ['dgx-llm-1.tail6d0ed4.ts.net:8003']
              labels:
                host: dgx
                kind: app
                service: vllm-autoresearch
          metrics_path: /metrics
          scrape_interval: 30s
          scrape_timeout: 10s

        # Whisper-openai application metrics (#996 follow-up; mirrors the
        # pyannote-server #943 pattern). The 2026-06-15 catastrophic-tail
        # sweep had no whisper-side telemetry — adding /metrics so any
        # future sweep can correlate whisper-side request rate / latency /
        # status codes with vLLM contention. Especially useful for the
        # ConnectionResetError failure mode the #996 sweep surfaced —
        # whisper-side request rate dropping to 0 + status code distribution
        # is the direct signal for that case.
        - job_name: dgx-whisper-app
          static_configs:
            - targets: ['dgx-llm-1.tail6d0ed4.ts.net:8002']
              labels:
                host: dgx
                kind: app
                service: whisper-server
          metrics_path: /metrics
          scrape_interval: 60s
          scrape_timeout: 10s

      remote_write:
        # Quote env substitutions: -config.expand-env=true inlines values
        # before YAML parse, and Grafana Cloud API keys typically contain
        # `:` / `-` / `=` chars that break unquoted scalars (the agent
        # crashed on bare unquoted password lines with "block sequence
        # entries are not allowed in this context"). Wrapping in double
        # quotes is unconditionally safe; URLs are well-formed.
        # Also: do not embed any literal curly-brace env-substitution
        # syntax (or its bash-default variant) inside comments — Go's
        # ExpandEnv processes the whole file as one string before YAML
        # parsing and treats such text as a variable reference, which
        # crashes the agent.
        - url: "${GRAFANA_CLOUD_PROM_URL}"
          basic_auth:
            username: "${GRAFANA_CLOUD_PROM_USER}"
            password: "${GRAFANA_CLOUD_API_KEY}"

logs:
  # Grafana Agent requires a positions directory for log scraping — it
  # tracks per-target byte offsets so a restart doesn't re-ship the
  # entire file. Without this top-level field the agent fails to start
  # with "cannot generate Loki positions file path for docker-containers
  # because positions_directory is not configured". /tmp is fine in the
  # agent container (no need for the codespace bind mount; positions
  # are an internal cursor, not corpus data — losing them means at-most
  # one duplicate scrape after restart, harmless).
  positions_directory: /tmp/grafana-agent-positions

  global:
    clients:
      - url: "${GRAFANA_CLOUD_LOKI_URL}"
        basic_auth:
          username: "${GRAFANA_CLOUD_LOKI_USER}"
          password: "${GRAFANA_CLOUD_API_KEY}"
        external_labels:
          env: "${PODCAST_ENV}"
          release: "${PODCAST_RELEASE}"
          # Stable app label for Loki dashboards / alerts (GitHub #746).
          app: podcast_scraper

  configs:
    - name: docker-containers
      scrape_configs:
        - job_name: docker
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 5s
          relabel_configs:
            # Use compose service name as the ``service`` label
            - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
              target_label: service
            # Drop containers without a compose service label (noise from
            # other Docker workloads on the host)
            - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
              regex: '.+'
              action: keep
            # Ship logs only for podcast-scraper-* services we care about
            - source_labels: ['service']
              regex: 'api|viewer|pipeline-llm|pipeline'
              action: keep
            # Use the container's stdout/stderr stream as the log source
            - source_labels: ['__meta_docker_container_log_stream']
              target_label: stream
