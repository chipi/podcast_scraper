# Grafana Agent config — pre-prod observability sink (RFC-081 §Layer 2).
#
# Scrapes:
#   * api ``/metrics`` every 30s via the compose ``default`` network
#   * Docker container logs (api, viewer, pipeline-llm) via the
#     ``docker_sd`` discovery
# Ships to:
#   * Grafana Cloud Prometheus remote_write (URL from env)
#   * Grafana Cloud Loki push (URL from env)
#
# Default behaviour: agent stays running but does NOT ship anything if
# any of GRAFANA_CLOUD_PROM_URL / GRAFANA_CLOUD_LOKI_URL /
# GRAFANA_CLOUD_USER / GRAFANA_CLOUD_API_KEY is unset (the
# remote_write / clients blocks resolve to empty strings; the agent
# logs once and continues idle).

server:
  log_level: info

metrics:
  global:
    scrape_interval: 30s
    external_labels:
      # Grafana Agent runs with -config.expand-env=true which uses
      # Go's os.ExpandEnv. ExpandEnv processes the WHOLE file as a
      # string before YAML parsing — including comments — and only
      # supports plain $VAR / curly-brace forms with no default
      # syntax. Do not write bash-style fallback expressions in
      # this file (in either values OR comments) because ExpandEnv
      # treats the literal text as a variable reference and crashes
      # with "unable to parse variable name". Compose-side defaulting
      # now sets these to non-empty values via the prod overlay
      # (PODCAST_ENV always populated; PODCAST_RELEASE may be empty
      # in dev).
      env: "${PODCAST_ENV}"
      release: "${PODCAST_RELEASE}"

  configs:
    - name: api
      scrape_configs:
        - job_name: api-metrics
          static_configs:
            - targets: ['api:8000']
              labels:
                component: api
                service: podcast-scraper-api
          metrics_path: /metrics

      remote_write:
        # Quote env substitutions: -config.expand-env=true inlines values
        # before YAML parse, and Grafana Cloud API keys typically contain
        # `:` / `-` / `=` chars that break unquoted scalars (the agent
        # crashed on bare unquoted password lines with "block sequence
        # entries are not allowed in this context"). Wrapping in double
        # quotes is unconditionally safe; URLs are well-formed.
        # Also: do not embed any literal curly-brace env-substitution
        # syntax (or its bash-default variant) inside comments — Go's
        # ExpandEnv processes the whole file as one string before YAML
        # parsing and treats such text as a variable reference, which
        # crashes the agent.
        - url: "${GRAFANA_CLOUD_PROM_URL}"
          basic_auth:
            username: "${GRAFANA_CLOUD_USER}"
            password: "${GRAFANA_CLOUD_API_KEY}"

logs:
  global:
    clients:
      - url: "${GRAFANA_CLOUD_LOKI_URL}"
        basic_auth:
          username: "${GRAFANA_CLOUD_USER}"
          password: "${GRAFANA_CLOUD_API_KEY}"
        external_labels:
          env: "${PODCAST_ENV}"
          release: "${PODCAST_RELEASE}"

  configs:
    - name: docker-containers
      scrape_configs:
        - job_name: docker
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 5s
          relabel_configs:
            # Use compose service name as the ``service`` label
            - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
              target_label: service
            # Drop containers without a compose service label (noise from
            # other Docker workloads on the host)
            - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
              regex: '.+'
              action: keep
            # Ship logs only for podcast-scraper-* services we care about
            - source_labels: ['service']
              regex: 'api|viewer|pipeline-llm|pipeline'
              action: keep
            # Use the container's stdout/stderr stream as the log source
            - source_labels: ['__meta_docker_container_log_stream']
              target_label: stream
