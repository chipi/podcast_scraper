# Grafana Agent config — pre-prod observability sink (RFC-081 §Layer 2).
#
# Scrapes:
#   * api ``/metrics`` every 30s via the compose ``default`` network
#   * Docker container logs (api, viewer, pipeline-llm) via the
#     ``docker_sd`` discovery
# Ships to:
#   * Grafana Cloud Prometheus remote_write (URL from env)
#   * Grafana Cloud Loki push (URL from env)
#
# Default behaviour: agent stays running but does NOT ship anything if
# any of GRAFANA_CLOUD_PROM_URL / GRAFANA_CLOUD_LOKI_URL /
# GRAFANA_CLOUD_USER / GRAFANA_CLOUD_API_KEY is unset (the
# remote_write / clients blocks resolve to empty strings; the agent
# logs once and continues idle).

server:
  log_level: info

metrics:
  global:
    scrape_interval: 30s
    external_labels:
      env: ${PODCAST_ENV:-dev}
      release: ${PODCAST_RELEASE:-podcast-scraper@dev}

  configs:
    - name: api
      scrape_configs:
        - job_name: api-metrics
          static_configs:
            - targets: ['api:8000']
              labels:
                component: api
                service: podcast-scraper-api
          metrics_path: /metrics

      remote_write:
        - url: ${GRAFANA_CLOUD_PROM_URL}
          basic_auth:
            username: ${GRAFANA_CLOUD_USER}
            password: ${GRAFANA_CLOUD_API_KEY}

logs:
  global:
    clients:
      - url: ${GRAFANA_CLOUD_LOKI_URL}
        basic_auth:
          username: ${GRAFANA_CLOUD_USER}
          password: ${GRAFANA_CLOUD_API_KEY}
        external_labels:
          env: ${PODCAST_ENV:-dev}
          release: ${PODCAST_RELEASE:-podcast-scraper@dev}

  configs:
    - name: docker-containers
      scrape_configs:
        - job_name: docker
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 5s
          relabel_configs:
            # Use compose service name as the ``service`` label
            - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
              target_label: service
            # Drop containers without a compose service label (noise from
            # other Docker workloads on the host)
            - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
              regex: '.+'
              action: keep
            # Ship logs only for podcast-scraper-* services we care about
            - source_labels: ['service']
              regex: 'api|viewer|pipeline-llm|pipeline'
              action: keep
            # Use the container's stdout/stderr stream as the log source
            - source_labels: ['__meta_docker_container_log_stream']
              target_label: stream
