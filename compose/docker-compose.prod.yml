# Pre-prod overlay on top of compose/docker-compose.stack.yml — used by
# Codespaces (RFC-081 Phase 1) and any future always-on host (Phase 2,
# separate RFC).
#
# Use on top of docker-compose.stack.yml, e.g.:
#   docker compose -f compose/docker-compose.stack.yml -f compose/docker-compose.prod.yml up -d
#
# What this overlay does:
#
#   * Adds ``restart: unless-stopped`` so the api + viewer survive Codespace
#     suspend / wake cycles.
#   * Swaps ``image:`` refs from local-tag (``podcast-scraper-stack-*:latest``)
#     to GHCR-published refs (``ghcr.io/chipi/podcast-scraper-stack-*:main``).
#     Codespaces / VPS pulls bytes from GHCR instead of building locally —
#     fast, repeatable, and the exact bits Stack-test validated.
#   * Clears the ``build:`` block on those services so compose never tries
#     to build pre-prod images locally.
#   * Surfaces the pre-prod env vars (metrics, sentry, job webhook).
#
# What this overlay does NOT do:
#
#   * Adds no mock-feeds — pre-prod hits the real internet for RSS feeds.
#   * Adds no Playwright wiring — pre-prod is for operators, not test bots.
#   * Defines no ``pipeline`` (ML) service — the published image set is
#     api / viewer / pipeline-llm only (RFC-081 §Layer 1, license-driven).
#     If a job ever requests an ML profile in pre-prod, the api factory
#     will fail loud — by design.
#
# Tagging:
#
#   * Default ``${PODCAST_IMAGE_TAG:-main}`` — every passing main pushes
#     :main, so codespaces auto-track green main.
#   * Override to ``:sha-<short>`` for pinning during incident response
#     or to ``:pr-<num>`` for collaborator UAT.
#
# For external named volumes on a VPS, replace the ``corpus_data``
# definition in a site-local override that adds ``external: true``.
#
# Corpus storage:
#
#   This overlay redefines the ``corpus_data`` named volume (originally a
#   Docker-managed volume in stack.yml for stack-test ephemerality) as a
#   bind mount onto a host directory the operator can edit + back up:
#
#     - On Codespaces: ``/workspaces/podcast_scraper/.codespace_corpus``
#       (workspace-mounted, persists across rebuilds, the path that
#       backup-corpus.yml tarballs).
#     - On a VPS: override via ``PODCAST_CORPUS_HOST_PATH`` env var.
#
#   So:
#     * From a codespace shell: ``/workspaces/podcast_scraper/.codespace_corpus``
#     * From inside the api / pipeline-llm containers: ``/app/output``
#     * From the viewer corpus-path input: also ``/app/output`` (the path
#       the api validates against is the container's view).
#
#   ``.devcontainer/start.sh`` ``mkdir -p``s the host dir before
#   ``docker compose up`` so the bind mount source always exists.

services:
  viewer:
    image: ghcr.io/chipi/podcast-scraper-stack-viewer:${PODCAST_IMAGE_TAG:-main}
    build: !reset null
    restart: unless-stopped

  api:
    image: ghcr.io/chipi/podcast-scraper-stack-api:${PODCAST_IMAGE_TAG:-main}
    build: !reset null
    restart: unless-stopped
    # Docker job-mode wiring (mirror of stack-test). The api spawns
    # ``pipeline-llm`` containers via ``docker compose run --rm`` rather
    # than running pipeline code in-process; the published ``api`` image
    # only ships ``[server]`` extras, so an in-process pipeline run
    # would crash on missing ``[llm]``/``[ml]`` deps. The mount of
    # ``/var/run/docker.sock`` lets the api shell out to the host
    # docker daemon; the read-only project dir mount makes
    # ``compose/*.yml`` reachable from inside the api container so the
    # nested compose call can resolve them.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PODCAST_DOCKER_PROJECT_DIR:?PODCAST_DOCKER_PROJECT_DIR must be set — Codespaces sets it via .devcontainer/start.sh; VPS sets it via /srv/podcast-scraper/.env per PROD_RUNBOOK.md}:${PODCAST_DOCKER_PROJECT_DIR}:ro
    environment:
      # Surface the pre-prod observability env vars. Defaults are off
      # (empty) so this overlay is safe to apply without operator-side
      # secrets configured yet.
      PODCAST_METRICS_ENABLED: ${PODCAST_METRICS_ENABLED:-1}
      PODCAST_SENTRY_DSN_API: ${PODCAST_SENTRY_DSN_API:-}
      PODCAST_JOB_WEBHOOK_URL: ${PODCAST_JOB_WEBHOOK_URL:-}
      PODCAST_ENV: ${PODCAST_ENV:-preprod}
      PODCAST_RELEASE: ${PODCAST_RELEASE:-}
      # Docker job mode: api spawns the pipeline container via compose
      # instead of running pipeline code in-process. Required because
      # the published ``api`` image only ships ``[server]`` extras.
      PODCAST_PIPELINE_EXEC_MODE: docker
      PODCAST_DOCKER_PROJECT_DIR: ${PODCAST_DOCKER_PROJECT_DIR:?see comment above; required env var (.devcontainer/start.sh for Codespaces, .env for VPS)}
      # Pass-through for the nested ``docker compose run`` the api spawns.
      # That nested call parses ``stack.yml + prod.yml`` (per
      # ``PODCAST_DOCKER_COMPOSE_FILES`` below) and the prod overlay's
      # ``volumes.corpus_data.driver_opts.device`` references
      # ``${PODCAST_CORPUS_HOST_PATH:?...}``. Compose's default ``.env``
      # auto-load looks in the project dir = ``dirname(first -f)`` =
      # ``<project>/compose``, NOT ``<project>``, so without this
      # passthrough the nested compose can't resolve the var even though
      # the operator's ``.env`` has it. The api code now also passes
      # ``--env-file`` (pipeline_docker_factory) as the durable fix; this
      # passthrough remains as a belt-and-suspenders + works for any
      # other compose-time vars the YAML grows over time.
      PODCAST_CORPUS_HOST_PATH: ${PODCAST_CORPUS_HOST_PATH:?see comment above; required env var (.devcontainer/start.sh for Codespaces, .env for VPS)}
      # Compose files the nested ``docker compose run`` resolves. Codespace
      # default targets stack + prod overlays so the spawned container
      # inherits the prod overlay's bind-mounted ``corpus_data``.
      PODCAST_DOCKER_COMPOSE_FILES: ${PODCAST_DOCKER_COMPOSE_FILES:-compose/docker-compose.stack.yml,compose/docker-compose.prod.yml}
      # Pin compose project name so the nested ``docker compose run``
      # joins the running stack's network + volumes. Default ``compose``
      # matches what compose picks from the parent dir of the first
      # ``-f`` file (``compose/`` → project name ``compose``).
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-compose}
      # Restrict the operator profile dropdown to profiles whose backing
      # image is actually published to GHCR. Phase 1 publishes
      # ``pipeline-llm`` only — but the image now ships [llm] + [search]
      # extras (faiss + sentence-transformers + torch CPU) so cloud_balanced
      # runs on it alongside cloud_thin. cloud_balanced is the default so
      # the viewer's Search/Index surface is populated; cloud_thin stays in
      # the allowlist for operators who explicitly want the cheaper
      # no-vector-index variant. See RFC-081 §Layer 1.
      # Comma-separated allowlist; intersected with on-disk profile names.
      # Override or extend on a Phase 2+ host that publishes more pipeline
      # images. Unset = no filtering (dev / CI).
      PODCAST_AVAILABLE_PROFILES: ${PODCAST_AVAILABLE_PROFILES:-cloud_balanced,cloud_thin}
      # Default profile for fresh corpora that haven't saved one yet. The
      # viewer preselects this in the dropdown so first-run UX shows the
      # right preset without an operator-side click; the api also falls
      # back to it in ``build_pipeline_argv`` when the operator triggers a
      # run before clicking Save in the profile menu. Must be one of
      # PODCAST_AVAILABLE_PROFILES or unset (no preselection / no fallback).
      PODCAST_DEFAULT_PROFILE: ${PODCAST_DEFAULT_PROFILE:-cloud_balanced}
      # Host-wide default for ``pipeline_install_extras`` when the operator
      # YAML omits it. Lets a fresh prod corpus run without an operator-side
      # YAML edit (#666 review #13 follow-up). Must be ``ml`` or ``llm``;
      # other values fall back to the strict YAML-required error path.
      # Default ``llm`` matches the prod-published image set (only the
      # ``pipeline-llm`` image is published in RFC-081 Phase 1 / RFC-082).
      # Codespace preprod inherits the same value via the prod overlay.
      PODCAST_DEFAULT_PIPELINE_INSTALL_EXTRAS: ${PODCAST_DEFAULT_PIPELINE_INSTALL_EXTRAS:-llm}
      # Pass-through for the nested ``docker compose run pipeline-llm``.
      # The pipeline-llm service's ``environment:`` block resolves these
      # vars from compose's env at parse time. Without this passthrough,
      # the nested compose process inherits only the api container's env
      # — and since the api doesn't otherwise need the LLM keys
      # itself, they'd resolve to empty defaults and the pipeline would
      # crash on the first provider call. The api code now also passes
      # ``--env-file`` (pipeline_docker_factory) which makes this
      # belt-and-suspenders, but keeping the passthrough explicit avoids
      # one indirection layer for operators reading the YAML.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      PODCAST_SENTRY_DSN_PIPELINE: ${PODCAST_SENTRY_DSN_PIPELINE:-}

  pipeline-llm:
    image: ghcr.io/chipi/podcast-scraper-stack-pipeline-llm:${PODCAST_IMAGE_TAG:-main}
    build: !reset null
    # No restart: pipeline runs are one-shot ``docker compose run --rm``
    # invocations spawned by the api factory; not a long-lived service.

  # Grafana Agent — pre-prod observability sink (RFC-081 §Layer 2).
  # Scrapes api /metrics + tails Docker container logs, ships to
  # Grafana Cloud Prom + Loki. Default-off when GRAFANA_CLOUD_*
  # env vars are unset; the agent stays running idle.
  grafana-agent:
    image: grafana/agent:v0.43.4
    restart: unless-stopped
    volumes:
      - ../compose/grafana-agent.yaml:/etc/agent/agent.yaml:ro
      # Read-only docker socket for ``docker_sd`` log discovery.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "-config.file=/etc/agent/agent.yaml"
      - "-config.expand-env=true"
      - "-enable-features=integrations-next"
      - "-server.http.address=0.0.0.0:12345"
    environment:
      GRAFANA_CLOUD_PROM_URL: ${GRAFANA_CLOUD_PROM_URL:-}
      GRAFANA_CLOUD_LOKI_URL: ${GRAFANA_CLOUD_LOKI_URL:-}
      GRAFANA_CLOUD_PROM_USER: ${GRAFANA_CLOUD_PROM_USER:-}
      GRAFANA_CLOUD_LOKI_USER: ${GRAFANA_CLOUD_LOKI_USER:-}
      GRAFANA_CLOUD_API_KEY: ${GRAFANA_CLOUD_API_KEY:-}
      PODCAST_ENV: ${PODCAST_ENV:-preprod}
      PODCAST_RELEASE: ${PODCAST_RELEASE:-}
    depends_on:
      api:
        condition: service_healthy

# Example: pin memory on a small VPS (uncomment and tune):
#   api:
#     deploy:
#       resources:
#         limits:
#           memory: 2G

# Override the ``corpus_data`` named volume from stack.yml as a bind
# mount onto the host's workspace dir. Default targets the codespace
# layout. On a VPS, set ``PODCAST_CORPUS_HOST_PATH`` to an absolute
# path (e.g., ``/var/lib/podcast/corpus``) before ``docker compose up``.
volumes:
  corpus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PODCAST_CORPUS_HOST_PATH:?PODCAST_CORPUS_HOST_PATH must be set — Codespaces sets it via .devcontainer/start.sh; VPS sets it via /srv/podcast-scraper/.env per PROD_RUNBOOK.md}
