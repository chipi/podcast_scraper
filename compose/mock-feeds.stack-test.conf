# Stack-test mock-feeds: avoid nesting bind mounts under /usr/share/nginx/html (Docker Desktop
# rejects a second mount under a read-only parent). Serve RSS from /data/rss; alias paths
# used by tests/fixtures/rss/*.xml (absolute /transcripts/, /audio/).
server {
    listen 80;
    server_name localhost;
    charset utf-8;

    location /transcripts/ {
        alias /data/transcripts/;
        default_type text/plain;
    }

    location /audio/ {
        alias /data/audio/;
        default_type audio/mpeg;
    }

    location / {
        root /data/rss;
        default_type application/xml;
    }
}
