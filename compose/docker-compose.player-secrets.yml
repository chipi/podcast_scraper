# Player secret delivery overlay — ADR-115 Option A (files-in-tmpfs), the same pattern
# the operator stack uses (compose/docker-compose.secrets.yml), scoped to the PLAYER tenant.
#
# Joined by deploy-player.sh ONLY when PLAYER_SECRETS_VIA_FILES=1. The player-api runs the
# same image as the operator api, whose baked entrypoint is the shim
# (docker/secrets-shim.sh, ENTRYPOINT ["/secrets-shim.sh"]): it reads /run/secrets/*,
# exports each file as its UPPERCASED env var, then execs the real entrypoint. So a file
# `app_session_secret` becomes env `APP_SESSION_SECRET` — no secret in the host/compose env
# and none at rest on disk (source files live in /dev/shm = RAM).
#
# Per-tenant isolation (ADR-115 §2): the player's plaintext source files live in
# /dev/shm/player-secrets/ (NOT the operator's /dev/shm/podcast-secrets/), staged fresh from
# GH Secrets on every deploy. GH Secrets stays the private source of truth (public repo →
# no sops ciphertext committed, Option A).
#
# Runtime secrets moved off .env.player: the Google OAuth client secret, the session
# signing secret, and the backend Sentry DSN. (VITE_* stay build-args — public, baked into
# the browser bundle; PLAYER_DOMAIN / corpus / client_id / PODCAST_ENV stay non-secret env.)

services:
  api:
    secrets:
      - app_oauth_google_client_secret
      - app_session_secret
      - podcast_sentry_dsn_api

secrets:
  app_oauth_google_client_secret:
    file: /dev/shm/player-secrets/app_oauth_google_client_secret
  app_session_secret:
    file: /dev/shm/player-secrets/app_session_secret
  podcast_sentry_dsn_api:
    file: /dev/shm/player-secrets/podcast_sentry_dsn_api
