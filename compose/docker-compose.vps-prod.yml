# VPS-prod-only overlay (RFC-082 + #713).
#
# Layered ON TOP of docker-compose.stack.yml + docker-compose.prod.yml when
# the stack runs on the always-on Hetzner VPS. Used by infra/deploy/deploy.sh
# and the systemd unit in infra/cloud-init/prod.user-data; NOT used by
# Codespaces (pre-prod), which sticks with stack + prod only and keeps the
# auth-free default nginx config.
#
# Adds:
#   - VPS-flavored nginx (prod landing page + same env injection as prod)
#   - landing.html bind-mounted into nginx's docroot (so /welcome resolves)

services:
  viewer:
    volumes:
      # Prod nginx config replaces the auth-free default that's baked
      # into the published image. Mounted as a TEMPLATE into
      # /etc/nginx/templates/ so the nginx:alpine entrypoint envsubst's
      # the ``${PODCAST_*}`` placeholders before nginx starts (the
      # viewer image sets ``NGINX_ENVSUBST_FILTER=^PODCAST_`` to prevent
      # mangling of nginx's own ``${var}`` references). Result lands at
      # /etc/nginx/conf.d/default.conf at container start.
      - ../docker/viewer/nginx-prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      # Landing page for /welcome. Bind-mounted (not COPY'd into the
      # published viewer image) so the prod-only landing surface
      # doesn't leak into Codespaces or alter the image's contents.
      - ../docker/viewer/landing.html:/usr/share/nginx/html/landing.html:ro

  # Enable OTEL traces on the always-on VPS (ADR-119). The base stack.yml gates
  # them off (exporter=none); here we only flip the exporter to otlp. The
  # ENDPOINT is NOT set here — it comes from the prod .env via stack.yml's
  # `OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}`
  # passthrough, so there is no hardcoded backend IP in this file. deploy-prod.yml
  # writes that key into the prod .env; it currently targets the self-hosted
  # homelab VictoriaTraces OTLP ingest:
  #   active:  http://homelab:10428/insert/opentelemetry/v1/traces
  #   (DGX stopgap was http://dgx-llm-1:10428/insert/opentelemetry/v1/traces)
  # A box migration is a one-line flip of that host in deploy-prod.yml's render.
  # Only the VPS gets these — stack-test/Codespaces never load this overlay.
  #
  # extra_hosts: the o11y backend is addressed by its Tailscale MagicDNS name
  # `homelab`, but Docker's embedded DNS can't resolve MagicDNS — so the containers
  # get a static hosts entry to reach VictoriaTraces (traces) + GlitchTip (errors).
  # HOMELAB_TAILNET_IP is resolved fresh at deploy time by deploy.sh (`tailscale ip
  # -4 homelab`) — the IP is never hardcoded in the repo. Using extra_hosts (not
  # `dns:`) keeps Docker's embedded DNS intact for compose service names.
  api:
    extra_hosts:
      - "homelab:${HOMELAB_TAILNET_IP}"
    environment:
      OTEL_TRACES_EXPORTER: otlp
  pipeline:
    extra_hosts:
      - "homelab:${HOMELAB_TAILNET_IP}"
    environment:
      OTEL_TRACES_EXPORTER: otlp
  pipeline-llm:
    extra_hosts:
      - "homelab:${HOMELAB_TAILNET_IP}"
    environment:
      OTEL_TRACES_EXPORTER: otlp
