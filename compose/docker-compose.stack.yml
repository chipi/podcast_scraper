# GitHub #659: viewer (Nginx) + API (FastAPI) + optional pipeline (docker/pipeline/Dockerfile).
# Long-running: viewer + api. Pipeline runs as one-shot jobs spawned by
# the API job factory (``PODCAST_PIPELINE_EXEC_MODE=docker``) which calls
# ``docker compose run --rm pipeline python -m podcast_scraper.cli ...``
# with operator-driven ``--config <viewer_operator.yaml> --feeds-spec
# <feeds.spec.yaml> --profile <name>``. Pipeline configuration lives in
# the operator YAML on disk under the corpus root, not in a static
# ``/app/config.yaml`` — that older single-config path was retired with
# the move to the operator-config API.
#
# Prerequisites:
#   - ``docker compose up`` does not start the pipeline services
#     (profiles ``pipeline`` / ``pipeline-llm``); they are spawned per-job.

services:
  viewer:
    build:
      context: ..
      dockerfile: docker/viewer/Dockerfile
      args:
        # Sentry build-time env injection. Vite picks up VITE_*
        # at build time and bakes them into the SPA bundle. All
        # three are optional — Vue main.ts only initialises Sentry
        # when VITE_SENTRY_DSN_VIEWER is set. See RFC-081 §Layer 2.
        VITE_SENTRY_DSN_VIEWER: ${VITE_SENTRY_DSN_VIEWER:-}
        VITE_PODCAST_ENV: ${VITE_PODCAST_ENV:-dev}
        VITE_PODCAST_RELEASE: ${VITE_PODCAST_RELEASE:-}
    image: podcast-scraper-stack-viewer:latest
    ports:
      - "${VIEWER_PORT:-8080}:80"
    # #666 review #6: explicit compose-level healthcheck so other services
    # can chain ``depends_on: condition: service_healthy`` on the viewer.
    # Nginx serves the SPA shell on GET /.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/ > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    image: podcast-scraper-stack-api:latest
    expose:
      - "8000"
    # #666 review #6: explicit compose-level healthcheck (mirrors the
    # Dockerfile HEALTHCHECK) so ``depends_on: condition: service_healthy``
    # actually waits on the API. Some Compose versions ignore healthchecks
    # declared only in the image; make the contract visible here.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    environment:
      # Provider keys: empty defaults (set in repo-root ``.env`` for Compose substitution only).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
    volumes:
      # Read-write: API may rebuild vector index or write lock files under the corpus root.
      - corpus_data:/app/output

  pipeline:
    profiles:
      - pipeline
    build:
      context: ..
      dockerfile: docker/pipeline/Dockerfile
      args:
        INSTALL_EXTRAS: ${STACK_PIPELINE_INSTALL_EXTRAS:-ml}
        PRELOAD_ML_MODELS: ${STACK_PIPELINE_PRELOAD_ML:-true}
        # Selects which preload bundle the Dockerfile bakes in. Default is
        # ``production`` (full nightly bundle); ``make stack-test-build`` overrides
        # to ``airgapped-thin`` so the stack-test pipeline image is smaller and
        # license-clean (no SummLlama / Pegasus / hybrid models).
        PRELOAD_VARIANT: ${STACK_PIPELINE_PRELOAD_VARIANT:-production}
    image: podcast-scraper-stack-pipeline:latest
    volumes:
      - corpus_data:/app/output
    environment:
      PODCAST_SCRAPER_WORK_DIR: /app
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      # Sentry SDK — init at the CLI entrypoint, gated on this DSN being
      # set. Default empty (no-op). When set in Codespaces / VPS env, the
      # spawned ``docker compose run pipeline ...`` subprocess inherits
      # the DSN and reports crashes with full stack traces tagged
      # ``component=pipeline``.  See RFC-081 §Layer 2, issue #681.
      PODCAST_SENTRY_DSN_PIPELINE: ${PODCAST_SENTRY_DSN_PIPELINE:-}
      PODCAST_ENV: ${PODCAST_ENV:-dev}
      PODCAST_RELEASE: ${PODCAST_RELEASE:-}

  # Optional: same Dockerfile with ``INSTALL_EXTRAS=llm`` (``pyproject`` **``. [llm]``**) for cloud-thin profiles.
  pipeline-llm:
    profiles:
      - pipeline-llm
    build:
      context: ..
      dockerfile: docker/pipeline/Dockerfile
      args:
        INSTALL_EXTRAS: llm
        PRELOAD_ML_MODELS: "false"
    image: podcast-scraper-stack-pipeline-llm:latest
    volumes:
      - corpus_data:/app/output
    environment:
      PODCAST_SCRAPER_WORK_DIR: /app
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GROK_API_KEY: ${GROK_API_KEY:-}
      # Mirror of the ``pipeline`` service's Sentry env. cloud_thin
      # pre-prod runs use this image, so DSN propagation must be
      # symmetric. See RFC-081 §Layer 2, issue #681.
      PODCAST_SENTRY_DSN_PIPELINE: ${PODCAST_SENTRY_DSN_PIPELINE:-}
      PODCAST_ENV: ${PODCAST_ENV:-dev}
      PODCAST_RELEASE: ${PODCAST_RELEASE:-}

volumes:
  corpus_data:
