# RFC-078: smoke overlay on compose/docker-compose.stack.yml (#659). Used locally (make smoke-*)
# and in CI. Build/run: always pass both -f files from the repository root.
# Usage:
#   docker compose -f compose/docker-compose.stack.yml -f compose/docker-compose.smoke.yml build
#   docker compose -f compose/docker-compose.stack.yml -f compose/docker-compose.smoke.yml run --rm pipeline

services:
  api:
    volumes:
      - smoke_data:/app/output

  viewer:
    ports:
      - "${SMOKE_VIEWER_PORT:-8090}:80"

  pipeline:
    profiles: []
    volumes:
      - smoke_data:/app/output
      - ../tests/fixtures/rss:/app/fixtures/rss:ro
      - ../config/ci/smoke-config.yaml:/app/config.yaml:ro

  pipeline-llm:
    profiles: []
    volumes:
      - smoke_data:/app/output
      - ../tests/fixtures/rss:/app/fixtures/rss:ro
      - ../config/ci/smoke-config.yaml:/app/config.yaml:ro

volumes:
  smoke_data:
