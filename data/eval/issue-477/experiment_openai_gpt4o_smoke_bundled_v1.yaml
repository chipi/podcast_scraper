# Experiment: GPT-4o bundled clean+summary+bullets on smoke (Issue #477).
#
# **Canonical copy:** ``data/eval/issue-477/`` (see README.md here).
#
# Same stack as experiment_openai_gpt4o_smoke_bullets_v1 but ``llm_pipeline_mode: bundled``.
# Compare quality (REFERENCE=silver_gpt4o_smoke_bullets_v1) and cost via
# ``python scripts/eval/run_experiment.py ... --cost-report`` (eval_pipeline_metrics.json).
#
# Requires: OPENAI_API_KEY

id: "experiment_openai_gpt4o_smoke_bundled_v1"
task: "summarization"

backend:
  type: "openai"
  model: "gpt-4o"

prompts:
  system: "shared/summarization/system_bullets_v1"
  user: "shared/summarization/bullets_json_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
llm_pipeline_mode: "bundled"
