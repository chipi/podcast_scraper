# Round 3 v1 — Llama-3.3-70B-Instruct-NVFP4 with vendor-correct sampling.
#
# Vendor Round 1/2 gap (per RedHatAI NVFP4 card 2026-06-17):
#   - Vendor's vLLM example: temperature=0.6, top_p=0.9.
#   - Round 2 ran greedy + strict anti-echo prompt → 46s/ep (recovered
#     from Round 1's 87s). Strict prompt was a partial fix; vendor
#     sampling may close more quality gap.
#   - NVFP4 quant does NOT change vendor sampling recommendations.
#   - --quantization=nvfp4 NOT required (vLLM autodetects).
#
# Keeps Round 2's strict anti-echo prompt — verbosity-overflow was the
# Round 1 failure mode and strict prompt resolved it.
#
# Reference: autoresearch/MODEL_PLAYBOOK.md § Round 3 plan, Priority 2
id: "autoresearch_prompt_vllm_llama_3_3_70b_nvfp4_dev_paragraph_round3_v1"
task: "summarization"
backend:
  type: "openai"
  model: "autoresearch"
  base_url: "http://localhost:8003/v1"
  api_key_env: "VLLM_API_KEY"
  extra_body:
    top_p: 0.9
prompts:
  system: "vllm/strict_summarization/system_v1"
  user: "vllm/strict_summarization/long_v1"
data:
  dataset_id: "curated_5feeds_dev_v1"
params:
  max_length: 800
  min_length: 200
  temperature: 0.6
preprocessing_profile: "cleaning_v4"
