# Silver candidate: Sonnet 4.6 paragraph summaries on benchmark_v2 (5 held-out e03 episodes).

id: "silver_candidate_sonnet46_benchmark_v2_paragraph"
task: "summarization"

backend:
  type: "anthropic"
  model: "claude-sonnet-4-6"

prompts:
  system: "anthropic/summarization/system_v1"
  user: "anthropic/summarization/long_v1"

data:
  dataset_id: "curated_5feeds_benchmark_v2"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
