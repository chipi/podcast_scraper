# Bundled OpenAI output scored on paragraph only — for apples-to-apples comparison
# with autoresearch_prompt_openai_smoke_paragraph_v1.
#
# Uses scoring_output_field: summary to extract only the prose paragraph before ROUGE.
# Pair with silver: silver_sonnet46_smoke_v1
#
# Requires: OPENAI_API_KEY

id: "autoresearch_prompt_openai_bundled_smoke_paragraph_v1"
task: "summarization"

backend:
  type: "openai"
  model: "gpt-4o-mini"

llm_pipeline_mode: "bundled"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
scoring_output_field: "summary"
