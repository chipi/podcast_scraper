# Autoresearch Track A — paragraph summaries, Ollama qwen3-coder:30b.
#
# Added for smoke v2 refresh on DGX (#924). Uses the same prompt templates as
# qwen3.5:9b for the first sweep — future tuning per model under
# src/podcast_scraper/prompts/ollama/qwen3-coder_30b/summarization/.
#
# Pair with silver: silver_sonnet46_smoke_v1
# Requires: ollama pull qwen3-coder:30b (already pulled on DGX as of 2026-06-08)

id: "autoresearch_prompt_ollama_qwen3-coder_30b_smoke_paragraph_v1"
task: "summarization"

backend:
  type: "ollama"
  model: "qwen3-coder:30b"

prompts:
  system: "ollama/qwen3-coder_30b/summarization/system_v1"
  user: "ollama/qwen3-coder_30b/summarization/long_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
