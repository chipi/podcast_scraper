# Autoresearch v2 non-bundled paragraph ratchet — Anthropic, dev dataset (10 episodes).
# Templates: anthropic/summarization/system_v1.j2 + long_v1.j2 (updated with champion rules).
# Paired silver: silver_sonnet46_dev_v1_paragraph

id: "autoresearch_prompt_anthropic_dev_paragraph_v2"
task: "summarization"

backend:
  type: "anthropic"
  model: "claude-haiku-4-5-20251001"

prompts:
  system: "anthropic/summarization/system_v1"
  user: "anthropic/summarization/long_v1"

data:
  dataset_id: "curated_5feeds_dev_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
