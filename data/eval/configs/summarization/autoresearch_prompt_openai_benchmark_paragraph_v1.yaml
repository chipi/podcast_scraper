# Autoresearch Track A — **paragraph** summaries (aligned with legacy silver pipeline).
#
# Pair with silver: ``silver_gpt4o_smoke_v1`` (from ``long_v1``, paragraph text in ``summary_final``).
#
# Compare: bullet line uses ``autoresearch_prompt_openai_smoke_bullets_v1.yaml`` +
# ``REFERENCE=silver_gpt4o_smoke_bullets_v1`` (once promoted).
#
# ``autoresearch/prompt_tuning/eval/score.py`` sets data.max_episodes from AUTORESEARCH_EVAL_N.
# Requires: materialized curated_5feeds_benchmark_v1.

id: "autoresearch_prompt_openai_benchmark_paragraph_v1"
task: "summarization"

backend:
  type: "openai"
  model: "gpt-4o-mini"

prompts:
  system: "openai/summarization/system_v1"
  user: "openai/summarization/long_v1"

data:
  dataset_id: "curated_5feeds_benchmark_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
