# Round 2 — DeepSeek-V2-Lite-Chat with STRICT anti-echo summarization prompt
# (Round 1 failure mode: model started transcribing the source verbatim instead of summarizing).
id: "autoresearch_prompt_vllm_deepseek_v2_lite_chat_dev_paragraph_strict_v2"
task: "summarization"
backend:
  type: "openai"
  model: "autoresearch"
  base_url: "http://localhost:8003/v1"
  api_key_env: "VLLM_API_KEY"
prompts:
  system: "vllm/strict_summarization/system_v1"
  user: "vllm/strict_summarization/long_v1"
  # DeepSeek-V2 + vLLM 26.05-py3 emits raw byte-level BPE artifacts
  # (`Ġ` for space, etc.) — same bug observed with R1-Distill in Phase 2a.
  # Apply the byte-level decoder post-processor.
  postprocessor: "decode_r1_byte_level"
data:
  dataset_id: "curated_5feeds_dev_v1"
params:
  max_length: 800
  min_length: 200
  temperature: 0.0
preprocessing_profile: "cleaning_v4"
