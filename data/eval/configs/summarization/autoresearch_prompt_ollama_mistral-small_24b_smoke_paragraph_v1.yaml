# Autoresearch Track A — paragraph summaries, Ollama mistral-small:24b.
#
# Added for smoke v2.1 refresh on DGX (#45). Successor candidate to
# mistral-small3.2 (already in v2 matrix). Uses qwen3.5:9b templates verbatim
# for the first pass; per-model tuning is a downstream concern (#906 descendant).
#
# Pair with silver: silver_sonnet46_smoke_v1
# Requires: ollama pull mistral-small:24b (DGX as of 2026-06-09)

id: "autoresearch_prompt_ollama_mistral-small_24b_smoke_paragraph_v1"
task: "summarization"

backend:
  type: "ollama"
  model: "mistral-small:24b"

prompts:
  system: "ollama/mistral-small_24b/summarization/system_v1"
  user: "ollama/mistral-small_24b/summarization/long_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
