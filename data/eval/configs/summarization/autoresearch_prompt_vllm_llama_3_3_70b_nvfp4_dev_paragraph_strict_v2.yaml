# Round 2 — Llama-3.3-70B-Instruct-NVFP4 (RedHatAI) with STRICT anti-verbosity prompt
# (Round 1 failure mode: hit finish_reason=length on p02_e02 — model produced detailed
# narrative summary that exceeded 800 tokens; same instruction-adherence issue as Kimi
# and DeepSeek-V2.)
id: "autoresearch_prompt_vllm_llama_3_3_70b_nvfp4_dev_paragraph_strict_v2"
task: "summarization"
backend:
  type: "openai"
  model: "autoresearch"
  base_url: "http://localhost:8003/v1"
  api_key_env: "VLLM_API_KEY"
prompts:
  system: "vllm/strict_summarization/system_v1"
  user: "vllm/strict_summarization/long_v1"
data:
  dataset_id: "curated_5feeds_dev_v1"
params:
  max_length: 800
  min_length: 200
  temperature: 0.0
preprocessing_profile: "cleaning_v4"
