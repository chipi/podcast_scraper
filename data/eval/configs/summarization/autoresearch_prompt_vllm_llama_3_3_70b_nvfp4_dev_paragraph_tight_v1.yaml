# #1016 Phase 2b summary tight — Llama-3.3-70B-Instruct-NVFP4 (RedHatAI, NEW Phase 2c candidate).
id: "autoresearch_prompt_vllm_llama_3_3_70b_nvfp4_dev_paragraph_tight_v1"
task: "summarization"
backend:
  type: "openai"
  model: "autoresearch"
  base_url: "http://localhost:8003/v1"
  api_key_env: "VLLM_API_KEY"
prompts:
  system: "ollama/qwen3.5_35b/summarization/system_v1"
  user: "ollama/qwen3.5_35b/summarization/long_v1"
data:
  dataset_id: "curated_5feeds_dev_v1"
params:
  # Llama-3.3-70B-NVFP4 needs more tokens than the 500-tight spec —
  # hit finish_reason=length guardrail at 500. Bumping to 800 (same
  # as the existing 4 vLLM models' original Phase 2b configs) so the
  # model can produce a complete summary. Length parity with the rest
  # of the cohort then checked at the gate via the char-count rule
  # (mean within 50% of spec band).
  max_length: 800
  min_length: 200
  temperature: 0.0
preprocessing_profile: "cleaning_v4"
