# Round 3 v1 — DeepSeek-V2-Lite-Chat with vendor-correct sampling.
#
# Vendor Round 1/2 gap:
#   - Vendor's vLLM example uses temperature=0.3.
#   - generation_config.json: temperature=0.3, top_p=0.95, do_sample=True.
#   - Round 2 ran greedy temp=0.0 with strict anti-echo prompt +
#     decode_r1_byte_level postproc — passed gate at 4.8s/ep (fastest
#     DGX-served candidate).
#   - Quality at vendor sampling may be different; speed-wise we have
#     huge headroom (4.8s is way under 100s gate).
#
# Keeps Round 2's harness (strict prompt + BPE decoder) — those resolved
# the Round 1 echo-and-byte-artifacts failure modes.
#
# Reference: autoresearch/MODEL_PLAYBOOK.md § Round 3 plan, Priority 2
id: "autoresearch_prompt_vllm_deepseek_v2_lite_chat_dev_paragraph_round3_v1"
task: "summarization"
backend:
  type: "openai"
  model: "autoresearch"
  base_url: "http://localhost:8003/v1"
  api_key_env: "VLLM_API_KEY"
  extra_body:
    top_p: 0.95
prompts:
  system: "vllm/strict_summarization/system_v1"
  user: "vllm/strict_summarization/long_v1"
  postprocessor: "decode_r1_byte_level"
data:
  dataset_id: "curated_5feeds_dev_v1"
params:
  max_length: 800
  min_length: 200
  temperature: 0.3
preprocessing_profile: "cleaning_v4"
