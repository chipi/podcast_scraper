# Ollama Gemma 2 9B — pure LLM summarization smoke (no LongT5 MAP).
# Requires: ollama pull gemma2:9b
# Hybrid MAP+REDUCE: use hybrid_ml tier2 configs with gemma2:9b REDUCE.

id: "llm_ollama_gemma2_9b_smoke_v1"
task: "summarization"

backend:
  type: "ollama"
  model: "gemma2:9b"

prompts:
  user: "ollama/summarization/long_v1"
  system: "ollama/summarization/system_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
