# Ollama Phi-3 mini — pure LLM summarization smoke (no LongT5 MAP).
# Requires: ollama pull phi3:mini
# Hybrid MAP+REDUCE: use configs with hybrid_ml + phi3:mini REDUCE.

id: "llm_ollama_phi3_mini_smoke_v1"
task: "summarization"

backend:
  type: "ollama"
  model: "phi3:mini"

prompts:
  user: "ollama/summarization/long_v1"
  system: "ollama/summarization/system_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
