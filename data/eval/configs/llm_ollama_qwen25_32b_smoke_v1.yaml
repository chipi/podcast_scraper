# Ollama Qwen 2.5 32B — pure LLM summarization smoke (no LongT5 MAP).
# For multi-run comparison vs silver. Requires: ollama pull qwen2.5:32b
# Hybrid MAP+REDUCE: use hybrid_ml_tier2_qwen25_32b_smoke_v1 (or authority).

id: "llm_ollama_qwen25_32b_smoke_v1"
task: "summarization"

backend:
  type: "ollama"
  model: "qwen2.5:32b"

prompts:
  user: "ollama/summarization/long_v1"
  system: "ollama/summarization/system_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
