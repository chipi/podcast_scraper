# Grok on smoke — for multi-run LLM comparison vs silver reference.
# Requires: GROK_API_KEY
# Model: aligned with acceptance (acceptance_planet_money_grok). grok-2 returned 400 (model not found).

id: "llm_grok_smoke_v1"
task: "summarization"

backend:
  type: "grok"
  model: "grok-3-mini"

prompts:
  user: "grok/summarization/long_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
