# Ollama Mistral 7B — pure LLM summarization smoke (no LongT5 MAP).
# Requires: ollama pull mistral:7b
# Hybrid MAP+REDUCE: use hybrid_ml tier2 configs with mistral:7b REDUCE.

id: "llm_ollama_mistral_7b_smoke_v1"
task: "summarization"

backend:
  type: "ollama"
  model: "mistral:7b"

prompts:
  user: "ollama/summarization/long_v1"
  system: "ollama/summarization/system_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
