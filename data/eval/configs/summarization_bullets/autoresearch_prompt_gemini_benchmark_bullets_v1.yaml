# Autoresearch Track A — bullet JSON summaries, Gemini backend, benchmark dataset.
#
# Pair with silver: ``silver_sonnet46_benchmark_bullets_v1``
#
# Template under tuning: src/podcast_scraper/prompts/shared/summarization/bullets_json_v1.j2
# Results log: autoresearch/prompt_tuning/results_summary_gemini_bullets_benchmark_v1.tsv
#
# Note: gemini-2.5-pro and gemini-3.1-pro-preview are thinking models that exhaust
# max_output_tokens on reasoning; use gemini-2.0-flash (non-thinking, GA).
#
# Requires: GOOGLE_API_KEY

id: "autoresearch_prompt_gemini_benchmark_bullets_v1"
task: "summarization"

backend:
  type: "gemini"
  model: "gemini-2.0-flash"

prompts:
  system: "shared/summarization/system_bullets_v1"
  user: "shared/summarization/bullets_json_v1"

data:
  dataset_id: "curated_5feeds_benchmark_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
