# Autoresearch Track A — bullet JSON summaries, Ollama backend (DGX smoke).
#
# Sibling of autoresearch_prompt_openai_smoke_bullets_v1.yaml — same prompts,
# same dataset, same preprocessing, swapped backend. Used by
# autoresearch-eval-nightly.yml on the DGX self-hosted runner.
#
# Pair with judge config: judge_config_ollama.yaml (Gemma + Mistral judges).
# Silver reference stays GPT-4o-generated (silver_gpt4o_smoke_bullets_v1) —
# silver is a fixed target, generated once, not a live API call.

id: "autoresearch_prompt_ollama_smoke_bullets_v1"
task: "summarization"

backend:
  type: "ollama"
  # Candidate ("aiming") model — what we're tuning the prompt against.
  # Meta family; distinct from Gemma (judge_a) and Mistral (judge_b).
  model: "llama3.1:8b"

prompts:
  system: "shared/summarization/system_bullets_v1"
  user: "shared/summarization/bullets_json_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
