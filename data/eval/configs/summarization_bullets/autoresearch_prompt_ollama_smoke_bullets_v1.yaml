# Autoresearch Track A — bullet JSON summaries, Ollama backend (DGX smoke).
#
# Sibling of autoresearch_prompt_openai_smoke_bullets_v1.yaml — same prompts,
# same preprocessing, swapped backend + dataset. Used by
# autoresearch-eval-nightly.yml on the DGX self-hosted runner.
#
# Pair with:
#   judge config:     judge_config_ollama.yaml         (Gemma + Mistral)
#   silver reference: silver_sonnet46_smoke_v2_bullets (Anthropic Sonnet 4.6)
#
# Four distinct vendor families across silver + candidate + 2 judges:
#   silver:    sonnet-4-6      (Anthropic)
#   candidate: llama3.1:8b     (Meta)        ← what we're tuning
#   judge_a:   gemma3:27b      (Google)
#   judge_b:   mistral-small:24b (Mistral AI)
# Cross-family is what keeps a single vendor's style from dominating
# the score — see operator memory ``feedback_silver_judge_vendor_bias``.

id: "autoresearch_prompt_ollama_smoke_bullets_v1"
task: "summarization"

backend:
  type: "ollama"
  # Candidate ("aiming") model — what we're tuning the prompt against.
  model: "llama3.1:8b"

prompts:
  system: "shared/summarization/system_bullets_v1"
  user: "shared/summarization/bullets_json_v1"

data:
  # v2 pairs with the current silver (silver_sonnet46_smoke_v2_bullets);
  # v1 is archived. The dataset descriptor is tracked but the materialized
  # tree is gitignored — the workflow runs ``make dataset-materialize`` before
  # the smoke to rebuild it from the (tracked) sources.
  dataset_id: "curated_5feeds_smoke_v2"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
