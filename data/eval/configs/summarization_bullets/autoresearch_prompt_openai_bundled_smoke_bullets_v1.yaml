# Autoresearch bundled prompt tuning — OpenAI, smoke scale.
#
# Ratchet design (r7+): scores bullets only (scoring_output_field: bullets) vs
# silver_sonnet46_smoke_bullets_v1. Paragraph quality is tracked separately via
# silver_gpt4o_smoke_bundled_v1 (evaluation only, not ratchet).
#
# Templates under tuning:
#   src/podcast_scraper/prompts/openai/summarization/bundled_clean_summary_system_v1.j2
#   src/podcast_scraper/prompts/openai/summarization/bundled_clean_summary_user_v1.j2
#
# Results log: autoresearch/bundled_prompt_tuning/results/results_openai_r1.tsv
#
# Requires: OPENAI_API_KEY

id: "autoresearch_prompt_openai_bundled_smoke_bullets_v1"
task: "summarization"

backend:
  type: "openai"
  model: "gpt-4o"

llm_pipeline_mode: "bundled"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  temperature: 0.0
  seed: 42

preprocessing_profile: "cleaning_v4"
scoring_output_field: "bullets"
