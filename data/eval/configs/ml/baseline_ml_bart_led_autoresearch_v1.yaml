# BART+LED autoresearch winner — promoted from baseline_ml_dev_authority
# RFC-057 Track B: greedy param sweep, 2 rounds, 11 experiments total.
#
# Round 1 wins:
#   max_new_tokens: 650 → 550  (+2.89% ROUGE-L)  avg_tokens: 217 → 267
#   num_beams:        4 → 6    (+1.15% ROUGE-L)
# Round 2 (no_repeat_ngram_size): all candidates rejected, early stop.
# Final: ROUGE-L 18.82% (+4.07% vs baseline 18.09%), embed 72.6%

id: "baseline_ml_bart_led_autoresearch_v1"
task: "summarization"

backend:
  type: "hf_local"
  map_model: "bart-small"
  reduce_model: "long-fast"

map_params:
  do_sample: false
  num_beams: 4
  max_new_tokens: 200
  min_new_tokens: 80
  no_repeat_ngram_size: 3
  repetition_penalty: 1.3
  length_penalty: 1.0
  early_stopping: true

reduce_params:
  do_sample: false
  num_beams: 6
  max_new_tokens: 550
  min_new_tokens: 220
  no_repeat_ngram_size: 3
  repetition_penalty: 1.3
  length_penalty: 1.0
  early_stopping: true

data:
  dataset_id: "curated_5feeds_smoke_v1"

preprocessing_profile: "cleaning_v4"

tokenize:
  map_max_input_tokens: 1024
  reduce_max_input_tokens: 4096
  truncation: true

chunking:
  strategy: "word_chunking"
  word_chunk_size: 900
  word_overlap: 150
