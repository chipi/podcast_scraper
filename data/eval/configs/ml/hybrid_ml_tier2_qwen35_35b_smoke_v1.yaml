# Hybrid MAP-REDUCE Tier 2 — smoke (5 episodes), Qwen 3.5 35B REDUCE (checklist Tier 3).
# Mirrors hybrid_ml_tier2_qwen25_7b_smoke_v1; requires: ollama pull qwen3.5:35b
# If you use qwen3.5:35b-a3b instead, duplicate this file or override reduce_model.

id: "hybrid_ml_tier2_qwen35_35b_smoke_v1"
task: "summarization"

backend:
  type: "hybrid_ml"
  map_model: "longt5-base"
  reduce_model: "qwen3.5:35b"
  reduce_backend: "ollama"

map_params:
  do_sample: false
  num_beams: 6
  max_new_tokens: 200
  min_new_tokens: 80
  no_repeat_ngram_size: 3
  repetition_penalty: 1.10
  length_penalty: 1.0
  early_stopping: true

reduce_params:
  do_sample: false
  num_beams: 4
  max_new_tokens: 650
  min_new_tokens: 220
  no_repeat_ngram_size: 3
  repetition_penalty: 1.12
  length_penalty: 1.0
  early_stopping: false

data:
  dataset_id: "curated_5feeds_smoke_v1"

preprocessing_profile: "cleaning_v4"

tokenize:
  map_max_input_tokens: 1024
  reduce_max_input_tokens: 4096
  truncation: true

chunking:
  strategy: "word_chunking"
  word_chunk_size: 900
  word_overlap: 150
