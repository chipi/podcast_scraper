# Hybrid MAP-REDUCE Tier 2 — smoke (5 episodes), Qwen 2.5 32B REDUCE, paragraph style.
# Mirrors hybrid_ml_tier2_qwen35_9b_smoke_paragraph_v1; requires: ollama pull qwen2.5:32b

id: "hybrid_ml_tier2_qwen25_32b_smoke_paragraph_v1"
task: "summarization"

backend:
  type: "hybrid_ml"
  map_model: "longt5-base"
  reduce_model: "qwen2.5:32b"
  reduce_backend: "ollama"
  reduce_instruction_style: "paragraph"

map_params:
  do_sample: false
  num_beams: 6
  max_new_tokens: 200
  min_new_tokens: 80
  no_repeat_ngram_size: 3
  repetition_penalty: 1.10
  length_penalty: 1.0
  early_stopping: true

reduce_params:
  do_sample: false
  num_beams: 4
  max_new_tokens: 800
  min_new_tokens: 200
  no_repeat_ngram_size: 3
  repetition_penalty: 1.12
  length_penalty: 1.1
  early_stopping: false

data:
  dataset_id: "curated_5feeds_smoke_v1"

preprocessing_profile: "cleaning_v4"

tokenize:
  map_max_input_tokens: 1024
  reduce_max_input_tokens: 4096
  truncation: true

chunking:
  strategy: "word_chunking"
  word_chunk_size: 900
  word_overlap: 150
