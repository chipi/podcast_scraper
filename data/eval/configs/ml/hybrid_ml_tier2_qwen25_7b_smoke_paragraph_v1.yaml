# Tier 2 smoke — paragraph-style REDUCE (silver-aligned) + length tuning
# Same as hybrid_ml_tier2_qwen25_7b_smoke_tuned_v1 plus reduce_instruction_style: paragraph.
# Tests whether paragraph output (no Takeaways/Outline/Actions) improves ROUGE/embed vs silver.

id: "hybrid_ml_tier2_qwen25_7b_smoke_paragraph_v1"
task: "summarization"

backend:
  type: "hybrid_ml"
  map_model: "longt5-base"
  reduce_model: "qwen2.5:7b"
  reduce_backend: "ollama"
  reduce_instruction_style: "paragraph"

map_params:
  do_sample: false
  num_beams: 6
  max_new_tokens: 200
  min_new_tokens: 80
  no_repeat_ngram_size: 3
  repetition_penalty: 1.10
  length_penalty: 1.0
  early_stopping: true

ollama_reduce_params:
  max_tokens: 800
  temperature: 0.3
  top_p: 0.9
  frequency_penalty: 0.0

data:
  dataset_id: "curated_5feeds_smoke_v1"

preprocessing_profile: "cleaning_v4"

tokenize:
  map_max_input_tokens: 1024
  reduce_max_input_tokens: 4096
  truncation: true

chunking:
  strategy: "word_chunking"
  word_chunk_size: 900
  word_overlap: 150
