# Hybrid MAP-REDUCE Tier 2: LongT5 MAP + Qwen 2.5 7B REDUCE via Ollama
# Requires: ollama pull qwen2.5:7b
# Inspired by baseline_ml_prod_authority_v1; use for eval and baseline comparison

id: "hybrid_ml_tier2_qwen25_7b_authority_v1"
task: "summarization"

backend:
  type: "hybrid_ml"
  map_model: "longt5-base"
  reduce_model: "qwen2.5:7b"
  reduce_backend: "ollama"

map_params:
  do_sample: false
  num_beams: 6
  max_new_tokens: 200
  min_new_tokens: 80
  no_repeat_ngram_size: 3
  repetition_penalty: 1.10
  length_penalty: 1.0
  early_stopping: true

ollama_reduce_params:
  max_tokens: 650
  temperature: 0.3
  top_p: 0.9
  frequency_penalty: 0.0

data:
  dataset_id: "curated_5feeds_benchmark_v1"

preprocessing_profile: "cleaning_v4"

tokenize:
  map_max_input_tokens: 1024
  reduce_max_input_tokens: 4096
  truncation: true

chunking:
  strategy: "word_chunking"
  word_chunk_size: 900
  word_overlap: 150
