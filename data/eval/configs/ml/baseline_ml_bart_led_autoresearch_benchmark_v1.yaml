# ML Prod (Tier 2) — benchmark scale
# Same params as baseline_ml_bart_led_autoresearch_v1, dataset switched to benchmark (10 eps).
# RFC-057 Track B autoresearch winner: num_beams=6, max_new_tokens=550.
# Pair with: silver_sonnet46_benchmark_v1

id: "baseline_ml_bart_led_autoresearch_benchmark_v1"
task: "summarization"

backend:
  type: "hf_local"
  map_model: "bart-small"
  reduce_model: "long-fast"

map_params:
  do_sample: false
  num_beams: 4
  max_new_tokens: 200
  min_new_tokens: 80
  no_repeat_ngram_size: 3
  repetition_penalty: 1.3
  length_penalty: 1.0
  early_stopping: true

reduce_params:
  do_sample: false
  num_beams: 6
  max_new_tokens: 550
  min_new_tokens: 220
  no_repeat_ngram_size: 3
  repetition_penalty: 1.3
  length_penalty: 1.0
  early_stopping: true

data:
  dataset_id: "curated_5feeds_benchmark_v1"

preprocessing_profile: "cleaning_v4"

tokenize:
  map_max_input_tokens: 1024
  reduce_max_input_tokens: 4096
  truncation: true

chunking:
  strategy: "word_chunking"
  word_chunk_size: 900
  word_overlap: 150
