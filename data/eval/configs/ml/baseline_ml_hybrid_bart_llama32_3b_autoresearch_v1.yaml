# Hybrid ML — BART-base MAP + Llama 3.2:3b REDUCE — autoresearch winner
# Promoted from 2-round autoresearch sweep on bart_llama32_3b (2026-04-04).
#
# Round 1: temperature=0.5 (carry-over from longt5 sweep), top_p=1.0 (+11.93% total)
# Round 2: max_tokens=1000 (+6.96%)
# Map params: max_new_tokens=200, num_beams=6 confirmed optimal (all candidates rejected)
#
# Final metrics vs silver_sonnet46_smoke_v1 on curated_5feeds_smoke_v1:
#   ROUGE-L: ~22-24% (±2-3pp sampling variance at temp=0.5)
#   Embedding cosine: ~76-78%
#   Latency: ~15-17s/episode
#   Beats BART+LED autoresearch_v1 (18.82%) by ~+22%
#   Closes ~70% of gap to best cloud (Anthropic Claude 32.6%)

id: "baseline_ml_hybrid_bart_llama32_3b_autoresearch_v1"
task: "summarization"

backend:
  type: "hybrid_ml"
  map_model: "bart-small"
  reduce_model: "llama3.2:3b"
  reduce_backend: "ollama"
  reduce_instruction_style: "paragraph"

map_params:
  do_sample: false
  num_beams: 6
  max_new_tokens: 200
  min_new_tokens: 80
  no_repeat_ngram_size: 3
  repetition_penalty: 1.10
  length_penalty: 1.0
  early_stopping: true

ollama_reduce_params:
  max_tokens: 1000
  temperature: 0.5
  top_p: 1.0
  frequency_penalty: 0.0

data:
  dataset_id: "curated_5feeds_smoke_v1"

preprocessing_profile: "cleaning_v4"

tokenize:
  map_max_input_tokens: 1024
  reduce_max_input_tokens: 4096
  truncation: true

chunking:
  strategy: "word_chunking"
  word_chunk_size: 900
  word_overlap: 150
