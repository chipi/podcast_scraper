# Hybrid ML (BART+Llama 3.2:3b) — benchmark scale
# Same params as baseline_ml_hybrid_bart_llama32_3b_autoresearch_v1, dataset switched to benchmark (10 eps).
# RFC-057 Track B autoresearch winner: temperature=0.5, top_p=1.0, max_tokens=1000.
# Pair with: silver_sonnet46_benchmark_v1

id: "baseline_ml_hybrid_bart_llama32_3b_autoresearch_benchmark_v1"
task: "summarization"

backend:
  type: "hybrid_ml"
  map_model: "bart-small"
  reduce_model: "llama3.2:3b"
  reduce_backend: "ollama"
  reduce_instruction_style: "paragraph"

map_params:
  do_sample: false
  num_beams: 6
  max_new_tokens: 200
  min_new_tokens: 80
  no_repeat_ngram_size: 3
  repetition_penalty: 1.10
  length_penalty: 1.0
  early_stopping: true

ollama_reduce_params:
  max_tokens: 1000
  temperature: 0.5
  top_p: 1.0
  frequency_penalty: 0.0

data:
  dataset_id: "curated_5feeds_benchmark_v1"

preprocessing_profile: "cleaning_v4"

tokenize:
  map_max_input_tokens: 1024
  reduce_max_input_tokens: 4096
  truncation: true

chunking:
  strategy: "word_chunking"
  word_chunk_size: 900
  word_overlap: 150
