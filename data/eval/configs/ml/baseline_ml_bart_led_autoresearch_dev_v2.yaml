# ML Prod (Tier 2) — v2 framework, dev dataset.
# Same params as baseline_ml_bart_led_autoresearch_v1, dataset switched to dev_v1.
# Measures: framework effect alone (same base model, same pipeline, new datasets + v2 judging).
# Pair with: silver_sonnet46_dev_v1_paragraph

id: "baseline_ml_bart_led_autoresearch_dev_v2"
task: "summarization"

backend:
  type: "hf_local"
  map_model: "bart-small"
  reduce_model: "long-fast"

map_params:
  do_sample: false
  num_beams: 4
  max_new_tokens: 200
  min_new_tokens: 80
  no_repeat_ngram_size: 3
  repetition_penalty: 1.3
  length_penalty: 1.0
  early_stopping: true

reduce_params:
  do_sample: false
  num_beams: 6
  max_new_tokens: 550
  min_new_tokens: 220
  no_repeat_ngram_size: 3
  repetition_penalty: 1.3
  length_penalty: 1.0
  early_stopping: true

data:
  dataset_id: "curated_5feeds_dev_v1"

preprocessing_profile: "cleaning_v4"

tokenize:
  map_max_input_tokens: 1024
  reduce_max_input_tokens: 4096
  truncation: true

chunking:
  strategy: "word_chunking"
  word_chunk_size: 900
  word_overlap: 150
