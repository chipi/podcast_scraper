# Hybrid ML Tier 2 — Mistral-Nemo:12b reduce, paragraph style
# Mid-size quality candidate: tests whether 12B justifies ~2x latency vs 7b.
# Cross-vendor (Mistral AI), different tokenizer, multilingual-capable.
# Same map params as other baselines for fair comparison.

id: "hybrid_ml_tier2_mistral_nemo_12b_smoke_paragraph_v1"
task: "summarization"

backend:
  type: "hybrid_ml"
  map_model: "longt5-base"
  reduce_model: "mistral-nemo:12b"
  reduce_backend: "ollama"
  reduce_instruction_style: "paragraph"

map_params:
  do_sample: false
  num_beams: 6
  max_new_tokens: 200
  min_new_tokens: 80
  no_repeat_ngram_size: 3
  repetition_penalty: 1.10
  length_penalty: 1.0
  early_stopping: true

ollama_reduce_params:
  max_tokens: 800
  temperature: 0.5
  top_p: 0.9
  frequency_penalty: 0.0

data:
  dataset_id: "curated_5feeds_smoke_v1"

preprocessing_profile: "cleaning_v4"

tokenize:
  map_max_input_tokens: 1024
  reduce_max_input_tokens: 4096
  truncation: true

chunking:
  strategy: "word_chunking"
  word_chunk_size: 900
  word_overlap: 150
