# GIL eval on v2 sources: Gemini provider mode (direct insight extraction from transcript).
# Targets insight count + Quote yield + offset-verify rate (>=95%) against the
# v2 KG-focused dataset (5 feeds x 3 episodes = 15 eps).
# Mirrors gil_gemini_benchmark_v2_provider.yaml settings (autoresearch v2 defaults).
id: gil_gemini_curated_5feeds_kg_v2_provider
task: grounded_insights

backend:
  type: gemini
  model: gemini-2.5-flash-lite

prompts:
  user: gemini/summarization/long_v1

data:
  dataset_id: curated_5feeds_kg_v2

preprocessing_profile: cleaning_v4

params:
  max_length: 800
  min_length: 200
  temperature: 0.0
  gi_insight_source: provider
  gi_max_insights: 12
  gi_require_grounding: true
