# Autoresearch Track A (RFC-057): OpenAI backend, **summary bullets** (JSON bullet output),
# not free-form paragraph summaries. ``task: summarization`` is the pipeline task id; the
# **output shape** is defined by template ``bullets_json_v1`` (see RFC-017).
#
# ``prompts.user`` points at the **on-disk shared** template
# ``prompts/shared/summarization/bullets_json_v1.j2`` (RFC-017 logical name
# ``shared/summarization/bullets_json_v1``).
#
# ``autoresearch/prompt_tuning/eval/score.py`` sets data.max_episodes from AUTORESEARCH_EVAL_N.
# Requires: materialized curated_5feeds_smoke_v1. For ROUGE, prefer silver
# ``silver_gpt4o_smoke_bullets_v1`` (bullet-shaped); legacy ``silver_gpt4o_smoke_v1`` is paragraph text.

id: "autoresearch_prompt_openai_smoke_bullets_v1"
task: "summarization"

backend:
  type: "openai"
  model: "gpt-4o-mini"

prompts:
  user: "shared/summarization/bullets_json_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
