# Ollama Llama 3.3 70B instruct (q3_K_M quant) — pure LLM summarization smoke (no LongT5 MAP).
# Requires: ollama pull llama3.3:70b-instruct-q3_K_M
# Large quant (~34GB on disk); allow headroom on 48GB+ unified RAM for KV cache + OS.
# Hybrid MAP+REDUCE: use hybrid_ml tier2 configs with llama3.3:70b-instruct-q3_K_M REDUCE.

id: "llm_ollama_llama33_70b_q3km_smoke_v1"
task: "summarization"

backend:
  type: "ollama"
  model: "llama3.3:70b-instruct-q3_K_M"

prompts:
  user: "ollama/summarization/long_v1"
  system: "ollama/summarization/system_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
