# Silver Reference Candidate — Gemini 3.1 Pro Preview on smoke dataset.
#
# Purpose: Generate a candidate silver reference using Gemini 3.1 Pro to evaluate
# whether it produces higher-quality summaries than the current silver (GPT-4o).
#
# NOTE: gemini-3.1-pro-preview is still in preview (not GA) as of April 2026.
# Rate limits may be more restrictive than GA models. If you hit 429s, wait and retry.
# Do NOT use gemini-3-pro-preview (discontinued March 2026) or gemini-3.1-pro (does not exist).
#
# Run:
#   make experiment-run CONFIG=data/eval/configs/silver_selection/silver_candidate_gemini31pro_smoke_v1.yaml FORCE=1
#
# Then promote (if selected):
#   make run-promote RUN_ID=silver_candidate_gemini31pro_smoke_v1 \
#     --as reference PROMOTED_ID=silver_gemini31pro_smoke_v1 \
#     REFERENCE_QUALITY=silver REASON="Gemini 3.1 Pro selected via pairwise judge"
#
# Requires: GEMINI_API_KEY

id: "silver_candidate_gemini31pro_smoke_v1"
task: "summarization"

backend:
  type: "gemini"
  model: "gemini-3.1-pro-preview"

prompts:
  system: "gemini/summarization/system_v1"
  user: "gemini/summarization/long_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
