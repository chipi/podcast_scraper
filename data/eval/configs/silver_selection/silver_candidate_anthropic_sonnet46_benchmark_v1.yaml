# Silver Reference Candidate — Anthropic Claude Sonnet 4.6 on benchmark dataset.
#
# Purpose: Generate the benchmark-scale silver reference using Claude Sonnet 4.6
# (winner of smoke pairwise judge, April 2026: 3-1-1 vs GPT-5.4, 5-0 vs Gemini 2.0 Flash).
#
# Run:
#   make experiment-run CONFIG=data/eval/configs/silver_selection/silver_candidate_anthropic_sonnet46_benchmark_v1.yaml FORCE=1
#
# Then promote:
#   make run-promote RUN_ID=silver_candidate_anthropic_sonnet46_benchmark_v1 AS=reference PROMOTED_ID=silver_sonnet46_benchmark_v1 REFERENCE_QUALITY=silver REASON="Claude Sonnet 4.6 benchmark silver, consistent with smoke winner"
#
# Requires: ANTHROPIC_API_KEY

id: "silver_candidate_anthropic_sonnet46_benchmark_v1"
task: "summarization"

backend:
  type: "anthropic"
  model: "claude-sonnet-4-6"

prompts:
  system: "anthropic/summarization/system_v1"
  user: "anthropic/summarization/long_v1"

data:
  dataset_id: "curated_5feeds_benchmark_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
