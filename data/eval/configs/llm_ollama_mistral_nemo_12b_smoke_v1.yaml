# Ollama Mistral Nemo 12B — pure LLM summarization smoke (no LongT5 MAP).
# Requires: ollama pull mistral-nemo:12b
# vs silver: make experiment-run CONFIG=... REFERENCE=silver_gpt4o_smoke_v1

id: "llm_ollama_mistral_nemo_12b_smoke_v1"
task: "summarization"

backend:
  type: "ollama"
  model: "mistral-nemo:12b"

prompts:
  user: "ollama/mistral-nemo_12b/summarization/long_v1"
  system: "ollama/mistral-nemo_12b/summarization/system_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
