# Ollama Qwen 3.5 27B — pure LLM summarization smoke (no LongT5 MAP).
# Requires: ollama pull qwen3.5:27b
# Hybrid MAP+REDUCE: use hybrid_ml_tier2_qwen35_27b_smoke_v1 (or authority).
# vs silver: make experiment-run CONFIG=... REFERENCE=silver_gpt4o_smoke_v1
# Model-specific prompts add explicit plain-text output rules (helps Qwen 3.5 family).

id: "llm_ollama_qwen35_27b_smoke_v1"
task: "summarization"

backend:
  type: "ollama"
  model: "qwen3.5:27b"

prompts:
  user: "ollama/qwen3.5_27b/summarization/long_v1"
  system: "ollama/qwen3.5_27b/summarization/system_v1"

data:
  dataset_id: "curated_5feeds_smoke_v1"

params:
  max_length: 800
  min_length: 200
  temperature: 0.0

preprocessing_profile: "cleaning_v4"
