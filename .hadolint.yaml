---
# Hadolint configuration for podcast_scraper pipeline image (docker/pipeline/Dockerfile)
# See: https://github.com/hadolint/hadolint

ignored:
  # DL3005: Avoid apt-get upgrade (non-reproducible layers)
  # We deliberately upgrade the slim base before apt install so distro CVE fixes
  # (e.g. libtiff / Snyk container findings) ship in rebuilt images.
  - DL3005

  # DL3008: Pin versions in apt-get install
  # We deliberately use latest ffmpeg as we want security updates
  - DL3008
  
  # DL3013: Pin versions in pip install
  # Version pinning is done in requirements.txt and pyproject.toml
  # The torch install uses a specific index URL which is version-controlled
  - DL3013
  
  # DL3059: Multiple consecutive RUN instructions
  # We intentionally separate RUN commands for clarity and caching
  - DL3059

failure-threshold: error
