# SPA + API proxy for the Learning Player container (RFC-099 §10).
# - SPA: history-mode fallback to index.html.
# - Only the consumer /api/app/* plane is proxied (#1163): the player never needs the
#   operator/read /api/* surface, so we do NOT forward it — a defense-in-depth layer on
#   top of the app-only backend (PODCAST_SERVE_APP_ONLY). The upstream `api` resolves to
#   whatever backend the composition provides (app-only on a public deploy). No audio is
#   proxied — the client plays origin enclosure URLs directly (bridge-never-rehost).

# Preserve the ORIGINAL scheme through the two-hop chain (Caddy https -> this nginx http
# -> uvicorn). Pass Caddy's X-Forwarded-Proto through unchanged; fall back to our own
# scheme only for a direct request. Without this the backend sees `http` and derives the
# OAuth callback as http://… -> redirect-URI mismatch (#1163).
map $http_x_forwarded_proto $lp_forwarded_proto {
  default $http_x_forwarded_proto;
  ''      $scheme;
}

# Recover the REAL client IP from Caddy's X-Forwarded-For so rate limiting keys on the
# client, not on Caddy. This container is loopback-bound (127.0.0.1:PLAYER_PORT) and only
# the trusted Caddy edge reaches it, so trusting XFF from the immediate peer is safe here.
set_real_ip_from 0.0.0.0/0;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# Rate limiting (T-06 / #1166) — per real client IP. Two zones: a normal API rate for the
# consumer plane, and a tighter one on the auth endpoints (login/callback) to blunt abuse.
limit_req_zone $binary_remote_addr zone=lp_api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=lp_auth:10m rate=2r/s;
limit_req_status 429;

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Common proxy headers for every /api/app/* location (server-level so both inherit).
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $lp_forwarded_proto;

  # Don't cache the SW or the app entry; hashed assets are immutable.
  location = /sw.js { add_header Cache-Control "no-cache"; }
  location = /index.html { add_header Cache-Control "no-cache"; }
  location /assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; }

  # Auth endpoints — stricter limit (more specific match wins over /api/app/ below).
  location /api/app/auth/ {
    limit_req zone=lp_auth burst=8 nodelay;
    proxy_pass http://api:8000;
  }

  # Consumer plane. /api/health is allowed for the container healthcheck path.
  location /api/app/ {
    limit_req zone=lp_api burst=40 nodelay;
    proxy_pass http://api:8000;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
