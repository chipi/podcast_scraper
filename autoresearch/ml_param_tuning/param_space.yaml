# ML Parameter Search Space
# -------------------------
# Each entry under `reduce_params` and `map_params` defines candidate values to sweep.
# The sweep loop tries candidates one at a time (greedy one-param-at-a-time) against
# the current best config. Accepted improvements are accumulated before moving to
# the next param group.
#
# Scoring: ROUGE-L F1 (primary) + embedding cosine (logged, not in scalar)
# Accept threshold: >= +1% relative gain on ROUGE-L
# Early stop: 3 consecutive experiments without gain
#
# To disable a param group: set `enabled: false`
# To limit candidate count: add `max_candidates: N`

# ─── BART/LED (dev baseline: ml_small_authority) ────────────────────────────
bart_led:
  # Round 2: base is the round-1 winner (max_new_tokens=550, num_beams=6)
  # Groups 1-3 (max_new_tokens, num_beams, length_penalty) already swept — disabled.
  base_config: "autoresearch/ml_param_tuning/results/bart_led_best_config.yaml"
  reference: "silver_sonnet46_smoke_v1"
  description: "BART-base MAP + LED-base-16384 REDUCE (ml_small_authority mode)"

  # Reduce params — largest impact on output quality and length
  reduce_params:
    max_new_tokens:
      enabled: false  # round-1: 550 accepted (+2.89%), already in best config
      candidates: [450, 550, 750, 850]
      description: "Output length cap. Current: 650. LED can generate longer with more."

    num_beams:
      enabled: false  # round-1: 6 accepted (+1.15%), already in best config
      candidates: [6, 8]
      description: "Beam width. More beams = better quality, slower. Current: 4."

    length_penalty:
      enabled: false  # round-1: all rejected (early stop triggered), skipping
      candidates: [1.2, 1.5, 0.8]
      description: "Values >1 encourage longer outputs. Current: 1.0."

    no_repeat_ngram_size:
      enabled: true
      candidates: [4, 5, 2]
      description: "Blocks n-gram repetition. Higher = more diverse. Current: 3."

    min_new_tokens:
      enabled: true
      candidates: [150, 280, 320]
      description: "Minimum output length floor. Current: 220."

    repetition_penalty:
      enabled: true
      candidates: [1.1, 1.5, 1.0]
      description: "Token-level repetition penalty. Current: 1.3."

  # Map params — affect chunk compression quality (input to reduce)
  map_params:
    num_beams:
      enabled: true
      candidates: [6, 8]
      description: "MAP beam width. More beams = better chunk summaries. Current: 4."

    max_new_tokens:
      enabled: true
      candidates: [150, 250]
      description: "MAP output length. Current: 200."

    no_repeat_ngram_size:
      enabled: true
      candidates: [4, 2]
      description: "MAP n-gram blocking. Current: 3."

# ─── LongT5+LED (new prod candidate replacing Pegasus) ──────────────────────
longt5_led:
  # Run baseline first: make experiment-run CONFIG=data/eval/configs/ml/baseline_ml_longt5_led_smoke_v1.yaml
  # Then: make ml-param-sweep MODEL=longt5_led
  # Round 2: reduce_params all disabled — confirmed no-ops (LED stops at 42 tokens due to
  # short LongT5 map output + no_repeat_ngram firing, not max_new_tokens cap).
  # Sweep map_params first to get richer chunk notes → longer reduce input.
  base_config: "data/eval/configs/ml/baseline_ml_longt5_led_smoke_v1.yaml"
  reference: "silver_sonnet46_smoke_v1"
  description: "LongT5-base MAP + LED-base-16384 REDUCE — new prod candidate"

  reduce_params:
    max_new_tokens:
      enabled: false  # round-1: no-op — LED hits token limit before max_new_tokens matters
      candidates: [450, 750, 850]
      description: "Output length cap. Disabled: cap_v2_standard floor raised to 200; map richness is the real lever."

    num_beams:
      enabled: false  # skip until map params improved
      candidates: [4, 8]
      description: "Beam width. Starting: 6 (from BART+LED winner)."

    length_penalty:
      enabled: false  # skip until map params improved
      candidates: [1.2, 1.5, 0.8]
      description: "Values >1 encourage longer outputs. Current: 1.0."

    no_repeat_ngram_size:
      enabled: false  # round-2: also a no-op at this output length; revisit after map params improve chunk richness
      candidates: [2, 4, 5]
      description: "Relax ngram blocking — LongT5 map produces compressed/abstract notes; ngram=3 fires too early. Try 2 first."

    min_new_tokens:
      enabled: false  # cap policy already pins floor to 200; min_new_tokens has no effect
      candidates: [150, 280, 320]
      description: "Minimum output length floor. Current: 220."

    repetition_penalty:
      enabled: false  # skip until map params improved
      candidates: [1.1, 1.5, 1.0]
      description: "Token-level repetition penalty. Current: 1.3."

  map_params:
    max_new_tokens:
      enabled: true
      candidates: [250, 300, 150]
      description: "MAP output length — primary lever. Richer chunk notes → longer reduce input → more output. Current: 200."

    num_beams:
      enabled: true
      candidates: [6, 8]
      description: "MAP beam width. LongT5 benefits more from beams than BART. Current: 4 (baseline default)."

    no_repeat_ngram_size:
      enabled: true
      candidates: [4, 2]
      description: "MAP n-gram blocking. Current: 3."

# ─── Hybrid: LongT5+Llama 3.2:3b ────────────────────────────────────────────
longt5_llama32_3b:
  base_config: "data/eval/configs/ml/hybrid_ml_tier2_llama32_3b_smoke_paragraph_v1.yaml"
  reference: "silver_sonnet46_smoke_v1"
  description: "LongT5-base MAP + Llama 3.2:3b REDUCE — speed-optimised hybrid candidate"

  # Ollama reduce params — tune first (largest impact for LLM reduce)
  ollama_reduce_params:
    temperature:
      enabled: true
      candidates: [0.1, 0.5, 0.7]
      description: "Lower = more focused/factual. Current: 0.3."

    top_p:
      enabled: true
      candidates: [0.7, 0.95, 1.0]
      description: "Nucleus sampling. Current: 0.9."

    frequency_penalty:
      enabled: true
      candidates: [0.3, 0.6, 1.0]
      description: "Penalise repeated tokens. Current: 0.0."

    max_tokens:
      enabled: true
      candidates: [600, 1000, 1200]
      description: "Output length cap. Current: 800."

  # Map params — tune after ollama params
  map_params:
    max_new_tokens:
      enabled: true
      candidates: [150, 250, 300]
      description: "MAP output length. Richer notes → better LLM synthesis. Current: 200."

    num_beams:
      enabled: true
      candidates: [4, 8]
      description: "MAP beam width. Current: 6."

    repetition_penalty:
      enabled: true
      candidates: [1.0, 1.5]
      description: "MAP repetition penalty. Current: 1.10."

