# ML Parameter Search Space
# -------------------------
# Each entry under `reduce_params` and `map_params` defines candidate values to sweep.
# The sweep loop tries candidates one at a time (greedy one-param-at-a-time) against
# the current best config. Accepted improvements are accumulated before moving to
# the next param group.
#
# Scoring: ROUGE-L F1 (primary) + embedding cosine (logged, not in scalar)
# Accept threshold: >= +1% relative gain on ROUGE-L
# Early stop: 3 consecutive experiments without gain
#
# To disable a param group: set `enabled: false`
# To limit candidate count: add `max_candidates: N`

# ─── BART/LED (dev baseline: ml_small_authority) ────────────────────────────
bart_led:
  # Round 2: base is the round-1 winner (max_new_tokens=550, num_beams=6)
  # Groups 1-3 (max_new_tokens, num_beams, length_penalty) already swept — disabled.
  base_config: "autoresearch/ml_param_tuning/results/bart_led_best_config.yaml"
  reference: "silver_sonnet46_smoke_v1"
  description: "BART-base MAP + LED-base-16384 REDUCE (ml_small_authority mode)"

  # Reduce params — largest impact on output quality and length
  reduce_params:
    max_new_tokens:
      enabled: false  # round-1: 550 accepted (+2.89%), already in best config
      candidates: [450, 550, 750, 850]
      description: "Output length cap. Current: 650. LED can generate longer with more."

    num_beams:
      enabled: false  # round-1: 6 accepted (+1.15%), already in best config
      candidates: [6, 8]
      description: "Beam width. More beams = better quality, slower. Current: 4."

    length_penalty:
      enabled: false  # round-1: all rejected (early stop triggered), skipping
      candidates: [1.2, 1.5, 0.8]
      description: "Values >1 encourage longer outputs. Current: 1.0."

    no_repeat_ngram_size:
      enabled: true
      candidates: [4, 5, 2]
      description: "Blocks n-gram repetition. Higher = more diverse. Current: 3."

    min_new_tokens:
      enabled: true
      candidates: [150, 280, 320]
      description: "Minimum output length floor. Current: 220."

    repetition_penalty:
      enabled: true
      candidates: [1.1, 1.5, 1.0]
      description: "Token-level repetition penalty. Current: 1.3."

  # Map params — affect chunk compression quality (input to reduce)
  map_params:
    num_beams:
      enabled: true
      candidates: [6, 8]
      description: "MAP beam width. More beams = better chunk summaries. Current: 4."

    max_new_tokens:
      enabled: true
      candidates: [150, 250]
      description: "MAP output length. Current: 200."

    no_repeat_ngram_size:
      enabled: true
      candidates: [4, 2]
      description: "MAP n-gram blocking. Current: 3."

# ─── LongT5+LED (new prod candidate replacing Pegasus) ──────────────────────
longt5_led:
  # Run baseline first: make experiment-run CONFIG=data/eval/configs/ml/baseline_ml_longt5_led_smoke_v1.yaml
  # Then: make ml-param-sweep MODEL=longt5_led
  base_config: "data/eval/configs/ml/baseline_ml_longt5_led_smoke_v1.yaml"
  reference: "silver_sonnet46_smoke_v1"
  description: "LongT5-base MAP + LED-base-16384 REDUCE — new prod candidate"

  reduce_params:
    max_new_tokens:
      enabled: true
      candidates: [450, 750, 850]
      description: "Output length cap. Starting: 550 (from BART+LED winner)."

    num_beams:
      enabled: true
      candidates: [4, 8]
      description: "Beam width. Starting: 6 (from BART+LED winner)."

    length_penalty:
      enabled: true
      candidates: [1.2, 1.5, 0.8]
      description: "Values >1 encourage longer outputs. Current: 1.0."

    no_repeat_ngram_size:
      enabled: true
      candidates: [4, 5, 2]
      description: "Blocks n-gram repetition. Current: 3. LongT5 map may produce diverse enough output to relax this."

    min_new_tokens:
      enabled: true
      candidates: [150, 280, 320]
      description: "Minimum output length floor. Current: 220."

    repetition_penalty:
      enabled: true
      candidates: [1.1, 1.5, 1.0]
      description: "Token-level repetition penalty. Current: 1.3."

  map_params:
    num_beams:
      enabled: true
      candidates: [6, 8]
      description: "MAP beam width. LongT5 benefits more from beams than BART."

    max_new_tokens:
      enabled: true
      candidates: [150, 250, 300]
      description: "MAP output length. LongT5 can produce richer summaries — try longer."

    no_repeat_ngram_size:
      enabled: true
      candidates: [4, 2]
      description: "MAP n-gram blocking. Current: 3."

# ─── Pegasus/LED (RETIRED — architectural mismatch for podcast content) ──────
# Pegasus kept for future news content type. Do not run sweep.
# See: data/eval/baselines/baseline_ml_pegasus_retirement_smoke_v1/RETIREMENT.md
pegasus_led:
  base_config: "data/eval/configs/ml/baseline_ml_prod_authority_smoke_v1.yaml"
  reference: "silver_sonnet46_smoke_v1"
  description: "Pegasus-CNN MAP + LED-base-16384 REDUCE (ml_prod_authority_v1 mode)"
  notes: >
    Pegasus produces near-duplicate chunk summaries which exhaust LED's no_repeat_ngram
    constraint. Reduce params should be tuned first to work around this, then map params
    to encourage chunk diversity.

  reduce_params:
    no_repeat_ngram_size:
      enabled: false  # retired — param tuning cannot fix architectural mismatch
      candidates: [4, 5, 6, 8]
      description: "Relax ngram blocking to allow LED to generate more despite redundant input."

    length_penalty:
      enabled: false
      candidates: [1.2, 1.5, 2.0]
      description: "Force longer outputs. Current: 1.0."

    max_new_tokens:
      enabled: false
      candidates: [450, 550, 750]
      description: "Output length cap. Current: 650."

    min_new_tokens:
      enabled: false
      candidates: [150, 100, 80]
      description: "Lower the floor to let LED produce what it can. Current: 220."

    early_stopping:
      enabled: false
      candidates: [true]
      description: "Allow early stop (currently false). May help when min_new_tokens is lowered."

  map_params:
    num_beams:
      enabled: false
      candidates: [4]
      description: "Pegasus map beam count. Disabled — map quality is not the bottleneck."

    repetition_penalty:
      enabled: false
      candidates: [1.3, 1.5, 1.7]
      description: "Push Pegasus to produce more diverse chunk summaries."
