# ─── Hybrid: BART+Llama 3.2:3b — map stage winner ───────────────────────────
bart_llama32_3b:
  # Round 2: base is the round-1 winner (top_p=1.0 accepted +1.84%, top_p=0.95 accepted +9.91%)
  # Groups disabled: temperature (carry-over from longt5 sweep), top_p (done), frequency_penalty (all rejected)
  base_config: "autoresearch/ml_param_tuning/results/bart_llama32_3b_best_config.yaml"
  reference: "silver_sonnet46_smoke_v1"
  description: "BART-base MAP + Llama 3.2:3b REDUCE — round 2 sweep (map params + max_tokens)"

  # Ollama reduce params
  ollama_reduce_params:
    temperature:
      enabled: false  # carry-over from longt5 sweep: 0.5 accepted +10.0%
      candidates: [0.1, 0.5, 0.7]
      description: "Already set to 0.5 (winner from longt5_llama32_3b sweep)."

    top_p:
      enabled: false  # round-1: 1.0 accepted (+11.93% total); done
      candidates: [0.7, 0.95, 1.0]
      description: "Round-1 winner: 1.0."

    frequency_penalty:
      enabled: false  # round-1: all rejected (any penalty hurts BART chunk diversity)
      candidates: [0.3, 0.6, 1.0]
      description: "Round-1: all rejected. BART produces diverse enough chunks."

    max_tokens:
      enabled: true
      candidates: [600, 1000, 1200]
      description: "Output length cap. Current: 800. More tokens may allow richer summaries."

  # Map params — tune after ollama params
  map_params:
    max_new_tokens:
      enabled: true
      candidates: [150, 250, 300]
      description: "MAP output length. BART produces ~100-150 token chunks by default. Current: 200."

    num_beams:
      enabled: true
      candidates: [4, 8]
      description: "MAP beam width. Current: 6."

    repetition_penalty:
      enabled: true
      candidates: [1.0, 1.5]
      description: "MAP repetition penalty. Current: 1.10."

# ─── Pegasus/LED (RETIRED — architectural mismatch for podcast content) ──────
# Pegasus kept for future news content type. Do not run sweep.
# See: data/eval/baselines/baseline_ml_pegasus_retirement_smoke_v1/RETIREMENT.md
pegasus_led:
  base_config: "data/eval/configs/ml/baseline_ml_prod_authority_smoke_v1.yaml"
  reference: "silver_sonnet46_smoke_v1"
  description: "Pegasus-CNN MAP + LED-base-16384 REDUCE (ml_prod_authority_v1 mode)"
  notes: >
    Pegasus produces near-duplicate chunk summaries which exhaust LED's no_repeat_ngram
    constraint. Reduce params should be tuned first to work around this, then map params
    to encourage chunk diversity.

  reduce_params:
    no_repeat_ngram_size:
      enabled: false  # retired — param tuning cannot fix architectural mismatch
      candidates: [4, 5, 6, 8]
      description: "Relax ngram blocking to allow LED to generate more despite redundant input."

    length_penalty:
      enabled: false
      candidates: [1.2, 1.5, 2.0]
      description: "Force longer outputs. Current: 1.0."

    max_new_tokens:
      enabled: false
      candidates: [450, 550, 750]
      description: "Output length cap. Current: 650."

    min_new_tokens:
      enabled: false
      candidates: [150, 100, 80]
      description: "Lower the floor to let LED produce what it can. Current: 220."

    early_stopping:
      enabled: false
      candidates: [true]
      description: "Allow early stop (currently false). May help when min_new_tokens is lowered."

  map_params:
    num_beams:
      enabled: false
      candidates: [4]
      description: "Pegasus map beam count. Disabled — map quality is not the bottleneck."

    repetition_penalty:
      enabled: false
      candidates: [1.3, 1.5, 1.7]
      description: "Push Pegasus to produce more diverse chunk summaries."
