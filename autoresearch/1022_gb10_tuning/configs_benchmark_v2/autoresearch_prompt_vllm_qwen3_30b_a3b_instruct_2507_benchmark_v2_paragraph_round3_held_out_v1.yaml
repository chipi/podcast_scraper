# Round 3 v1 — Qwen3-30B-A3B-Instruct-2507 with vendor-correct sampling.
#
# Vendor Round 1/2 gap (per HF model card 2026-06-17):
#   - "This model supports ONLY non-thinking mode and does not generate
#     <think></think> blocks in its output. Specifying enable_thinking=False
#     is no longer required."
#   - Our previous config had a redundant `enable_thinking: false` in
#     extra_body — harmless, kept for explicit-is-better.
#   - Vendor recommended sampling: temperature=0.7, top_p=0.8, top_k=20,
#     min_p=0, presence_penalty between 0-2.
#   - We ran greedy temp=0.0.
#
# No --reasoning-parser flag (this variant does NOT think).
#
# Reference: autoresearch/MODEL_PLAYBOOK.md § Round 3 plan, Priority 2
id: "autoresearch_prompt_vllm_qwen3_30b_a3b_instruct_2507_benchmark_v2_paragraph_round3_held_out_v1"
task: "summarization"
backend:
  type: "openai"
  model: "autoresearch"
  base_url: "http://localhost:8003/v1"
  api_key_env: "VLLM_API_KEY"
  extra_body:
    chat_template_kwargs:
      enable_thinking: false
    top_p: 0.8
    top_k: 20
    min_p: 0.0
    presence_penalty: 1.5
prompts:
  system: "ollama/qwen3.5_35b/summarization/system_v1"
  user: "ollama/qwen3.5_35b/summarization/long_v1"
data:
  dataset_id: "curated_5feeds_benchmark_v2"
params:
  max_length: 500
  min_length: 200
  temperature: 0.7
preprocessing_profile: "cleaning_v4"
