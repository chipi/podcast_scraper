# vLLM judge B — second sequential single-judge phase, paired with
# judge_config_vllm_a.yaml.
#
# Physical setup (homelab):
#   Container:      vllm-judge-b  (~/agentic-ai-homelab/infra/vllm/judge-b/)
#   Port:           8003  (shared with autoresearch + judge-a — see below)
#   Served model:   RedHatAI/Llama-3.3-70B-Instruct-NVFP4
#   Served alias:   judge-b  (declared via ``--served-model-name``)
#
# Only ONE vLLM may own the GB10 GPU at a time. The sweep swaps to
# judge-b via ``gpu-mode-swap.sh judging b`` after phase 2 (which used
# judge-a) completes. The three research-side vLLMs share port 8003
# because the DGX's tailscale ACL only permits 8003 + 11434 out to the
# mac — gpu-mode-swap.sh enforces single-owner via container-name
# detection so the port re-use is safe.
#
# Single-judge phase: judge_b field is intentionally absent from THIS
# yaml (confusingly-named — the alias ``judge-b`` refers to the vLLM
# container serving as judge_a in this phase, not to a second judge
# slot). Contest fraction is not applicable.

mode: pairwise

# Prep command — invokes ``gpu-mode-swap.sh judging b`` on the DGX via
# ``scripts/ops/dgx_gpu_mode.sh``, swapping vllm-judge-a down and
# vllm-judge-b up. See judge_config_vllm_a.yaml for the SSH-vs-local
# transport picker.
# GPU_MODE_START_TIMEOUT=900 — Llama-3.3-70B-NVFP4 is larger, expect
# 5-8 min cold boot before /health returns 200.
prep_cmd: GPU_MODE_START_TIMEOUT=900 scripts/ops/dgx_gpu_mode.sh judging b

judge_a:
  provider: vllm
  model: judge-b
  # Port 8003 (shared with autoresearch + judge-a — single-owner enforced
  # by gpu-mode-swap.sh). Hostname templated from ``DGX_TAILNET_FQDN`` at
  # runtime — the sweep script substitutes ``${DGX_TAILNET_FQDN}`` before
  # invoking score.py.
  api_base: http://${DGX_TAILNET_FQDN}:8003/v1
