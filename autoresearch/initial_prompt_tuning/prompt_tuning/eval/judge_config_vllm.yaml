# DGX judge config — hybrid vLLM + Ollama panel, bigger than the W27
# gemma3:27b-q8 + mistral-small:24b pair.
#
# Why hybrid (not pure vLLM): the autoresearch vLLM container serves ONE
# model at a time (Qwen3-30B-A3B-Instruct-2507 as of the last deployment
# — see [[project_dgx_vllm_distinction]]). Running two vLLM judges would
# need a second vLLM deployment or per-call model swaps; neither is worth
# it for weekly sweep judging when Ollama already has llama3.3:70b
# available on the same DGX at the same tailnet cost. So one judge lives
# on vLLM (already up), the other on Ollama (already up).
#
# Cross-family layout — silver disjoint from every judge, both judges
# from families the operator specifically flagged as "keep unflagged for
# candidates":
#   silver:  sonnet-4-6                     (Anthropic)
#   judge_a: Qwen3-30B-A3B-Instruct-2507    (Alibaba, 30B MoE, vLLM)
#            Sonnet-lean per Round 3 measurements — useful as a
#            Sonnet-style proxy on the panel.
#   judge_b: llama3.3:70b                   (Meta, 70B dense, Ollama)
#            Larger and neutral-vs-Sonnet — a cross-check that isn't
#            style-biased toward the silver.
#
# Same-family flag fires for:
#   llama3.1:8b + hermes3:8b   (Meta / Nous-Llama fine-tune) ↔ judge_b
#   qwen3.5:9b + qwen2.5:32b   (Alibaba)                    ↔ judge_a
# gemma2:9b + mistral:7b: NO flag under this panel — the pair chosen
# specifically to keep them unflagged (operator ask, 2026-06-30).
#
# All flags visible in the leaderboard ``flag`` column — 4 of 7
# candidates flagged; audit surface stays honest.
#
# Prerequisites at runtime:
#   1. ``vllm-autoresearch`` container UP on DGX port 8003, serving the
#      model in judge_a below.
#   2. Ollama up on DGX port 11434 with llama3.3:70b pulled (verified in
#      the operator's earlier local sweep).
#
# Env: VLLM_API_BASE (or DGX_TAILNET_FQDN → :8003/v1) for judge_a;
# OLLAMA_API_BASE (or DGX_TAILNET_FQDN → :11434/v1) for judge_b.
# No API keys — tailnet reach is the auth boundary.

judge_a:
  provider: vllm
  model: Qwen/Qwen3-30B-A3B-Instruct-2507

judge_b:
  provider: ollama
  model: llama3.3:70b
