# Ollama-only judge config — used by the DGX autoresearch smoke.
#
# Cross-family choice (preserves the vendor-bias-mitigation spirit even
# within Ollama): judge_a is Google's Gemma, judge_b is Mistral. The
# candidate (in autoresearch_prompt_ollama_smoke_bullets_v1.yaml) is
# Meta's Llama. Three different model families → judge disagreement is
# meaningful signal, not style mirroring.
#
# Both judges run on the DGX Ollama instance (OLLAMA_API_BASE env var
# resolves to http://dgx-llm-1.tail6d0ed4.ts.net:11434/v1 in CI).
# No API keys needed.

judge_a:
  provider: ollama
  model: gemma3:27b-it-q8_0

judge_b:
  provider: ollama
  model: mistral-small:24b
