# Ollama-only judge config — used by the DGX autoresearch sweep.
#
# Cross-family choice (preserves vendor-bias-mitigation): Gemma 27B
# (Google) and Mistral Small 24B (Mistral AI). Mid-size, high-fidelity.
#
# The workflow swaps DGX into ``idle`` mode (gpu-mode-swap.sh idle)
# BEFORE the sweep — this stops the vllm-autoresearch container which
# normally holds ~73 GB of the 128 GB GPU 24/7. With vLLM down, Ollama
# has the whole GPU, so even the big judges + a 32 GB candidate fit.
# After the sweep, the workflow restores ``research`` mode (vLLM back
# up) — minimal disruption to other autoresearch consumers (~1 hr/week
# of vLLM downtime during the Monday sweep window).
#
# Both judges run on DGX Ollama via OpenAI-compat /v1 endpoint.

judge_a:
  provider: ollama
  model: gemma3:27b-it-q8_0

judge_b:
  provider: ollama
  model: mistral-small:24b
