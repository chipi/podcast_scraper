id: gil_bundling_bundled_b_only_v1
description: |
  Layer B only: staged extract_quotes (one call per insight) + bundled
  score_entailment (chunked NLI). Tests whether bundled NLI preserves
  scoring quality independently of extract changes.

backend:
  type: gemini
  model: gemini-2.5-flash-lite-preview-09-2025

data:
  dataset_id: curated_5feeds_dev_v1
  max_episodes: 10

podcast_scraper_overrides:
  generate_gi: true
  gi_require_grounding: true
  quote_extraction_provider: gemini
  entailment_provider: gemini
  gil_evidence_quote_mode: staged
  gil_evidence_nli_mode: bundled
  gil_evidence_nli_chunk_size: 15
