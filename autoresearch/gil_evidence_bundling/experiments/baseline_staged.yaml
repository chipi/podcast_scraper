# #698 cell 1 — staged baseline. Reproduces the published 80% Gemini GI
# coverage on benchmark_v2 (EVAL_CROSS_DATASET_BASELINE_2026_04). Identical
# to ``data/eval/configs/gil_gemini_benchmark_v2_provider.yaml`` except for
# the ``id`` and explicit ``staged`` mode flags (defaults pre-#698).
id: gil_bundling_baseline_staged_v1
task: grounded_insights

backend:
  type: gemini
  model: gemini-2.5-flash-lite

prompts:
  user: gemini/summarization/long_v1

data:
  dataset_id: curated_5feeds_benchmark_v2

preprocessing_profile: cleaning_v4

params:
  max_length: 800
  min_length: 200
  temperature: 0.0
  gi_insight_source: provider
  gi_max_insights: 12
  gi_require_grounding: true
  # #698 mode flags — staged baseline (no behaviour change).
  gil_evidence_quote_mode: staged
  gil_evidence_nli_mode: staged
