# Mock-feeds nginx config for stack-test (#666 follow-up).
#
# Serves the project's `tests/fixtures/rss/*.xml` and
# `tests/fixtures/audio/*.mp3` so the pipeline container can fetch
# RSS + audio without hitting the public internet during stack-test.
#
# Mount layout (see compose/docker-compose.stack-test.yml):
#   /usr/share/nginx/html/feed.xml   → tests/fixtures/rss/p01_fast.xml
#   /usr/share/nginx/html/audio/     → tests/fixtures/audio/
#   /usr/share/nginx/html/images/    → tests/fixtures/images/ (optional)
#
# Uses port 80 inside the network; pipeline references it as
# `http://mock-feeds/feed.xml`. Not exposed to the host.

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    autoindex off;

    # RSS feeds — the single ``feed.xml`` fixture used by airgapped /
    # cloud-thin pipeline runs PLUS the two per-feed RSS URLs the
    # full UI flow spec adds via the Configuration dialog
    # (``stack-jobs-flow.spec.ts``). All three are static files
    # mounted into the html root by ``compose/docker-compose.stack-test.yml``.
    location ~ ^/(feed|p01_fast_with_transcript|p01_episode_selection)\.xml$ {
        types {
            application/rss+xml xml;
        }
        default_type application/rss+xml;
        add_header Cache-Control "no-cache" always;
    }

    # Audio enclosure URLs in the RSS fixture point to /audio/<name>.mp3
    location /audio/ {
        types {
            audio/mpeg mp3;
        }
        add_header Cache-Control "max-age=300" always;
    }

    # Transcript URLs in the RSS fixtures (``<podcast:transcript>`` /
    # itunes-style links). Mounted to allow the full UI flow spec to
    # exercise the transcript-download fast path without Whisper.
    location /transcripts/ {
        types {
            text/plain txt;
            text/vtt vtt;
            application/srt srt;
        }
        default_type text/plain;
        add_header Cache-Control "max-age=300" always;
    }

    # Optional cover images (referenced by RSS fixture).
    location /images/ {
        types {
            image/jpeg jpg jpeg;
            image/png png;
        }
        add_header Cache-Control "max-age=300" always;
    }

    # Cheap healthcheck endpoint for compose `depends_on:
    # condition: service_healthy`.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
