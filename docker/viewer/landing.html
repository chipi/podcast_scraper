<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>podcast_scraper</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1a1a1a;
      --fg-muted: #5a5a5a;
      --bg: #fafafa;
      --accent: #2c5282;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f0f0f0;
        --fg-muted: #b0b0b0;
        --bg: #1a1a1a;
        --accent: #63b3ed;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--fg);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    main {
      max-width: 28rem;
      text-align: center;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      letter-spacing: -0.01em;
    }
    p {
      color: var(--fg-muted);
      line-height: 1.5;
      margin: 0 0 2rem;
    }
    a.cta {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 0.5rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    a.cta:hover { opacity: 0.85; }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--fg-muted);
    }
  </style>
</head>
<body>
  <main>
    <h1>podcast_scraper</h1>
    <p>Knowledge-graph viewer for podcast transcripts. Access requires credentials.</p>
    <a class="cta" href="/">Open viewer →</a>
    <p class="hint">You'll be prompted for a username and password.</p>
  </main>
</body>
</html>
