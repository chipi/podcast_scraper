# Profile: eval_default — bias-clean baseline for internal autoresearch (#1016 R3)
#
# Used as the default profile when we run our OWN autoresearch evals (cohort
# comparisons across new candidate LLMs). Uses Moonlight-16B-A3B-Instruct on
# vLLM as the summary stage because we're our own downstream consumer — a
# bias-clean (Δ S−O = 0.0) baseline gives more defensible self-comparison when
# new candidates are introduced.
#
# Why not Qwen3.5-35B-A3B (the #1016 top-dog)?
#   - Qwen3.5 has +3.6 Sonnet-mimicry on summary stage
#   - If we use it as the autoresearch eval baseline, our future cohorts will
#     be compared against a candidate that judges-with-Sonnet-style score better
#   - That would silently inflate Qwen3.5's wins in subsequent rounds
#   - Moonlight is style-neutral across all 3 stages — no silent inflation
#
# Why not Ollama qwen3.5:35b (the #928 winner)?
#   - It's an Ollama path, not vLLM — different compose, different sampling
#   - Our autoresearch tooling targets vLLM via the OpenAI-compat path
#   - Using Ollama for the eval baseline would create a compose-dance mismatch
#     when iterating on new vLLM candidates
#
# Trade-offs vs prod_dgx_full_with_fallback / prod_dgx_balanced:
#   - prod_dgx_balanced uses Moonlight too — these profiles are
#     functionally equivalent for the summary stage. The split exists for
#     CLARITY: prod is for serving real users; eval_default is for running
#     comparisons. Operators can flip either without affecting the other.
#
# Compose defaults applied to ~/agentic-ai-homelab/infra/vllm/autoresearch/
# docker-compose.yml on 2026-06-17 (lever A + C from #1016 §5):
#   - --max-num-seqs=4 (down from 64; KV peak was 2.5% even at 64)
#   - --enforce-eager (saves 2-4 min boot at ~10-15% inference perf cost)
# These are RIGHT for eval-loop iteration. For prod-mirror benchmark runs,
# remove --enforce-eager and bump --max-num-seqs back to 64.
#
# 2026-06-17 — Created from #1016 Round 3 final report.

profile: eval_default

# --- Transcription: DGX whisper-openai with cloud Whisper fallback ---
transcription:
  primary: tailnet_dgx_whisper
  fallback: openai

dgx_tailnet_host: ${DGX_TAILNET_HOST:-your-dgx.tailnet.ts.net}
dgx_whisper_model: large-v3
dgx_whisper_port: 8002
transcription_fallback_provider: openai
openai_transcription_model: whisper-1

# --- Diarization: pyannote on DGX with local fallback ---
screenplay: true
diarize: true
diarization_provider: tailnet_dgx
dgx_diarize_port: 8001
dgx_diarize_model: pyannote/speaker-diarization-community-1
dgx_diarize_request_timeout_sec: 180.0

audio_preprocessing_profile: speech_optimal_v1

# --- Speaker detection: Gemini ---
speaker_detector_provider: gemini
auto_speakers: true

# --- LLM summary stage: vLLM-served Qwen3-30B-A3B-NVFP4 (Cell F #1022) ---
# 2026-06-19 UPDATE: was Moonlight-16B-A3B; swapped to
# NVFP4/Qwen3-30B-A3B-Instruct-2507-FP4 after #1022 Cell F entered the cohort.
# Same speed as Moonlight (~38 vs 40 s/ep end-to-end), wins GI by 161%, KG by
# 45%, half the memory footprint. The autoresearch served-model-name alias is
# unchanged — the homelab compose's `model:` line is what determines the
# actual model behind it. See docs/wip/VLLM_GB10_TUNING_VALIDATION_2026-06-18.md.
summary_provider: openai
openai_api_base: http://${DGX_TAILNET_HOST:-your-dgx.tailnet.ts.net}:8003/v1
openai_summary_model: autoresearch  # served-model-name on the vLLM slot
openai_api_key_env: VLLM_API_KEY
llm_pipeline_mode: staged

# Cloud fallback path.
degradation_policy:
  fallback_provider_on_failure: gemini
  continue_on_stage_failure: true
gemini_summary_model: gemini-2.5-flash-lite

preprocessing_enabled: true
cloud_llm_structured_min_output_tokens: 4096

# --- GI / KG / vector search ---
generate_gi: true
gi_insight_source: provider
# Generate broadly and let the GATE trim: the cap is not a quality control, it is a truncation.
# Prod ran 12 while every eval ran 50, so the comparison measured a pipeline production never runs.
gi_max_insights: 50
gi_require_grounding: true
gil_evidence_quote_mode: bundled
gil_evidence_nli_mode: bundled

generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

vector_search: true
vector_embedding_provider: sentence_transformers
llm_circuit_breaker_enabled: true

generate_metadata: true
generate_summaries: true
language: en
log_level: INFO

# -----------------------------------------------------------------------------
# RFC-088 chunk-7 enricher set (advisory mirror of profile_sets.py)
# -----------------------------------------------------------------------------
# 'eval_default' runs NO enrichers by default (CI isolation /
# operator-side-only profile). The Python matrix at
# src/podcast_scraper/enrichment/profile_sets.py is the source of truth.
# Override per run via:
#   python -m podcast_scraper.cli enrich --profile eval_default \
#     --enrichers topic_cooccurrence,topic_cooccurrence_corpus
enrichment:
  enabled: false
  enrichers: {}

# --- GI quality gates (wired 2026-07-14) -----------------------------------------------------------
# Every knob below defaulted OFF or to a stale value, and NO profile set any of them. The value
# gate — the judge that removes filler — therefore never ran in production at all; it ran only in
# evals, which is how the eval and the product came to measure different pipelines.
gi_value_gate_enabled: true
# PIN the judge. A model grading its own output is lenient (#939), and if each arm is filtered by a
# different strictness the surviving counts are not comparable. Vendor-disjoint from the extractor.
gi_value_gate_provider: anthropic
gi_value_gate_model: claude-haiku-4-5-20251001
gi_value_gate_min_tier: 2
# The same claim twice is not two insights. The judge grades each one ALONE, so it cannot see
# redundancy: measured on the real corpus, 35% of one model's insights restated an earlier one.
gi_insight_dedupe_threshold: 0.75
# PINNED, not defaulted. v3 (the speech-act variant) LOST its A/B — route kappa 0.57 against
# v2's 0.67 — and stays on disk only as the record of that measurement. Naming the winner
# here means a future change of default cannot silently move this profile off it.
# Pinned so a reprocess is REPRODUCIBLE and so the eval measures the model, not the sampler.
# Left unset, extraction samples at the provider default (0.3) and the same episode yields
# different insights on every run — noise a model comparison reports as model quality.
gi_insight_temperature: 0.0
gi_insight_prompt_version: v2
# An LLM grounds with an LLM. `gil_evidence_*_mode: bundled` above is an LLM-only path, and with
# the provider left at its "transformers" default it did nothing — these profiles asked for bundled
# LLM grounding and got local DeBERTa.
quote_extraction_provider: openai
entailment_provider: openai

# --- registry-materialized (make profiles-materialize) — do not hand-edit ---
transcription_provider: tailnet_dgx_whisper
summary_model: autoresearch
topic_cluster_threshold: 0.75
insight_cluster_threshold: 0.75
gi_insight_chunk_chars: 30000
gi_qa_score_min: 0.3
gi_nli_entailment_min: 0.75
gil_evidence_match_summary_provider: true
resilience_run_context: serve
resilience_failure_strategy: failover
transcription_coverage_min: 0.0
