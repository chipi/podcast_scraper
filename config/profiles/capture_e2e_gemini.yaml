# Profile capture: E2E mock RSS + Gemini (GEMINI_API_KEY). Whisper + spaCy + Gemini summary.
# Aligns with cost-efficient cloud-text pattern (local transcribe + local NER + Gemini text).
# Placeholder rss -> podcast1_mtb via freeze_profile.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-gemini \
#     PIPELINE_CONFIG=config/profiles/capture_e2e_gemini.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

rss: https://example.invalid/e2e-placeholder-single-feed.xml
output_dir: .tmp/profile_capture/e2e/gemini
max_episodes: 2

transcription_provider: whisper
speaker_detector_provider: spacy
summary_provider: gemini

whisper_model: base.en
whisper_device: cpu
ner_model: en_core_web_sm
gemini_summary_model: gemini-2.0-flash

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 5
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
vector_search: true
vector_backend: faiss
