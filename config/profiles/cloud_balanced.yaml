# Profile: cloud_balanced — production default
#
# Best compound score (quality × cost × latency) from v2 eval + autoresearch.
# Use this for production deployments, corpus building, and general use.
#
# Research references:
#   Summary:   EVAL_HELDOUT_V2_2026_04.md (gemini 0.564 bullets, 1.5s, $0.00047/ep)
#   GI:        GI_AUTORESEARCH_PLAN.md (provider mode +10pp, n=12 sweet spot)
#   KG:        KG_AUTORESEARCH_PLAN.md (provider mode +37pp, n=10 sweet spot)
#   Clustering: 0.75 threshold (code default, insight_clusters.py)
#   NER:       spaCy trf = 1.000 F1 with show-title fix
#
# Usage:
#   python -m podcast_scraper.cli --config config/profiles/cloud_balanced.yaml \
#     --rss <feed_url> --output-dir <output>

# Transcription — whisper-1 is the current default (Exp 3 of #577, 2026-04-20):
# predictable WER (avg 8.2%), no duration/token caps, $0.20/ep on 32-min audio.
# voxtral-mini-latest is 6x cheaper with comparable WER (8.6% avg) but showed a
# hallucination on 1/5 test eps — parked pending investigation of anti-loop
# mitigations. gpt-4o-[mini-]transcribe blocked on chunking (#286).
transcription_provider: openai
openai_transcription_model: whisper-1

# Audio preprocessing — named preset in config/profiles/audio/ (#634 Scope 1).
# One edit to speech_optimal_v1.yaml updates every profile that references it.
audio_preprocessing_profile: speech_optimal_v1

# Speaker detection — spaCy trf is free, local, 1.000 F1 with show-title fix.
# No reason to pay for a cloud NER call when local trf matches reference.
speaker_detector_provider: spacy
ner_model: en_core_web_trf
auto_speakers: true

# Summarization
summary_provider: gemini
gemini_summary_model: gemini-2.5-flash-lite
preprocessing_enabled: true

# Grounded Insights
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

# Vector search + clustering
vector_search: true
vector_backend: faiss

# General
generate_metadata: true
generate_summaries: true
language: en
log_level: INFO
