# 2026-06-12 (#907 Option B): opted into registry-driven defaults.
# See tests/integration/providers/ml/test_profile_yaml_registry_drift.py.

profile: cloud_thin

# Profile: cloud_thin — cloud APIs only (no local spaCy / vector index)
#
# Use with pipeline image built using ``INSTALL_EXTRAS=llm`` (``pyproject`` **``. [llm]``**).
# Requires ``OPENAI_API_KEY`` (Whisper) and ``GEMINI_API_KEY`` (NER + summary + GI/KG) in the environment.
# No local semantic index: ``vector_search: false``.
#
# Speaker + summary share the same Gemini model id (aligned with ``cloud_balanced`` flash-lite).

transcription_provider: openai
openai_transcription_model: whisper-1
# Diarization is a core pipeline stage (#913, 2026-06-15). Cloud
# profiles route to Deepgram for the diarize pass — independent API call,
# no [ml]/HF_TOKEN install on the pipeline host. Cost: ~$0.004/min for the
# diarize call on top of OpenAI Whisper ($0.006/min) for transcription.
diarize: true
diarization_provider: deepgram
deepgram_diarization_model: nova-3-general  # from registry: deepgram_diarization_nova3
screenplay: true

audio_preprocessing_profile: speech_optimal_v1

speaker_detector_provider: gemini
auto_speakers: true

# Summary model re-validated 2026-06-08 (#816) with reliability axis added
# to autoresearch — wins composite ranking by 4-10× on $/successful-call and
# 3× on p50 vs alternatives. Prod operating point (2026-05-24) shows
# ~15-20% Gemini 503 burst absorbed by #697 circuit breaker. Re-validate via
# scripts/eval/score/summary_model_reliability_v1.py before swapping.
summary_provider: gemini
gemini_summary_model: gemini-2.5-flash-lite
gemini_speaker_model: gemini-2.5-flash-lite
preprocessing_enabled: true

llm_pipeline_mode: mega_bundled
cloud_llm_structured_min_output_tokens: 4096

# GIL evidence stack: with #698 bundling (gil_evidence_*_mode: bundled below)
# this stage now issues ~6 calls/episode instead of 76, dropping latency from
# ~95s to ~36s on gemini-2.5-flash-lite. 1200s timeout retained as a safety
# margin for transient Gemini 503 spikes — see #697 for the breaker.
summarization_timeout: 1200

# #697: per-provider wait-and-resume circuit breaker for Gemini 503 bursts.
# When ≥3 overload-class failures land in a 30 s window, pause the next call
# for 60 s instead of stacking individual per-call retry sleeps that can
# tip episodes over the summarization timeout. Defaults sized to the WSJ
# Journal incident (2026-04-28).
llm_circuit_breaker_enabled: true

generate_gi: true
gi_insight_source: provider
# Generate broadly and let the GATE trim: the cap is not a quality control, it is a truncation.
# Prod ran 12 while every eval ran 50, so the comparison measured a pipeline production never runs.
gi_max_insights: 50
gi_require_grounding: true

# #698 GIL evidence bundling — Layer A + Layer B both bundled.
# Coverage vs Sonnet-4.6 silver: 75% (staged) → 82% (+7pp). 92% calls cut.
# ADR-078; results in autoresearch/gil_evidence_bundling/results.tsv.
gil_evidence_quote_mode: bundled
gil_evidence_nli_mode: bundled

generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

vector_search: false

generate_metadata: true
generate_summaries: true
language: en
log_level: INFO

cost_soft_cap_usd_per_run: 1.0
cost_soft_cap_action: abort
cost_daily_alert_usd: 10.0

# -----------------------------------------------------------------------------
# RFC-088 chunk-7 enricher set (advisory mirror of profile_sets.py)
# -----------------------------------------------------------------------------
# The Python matrix at src/podcast_scraper/enrichment/profile_sets.py is
# the source of truth; this block reflects the 'cloud_thin' row so
# operators can discover the active set without reading code.
# Per-enricher knobs (cost caps, thresholds) live under enrichers.<id>.
enrichment:
  enabled: true
  enrichers:
    topic_cooccurrence_corpus: {}
    topic_theme_clusters: {}
    temporal_velocity: {}
    grounding_rate: {}
    guest_coappearance: {}
    insight_density: {}
    insight_sentiment: {}
    topic_similarity:
      provider:
        type: sentence_transformer_local
        model: all-MiniLM-L6-v2
    topic_consensus:
      provider:
        type: consensus_local
        embed_model: all-MiniLM-L6-v2

# --- GI quality gates (wired 2026-07-14) -----------------------------------------------------------
# Every knob below defaulted OFF or to a stale value, and NO profile set any of them. The value
# gate — the judge that removes filler — therefore never ran in production at all; it ran only in
# evals, which is how the eval and the product came to measure different pipelines.
gi_value_gate_enabled: true
# PIN the judge. A model grading its own output is lenient (#939), and if each arm is filtered by a
# different strictness the surviving counts are not comparable. Vendor-disjoint from the extractor.
gi_value_gate_provider: anthropic
gi_value_gate_model: claude-haiku-4-5-20251001
gi_value_gate_min_tier: 2
# The same claim twice is not two insights. The judge grades each one ALONE, so it cannot see
# redundancy: measured on the real corpus, 35% of one model's insights restated an earlier one.
gi_insight_dedupe_threshold: 0.75
# PINNED, not defaulted. v3 (the speech-act variant) LOST its A/B — route kappa 0.57 against
# v2's 0.67 — and stays on disk only as the record of that measurement. Naming the winner
# here means a future change of default cannot silently move this profile off it.
# Pinned so a reprocess is REPRODUCIBLE and so the eval measures the model, not the sampler.
# Left unset, extraction samples at the provider default (0.3) and the same episode yields
# different insights on every run — noise a model comparison reports as model quality.
gi_insight_temperature: 0.0
gi_insight_prompt_version: v2
# An LLM grounds with an LLM. `gil_evidence_*_mode: bundled` above is an LLM-only path, and with
# the provider left at its "transformers" default it did nothing — these profiles asked for bundled
# LLM grounding and got local DeBERTa.
quote_extraction_provider: gemini
entailment_provider: gemini

# --- registry-materialized (make profiles-materialize) — do not hand-edit ---
summary_model: gemini-2.5-flash-lite
topic_cluster_threshold: 0.75
insight_cluster_threshold: 0.75
gi_insight_chunk_chars: 30000
gi_qa_score_min: 0.3
gi_nli_entailment_min: 0.75
gil_evidence_match_summary_provider: true
resilience_run_context: serve
resilience_failure_strategy: failover
transcription_coverage_min: 0.0
enforce_model_governance: false
transcription_coverage_failover_model: null
