# Profile: local_dgx_balanced — DGX-hosted Ollama with cloud degradation fallback (RFC-089)
#
# Point ollama_api_base / dgx_tailnet_host at your DGX MagicDNS name before running.
# See docs/guides/DGX_RUNBOOK.md.

dgx_tailnet_host: dgx-llm-1.tail6d0ed4.ts.net
ollama_api_base: http://dgx-llm-1.tail6d0ed4.ts.net:11434/v1

transcription_provider: whisper
whisper_model: small.en

# Screenplay + neural diarization (RFC-058 + #926)
screenplay: true
diarize: true

# Diarization on DGX via pyannote-server (#926). DGX runs the pyannote
# container alongside Ollama; this profile already targets the DGX for LLM,
# so routing diarization there too keeps all heavy compute on one host.
# Falls back to in-process pyannote if the DGX service is unavailable.
diarization_provider: tailnet_dgx
dgx_diarize_port: 8001
dgx_diarize_model: pyannote/speaker-diarization-3.1

audio_preprocessing_profile: speech_optimal_v1

speaker_detector_provider: spacy
ner_model: en_core_web_trf
auto_speakers: true

summary_provider: ollama
ollama_summary_model: qwen3.5:9b
# Use staged (clean + summary as TWO Ollama calls) instead of bundled.
# Investigation 2026-06-07: qwen3.5:9b in bundled mode produces inconsistently
# malformed JSON output (~50-67% failure rate on small N) — model is at the
# edge of what it can reliably structure in one fused clean+summarize pass.
# Even when bundled works, output is degraded (1-3 bullets vs target 6-8).
# Larger models (qwen3.5:27b, qwen2.5:32b) handle bundled cleanly; 9B doesn't.
# Staged trades ~1.5x wall-clock for reliable output. Acceptable on a local
# DGX where Ollama calls are ~30ms RTT and free.
llm_pipeline_mode: staged

generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

vector_search: true
vector_embedding_provider: sentence_transformers
# Embeddings stay in-process via sentence_transformers (the default). Per ADR-098,
# the empirical A/B on the operator's corpus showed MiniLM beats nomic-embed-text
# on transcript-chunked retrieval (the production-realistic path). DGX runs only
# Ollama for the LLM stages; embeddings keep their fast in-process path (~7ms p50
# vs ~33ms over HTTP to Ollama) and no DGX availability dependency.
# See eval/embedding_provider_comparison/transcript-chunked/ for the numbers.

# No LLM-level cloud fallback (operator decision, 2026-06-07): this profile is
# for laptop-driven runs against the operator's tailnet DGX. If DGX Ollama goes
# down mid-run, the pipeline degrades visibly (summary missing for the affected
# episode) rather than silently routing to a paid cloud provider. The operator
# fixes the DGX side and re-runs.
#
# Cloud fallback IS enabled in prod (cloud_with_dgx_primary) where
# uptime trumps cost visibility, but at the Whisper layer
# (transcription_fallback_provider: openai), not the LLM layer — prod's LLM
# primary is already cloud Gemini.
#
# The FallbackAwareSummarizationProvider wrapper (RFC-089 #5) stays available;
# any profile that opts in via degradation_policy.fallback_provider_on_failure
# gets it. local_dgx_balanced just doesn't opt in.
degradation_policy:
  continue_on_stage_failure: true

generate_metadata: true
generate_summaries: true
language: en
log_level: INFO
