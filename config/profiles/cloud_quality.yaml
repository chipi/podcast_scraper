# Profile: cloud_quality — maximum quality, cost secondary
#
# Uses the best provider per stage based on autoresearch findings.
# ~2x cost of cloud_balanced but highest quality ceiling.
#
# Research references (EVAL_HELDOUT_V2, EVAL_CROSS_DATASET_BASELINE_2026_04):
#   Summary:   DeepSeek 0.586 bullets / 0.541 paragraph (#1 quality, v2 held-out)
#   GI:        Gemini 80% insight coverage (#1, range 65-80% across cloud LLMs)
#   KG:        qwen3.5:9b 79% topic coverage leads overall; cloud LLMs cluster
#              at 65% (gemini/openai/anthropic). KG pick below is DeepSeek for
#              prompt-coherence with summary, not because it leads KG — KG
#              per-stage provider routing is future work.
#
# Usage:
#   python -m podcast_scraper.cli --config config/profiles/cloud_quality.yaml \
#     --rss <feed_url> --output-dir <output>

# Transcription — whisper-1 for reliability (Exp 3 of #577): no duration/token
# caps, no hallucination risk seen. Costs more than voxtral-mini but that's
# aligned with this profile's "quality > cost" intent.
transcription_provider: openai
openai_transcription_model: whisper-1

# Audio preprocessing — named preset (#634 Scope 1).
audio_preprocessing_profile: speech_optimal_v1

# Speaker detection — spaCy trf ties all cloud LLMs at F1=1.000 on NER smoke
# (5 eps / 15 entities). Free, local, deterministic. Larger-corpus validation
# deferred to post-reingestion (see POST_REINGESTION_PLAN.md Step 6).
speaker_detector_provider: spacy
ner_model: en_core_web_trf
auto_speakers: true

# Summarization — DeepSeek for quality
summary_provider: deepseek
deepseek_summary_model: deepseek-chat

# Pipeline mode — mega_bundled (#643): one call returns
# title + summary + bullets + insights + topics + entities. DeepSeek is tier-2
# for mega-bundle (entity F1 ≈ 0.88 vs Anthropic haiku-4.5 tier-1 at 1.000),
# but the ~6× cost savings vs three standalone calls outweighs the entity gap
# for most quality-tier users. Swap to Anthropic haiku-4.5 + mega_bundled if
# NER fidelity matters most. See docs/guides/AI_PROVIDER_COMPARISON_GUIDE.md.
llm_pipeline_mode: mega_bundled

# Output token floor for cloud LLM structured JSON (#645). Default 4096 is
# enough for mega-bundle on full-length transcripts; raise if you see
# truncated JSON in logs.
cloud_llm_structured_min_output_tokens: 4096

# Grounded Insights — uses summary_provider (DeepSeek) for insight + evidence.
# Best single-provider GI in the 7-LLM matrix is Gemini at 80%, but switching
# here would split summary and GI across providers. Per-stage provider routing
# (gi_insight_provider override) is future work; until then, DeepSeek is used
# for summary + GI consistency.
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph — DeepSeek for prompt coherence with summary.
# qwen3.5:9b leads KG (79%) in the cross-dataset baseline, but that's a local
# model; within cloud LLMs KG clusters at 65%. Per-stage routing is future work.
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

# Vector search + clustering
vector_search: true
vector_backend: faiss

# General
generate_metadata: true
generate_summaries: true
language: en
log_level: INFO
