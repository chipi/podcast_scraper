# Profile: freeze/deepseek — max-DeepSeek (NER + summary via DeepSeek).
# DeepSeek has no transcription API, so whisper small.en (production WER sweet spot).
# Provider-only prescription; operational fields injected by freeze_profile / CLI.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-deepseek \
#     PIPELINE_CONFIG=config/profiles/freeze/deepseek.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

# Transcription — local Whisper (DeepSeek has no transcription API)
transcription_provider: whisper
whisper_model: small.en

# Speaker detection — DeepSeek (exercise full provider surface)
speaker_detector_provider: deepseek
deepseek_speaker_model: deepseek-chat
auto_speakers: true

# Summarization — DeepSeek (v2 bullets non-bundled leader, 43.1%)
summary_provider: deepseek
deepseek_summary_model: deepseek-chat

# Grounded Insights
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

# Vector search + clustering
vector_search: true
vector_backend: faiss

# General
generate_metadata: true
generate_summaries: true
language: en
log_level: INFO
