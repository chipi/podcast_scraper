# Profile: freeze/anthropic — max-Anthropic (NER + summary via Anthropic).
# Anthropic has no transcription API, so whisper small.en (production WER sweet spot).
# Provider-only prescription; operational fields injected by freeze_profile / CLI.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-anthropic \
#     PIPELINE_CONFIG=config/profiles/freeze/anthropic.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

# Transcription — local Whisper (Anthropic has no transcription API)
transcription_provider: whisper
whisper_model: small.en

# Speaker detection — Anthropic claude-haiku-4-5
speaker_detector_provider: anthropic
anthropic_speaker_model: claude-haiku-4-5
auto_speakers: true

# Summarization — Anthropic claude-haiku-4-5 (v2 bundled winner)
summary_provider: anthropic
anthropic_summary_model: claude-haiku-4-5

# Grounded Insights
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

# Vector search + clustering
vector_search: true
vector_backend: faiss

# General
generate_metadata: true
generate_summaries: true
language: en
log_level: INFO
