# Profile: freeze/ollama_llama32 — max-Ollama speed tier (llama3.2:3b).
# Smallest Ollama variant; tests latency/cost shape for 3B models.
# Prereq: `ollama pull llama3.2:3b`.
# Provider-only prescription; operational fields injected by freeze_profile / CLI.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-ollama-llama32 \
#     PIPELINE_CONFIG=config/profiles/freeze/ollama_llama32.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

# Transcription — local Whisper (Ollama has no transcription)
transcription_provider: whisper
whisper_model: small.en

# Speaker detection — Ollama llama3.2:3b
speaker_detector_provider: ollama
ollama_speaker_model: llama3.2:3b
auto_speakers: true

# Summarization — Ollama llama3.2:3b
summary_provider: ollama
ollama_summary_model: llama3.2:3b

# Grounded Insights
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

# Vector search + clustering
vector_search: true
vector_backend: faiss

# General
generate_metadata: true
generate_summaries: true
language: en
log_level: INFO
