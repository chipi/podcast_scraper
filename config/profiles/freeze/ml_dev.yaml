# Profile: freeze/ml_dev — all-local, fast-iteration shape.
# Mirrors the `dev` main profile (tiny.en + spaCy sm + transformers).
# Provider-only prescription; operational fields injected by freeze_profile / CLI.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-ml-dev \
#     PIPELINE_CONFIG=config/profiles/freeze/ml_dev.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

# Transcription — smallest local Whisper (dev speed)
transcription_provider: whisper
whisper_model: base.en

# Speaker detection — spaCy sm (dev speed, 0.966 F1)
speaker_detector_provider: spacy
ner_model: en_core_web_sm
auto_speakers: true

# Summarization — local ML (bart-small MAP + long-fast REDUCE)
summary_provider: transformers
summary_model: bart-small
summary_reduce_model: long-fast

# Grounded Insights — summary_bullets (transformers is summary-only, not chat)
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph — summary_bullets (same rationale)
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 10
kg_max_entities: 15

# Vector search + clustering
vector_search: true
vector_backend: faiss

# General
generate_metadata: true
generate_summaries: true
language: en
log_level: INFO
