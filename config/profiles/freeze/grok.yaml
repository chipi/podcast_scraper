# Profile: freeze/grok — max-Grok (NER + summary via Grok).
# Grok has no transcription API, so whisper small.en (production WER sweet spot).
# grok-3-mini is the currently-working x.ai model (grok-2 / grok-beta are stale).
# Provider-only prescription; operational fields injected by freeze_profile / CLI.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-grok \
#     PIPELINE_CONFIG=config/profiles/freeze/grok.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

# Transcription — local Whisper (Grok has no transcription API)
transcription_provider: whisper
whisper_model: small.en

# Speaker detection — Grok
speaker_detector_provider: grok
grok_speaker_model: grok-3-mini
auto_speakers: true

# Summarization — Grok
summary_provider: grok
grok_summary_model: grok-3-mini
grok_cleaning_model: grok-3-mini

# Grounded Insights
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

# Vector search + clustering
vector_search: true
vector_backend: faiss

# General
generate_metadata: true
generate_summaries: true
language: en
log_level: INFO
