# Profile: freeze/mistral — max-Mistral (transcription + NER + summary).
# EU-resident end-to-end: voxtral-mini-latest transcription + mistral-large.
# Provider-only prescription; operational fields injected by freeze_profile / CLI.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-mistral \
#     PIPELINE_CONFIG=config/profiles/freeze/mistral.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

# Transcription — Mistral voxtral-mini-latest
transcription_provider: mistral
mistral_transcription_model: voxtral-mini-latest

# Speaker detection — Mistral
speaker_detector_provider: mistral
mistral_speaker_model: mistral-large-latest
auto_speakers: true

# Summarization — Mistral
summary_provider: mistral
mistral_summary_model: mistral-large-latest

# Grounded Insights
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

# Vector search + clustering
vector_search: true
vector_backend: faiss

# General
generate_metadata: true
generate_summaries: true
language: en
log_level: INFO
