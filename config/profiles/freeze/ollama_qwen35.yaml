# Profile: freeze/ollama_qwen35 — max-Ollama scale reference (qwen3.5:35b).
# Also sets bundled pipeline mode (v2 eval showed qwen3.5 stabilises paragraph
# JSON structure under bundled on local models).
# Prereq: `ollama pull qwen3.5:35b`.
# Provider-only prescription; operational fields injected by freeze_profile / CLI.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-ollama-qwen35 \
#     PIPELINE_CONFIG=config/profiles/freeze/ollama_qwen35.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

# Transcription — local Whisper (Ollama has no transcription)
transcription_provider: whisper
whisper_model: small.en

# Speaker detection — Ollama qwen3.5:35b
speaker_detector_provider: ollama
ollama_speaker_model: qwen3.5:35b
auto_speakers: true

# Summarization — Ollama qwen3.5:35b + bundled pipeline
summary_provider: ollama
ollama_summary_model: qwen3.5:35b
llm_pipeline_mode: bundled

# Grounded Insights
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

# Vector search + clustering
vector_search: true
vector_backend: faiss

# General
generate_metadata: true
generate_summaries: true
language: en
log_level: INFO
