# 2026-06-12 (#907 Option B): opted into registry-driven defaults.
# See tests/integration/providers/ml/test_profile_yaml_registry_drift.py.

profile: local_dgx_full

# Profile: local_dgx_full — pure DGX measurement profile (no cloud fallback in config)
#
# For autoresearch / comparison runs only. Do not use for prod or pre-prod pipelines.

dgx_tailnet_host: ${DGX_TAILNET_HOST:-your-dgx.tailnet.ts.net}
ollama_api_base: http://your-dgx.tailnet.ts.net:11434/v1

transcription_provider: whisper
whisper_model: small.en

# Screenplay + neural diarization (RFC-058 + #926)
screenplay: true
diarize: true

# Diarization on DGX via pyannote-server (#926). This is the pure-DGX
# measurement profile, so routing diarization off-laptop keeps the
# autoresearch comparison fair (LLM + diarize both on GB10 vs cloud).
# Falls back to in-process pyannote if the DGX service is unavailable.
diarization_provider: tailnet_dgx
dgx_diarize_port: 8001
dgx_diarize_model: pyannote/speaker-diarization-3.1

summary_provider: ollama
ollama_summary_model: llama3.3:70b
llm_pipeline_mode: bundled

# GI/KG insights come from the configured LLM provider (ollama, via
# summary_provider above). The *source* is `provider`; "ollama" is not a valid
# source value — it names the backend, which summary_provider already selects.
generate_gi: true
gi_insight_source: provider
generate_kg: true
kg_extraction_source: provider

generate_metadata: true
generate_summaries: true
language: en

# Vector search intentionally OFF (explicit, not by default omission): this is a
# pure-DGX autoresearch *measurement* profile (transcription/diarization/LLM
# comparison), not a viewer/search-serving profile — building a LanceDB index would
# add cost with no bearing on the comparison. Search-serving profiles
# (local_dgx_balanced, cloud_*, prod_*) set vector_search: true instead.
vector_search: false

# -----------------------------------------------------------------------------
# RFC-088 chunk-7 enricher set (advisory mirror of profile_sets.py)
# -----------------------------------------------------------------------------
# The Python matrix at src/podcast_scraper/enrichment/profile_sets.py is
# the source of truth; this block reflects the 'local_dgx_full' row so
# operators can discover the active set without reading code.
# Per-enricher knobs (cost caps, thresholds) live under enrichers.<id>.
enrichment:
  enabled: true
  enrichers:
    topic_cooccurrence_corpus: {}
    topic_theme_clusters: {}
    temporal_velocity: {}
    grounding_rate: {}
    guest_coappearance: {}
    insight_density: {}
    topic_similarity: {}
    nli_contradiction: {}
