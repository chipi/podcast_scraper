# Profile capture: E2E mock RSS + Grok (GROK_API_KEY). Whisper + spaCy + Grok summary.
# Matches AI Provider Guide "Speed-First" shape (local transcribe + spaCy + Grok text).
# Uses grok-3-mini for summary + cleaning (x.ai model IDs evolve; grok-2/grok-beta may 400).
# Placeholder rss -> podcast1_mtb via freeze_profile.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-grok \
#     PIPELINE_CONFIG=config/profiles/capture_e2e_grok.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

rss: https://example.invalid/e2e-placeholder-single-feed.xml
output_dir: .tmp/profile_capture/e2e/grok
max_episodes: 2

transcription_provider: whisper
speaker_detector_provider: spacy
summary_provider: grok

whisper_model: base.en
whisper_device: cpu
ner_model: en_core_web_sm
grok_summary_model: grok-3-mini
grok_cleaning_model: grok-3-mini

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 5
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
vector_search: true
vector_backend: faiss
