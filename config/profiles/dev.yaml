# Profile: dev — fastest, cheapest, CI-friendly
#
# Registry status: ProfilePreset-backed (promoted 2026-06-23 in #1060).
# Routing maps to the `dev` preset in `_PROFILE_PRESETS`: same
# compositional choice as airgapped_thin (tiny.en + bart-small+long-fast
# + spaCy sm), but this YAML's boolean toggles
# (generate_gi=false / generate_kg=false / vector_search=false) layer
# on top of the registry preset via Field defaults. The drift test only
# checks routing fields, not the on/off toggles.
#
profile: dev
#
# Minimum viable pipeline for development and testing.
# No API calls, no Ollama, minimal quality — speed only.
#
# Research references:
#   Summary:   bart-led is Tier 2 floor (v2 eval 0.206 paragraph)
#   GI/KG:     stub mode (skip for speed)
#   NER:       spaCy sm = 0.966 F1 (fast, no GPU)
#
# Usage:
#   python -m podcast_scraper.cli --config config/profiles/dev.yaml \
#     --rss <feed_url> --output-dir <output>

# Transcription — smallest local Whisper (~13% WER, 40s/ep).
# Fast feedback, errors exist but pipeline still runs.
# See TRANSCRIPTION_AUTORESEARCH_PLAN.md for sweep data.
transcription_provider: whisper
whisper_model: tiny.en

# Screenplay + neural diarization (RFC-058)
screenplay: true
diarize: true
diarization_model: pyannote/speaker-diarization-community-1  # from registry: pyannote_diarization_community1

# Audio preprocessing — named preset (#634 Scope 1).
audio_preprocessing_profile: speech_optimal_v1

# Speaker detection — fast spaCy (en_core_web_sm: 0.966 F1, no GPU, ~5x faster
# than trf). Intentional for dev: speed over the last 3.4pp of accuracy.
speaker_detector_provider: spacy
ner_model: en_core_web_sm
auto_speakers: true

# Summarization — pure ML, no deps.
# Pin `summary_mode_id` explicitly to the DEV registry mode. Previously
# implicit via `_get_default_summary_mode_id` reading
# `PODCAST_SCRAPER_PROFILE=dev`; profile is now the source of truth and the
# helper's env-var-reading branch is vestigial after this pin.
# `summary_tokenize` is sourced from this mode automatically.
summary_provider: transformers
summary_mode_id: ml_small_authority

# Grounded Insights — skip for speed
generate_gi: false

# Knowledge Graph — skip for speed
generate_kg: false

# Vector search — skip for speed
vector_search: false

# General
generate_metadata: true
generate_summaries: true
transcribe_missing: true
language: en
log_level: INFO

# -----------------------------------------------------------------------------
# RFC-088 chunk-7 enricher set (advisory mirror of profile_sets.py)
# -----------------------------------------------------------------------------
# The Python matrix at src/podcast_scraper/enrichment/profile_sets.py is
# the source of truth; this block reflects the 'dev' row so
# operators can discover the active set without reading code.
# Per-enricher knobs (cost caps, thresholds) live under enrichers.<id>.
enrichment:
  enabled: true
  enrichers:
    topic_cooccurrence_corpus: {}
    topic_theme_clusters: {}
    temporal_velocity: {}
    grounding_rate: {}
    guest_coappearance: {}
    insight_density: {}
    insight_sentiment: {}
    topic_similarity:
      provider:
        type: sentence_transformer_local
        model: all-MiniLM-L6-v2
    topic_consensus:
      provider:
        type: consensus_local
        embed_model: all-MiniLM-L6-v2

# --- registry-materialized (make profiles-materialize) — do not hand-edit ---
summary_model: bart-small
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15
topic_cluster_threshold: 0.75
insight_cluster_threshold: 0.75
gi_insight_source: provider
gi_max_insights: 50
gi_require_grounding: true
gil_evidence_quote_mode: bundled
gil_evidence_nli_mode: bundled
gi_insight_chunk_chars: 30000
gi_insight_dedupe_threshold: 0.75
gi_insight_temperature: 0.0
gi_insight_prompt_version: v2
gi_value_gate_enabled: false
gi_value_gate_min_tier: 2
gi_qa_score_min: 0.3
gi_nli_entailment_min: 0.5
gil_evidence_match_summary_provider: true
resilience_run_context: serve
resilience_failure_strategy: failover
transcription_coverage_min: 0.0
