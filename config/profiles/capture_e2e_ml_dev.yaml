# Profile capture: E2E mock RSS + ML dev (same shape as sample_acceptance_e2e_fixture_single.yaml).
# Placeholder rss is replaced at runtime: freeze_profile starts E2EHTTPServer and uses podcast1_mtb.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-ml-dev \
#     PIPELINE_CONFIG=config/profiles/capture_e2e_ml_dev.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

rss: https://example.invalid/e2e-placeholder-single-feed.xml
output_dir: .tmp/profile_capture/e2e/ml_dev
max_episodes: 2

transcription_provider: whisper
speaker_detector_provider: spacy
summary_provider: transformers

whisper_model: base.en
whisper_device: cpu
summary_model: bart-small
summary_reduce_model: long-fast
summary_device: cpu
ner_model: en_core_web_sm

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 5
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
vector_search: true
vector_backend: faiss
