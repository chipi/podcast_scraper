# Profile: prod_dgx_balanced — Moonlight summary variant of prod_dgx_full_with_fallback (#1016 R3)
#
# Same operational shape as prod_dgx_full_with_fallback, but the summary stage
# uses vLLM-served Moonlight-16B-A3B-Instruct (the #1016 Round 3 safe pick)
# instead of Ollama qwen3.5:35b (the #928 Cell C winner).
#
# Trade-off (from EVAL_1016_FINAL_REPORT_2026_06_17.md):
#
#   | Axis            | prod_dgx_full_with_fallback (Qwen3.5)  | prod_dgx_balanced (Moonlight)        |
#   |-----------------|----------------------------------------|--------------------------------------|
#   | ROUGE-1 vs Opus | 59.4%                                  | 57.5%   (-1.9pt)                     |
#   | Summary speed   | 13.6 s/ep                              | 9.0 s/ep    (33% faster)             |
#   | Resident mem    | 67 GB BF16                             | 32 GB BF16  (half)                   |
#   | Style bias      | +3.6 Sonnet-mimicry                    | 0.0 — perfectly neutral              |
#   | Judge req       | cross-vendor panel required            | any judge OK                         |
#
# When to pick this profile (over prod_dgx_full_with_fallback):
#
#   (a) DGX is shared with other workloads — half-mem matters
#   (b) downstream judge vendor is unknown or Sonnet-heavy
#   (c) audit-clean rankings matter more than peak quality
#       (e.g. customer-facing leaderboards, third-party-graded outputs)
#   (d) latency matters (33% faster summary)
#
# Same #963 / #996 catastrophic-tail operational gate applies as
# prod_dgx_full_with_fallback. See that profile's header for the full rule.
#
# 2026-06-17 — Created from #1016 Round 3 final report.

profile: prod_dgx_balanced

# --- Transcription: DGX whisper-openai with cloud Whisper fallback ---
transcription:
  primary: tailnet_dgx_whisper
  fallback: openai

dgx_tailnet_host: ${DGX_TAILNET_HOST:-your-dgx.tailnet.ts.net}
dgx_whisper_model: large-v3
dgx_whisper_port: 8002
transcription_fallback_provider: openai
openai_transcription_model: whisper-1

# --- Diarization: pyannote on DGX with local fallback ---
screenplay: true
diarize: true
diarization_provider: tailnet_dgx
dgx_diarize_port: 8001
dgx_diarize_model: pyannote/speaker-diarization-community-1
dgx_diarize_request_timeout_sec: 180.0

audio_preprocessing_profile: speech_optimal_v1

# --- Speaker detection: Gemini ---
speaker_detector_provider: gemini
auto_speakers: true

# --- LLM summary stage: vLLM-served Qwen3-30B-A3B-NVFP4 (Cell F #1022) ---
# 2026-06-19 UPDATE: was Moonlight-16B-A3B; swapped to
# NVFP4/Qwen3-30B-A3B-Instruct-2507-FP4 after #1022 Cell F entered the cohort.
# Cell F dominates Moonlight in 4 of 5 dimensions: loses summary rouge1 by 6%
# but wins GI by 161%, KG by 45%, end-to-end speed by 5%, weight footprint by
# 44% (18 GB vs 32 GB). Requires the autoresearch slot to be serving
# NVFP4/Qwen3-30B-A3B-Instruct-2507-FP4 in the homelab compose. See
# ~/agentic-ai-homelab/infra/vllm/autoresearch/docker-compose.yml and use
# gpu-mode-swap.sh research. Style-neutrality caveat: Cell F has not been
# Δ S−O measured; for strict bias-clean ranking, manually swap to Moonlight.
# Full evidence: docs/wip/VLLM_GB10_TUNING_VALIDATION_2026-06-18.md.
summary_provider: openai
openai_base_url: http://${DGX_TAILNET_HOST:-your-dgx.tailnet.ts.net}:8003/v1
openai_summary_model: autoresearch  # served-model-name on the vLLM slot
openai_api_key_env: VLLM_API_KEY
llm_pipeline_mode: staged

# Cloud fallback for summary if DGX is down.
degradation_policy:
  fallback_provider_on_failure: gemini
  continue_on_stage_failure: true
gemini_summary_model: gemini-2.5-flash-lite

preprocessing_enabled: true
cloud_llm_structured_min_output_tokens: 4096

# --- GI / KG / vector search ---
generate_gi: true
gi_insight_source: provider
# Generate broadly and let the GATE trim: the cap is not a quality control, it is a truncation.
# Prod ran 12 while every eval ran 50, so the comparison measured a pipeline production never runs.
gi_max_insights: 50
gi_require_grounding: true
gil_evidence_quote_mode: bundled
gil_evidence_nli_mode: bundled

generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

vector_search: true
vector_embedding_provider: sentence_transformers
llm_circuit_breaker_enabled: true

generate_metadata: true
generate_summaries: true
language: en
log_level: INFO

# -----------------------------------------------------------------------------
# RFC-088 chunk-7 enricher set (advisory mirror of profile_sets.py)
# -----------------------------------------------------------------------------
# The Python matrix at src/podcast_scraper/enrichment/profile_sets.py is
# the source of truth; this block reflects the 'prod_dgx_balanced' row so
# operators can discover the active set without reading code.
# Per-enricher knobs (cost caps, thresholds) live under enrichers.<id>.
enrichment:
  enabled: true
  enrichers:
    topic_cooccurrence_corpus: {}
    topic_theme_clusters: {}
    temporal_velocity: {}
    grounding_rate: {}
    guest_coappearance: {}
    insight_density: {}
    insight_sentiment: {}
    topic_similarity:
      provider:
        type: sentence_transformer_local
        model: all-MiniLM-L6-v2
    topic_consensus:
      provider:
        type: consensus_local
        embed_model: all-MiniLM-L6-v2

# --- GI quality gates (wired 2026-07-14) -----------------------------------------------------------
# Every knob below defaulted OFF or to a stale value, and NO profile set any of them. The value
# gate — the judge that removes filler — therefore never ran in production at all; it ran only in
# evals, which is how the eval and the product came to measure different pipelines.
gi_value_gate_enabled: true
# PIN the judge. A model grading its own output is lenient (#939), and if each arm is filtered by a
# different strictness the surviving counts are not comparable. Vendor-disjoint from the extractor.
gi_value_gate_provider: anthropic
gi_value_gate_model: claude-haiku-4-5-20251001
gi_value_gate_min_tier: 2
# The same claim twice is not two insights. The judge grades each one ALONE, so it cannot see
# redundancy: measured on the real corpus, 35% of one model's insights restated an earlier one.
gi_insight_dedupe_threshold: 0.75
# PINNED, not defaulted. v3 (the speech-act variant) LOST its A/B — route kappa 0.57 against
# v2's 0.67 — and stays on disk only as the record of that measurement. Naming the winner
# here means a future change of default cannot silently move this profile off it.
gi_insight_prompt_version: v2
# An LLM grounds with an LLM. `gil_evidence_*_mode: bundled` above is an LLM-only path, and with
# the provider left at its "transformers" default it did nothing — these profiles asked for bundled
# LLM grounding and got local DeBERTa.
quote_extraction_provider: openai
entailment_provider: openai
