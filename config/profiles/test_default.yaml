# Profile: test_default — what tests load when no other profile is specified.
#
# Registry status: YAML-only (no entry in `_PROFILE_PRESETS`). Reason:
# `ProfilePreset` pins both PROVIDER and MODEL per stage; this profile only
# pins MODEL choices (cheap tier across vendors) and lets Field defaults
# decide PROVIDER. Adding a Preset would force test-tier StageOption
# coverage for every provider — meaningful registry surface expansion
# without a clear product driver. Drift-checked by SKIPPING the
# `test_profile_yaml_registry_drift.py` test (no `profile: test_default`
# top-level field → opted-out by design).
#
#
# Replaces the old `_is_test_environment()` + 24 `_get_default_*` env-detect
# machinery (commit ce029849 / 2026-06-22 narrowing + the structural refactor
# that followed). The mechanism was:
#
#   - Old: per-knob `default_factory=_get_default_X` that returned TEST_DEFAULT_X
#     when `unittest in sys.modules` was true (false-positive: numpy lazy-imports
#     numpy.testing → unittest in sys.modules → silent prod runs got TEST values
#     for 5 months, 2026-02-06 → 2026-06-22).
#   - New: profile YAML is the source of truth. Tests load this profile; prod
#     loads its own profile; both layers pin their model choices explicitly.
#
# This profile pins the same model set that the old TEST_DEFAULT_* constants
# carried — small, fast, cheap models suitable for CI / unit / integration
# runs. Tests can still override individual fields per-test (Config explicit
# fields win over profile YAML, per the merge order in `_merge_profile_into_data`).
#
# Tests opt into this profile via `PODCAST_SCRAPER_PROFILE` env var (set by
# tests/conftest.py autouse fixture), OR by passing `profile="test_default"`
# explicitly to `Config(...)`.

# Transcription — smallest local Whisper (~13% WER, 40s/ep).
whisper_model: tiny.en

# Speaker detection — fast spaCy.
ner_model: en_core_web_sm

# Summarization — small map + reduce models (aliases resolved via ModelRegistry).
summary_model: bart-small
summary_reduce_model: long-fast

# Test default: NO summary_mode_id — so explicit `summary_model` / `summary_reduce_model`
# kwargs win in `select_summary_model` / `select_reduce_model`. Pre-refactor, the
# old env-detect helper returned None for `summary_mode_id` under pytest; this
# pin preserves that behavior in the new profile-as-source-of-truth model.
summary_mode_id: null

# OpenAI — cheap models for tests.
openai_summary_model: gpt-4o-mini
openai_speaker_model: gpt-4o-mini
openai_cleaning_model: gpt-4o-mini
openai_transcription_model: whisper-1

# Anthropic — cheap Haiku for tests.
anthropic_speaker_model: claude-haiku-4-5
anthropic_summary_model: claude-haiku-4-5

# Mistral — cheap small for tests.
mistral_transcription_model: voxtral-mini-latest
mistral_speaker_model: mistral-small-latest
mistral_summary_model: mistral-small-latest

# Grok — beta tier for tests.
grok_speaker_model: grok-beta
grok_summary_model: grok-beta

# Gemini — flash-lite (TEST == PROD; pinned for transparency).
gemini_transcription_model: gemini-2.5-flash-lite
gemini_speaker_model: gemini-2.5-flash-lite
gemini_summary_model: gemini-2.5-flash-lite

# DeepSeek — single tier (TEST == PROD; pinned for transparency).
deepseek_speaker_model: deepseek-chat
deepseek_summary_model: deepseek-chat

# Ollama — 8B tier (TEST == PROD; pinned for transparency).
ollama_speaker_model: llama3.1:8b
ollama_summary_model: llama3.1:8b

# -----------------------------------------------------------------------------
# RFC-088 chunk-7 enricher set (advisory mirror of profile_sets.py)
# -----------------------------------------------------------------------------
# 'test_default' runs NO enrichers by default (CI isolation /
# operator-side-only profile). The Python matrix at
# src/podcast_scraper/enrichment/profile_sets.py is the source of truth.
# Override per run via:
#   python -m podcast_scraper.enrichment.cli --profile test_default \
#     --enrichers topic_cooccurrence,topic_cooccurrence_corpus
enrichment:
  enabled: false
  enrichers: []
