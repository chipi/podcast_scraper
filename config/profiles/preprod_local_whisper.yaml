# Profile: preprod_local_whisper — Stage A dress rehearsal for the prod profile.
#
# Registry status: ProfilePreset-backed (promoted 2026-06-23 in #1060 FU1).
# Routes to the `preprod_local_whisper` preset in `_PROFILE_PRESETS`:
# mirrors cloud_with_dgx_primary EXCEPT transcription, which uses the
# laptop's local Whisper small.en (the existing `local_whisper_small_en`
# StageOption covers this — no new variant needed). Drift-checked by
# `test_profile_yaml_registry_drift.py`.
#
profile: preprod_local_whisper
#
# Mirrors cloud_with_dgx_primary.yaml exactly, EXCEPT:
#   - transcription runs on laptop-local Whisper (openai-whisper + Apple MPS / CUDA)
#   - DGX-specific fields removed (no tailnet_dgx_whisper, no dgx_tailnet_host)
#
# Purpose: validate the full prod pipeline shape (cloud Gemini LLM, screenplay,
# diarize, GI evidence, KG, vectors, bridge) from your laptop BEFORE the DGX
# Whisper service is built. See DGX_RUNBOOK §"Pre-prod laptop validation".
#
# Once this passes against the operator's last-7-days corpus, the DGX Whisper
# service work (#814 Stage B) becomes worthwhile. Until then, this profile is
# the unblocker.
#
# Run:
#   make preprod-local RSS=<feed-url>
# or directly:
#   podcast-scraper <feed-url> --profile preprod_local_whisper --output-dir /tmp/preprod

transcription_provider: whisper
# small.en is the iteration default (~10x real-time on M-series MPS).
# For the FINAL dress rehearsal before prod flip, override to large-v3 to match
# what the DGX Whisper service will run (~0.6x real-time on M-series; one-time
# ~3GB download). Both pass through the same pipeline glue.
whisper_model: small.en

# Screenplay + neural diarization (RFC-058) — non-negotiable per operator;
# prod profile has these on, so Stage A must too.
screenplay: true
diarize: true
diarization_model: pyannote/speaker-diarization-community-1  # from registry: pyannote_diarization_community1

audio_preprocessing_profile: speech_optimal_v1

speaker_detector_provider: gemini
auto_speakers: true

summary_provider: gemini
gemini_summary_model: gemini-2.5-flash-lite
preprocessing_enabled: true
llm_pipeline_mode: mega_bundled
cloud_llm_structured_min_output_tokens: 4096

generate_gi: true
gi_insight_source: provider
# Generate broadly and let the GATE trim: the cap is not a quality control, it is a truncation.
# Prod ran 12 while every eval ran 50, so the comparison measured a pipeline production never runs.
gi_max_insights: 50
gi_require_grounding: true
gil_evidence_quote_mode: bundled
gil_evidence_nli_mode: bundled

generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

vector_search: true
vector_embedding_provider: sentence_transformers  # explicit (preprod mirrors prod; matches all search-on profiles)
llm_circuit_breaker_enabled: true

generate_metadata: true
generate_summaries: true
language: en
log_level: INFO

# -----------------------------------------------------------------------------
# RFC-088 chunk-7 enricher set (advisory mirror of profile_sets.py)
# -----------------------------------------------------------------------------
# 'preprod_local_whisper' runs NO enrichers by default (CI isolation /
# operator-side-only profile). The Python matrix at
# src/podcast_scraper/enrichment/profile_sets.py is the source of truth.
# Override per run via:
#   python -m podcast_scraper.cli enrich --profile preprod_local_whisper \
#     --enrichers topic_cooccurrence,topic_cooccurrence_corpus
enrichment:
  enabled: false
  enrichers: {}

# --- GI quality gates (wired 2026-07-14) -----------------------------------------------------------
# Every knob below defaulted OFF or to a stale value, and NO profile set any of them. The value
# gate — the judge that removes filler — therefore never ran in production at all; it ran only in
# evals, which is how the eval and the product came to measure different pipelines.
gi_value_gate_enabled: true
# PIN the judge. A model grading its own output is lenient (#939), and if each arm is filtered by a
# different strictness the surviving counts are not comparable. Vendor-disjoint from the extractor.
gi_value_gate_provider: anthropic
gi_value_gate_model: claude-haiku-4-5-20251001
gi_value_gate_min_tier: 2
# The same claim twice is not two insights. The judge grades each one ALONE, so it cannot see
# redundancy: measured on the real corpus, 35% of one model's insights restated an earlier one.
gi_insight_dedupe_threshold: 0.75
# PINNED, not defaulted. v3 (the speech-act variant) LOST its A/B — route kappa 0.57 against
# v2's 0.67 — and stays on disk only as the record of that measurement. Naming the winner
# here means a future change of default cannot silently move this profile off it.
gi_insight_prompt_version: v2
# An LLM grounds with an LLM. `gil_evidence_*_mode: bundled` above is an LLM-only path, and with
# the provider left at its "transformers" default it did nothing — these profiles asked for bundled
# LLM grounding and got local DeBERTa.
quote_extraction_provider: gemini
entailment_provider: gemini
