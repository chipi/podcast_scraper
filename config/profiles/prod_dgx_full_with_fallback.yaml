# Profile: prod_dgx_full_with_fallback — all-DGX prod hot path, cloud fallbacks (#923)
#
# Compared to `cloud_with_dgx_primary`, this profile additionally moves the
# **LLM stages** (summary / GI / KG) onto DGX Ollama. The hot path no longer
# pays cloud LLM spend; the cloud is the fallback only.
#
# Cost (at the operator's ~100 ep/mo cadence): marginal ≈ $0 (electricity).
# `cloud_with_dgx_primary` is ~$0.85/mo at the same volume. Both rely on the
# DGX capex.
#
# 2026-06-14 — OPERATIONAL GATE (#963 / #996 catastrophic-tail).
# The 2026-06-14 #963 re-run found that under active vLLM serving, DGX
# whisper can produce a successful-but-garbage response (WER 1.000) for one
# episode in a 5-episode batch — a failure mode the `tailnet_dgx.resilience`
# layer cannot catch (200 OK + wrong content, not a timeout). On THIS
# profile the transcribe + diarize + summary stages run sequentially per
# episode so they don't overlap each other — but external vLLM autoresearch
# sweeps on the coder-next image DO overlap. Operator rule:
#
#   DO NOT run autoresearch sweeps on coder-next vLLM concurrent with a
#   pipeline run on this profile.
#
# #996 tracks characterizing the catastrophic-tail failure rate at N≥20 so
# the operational rule can graduate to a code-level enforcement story.
# Until #996 closes, this profile is "prod-eligible but operator-gated."

# 2026-06-12 (#907 Option B): opted into registry-driven defaults. The
# `profile:` field below names the registry preset; routing fields below
# are cross-checked against the registry by
# tests/integration/providers/ml/test_profile_yaml_registry_drift.py.
profile: prod_dgx_full_with_fallback

# --- Transcription: DGX whisper-openai with cloud Whisper fallback ---
# Same pattern as cloud_with_dgx_primary post-#929/#966.
transcription:
  primary: tailnet_dgx_whisper
  fallback: openai

dgx_tailnet_host: ${DGX_TAILNET_HOST:-your-dgx.tailnet.ts.net}
dgx_whisper_model: large-v3
dgx_whisper_port: 8002
transcription_fallback_provider: openai
openai_transcription_model: whisper-1

# --- Diarization: pyannote on DGX with local fallback ---
# Identical to cloud_with_dgx_primary. The TailnetDgxDiarizationProvider
# handles fallback to in-process pyannote on health-check or per-request
# error; no separate `diarization_fallback_provider` config needed.
screenplay: true
diarize: true
diarization_provider: tailnet_dgx
dgx_diarize_port: 8001
dgx_diarize_model: pyannote/speaker-diarization-community-1
dgx_diarize_request_timeout_sec: 180.0  # #954: per-request hard ceiling

audio_preprocessing_profile: speech_optimal_v1

# --- Speaker detection: Gemini (kept on cloud) ---
# Sub-cent per call, materially better than spacy on names. The cost
# argument that drives moving LLM to DGX doesn't apply to speaker
# detection (already nearly free) so we keep it where quality wins.
speaker_detector_provider: gemini
auto_speakers: true

# --- LLM stages: vLLM Qwen3-30B-A3B-NVFP4 (Cell F #1022 daily driver) ---
# 2026-06-19 UPDATE (#1022): swapped daily-driver from Qwen3.5-35B-A3B (bf16)
# to NVFP4/Qwen3-30B-A3B-Instruct-2507-FP4 (Cell F champion). 1.7× faster
# end-to-end (38 vs 64.9 s/ep), -4.7% quality sum; wins GI stage outright
# (cov 0.4250 vs Qwen3.5-35B 0.3625, +17%). 18 GB weight footprint vs 67 GB
# (frees ~50 GB for KV / co-residence). Validated on dev_v1 + held-out
# benchmark_v2 cross-vendor silvers (Opus 4.7 + Sonnet 4.6). Full evidence:
# docs/wip/VLLM_GB10_TUNING_VALIDATION_2026-06-18.md.
# For highest-stakes one-shot evals where summary or KG quality matters more
# than wall-clock, manually swap the homelab compose to
# `Qwen/Qwen3.5-35B-A3B-Instruct` for that specific run.
# 2026-06-17 (prior) HISTORY: had flipped from Ollama qwen3.5:35b to vLLM
# Qwen3.5-35B-A3B per #1016 Round 3 top-dog finding. That layer is now
# superseded by Cell F for daily-driver use; Qwen3.5-35B-A3B remains the
# top-quality reserve.
# `llm_pipeline_mode: staged` retained per #912 workaround.
summary_provider: openai
openai_base_url: http://${DGX_TAILNET_HOST:-your-dgx.tailnet.ts.net}:8003/v1
openai_summary_model: autoresearch  # served-model-name on the vLLM slot
openai_api_key_env: VLLM_API_KEY
llm_pipeline_mode: staged

# Cloud fallback path for the LLM stages. The FallbackAwareSummarizationProvider
# wraps summary + GI evidence (extract_quotes / score_entailment) + KG so a
# DGX outage degrades cleanly to Gemini (#812). The fallback tier is now driven by
# the registry-emitted summary_fallback_providers below (RFC-105 / #1198), not by
# a hand-set degradation_policy.fallback_provider_on_failure. Speaker detection
# already hits Gemini directly above.
degradation_policy:
  continue_on_stage_failure: true
gemini_summary_model: gemini-2.5-flash-lite

preprocessing_enabled: true
cloud_llm_structured_min_output_tokens: 4096

# --- GI / KG / vector search ---
generate_gi: true
gi_insight_source: provider
# Generate broadly and let the GATE trim: the cap is not a quality control, it is a truncation.
# Prod ran 12 while every eval ran 50, so the comparison measured a pipeline production never runs.
gi_max_insights: 50
gi_require_grounding: true
gil_evidence_quote_mode: bundled
gil_evidence_nli_mode: bundled

generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

vector_search: true
vector_embedding_provider: sentence_transformers
llm_circuit_breaker_enabled: true

generate_metadata: true
generate_summaries: true
language: en
log_level: INFO

# -----------------------------------------------------------------------------
# RFC-088 chunk-7 enricher set (advisory mirror of profile_sets.py)
# -----------------------------------------------------------------------------
# The Python matrix at src/podcast_scraper/enrichment/profile_sets.py is
# the source of truth; this block reflects the 'prod_dgx_full_with_fallback' row so
# operators can discover the active set without reading code.
# Per-enricher knobs (cost caps, thresholds) live under enrichers.<id>.
enrichment:
  enabled: true
  enrichers:
    topic_cooccurrence_corpus: {}
    topic_theme_clusters: {}
    temporal_velocity: {}
    grounding_rate: {}
    guest_coappearance: {}
    insight_density: {}
    insight_sentiment: {}
    topic_similarity:
      provider:
        type: sentence_transformer_local
        model: all-MiniLM-L6-v2
    topic_consensus:
      provider:
        type: consensus_local
        embed_model: all-MiniLM-L6-v2

# --- GI quality gates (wired 2026-07-14) -----------------------------------------------------------
# Every knob below defaulted OFF or to a stale value, and NO profile set any of them. The value
# gate — the judge that removes filler — therefore never ran in production at all; it ran only in
# evals, which is how the eval and the product came to measure different pipelines.
gi_value_gate_enabled: true
# PIN the judge. A model grading its own output is lenient (#939), and if each arm is filtered by a
# different strictness the surviving counts are not comparable. Vendor-disjoint from the extractor.
gi_value_gate_provider: anthropic
gi_value_gate_model: claude-haiku-4-5-20251001
gi_value_gate_min_tier: 2
# The same claim twice is not two insights. The judge grades each one ALONE, so it cannot see
# redundancy: measured on the real corpus, 35% of one model's insights restated an earlier one.
gi_insight_dedupe_threshold: 0.75
# PINNED, not defaulted. v3 (the speech-act variant) LOST its A/B — route kappa 0.57 against
# v2's 0.67 — and stays on disk only as the record of that measurement. Naming the winner
# here means a future change of default cannot silently move this profile off it.
# Pinned so a reprocess is REPRODUCIBLE and so the eval measures the model, not the sampler.
# Left unset, extraction samples at the provider default (0.3) and the same episode yields
# different insights on every run — noise a model comparison reports as model quality.
gi_insight_temperature: 0.0
gi_insight_prompt_version: v2
# An LLM grounds with an LLM. `gil_evidence_*_mode: bundled` above is an LLM-only path, and with
# the provider left at its "transformers" default it did nothing — these profiles asked for bundled
# LLM grounding and got local DeBERTa.
quote_extraction_provider: openai
entailment_provider: openai

# --- registry-materialized (make profiles-materialize) — do not hand-edit ---
transcription_provider: moss
summary_model: autoresearch
topic_cluster_threshold: 0.75
insight_cluster_threshold: 0.75
gi_insight_chunk_chars: 30000
gi_qa_score_min: 0.3
gi_nli_entailment_min: 0.75
gil_evidence_match_summary_provider: true
transcription_fallback_providers: [tailnet_dgx_whisper, whisper, openai]
diarization_fallback_providers: [local, deepgram]
summary_fallback_providers: [gemini]
