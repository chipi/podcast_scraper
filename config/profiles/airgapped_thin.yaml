# Profile: airgapped_thin — same isolation as ``airgapped``, lower RAM / startup cost
#
# Registry status: ProfilePreset-backed (promoted 2026-06-23 in #1060).
# Routing maps to the `airgapped_thin` preset in `_PROFILE_PRESETS`:
# tiny.en Whisper + bart-small+long-fast (ml_small_authority mode) +
# spaCy sm. Drift-checked by `test_profile_yaml_registry_drift.py`.
#
profile: airgapped_thin
#
# No cloud APIs, no Ollama. Tuned for Docker stack tests and smaller machines while keeping the
# same **GI / KG / search-index** shape as packaged ``airgapped`` (summary bullets → GI/KG, grounded GIL).
#
# Compared to ``airgapped``:
# - Whisper ``tiny.en`` instead of ``medium.en`` (smaller download + VRAM/RAM footprint)
# - ``en_core_web_sm`` instead of ``en_core_web_trf`` (faster NER, less memory)
# - ``transformers`` BART-small + ``long-fast`` REDUCE instead of SummLlama-3B (~7GB peak)
#
# For maximum local quality, use ``airgapped`` instead.
#
# -----------------------------------------------------------------------------
# RFC-097 v3.0 capability set (profile contract)
# -----------------------------------------------------------------------------
# Profiles WITHOUT an LLM cannot produce the full v3.0 vocabulary. The
# Tier-3 stack-test asserts STRICTLY against this subset; the
# Organization contract is asserted at the Python integration layer
# (tests/integration/server/test_cil_queries.py) against a hand-crafted
# v3.0 corpus fixture.
#
# PRODUCED by airgapped_thin (strict — Tier-3 fails if these are missing):
#   - schema_version: "3.0" on GI artifacts
#   - Insight nodes (BART bullets feed the insight_texts path)
#   - Insight.insight_type via rule-based classifier (no LLM needed)
#   - Insight.position_hint numeric via the waterfall step 1 (RSS
#     itunes:duration) or step 2 (last transcript segment)
#   - KG Person nodes from speaker detection (hosts + guests)
#   - KG Podcast node + HAS_EPISODE edges from feed metadata
#   - KG Topic nodes from bullet labels
#   - GI ABOUT + SPOKEN_BY + SUPPORTED_BY + HAS_INSIGHT edges
#   - Migration safety: ZERO legacy MENTIONS pointing at typed KG nodes
#     (the typed-MENTIONS post-pass rewrites any legacy edges it finds)
#
# CONDITIONAL (best-effort — Tier-3 does NOT require these because BART
# summarization may paraphrase speaker names out of bullets, so the
# typed-MENTIONS post-pass has nothing to match):
#   - GI MENTIONS_PERSON edges (post-pass needs the KG Person name to
#     appear as a whole-word substring in the Insight text. Fires when
#     BART preserves the host/guest name in the bullet; misses when
#     BART paraphrases to "the host"/"the guest". Common enough in
#     dialogue-heavy episodes; not guaranteed.)
#
# NOT PRODUCED by airgapped_thin (requires LLM — use cloud_thin /
# cloud_balanced / local_dgx_* profiles to exercise these):
#   - KG Organization nodes (no LLM entity-class extraction)
#   - GI MENTIONS_ORG edges (depend on Organization nodes)
#   - Higher-recall Person extraction (LLM beats spaCy_sm)
#   - Rich insight_type accuracy (rule-based vs LLM classifier)

# Transcription — smallest local Whisper (stack-test / dev friendly)
transcription_provider: whisper
whisper_model: tiny.en

# Screenplay + neural diarization (RFC-058)
screenplay: true
diarize: true
diarization_model: pyannote/speaker-diarization-community-1  # from registry: pyannote_diarization_community1

# Audio preprocessing — named preset (#634 Scope 1).
audio_preprocessing_profile: speech_optimal_v1

# Speaker detection — spaCy sm (fast, fully local)
speaker_detector_provider: spacy
ner_model: en_core_web_sm
auto_speakers: true

# Summarization — local transformers (summary-only)
summary_provider: transformers
summary_model: bart-small
summary_reduce_model: long-fast

# Grounded Insights — provider source (#1033/#1034). Transformers is summary-only
# so generate_insights is a no-op here; GI requires an LLM summary_provider to fire.
generate_gi: true
gi_insight_source: provider
gi_max_insights: 50
gi_require_grounding: true

# Knowledge Graph — provider source (#1033/#1034). Same transformers no-op caveat.
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

# #1076 chunk 4-A — spaCy NER pass for typed MENTIONS_PERSON post-pass.
# Default-on for airgapped_thin because BART summarisation paraphrases
# speaker names ("Maya argued..." instead of "Maya Hutchinson argued...")
# and the literal whole-word regex misses the fragment case.
#
# Validation against the prod-v2 corpus (209 GI files, 2026-06-24):
#   Pre-migration measurement (regex-only baseline vs regex+NER on raw
#   v2 envelopes via scripts/dev/measure_ner_mentions_diff.py):
#     12 → 90 MP edges, +78 NER-only delta over the regex-only floor.
#   Post-migration on-disk retro sweep (`enrich-edges --use-ner
#   --retro-audit`, marker `#1076-ner-2026-06-24`):
#     +46 NER-only MP edges across 14 of 99 paired GI/KG artifacts on
#     top of the legacy MENTIONS → typed-MENTIONS migration rewrite.
# Two baselines, two numbers — both real. Operator-labelled 50-row
# sample: 47 TP / 3 AMBIGUOUS (single-token common-surname names that
# pass the per-artifact disambiguation guard) / 0 FP.
#
# Layered overlay only — NOT carried by ProfilePreset. Code that
# instantiates `_PROFILE_PRESETS["airgapped_thin"]` programmatically
# without the YAML overlay will run with the cfg-default (False).
# The drift test `tests/unit/podcast_scraper/test_config_ner_flag.py`
# pins the YAML-overlay expected values.
gi_typed_mentions_use_ner: true

# #1058 chunk 1 — KG Organization post-pass for LLM-free profiles.
# Default-on for airgapped_thin because BART (summary-only) can't
# extract typed entities — Organization nodes never land without
# this. The post-pass runs spaCy NER over GI Insight texts and adds
# Organization nodes; idempotent. Same overlay-only nature as
# gi_typed_mentions_use_ner (not carried by ProfilePreset).
kg_organizations_use_ner: true

# #1058 chunk 3 — corpus-level Topic clustering for cross-show synthesis.
# Under BART, bullet-derived Topics per show never share labels with
# other shows; this corpus post-pass clusters them via
# sentence-transformers (already present for ABOUT edges) and emits
# concept-Topic + RELATED_TO so cross_show_synthesis connectivity
# lands. Overlay-only (not on ProfilePreset). Idempotent.
kg_topic_corpus_clustering: true

# Vector search + clustering
vector_search: true
vector_embedding_provider: sentence_transformers

# General
generate_metadata: true
generate_summaries: true
transcribe_missing: true
language: en
log_level: INFO

# -----------------------------------------------------------------------------
# RFC-088 chunk-7 enricher set (advisory mirror of profile_sets.py)
# -----------------------------------------------------------------------------
# The Python matrix at src/podcast_scraper/enrichment/profile_sets.py is
# the source of truth; this block reflects the 'airgapped_thin' row so
# operators can discover the active set without reading code.
# Per-enricher knobs (cost caps, thresholds) live under enrichers.<id>.
enrichment:
  enabled: true
  enrichers:
    topic_cooccurrence_corpus: {}
    topic_theme_clusters: {}
    temporal_velocity: {}
    grounding_rate: {}
    guest_coappearance: {}
    insight_density: {}
    insight_sentiment: {}

# --- registry-materialized (make profiles-materialize) — do not hand-edit ---
topic_cluster_threshold: 0.75
insight_cluster_threshold: 0.75
gil_evidence_quote_mode: bundled
gil_evidence_nli_mode: bundled
gi_insight_chunk_chars: 30000
gi_insight_dedupe_threshold: 0.75
gi_insight_temperature: 0.0
gi_insight_prompt_version: v2
gi_value_gate_enabled: false
gi_value_gate_min_tier: 2
gi_qa_score_min: 0.3
gi_nli_entailment_min: 0.5
gil_evidence_match_summary_provider: true
resilience_run_context: serve
resilience_failure_strategy: failover
transcription_coverage_min: 0.0
enforce_model_governance: false
