# Profile: airgapped_thin — same isolation as ``airgapped``, lower RAM / startup cost
#
# No cloud APIs, no Ollama. Tuned for Docker stack tests and smaller machines while keeping the
# same **GI / KG / search-index** shape as packaged ``airgapped`` (summary bullets → GI/KG, grounded GIL).
#
# Compared to ``airgapped``:
# - Whisper ``tiny.en`` instead of ``medium.en`` (smaller download + VRAM/RAM footprint)
# - ``en_core_web_sm`` instead of ``en_core_web_trf`` (faster NER, less memory)
# - ``transformers`` BART-small + ``long-fast`` REDUCE instead of SummLlama-3B (~7GB peak)
#
# For maximum local quality, use ``airgapped`` instead.
#
# -----------------------------------------------------------------------------
# RFC-097 v3.0 capability set (profile contract)
# -----------------------------------------------------------------------------
# Profiles WITHOUT an LLM cannot produce the full v3.0 vocabulary. The
# Tier-3 stack-test asserts STRICTLY against this subset; the
# Organization contract is asserted at the Python integration layer
# (tests/integration/server/test_cil_queries.py) against a hand-crafted
# v3.0 corpus fixture.
#
# PRODUCED by airgapped_thin (strict — Tier-3 fails if these are missing):
#   - schema_version: "3.0" on GI artifacts
#   - Insight nodes (BART bullets feed the insight_texts path)
#   - Insight.insight_type via rule-based classifier (no LLM needed)
#   - Insight.position_hint numeric via the waterfall step 1 (RSS
#     itunes:duration) or step 2 (last transcript segment)
#   - KG Person nodes from speaker detection (hosts + guests)
#   - KG Podcast node + HAS_EPISODE edges from feed metadata
#   - KG Topic nodes from bullet labels
#   - GI ABOUT + SPOKEN_BY + SUPPORTED_BY + HAS_INSIGHT edges
#   - Migration safety: ZERO legacy MENTIONS pointing at typed KG nodes
#     (the typed-MENTIONS post-pass rewrites any legacy edges it finds)
#
# CONDITIONAL (best-effort — Tier-3 does NOT require these because BART
# summarization may paraphrase speaker names out of bullets, so the
# typed-MENTIONS post-pass has nothing to match):
#   - GI MENTIONS_PERSON edges (post-pass needs the KG Person name to
#     appear as a whole-word substring in the Insight text. Fires when
#     BART preserves the host/guest name in the bullet; misses when
#     BART paraphrases to "the host"/"the guest". Common enough in
#     dialogue-heavy episodes; not guaranteed.)
#
# NOT PRODUCED by airgapped_thin (requires LLM — use cloud_thin /
# cloud_balanced / local_dgx_* profiles to exercise these):
#   - KG Organization nodes (no LLM entity-class extraction)
#   - GI MENTIONS_ORG edges (depend on Organization nodes)
#   - Higher-recall Person extraction (LLM beats spaCy_sm)
#   - Rich insight_type accuracy (rule-based vs LLM classifier)

# Transcription — smallest local Whisper (stack-test / dev friendly)
transcription_provider: whisper
whisper_model: tiny.en

# Screenplay + neural diarization (RFC-058)
screenplay: true
diarize: true

# Audio preprocessing — named preset (#634 Scope 1).
audio_preprocessing_profile: speech_optimal_v1

# Speaker detection — spaCy sm (fast, fully local)
speaker_detector_provider: spacy
ner_model: en_core_web_sm
auto_speakers: true

# Summarization — local transformers (summary-only)
summary_provider: transformers
summary_model: bart-small
summary_reduce_model: long-fast

# Grounded Insights — provider source (#1033/#1034). Transformers is summary-only
# so generate_insights is a no-op here; GI requires an LLM summary_provider to fire.
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph — provider source (#1033/#1034). Same transformers no-op caveat.
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

# Vector search + clustering
vector_search: true
vector_embedding_provider: sentence_transformers

# General
generate_metadata: true
generate_summaries: true
transcribe_missing: true
language: en
log_level: INFO
