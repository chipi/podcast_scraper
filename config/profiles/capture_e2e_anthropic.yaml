# Profile capture: E2E mock RSS + Anthropic (real ANTHROPIC_API_KEY).
# Placeholder rss -> podcast1_mtb via freeze_profile.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-anthropic \
#     PIPELINE_CONFIG=config/profiles/capture_e2e_anthropic.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

rss: https://example.invalid/e2e-placeholder-single-feed.xml
output_dir: .tmp/profile_capture/e2e/anthropic
max_episodes: 2

transcription_provider: whisper
speaker_detector_provider: anthropic
summary_provider: anthropic

whisper_model: base.en
whisper_device: cpu
anthropic_speaker_model: claude-haiku-4-5
anthropic_summary_model: claude-haiku-4-5

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 5
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
vector_search: true
vector_backend: faiss
