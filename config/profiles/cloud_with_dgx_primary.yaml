# Profile: cloud_with_dgx_primary — prod Whisper + pyannote on DGX, cloud fallback (ADR-096, #814, #926)
#
# Renamed from cloud_with_dgx_whisper_primary on 2026-06-09 when pyannote
# diarization on DGX (#926) joined Whisper on DGX (#814) as the second
# prod-critical service on the GB10 box. "Whisper-primary" was no longer
# accurate; this profile now covers TWO DGX services.
#
# Summarization / GI / KG remain on cloud_balanced defaults (Gemini).
# Requires prod VPS tailnet reachability to tag:dgx-llm-host (ports 8000 for
# Speaches, 8001 for pyannote, 11434 for Ollama not used by this profile).
# Cloud fallbacks: OPENAI_API_KEY (Whisper), GEMINI_API_KEY (summary).
# Diarization falls back to in-process pyannote (no cheap cloud alternative
# to bill against — TailnetDgxDiarizationProvider handles this transparently).
#
# 2026-06-12 (#907 Option B): opted into registry-driven defaults. The
# `profile:` field below names the registry preset; routing fields below
# (transcription_provider, summary_provider, summary_model) are now
# cross-checked against the registry by
# tests/integration/providers/ml/test_profile_yaml_registry_drift.py. If
# this YAML disagrees with the registry preset, CI fails — update either
# this file or the registry (with new research_ref evidence).

profile: cloud_with_dgx_primary

transcription:
  primary: tailnet_dgx_whisper
  fallback: openai

dgx_tailnet_host: ${DGX_TAILNET_HOST:-your-dgx.tailnet.ts.net}
# Registry-driven choice (`tailnet_dgx_whisper_speaches` in
# src/podcast_scraper/providers/ml/model_registry.py).
#
# 2026-06-16 (#955 reopen + #952 close): flipped back from
# `large-v3` on :8002 (whisper-openai wrapper) to
# `Systran/faster-whisper-large-v3` on :8000 (Speaches).
#
# History — the routing went :8000 → :8002 on 2026-06-10/12 based on
# `EVAL_TRANSCRIPTION_3WAY_2026_06.md` (v2 fixtures), which reported
# whisper-openai at 4.6× realtime vs Speaches at 0.93× realtime.
# That decision predated the Speaches int8 pin (#948) and the
# `v0.9.0-rc.3-cuda` image bump (#920) — Speaches was on the slow
# `default` (fp32) compute type when measured. The 2026-06-15 #920 pin
# + #948 empirical re-confirmation cut Speaches per-episode wall-time
# by ~3× (Speaches int8 = 4.89× realtime on a 33-min real episode).
#
# Today's #952 real-podcast eval on the post-#948 image overturns
# the routing decision on both metrics:
#
# | metric                 | whisper-openai (:8002) | Speaches int8 (:8000) |
# | ---------------------- | ---------------------- | --------------------- |
# | WER vs Deepgram silver | 12.97%                 | 10.23% ← better       |
# | wall-clock per episode | 340s mean              | 281s mean (~20% fast) |
#
# Speaches now wins on both quality AND speed. Eval report:
# `docs/guides/eval-reports/EVAL_WHISPER_ENGINE_DRIFT_2026_06_16.md`.
#
# The whisper-openai container stays parallel-deployed at :8002 as the
# comparison sibling for future engine-drift evals — not the prod path.
dgx_whisper_model: Systran/faster-whisper-large-v3
dgx_whisper_port: 8000
transcription_fallback_provider: openai

openai_transcription_model: whisper-1

screenplay: true
diarize: true

# Diarization on DGX via pyannote-server (#926). Falls back to in-process
# pyannote on health-check failure or per-request error (the
# TailnetDgxDiarizationProvider handles fallback; no separate
# `diarization_fallback_provider` config needed).
diarization_provider: tailnet_dgx
dgx_diarize_port: 8001
dgx_diarize_model: pyannote/speaker-diarization-3.1

audio_preprocessing_profile: speech_optimal_v1

speaker_detector_provider: gemini
auto_speakers: true

summary_provider: gemini
gemini_summary_model: gemini-2.5-flash-lite
preprocessing_enabled: true
llm_pipeline_mode: mega_bundled
cloud_llm_structured_min_output_tokens: 4096

generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true
gil_evidence_quote_mode: bundled
gil_evidence_nli_mode: bundled

generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

vector_search: true
vector_embedding_provider: sentence_transformers
llm_circuit_breaker_enabled: true

generate_metadata: true
generate_summaries: true
language: en
log_level: INFO

# -----------------------------------------------------------------------------
# RFC-088 chunk-7 enricher set (advisory mirror of profile_sets.py)
# -----------------------------------------------------------------------------
# The Python matrix at src/podcast_scraper/enrichment/profile_sets.py is
# the source of truth; this block reflects the 'cloud_with_dgx_primary' row so
# operators can discover the active set without reading code.
# Per-enricher knobs (cost caps, thresholds) live under enrichers.<id>.
enrichment:
  enabled: true
  enrichers:
    topic_cooccurrence_corpus: {}
    topic_theme_clusters: {}
    temporal_velocity: {}
    grounding_rate: {}
    guest_coappearance: {}
    insight_density: {}
    topic_similarity:
      provider:
        type: sentence_transformer_local
        model: all-MiniLM-L6-v2
