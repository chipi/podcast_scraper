# Profile capture: E2E mock RSS + Mistral (MISTRAL_API_KEY). Whisper + spaCy + Mistral summary.
# Matches AI Provider Guide "EU Compliant" shape (mistral-large-latest for summarization).
# Placeholder rss -> podcast1_mtb via freeze_profile.
#
# Run:
#   make profile-freeze VERSION=v2.6.0-mistral \
#     PIPELINE_CONFIG=config/profiles/capture_e2e_mistral.yaml \
#     DATASET_ID=e2e_podcast1_mtb_n2

rss: https://example.invalid/e2e-placeholder-single-feed.xml
output_dir: .tmp/profile_capture/e2e/mistral
max_episodes: 2

transcription_provider: whisper
speaker_detector_provider: spacy
summary_provider: mistral

whisper_model: base.en
whisper_device: cpu
ner_model: en_core_web_sm
mistral_summary_model: mistral-large-latest

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 5
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
vector_search: true
vector_backend: faiss
