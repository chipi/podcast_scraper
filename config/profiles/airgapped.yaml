# Profile: airgapped — no network, no Ollama daemon
#
# Maximum isolation: no API calls, no Ollama server, no network.
# Uses only bundled ML models (SummLlama / transformers, spaCy, local Whisper).
#
# Research references:
#   Summary:   SummLlama3.2-3B 0.485 paragraph (#571, 2.4x over bart-led 0.206)
#              #657 Part A refresh (2026-04-23): NOT re-run — the SummLlama3.2-3B
#              HF model is not currently cached in this environment (~3GB
#              download + transformers dependency chain). Cited 0.485 baseline
#              dates to #571 (pre-#652/#653). #652 touched insight extraction
#              prompts (not summarization) and #653 touched GI topic labels
#              (not summary content) — neither directly affects standalone
#              SummLlama paragraph output, so the pre-existing baseline is
#              still the best reference until a full re-run is warranted.
#              TODO follow-up: cache the HF model + re-run the eval config
#              data/eval/configs/ml/summllama32_standalone_v2.yaml via
#              scripts/eval/experiment/run_summllama_v2.py.
#   GI:        summary_bullets source (SummLlama is summary-only, not chat)
#   KG:        summary_bullets source (same rationale)
#   NER:       spaCy trf for quality (1.000 F1 w/ show-title fix)
#
# Usage:
#   python -m podcast_scraper.cli --config config/profiles/airgapped.yaml \
#     --rss <feed_url> --output-dir <output>

# Transcription — local Whisper, medium for best quality
transcription_provider: whisper
whisper_model: medium.en

# Audio preprocessing — named preset (#634 Scope 1).
audio_preprocessing_profile: speech_optimal_v1

# Speaker detection — spaCy trf (1.000 F1, fully local)
speaker_detector_provider: spacy
ner_model: en_core_web_trf
auto_speakers: true

# Summarization — SummLlama3.2-3B (#571): instruction-tuned summary model,
# 0.485 paragraph quality, single safetensors shard, ~7GB RAM on CPU.
# Requires `make preload-ml-models` (or manual HF cache) to populate weights.
summary_provider: summllama

# Grounded Insights — from summary bullets (SummLlama is summary-only, not chat).
# n=12 matches the autoresearch sweet spot (applies regardless of insight source;
# the old n=8 was a bart-led carry-over).
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph — from summary bullets.
# n=10 matches autoresearch sweet spot; kg_max_entities=15 matches other profiles.
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 10
kg_max_entities: 15

# Vector search + clustering
vector_search: true
vector_backend: faiss

# General
generate_metadata: true
generate_summaries: true
transcribe_missing: true
language: en
log_level: INFO
