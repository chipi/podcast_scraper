# Profile: airgapped — no network, no Ollama daemon
#
# Maximum isolation: no API calls, no Ollama server, no network.
# Uses only bundled ML models (transformers, spaCy, local Whisper).
#
# Research references:
#   Summary:   bart-led 0.206 paragraph (weak but zero-dep)
#   GI:        summary_bullets source (no LLM for provider mode)
#   KG:        summary_bullets source (no LLM for provider mode)
#   NER:       spaCy sm for speed, trf for quality
#
# Note: SummLlama3.2-3B (#571) would upgrade this profile significantly
# when wired as a proper ML mode (0.485 paragraph vs 0.206 for bart-led).
#
# Usage:
#   python -m podcast_scraper.cli --config config/profiles/airgapped.yaml \
#     --rss <feed_url> --output-dir <output>

# Transcription — local Whisper, medium for best quality
transcription_provider: whisper
whisper_model: medium.en

# Speaker detection — spaCy only
speaker_detector_provider: spacy
auto_speakers: true

# Summarization — pure ML, bart-led
summary_provider: transformers

# Grounded Insights — from summary bullets (no LLM provider available)
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 8
gi_require_grounding: true

# Knowledge Graph — from summary bullets
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
kg_max_entities: 10

# Vector search + clustering
vector_search: true
vector_backend: faiss

# General
generate_metadata: true
generate_summaries: true
transcribe_missing: true
language: en
log_level: INFO
