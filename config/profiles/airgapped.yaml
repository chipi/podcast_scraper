# Profile: airgapped — no network, no Ollama daemon
#
# Registry status: ProfilePreset-backed (promoted 2026-06-23 in #1060).
# Routing maps to the `airgapped` preset in `_PROFILE_PRESETS`:
# medium.en Whisper + SummLlama 3.2-3B paragraph + spaCy trf.
# Drift-checked by `test_profile_yaml_registry_drift.py`.
#
profile: airgapped
#
# Maximum isolation: no API calls, no Ollama server, no network.
# Uses only bundled ML models (SummLlama / transformers, spaCy, local Whisper).
#
# Research references:
#   Summary:   SummLlama3.2-3B 0.485 paragraph (#571, 2.4x over bart-led 0.206).
#              Refreshed 2026-04-23 post-#652/#653 (standalone, no judge re-run):
#              paragraph ROUGE-L 0.325 / cosine 0.784 / ~78 s/ep on MPS.
#              eval: data/eval/runs/summllama32_standalone_benchmark_v2_paragraph/
#              Historic compound "Final" = 0.4×ROUGE-L + 0.6×judge. Solving for
#              judge on historic Final 0.485 → judge ~0.59; with fresh ROUGE-L
#              0.325, implied Final ≈ 0.484. No regression within eval noise.
#              SummLlama is summary-only (no chat/JSON mode), so the airgapped
#              pipeline reuses these bullets as the source for downstream GI/KG
#              (gi_insight_source: provider) — there is no separate
#              "bundled" variant. Weakest paragraph model of the 4 profiles on
#              pure ROUGE-L + cosine, traded for offline capability.
#   GI:        provider source (#1033 audit — was summary_bullets; #1034
#              removed the deprecated route). Note: SummLlama is summary-only,
#              so provider-side generate_insights returns empty — GI is effectively
#              disabled on this profile until an LLM summary_provider is wired.
#   KG:        provider source (same rationale + same caveat)
#   NER:       spaCy trf for quality (1.000 F1 w/ show-title fix)
#
# Usage:
#   python -m podcast_scraper.cli --config config/profiles/airgapped.yaml \
#     --rss <feed_url> --output-dir <output>

# Transcription — local Whisper, medium for best quality
transcription_provider: whisper
whisper_model: medium.en

# Screenplay + neural diarization (RFC-058)
screenplay: true
diarize: true

# Audio preprocessing — named preset (#634 Scope 1).
audio_preprocessing_profile: speech_optimal_v1

# Speaker detection — spaCy trf (1.000 F1, fully local)
speaker_detector_provider: spacy
ner_model: en_core_web_trf
auto_speakers: true

# Summarization — SummLlama3.2-3B (#571): instruction-tuned summary model,
# 0.485 paragraph quality, single safetensors shard, ~7GB RAM on CPU.
# Requires `make preload-ml-models` (or manual HF cache) to populate weights.
summary_provider: summllama

# Grounded Insights — provider source (#1033 audit flipped from summary_bullets;
# #1034 removed the deprecated route). SummLlama is summary-only so provider-side
# generate_insights is a no-op here; GI requires an LLM summary_provider to fire.
# n=12 matches the autoresearch sweet spot.
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

# Knowledge Graph — provider source (#1033/#1034). Same SummLlama no-op caveat.
# n=10 matches autoresearch sweet spot; kg_max_entities=15 matches other profiles.
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

# #1076 chunk 4-A — spaCy NER pass for typed MENTIONS_PERSON post-pass.
# Default-on for airgapped because SummLlama (like BART) paraphrases
# speaker names away from the literal KG form; NER catches fragments
# the regex misses. Same validation as airgapped_thin (see that YAML).
#
# Layered overlay only — NOT carried by ProfilePreset (the registry
# class has no slot for this field). Code that instantiates
# `_PROFILE_PRESETS["airgapped"]` programmatically without the YAML
# overlay will run with the cfg-default (False). The drift test
# `tests/unit/podcast_scraper/test_config_ner_flag.py` pins the
# YAML-overlay expected values.
gi_typed_mentions_use_ner: true

# #1058 chunk 1 — KG Organization post-pass for LLM-free profiles.
# Default-on for airgapped because SummLlama (summary-only, no JSON)
# can't extract typed entities — Organization nodes never land
# without this. The post-pass runs spaCy NER over GI Insight texts
# and adds Organization nodes; idempotent. Same overlay-only nature
# as gi_typed_mentions_use_ner (not carried by ProfilePreset).
kg_organizations_use_ner: true

# Vector search + clustering
vector_search: true
vector_embedding_provider: sentence_transformers

# General
generate_metadata: true
generate_summaries: true
transcribe_missing: true
language: en
log_level: INFO
