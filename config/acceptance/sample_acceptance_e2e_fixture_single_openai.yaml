# Sample acceptance: single feed, full pipeline, OpenAI (E2E mock RSS).
# RSS below is a placeholder — not fetched. Run with USE_FIXTURES=1 (see config/acceptance/README.md).
#
# Run:
#   make test-acceptance CONFIGS="config/acceptance/sample_acceptance_e2e_fixture_single_openai.yaml" USE_FIXTURES=1
#
# Requires: OPENAI_API_KEY

rss: https://example.invalid/e2e-placeholder-single-feed.xml
output_dir: .test_outputs/acceptance/sample_e2e_single_openai
max_episodes: 2

transcription_provider: openai
speaker_detector_provider: openai
summary_provider: openai

openai_transcription_model: whisper-1
openai_speaker_model: gpt-4o-mini
openai_summary_model: gpt-4o-mini
preprocessing_enabled: true

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 5
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
vector_search: true
vector_backend: faiss
