# Sample acceptance preset: multi-feed (5 feeds), full pipeline, local ML only (no API keys).
# Filename suffix _ml distinguishes this from API-backed samples (OpenAI, DeepSeek, etc.).
# Feed URLs below are placeholders — they are NOT fetched. Run via the acceptance runner with
# USE_FIXTURES=1: each slot maps to E2E mock RSS podcast1..podcast5 (fixtures p01..p05).
# No max_episodes — every item in each fixture RSS is processed (typically 3 per feed).
#
# Run:
#   make test-acceptance CONFIGS="config/acceptance/sample_acceptance_e2e_fixture_multi_ml.yaml" USE_FIXTURES=1

feeds:
  - https://example.invalid/e2e-placeholder-feed-p01.xml
  - https://example.invalid/e2e-placeholder-feed-p02.xml
  - https://example.invalid/e2e-placeholder-feed-p03.xml
  - https://example.invalid/e2e-placeholder-feed-p04.xml
  - https://example.invalid/e2e-placeholder-feed-p05.xml

output_dir: .test_outputs/acceptance/sample_e2e_multi_ml

transcription_provider: whisper
speaker_detector_provider: spacy
summary_provider: transformers

whisper_model: base.en
whisper_device: cpu
summary_model: bart-small
summary_reduce_model: long-fast
summary_device: cpu
ner_model: en_core_web_sm

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 5
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
vector_search: true
vector_backend: faiss
