# Sample acceptance: single feed, full pipeline, DeepSeek LLM + local Whisper (E2E mock RSS).
# RSS below is a placeholder — not fetched. Run with USE_FIXTURES=1 (see config/acceptance/README.md).
# Peer to sample_acceptance_e2e_fixture_single_openai.yaml; matches acceptance_planet_money_deepseek shape.
#
# Run:
#   make test-acceptance CONFIGS="config/acceptance/sample_acceptance_e2e_fixture_single_deepseek.yaml" USE_FIXTURES=1
#
# Requires: DEEPSEEK_API_KEY

rss: https://example.invalid/e2e-placeholder-single-feed.xml
output_dir: .test_outputs/acceptance/sample_e2e_single_deepseek
max_episodes: 2

transcription_provider: whisper
speaker_detector_provider: deepseek
summary_provider: deepseek

whisper_model: base.en
whisper_device: cpu
deepseek_speaker_model: deepseek-chat
deepseek_summary_model: deepseek-chat

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 5
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
vector_search: true
vector_backend: faiss
