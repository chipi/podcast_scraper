# Sample acceptance: single feed, full pipeline, Ollama qwen3.5:35b (E2E mock RSS).
# RSS below is a placeholder — not fetched. Run with USE_FIXTURES=1 (see config/acceptance/README.md).
# Mirrors acceptance_planet_money_ollama_qwen3_5_35b.yaml; whisper_device cpu for portable runs.
#
# Run:
#   make test-acceptance CONFIGS="config/acceptance/sample_acceptance_e2e_fixture_single_ollama_qwen3_5_35b.yaml" USE_FIXTURES=1
#
# Prereq: ollama pull qwen3.5:35b (local Ollama daemon)

rss: https://example.invalid/e2e-placeholder-single-feed.xml
output_dir: .test_outputs/acceptance/sample_e2e_single_ollama_qwen3_5_35b
max_episodes: 2

transcription_provider: whisper
speaker_detector_provider: ollama
summary_provider: ollama

whisper_model: base.en
whisper_device: cpu
ollama_speaker_model: qwen3.5:35b
ollama_summary_model: qwen3.5:35b

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
vector_search: true
vector_backend: faiss
