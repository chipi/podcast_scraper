# Polite HTTP preset (Issue #522) — merge into your main config or use as a template.
#
# When to use:
# - Several workers hitting the same host for RSS + transcript/media URLs
# - Multi-feed runs where you want spacing and a cap on per-host concurrency
# - You want RSS conditional GET (ETag / Last-Modified) to reduce full feed downloads
#
# Defaults alone are already resilient (urllib3 retries + one episode-level retry).
# This file adds fair-usage knobs without enabling the circuit breaker by default.
#
# Docs: docs/api/CONFIGURATION.md — Download resilience, Recommended presets
# CLI: docs/api/CLI.md — Control Options

rss: https://feeds.example.com/podcast.xml
output_dir: ./my_corpus

# urllib3 retries: optional; omit to keep shipped defaults (http 8/1.0, rss 10/2.0)
# http_retry_total: 8
# http_backoff_factor: 1.0
# rss_retry_total: 10
# rss_backoff_factor: 2.0

# Per-host pacing (milliseconds between requests to the same host; 0 = off)
host_request_interval_ms: 200

# Cap simultaneous downloads per host (0 = unlimited)
host_max_concurrent: 4

# RSS If-None-Match / If-Modified-Since; 304 uses cached body under rss_cache_dir
rss_conditional_get: true

# Optional explicit cache dir (else PODCAST_SCRAPER_RSS_CACHE_DIR or ~/.cache/podcast_scraper/rss)
# rss_cache_dir: ~/.cache/podcast_scraper/rss

# Optional: open circuit after repeated failures (401/403/429/5xx, connection errors)
# circuit_breaker_enabled: true
# circuit_breaker_scope: host   # feed | host
# circuit_breaker_failure_threshold: 5
# circuit_breaker_window_seconds: 60
# circuit_breaker_cooldown_seconds: 120
