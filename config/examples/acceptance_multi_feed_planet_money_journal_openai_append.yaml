# Tracked copy: multi-feed + OpenAI + append/resume (GitHub #444 + #440).
# Same as acceptance_multi_feed_planet_money_journal_openai.yaml with append: true.
#
# Run (real RSS + OPENAI_API_KEY):
#   make test-acceptance CONFIGS="config/examples/acceptance_multi_feed_planet_money_journal_openai_append.yaml" USE_FIXTURES=0
#
# Run with fixtures:
#   make test-acceptance CONFIGS="config/examples/acceptance_multi_feed_planet_money_journal_openai_append.yaml" USE_FIXTURES=1
#
# Re-run the same command to validate resume (stable run_append_* per feed; skips complete episodes).

feeds:
  - https://feeds.npr.org/510289/podcast.xml
  - https://video-api.wsj.com/podcast/rss/wsj/the-journal

output_dir: .test_outputs/acceptance/full/multi_feed_planet_money_journal_openai_append
max_episodes: 2

append: true

transcription_provider: openai
speaker_detector_provider: openai
summary_provider: openai

openai_transcription_model: whisper-1
openai_speaker_model: gpt-4o-mini
openai_summary_model: gpt-4o-mini
preprocessing_enabled: true

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 5
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
vector_search: true
vector_backend: faiss
