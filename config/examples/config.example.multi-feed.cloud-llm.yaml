# Multi-feed corpus example (GitHub #440) — cloud LLM stack
#
# Option set aligned with ``config/manual/manual_multi_feed_corpus_rss_registry_openai_gemini.yaml``
# except **feeds** (placeholder URLs below for copy-paste; swap for real RSS or the registry list
# in ``docs/wip/CORPUS-RSS-FEEDS.md``).
#
# Use a list under ``feeds`` or ``rss_urls`` instead of a single ``rss`` string. When two or more
# URLs are in effect, ``output_dir`` is required (corpus parent). Each feed is written under:
#   <output_dir>/feeds/rss_<host>_<hash>/run_*/...
#
# JSON twin: config.example.multi-feed.cloud-llm.json
#
# Requires: ``OPENAI_API_KEY``, ``GEMINI_API_KEY``
#
# GitHub #559: ``multi_feed_strict`` defaults to false (lenient: exit 0 / success when every
# failed feed is soft-classified). For strict CI, set ``multi_feed_strict: true`` or run the
# CLI with ``--multi-feed-strict``. Deprecated: ``multi_feed_soft_fail_exit_zero`` maps to
# ``multi_feed_strict = not`` that value.

feeds:
  - https://example.com/podcast-feed-a.xml
  - https://example.com/podcast-feed-b.xml

output_dir: output
max_episodes: 3

transcription_provider: openai
speaker_detector_provider: gemini
summary_provider: gemini

openai_transcription_model: whisper-1
gemini_speaker_model: gemini-2.5-flash-lite
gemini_summary_model: gemini-2.5-flash-lite
preprocessing_enabled: true

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 5
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
vector_search: true
vector_backend: faiss

delay_ms: 250
language: en
auto_speakers: true
cache_detected_hosts: true
screenplay: true
speaker_names:
  - Host
  - Guest
workers: 4
log_level: INFO

# Live pipeline monitor (RFC-065): monitor + optional memray / py-spy — see config.example.yaml
# monitor: false
