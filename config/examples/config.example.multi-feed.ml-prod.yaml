# Multi-feed corpus example (GitHub #440) — local ML prod stack (model registry)
#
# Same **feeds** / GI/KG / **vector_search** shape as ``config.example.multi-feed.cloud-llm.yaml``,
# but **Whisper + spaCy + transformers** only (no cloud API keys). Summarization uses promoted
# registry mode **`ml_bart_led_autoresearch_v1`** (Tier 2 in ADR-071): MAP ``bart-small``, REDUCE
# ``long-fast``, with that mode's map/reduce params (differs from ``ml_small_authority`` on beams
# and token budgets — use ``summary_mode_precedence: mode`` so the registry wins).
#
# Whisper model, spaCy **``ner_model``**, and **``summary_device``** are omitted — they follow
# normal ``Config`` defaults unless you set them explicitly (unset **``ner_model``** defaults to
# **``en_core_web_trf``**).
#
# JSON twin: config.example.multi-feed.ml-prod.json
#
# Requires: local ML deps; larger spaCy package for ``en_core_web_trf``.
#
# GitHub #559: ``multi_feed_strict`` defaults to false (lenient). For strict CI, set
# ``multi_feed_strict: true`` or ``--multi-feed-strict``.

feeds:
  - https://example.com/podcast-feed-a.xml
  - https://example.com/podcast-feed-b.xml

output_dir: output
max_episodes: 3
append: true

transcription_provider: whisper
speaker_detector_provider: spacy
summary_provider: transformers

summary_mode_id: ml_bart_led_autoresearch_v1
summary_mode_precedence: mode

preprocessing_enabled: true

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
vector_search: true
vector_backend: faiss

delay_ms: 1000
language: en
auto_speakers: true
cache_detected_hosts: true
screenplay: true
speaker_names:
  - Host
  - Guest
workers: 4
log_level: INFO
