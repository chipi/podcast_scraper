# Example: tune RSS/media HTTP retries, episode-level retries, and optional Issue #522 fair HTTP.
#
# Related files:
# - config.example.download-resilience.polite.yaml — recommended add-on for high workers / polite CDN use
# - docs/api/CONFIGURATION.md — Download resilience (tables, recommended presets, CLI parity)
# - docs/api/CLI.md — Control Options (same parameters as flags)
#
# Copy and merge keys into your main YAML, or use CLI overrides for one-off runs.

rss: https://feeds.example.com/podcast.xml
output_dir: ./my_corpus

# urllib3 retries for transcript/media downloads (not RSS; RSS uses rss_* below)
http_retry_total: 8
http_backoff_factor: 1.0

# urllib3 retries for the RSS feed XML fetch
rss_retry_total: 10
rss_backoff_factor: 2.0

# After urllib3 gives up, retry the whole episode download on transient errors (0 = off)
episode_retry_max: 1
episode_retry_delay_sec: 10.0

# Optional: fair HTTP toward feeds/CDNs (Issue #522; defaults off)
# host_request_interval_ms: 200
# host_max_concurrent: 4
# circuit_breaker_enabled: true
# circuit_breaker_scope: feed   # or host
# rss_conditional_get: true
# rss_cache_dir: ~/.cache/podcast_scraper/rss

# Optional: fast-fail profile for CI or local smoke (uncomment to use)
# http_retry_total: 1
# http_backoff_factor: 0.0
# rss_retry_total: 1
# rss_backoff_factor: 0.0
# episode_retry_max: 0
