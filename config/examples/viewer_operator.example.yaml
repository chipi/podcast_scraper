# Packaged default for the GI/KG viewer: seeded as ``viewer_operator.yaml`` in a corpus
# directory when the file is missing or whitespace-only (GET /api/operator-config).
#
# Do not set ``profile:`` here — same as thin CLI operator files: pick a preset in the
# viewer **Profile** menu (Save writes ``profile:``) or pass ``--profile`` on the CLI.
#
# Do not set ``output_dir`` here: viewer jobs pass ``--output-dir`` = the corpus root.
# Feeds belong in ``feeds.spec.yaml`` in the same directory (Feeds API / CLI --feeds-spec).
#
# Reference manual: ``config/manual/operator_defaults.yaml`` (CLI-oriented; may set output_dir).

# Required for Docker job mode (api spawns ``pipeline-llm`` / ``pipeline``
# via ``docker compose run``). Selects which compose service to spawn:
#   ``llm`` → ``pipeline-llm`` (LLM-only, ~10× smaller image; the only
#            image published in RFC-081 Phase 1 / RFC-082 prod hosting)
#   ``ml``  → ``pipeline``     (full ML: Whisper + speaker diarization;
#            published only on hosts that opt into the heavy variant)
# Harmless in native ``make serve-api`` mode — the api strips the key
# before the operator YAML reaches Pydantic ``Config`` (#666 review #13).
# Default ``llm`` because the prod overlay's
# ``PODCAST_AVAILABLE_PROFILES`` ships ``cloud_balanced`` + ``cloud_thin``
# — both LLM-only — out of the box. Operators on a heavy host: change
# to ``ml``.
pipeline_install_extras: llm

max_episodes: 1
delay_ms: 1250

transcribe_missing: true
skip_existing: true
reuse_media: true
append: false
screenplay: false
workers: 4
log_level: INFO

# Optional in-process cron scheduler (#708). When uncommented, the api
# fires the same pipeline-job path as a manual viewer Run, on the cron
# expression below. Each schedule reuses the corpus's standing
# ``feeds.spec.yaml`` + this file's profile + overrides. Disabled
# entries are loaded but never fired. Default timezone is UTC; override
# via the ``TZ`` (or ``PODCAST_SCHEDULER_TZ``) env on the api process.
#
# scheduled_jobs:
#   - name: morning-feed-sweep
#     cron: "0 4 * * *"
#     enabled: true
