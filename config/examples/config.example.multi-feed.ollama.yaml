# Multi-feed corpus example (GitHub #440) — local Ollama + bundled clean/summary/bullets
#
# Same **feeds** / **output_dir** / GI/KG / **vector_search** shape as
# ``config.example.multi-feed.cloud-llm.yaml``, but **no cloud API keys**:
# **Whisper** (local) transcription + **Ollama** speaker + summary with
# ``llm_pipeline_mode: bundled`` (one structured call for bullets + paragraph
# when the provider supports it).
#
# Eval-style shorthand (not valid top-level keys here — use the flat fields below):
#   backend:
#     type: "ollama"
#     model: "qwen3.5:9b"
#   llm_pipeline_mode: "bundled"
#   params:
#     temperature: 0.0
#
# JSON twin: config.example.multi-feed.ollama.json
#
# Requires: **Ollama** running locally; ``ollama pull qwen3.5:9b``
#
# GitHub #559: ``multi_feed_strict`` defaults to false (lenient: exit 0 / success when every
# failed feed is soft-classified). For strict CI, set ``multi_feed_strict: true`` or run the
# CLI with ``--multi-feed-strict``. Deprecated: ``multi_feed_soft_fail_exit_zero`` maps to
# ``multi_feed_strict = not`` that value.

feeds:
  - https://example.com/podcast-feed-a.xml
  - https://example.com/podcast-feed-b.xml

output_dir: output
max_episodes: 3
append: true

transcription_provider: whisper
speaker_detector_provider: ollama
summary_provider: ollama

ollama_speaker_model: qwen3.5:9b
ollama_summary_model: qwen3.5:9b
ollama_temperature: 0.0
llm_pipeline_mode: bundled

preprocessing_enabled: true

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: provider
gi_max_insights: 12
generate_kg: true
kg_extraction_source: provider
kg_max_topics: 10
vector_search: true
vector_backend: faiss

delay_ms: 1000
language: en
auto_speakers: true
cache_detected_hosts: true
screenplay: true
speaker_names:
  - Host
  - Guest
workers: 4
log_level: INFO

# Live pipeline monitor (RFC-065): monitor + optional memray / py-spy — see config.example.yaml
# monitor: false
