# Manual validation: NPR Planet Money, Gemini — metadata + summaries only (no GI/KG).
# Doc: Summaries default to JSON bullets (shared prompts). Override *summary_*_prompt for paragraph style.
# Cost-compare: same RSS + max_episodes as manual_planet_money_openai_summaries_only.yaml;
# use metrics.json (and provider dashboards) for head-to-head spend vs OpenAI mini + Whisper.
#
# Run:
#   python -m podcast_scraper.cli --config config/manual/manual_planet_money_gemini_summaries_only.yaml
# Requires: GEMINI_API_KEY

rss: https://feeds.npr.org/510289/podcast.xml
output_dir: .test_outputs/manual/planet_money_gemini_summaries_only
max_episodes: 3

transcription_provider: gemini
speaker_detector_provider: gemini
summary_provider: gemini

gemini_transcription_model: gemini-2.0-flash
gemini_speaker_model: gemini-2.0-flash
gemini_summary_model: gemini-2.0-flash

transcribe_missing: true
preprocessing_enabled: true

generate_metadata: true
generate_summaries: true
generate_gi: false
generate_kg: false
