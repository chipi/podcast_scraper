# Manual validation: NPR Planet Money, OpenAI — GI + KG via provider (generate_insights + extract_kg_graph).
# Doc: With gil_evidence_match_summary_provider (default True), GIL quote+entail follow this summary
# provider unless quote_extraction_provider / entailment_provider are set.
# Heavier than summary_bullets; use after the bullets config if you want LLM-shaped insights and graph.
#
# Run:
#   python -m podcast_scraper.cli --config config/manual/manual_planet_money_openai_gi_kg_provider.yaml
# Requires: OPENAI_API_KEY

rss: https://feeds.npr.org/510289/podcast.xml
output_dir: .test_outputs/manual/planet_money_openai_gi_kg_provider
max_episodes: 3

transcription_provider: openai
speaker_detector_provider: openai
summary_provider: openai

openai_transcription_model: whisper-1
openai_speaker_model: gpt-4o-mini
openai_summary_model: gpt-4o-mini
openai_cleaning_model: gpt-4o-mini

transcribe_missing: true
preprocessing_enabled: true

generate_metadata: true
generate_summaries: true

generate_gi: true
gi_insight_source: provider

generate_kg: true
kg_extraction_source: provider
kg_max_entities: 15
