# Manual validation: NPR Planet Money, Mistral — GI + KG via provider.
# Doc: With gil_evidence_match_summary_provider (default True), GIL quote+entail follow this summary provider unless quote_extraction_provider / entailment_provider are set.
# Cost-compare peer: manual_planet_money_openai_gi_kg_provider.yaml.
#
# Run:
#   python -m podcast_scraper.cli --config config/manual/manual_planet_money_mistral_gi_kg_provider.yaml
# Requires: MISTRAL_API_KEY

rss: https://feeds.npr.org/510289/podcast.xml
output_dir: .test_outputs/manual/planet_money_mistral_gi_kg_provider
max_episodes: 3

transcription_provider: mistral
speaker_detector_provider: mistral
summary_provider: mistral

mistral_transcription_model: voxtral-mini-latest
mistral_speaker_model: mistral-small-latest
mistral_summary_model: mistral-small-latest

transcribe_missing: true
preprocessing_enabled: true

generate_metadata: true
generate_summaries: true

generate_gi: true
gi_insight_source: provider

generate_kg: true
kg_extraction_source: provider
kg_max_entities: 15
