# Manual validation: multi-feed corpus (Planet Money + The Journal), OpenAI stack, append/resume (GitHub #444 + #440).
#
# Use this preset when validating:
# - Stable per-feed workspaces (run_append_* under each feeds/<id>/ tree)
# - Second invocation skipping episodes with valid on-disk artifacts (episode_id + transcript + summary + GI + KG)
#
# ---------------------------------------------------------------------------
# Handoff — OpenAI / LLM intelligence stack owners / platform channel
# ---------------------------------------------------------------------------
# When you run this for staging or cost review, post a short update to your team
# channel (e.g. #ml-ops, #intelligence-platform, or equivalent) with:
#   - Config path: config/manual/manual_multi_feed_planet_money_journal_openai_append.yaml
#   - output_dir (below) and whether USE_FIXTURES or real RSS
#   - max_episodes and observed token/API usage (from logs or provider dashboard)
#   - After a second identical run: confirm duplicate transcripts were NOT created under run_append_*
# ---------------------------------------------------------------------------
#
# Run:
#   python -m podcast_scraper.cli --config config/manual/manual_multi_feed_planet_money_journal_openai_append.yaml
#
# Acceptance runner:
#   make test-acceptance CONFIGS="config/manual/manual_multi_feed_planet_money_journal_openai_append.yaml"
#
# Requires: OPENAI_API_KEY. Incompatible with clean_output (append needs a durable workspace).
#
# Layout: .test_outputs/manual/multi_feed_pm_journal_openai_append/feeds/<stable_name>/run_append_*/...

feeds:
  - https://feeds.npr.org/510289/podcast.xml
  - https://video-api.wsj.com/podcast/rss/wsj/the-journal

output_dir: .test_outputs/manual/multi_feed_pm_journal_openai_append
max_episodes: 10

append: true

transcription_provider: openai
speaker_detector_provider: openai
summary_provider: openai

openai_transcription_model: whisper-1
openai_speaker_model: gpt-4o-mini
openai_summary_model: gpt-4o-mini
preprocessing_enabled: true

transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
gi_insight_source: summary_bullets
gi_max_insights: 5
generate_kg: true
kg_extraction_source: summary_bullets
kg_max_topics: 5
vector_search: true
vector_backend: faiss
