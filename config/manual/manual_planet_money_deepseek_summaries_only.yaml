# Manual validation: NPR Planet Money, DeepSeek — metadata + summaries only (no GI/KG).
# Doc: Summaries default to JSON bullets (shared prompts). Override *summary_*_prompt for paragraph style.
# DeepSeek has no audio API: transcription uses OpenAI whisper-1 (same as OpenAI baseline)
# so you isolate speaker + summary cost vs gpt-4o-mini on the same transcript path.
#
# Run:
#   python -m podcast_scraper.cli --config config/manual/manual_planet_money_deepseek_summaries_only.yaml
# Requires: OPENAI_API_KEY, DEEPSEEK_API_KEY

rss: https://feeds.npr.org/510289/podcast.xml
output_dir: .test_outputs/manual/planet_money_deepseek_summaries_only
max_episodes: 3

transcription_provider: openai
speaker_detector_provider: deepseek
summary_provider: deepseek

openai_transcription_model: whisper-1

deepseek_speaker_model: deepseek-chat
deepseek_summary_model: deepseek-chat

transcribe_missing: true
preprocessing_enabled: true

generate_metadata: true
generate_summaries: true
generate_gi: false
generate_kg: false
