# Manual validation: NPR Planet Money, Mistral — metadata + summaries only (no GI/KG).
# Doc: Summaries default to JSON bullets (shared prompts). Override *summary_*_prompt for paragraph style.
# Cost-compare: same RSS + max_episodes as manual_planet_money_openai_summaries_only.yaml.
# Models match test-tier defaults in config_constants (voxtral + mistral-small-latest).
#
# Run:
#   python -m podcast_scraper.cli --config config/manual/manual_planet_money_mistral_summaries_only.yaml
# Requires: MISTRAL_API_KEY

rss: https://feeds.npr.org/510289/podcast.xml
output_dir: .test_outputs/manual/planet_money_mistral_summaries_only
max_episodes: 3

transcription_provider: mistral
speaker_detector_provider: mistral
summary_provider: mistral

mistral_transcription_model: voxtral-mini-latest
mistral_speaker_model: mistral-small-latest
mistral_summary_model: mistral-small-latest

transcribe_missing: true
preprocessing_enabled: true

generate_metadata: true
generate_summaries: true
generate_gi: false
generate_kg: false
