# Manual validation: NPR Planet Money, Gemini — GI + KG from summary bullets.
# Cost-compare peer: manual_planet_money_openai_gi_kg_summary_bullets.yaml (same episode cap).
#
# Summaries default to JSON bullets (shared prompts). With gil_evidence_match_summary_provider
# (default True), GIL quote+entail use Gemini, not local transformers — no .[ml] required for GIL.
#
# Run:
#   python -m podcast_scraper.cli --config config/manual/manual_planet_money_gemini_gi_kg_summary_bullets.yaml
# Requires: GEMINI_API_KEY

rss: https://feeds.npr.org/510289/podcast.xml
output_dir: .test_outputs/manual/planet_money_gemini_gi_kg_summary_bullets
max_episodes: 3

transcription_provider: gemini
speaker_detector_provider: gemini
summary_provider: gemini

gemini_transcription_model: gemini-2.0-flash
gemini_speaker_model: gemini-2.0-flash
gemini_summary_model: gemini-2.0-flash

transcribe_missing: true
preprocessing_enabled: true

generate_metadata: true
generate_summaries: true

generate_gi: true
gi_insight_source: summary_bullets

generate_kg: true
kg_extraction_source: summary_bullets
