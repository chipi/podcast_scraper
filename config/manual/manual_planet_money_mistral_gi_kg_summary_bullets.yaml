# Manual validation: NPR Planet Money, Mistral — GI + KG from summary bullets.
# Cost-compare peer: manual_planet_money_openai_gi_kg_summary_bullets.yaml.
#
# Summaries default to JSON bullets (shared prompts). With gil_evidence_match_summary_provider
# (default True), GIL quote+entail use Mistral — no .[ml] required for GIL.
#
# Run:
#   python -m podcast_scraper.cli --config config/manual/manual_planet_money_mistral_gi_kg_summary_bullets.yaml
# Requires: MISTRAL_API_KEY

rss: https://feeds.npr.org/510289/podcast.xml
output_dir: .test_outputs/manual/planet_money_mistral_gi_kg_summary_bullets
max_episodes: 3

transcription_provider: mistral
speaker_detector_provider: mistral
summary_provider: mistral

mistral_transcription_model: voxtral-mini-latest
mistral_speaker_model: mistral-small-latest
mistral_summary_model: mistral-small-latest

transcribe_missing: true
preprocessing_enabled: true

generate_metadata: true
generate_summaries: true

generate_gi: true
gi_insight_source: summary_bullets

generate_kg: true
kg_extraction_source: summary_bullets
