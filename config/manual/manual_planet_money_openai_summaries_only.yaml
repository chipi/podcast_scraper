# Manual validation: NPR Planet Money, OpenAI — metadata + summaries only (no GI/KG).
# Doc: Summaries default to JSON bullets (shared prompts). Override *summary_*_prompt for paragraph style.
# Use as a warm-up / baseline before GI+KG configs.
#
# Run:
#   python -m podcast_scraper.cli --config config/manual/manual_planet_money_openai_summaries_only.yaml
# Requires: OPENAI_API_KEY

rss: https://feeds.npr.org/510289/podcast.xml
output_dir: .test_outputs/manual/planet_money_openai_summaries_only
max_episodes: 3

transcription_provider: openai
speaker_detector_provider: openai
summary_provider: openai

openai_transcription_model: whisper-1
openai_speaker_model: gpt-4o-mini
openai_summary_model: gpt-4o-mini
openai_cleaning_model: gpt-4o-mini

transcribe_missing: true
preprocessing_enabled: true

generate_metadata: true
generate_summaries: true
generate_gi: false
generate_kg: false
