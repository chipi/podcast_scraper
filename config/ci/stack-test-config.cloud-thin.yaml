# Stack-test pipeline config — cloud-thin profile (#666 follow-up).
#
# Mounted read-only at ``/app/config.yaml`` by the cloud-thin variant
# of the stack-test compose run (``make stack-test-run-cloud``).
# Mirrors ``config/profiles/cloud_thin.yaml`` shape but pinned to the
# stack-test fixture corpus (mock-feeds + the p01_mtb feed).
#
# Requires API keys:
#   - ``OPENAI_API_KEY``   (Whisper transcription)
#   - ``GEMINI_API_KEY``   (NER + summary + GI/KG via gemini-2.5-flash-lite)
#
# These are passed through compose env from the developer / CI ``.env``
# (see ``compose/docker-compose.stack.yml`` ``pipeline-llm`` block).

rss: "http://mock-feeds/feed.xml"
output_dir: "/app/output"
max_episodes: 1
workers: 1
log_level: INFO

append: false
transcribe_missing: true
generate_metadata: true
generate_summaries: true
generate_gi: true
generate_kg: true

# Cloud-thin: cloud APIs only (no local spaCy / FAISS / transformers
# REDUCE chain). See ``config/profiles/cloud_thin.yaml`` for production
# defaults.

transcription_provider: openai
openai_transcription_model: whisper-1

audio_preprocessing_profile: speech_optimal_v1

speaker_detector_provider: gemini
auto_speakers: true

summary_provider: gemini
gemini_summary_model: gemini-2.5-flash-lite
gemini_speaker_model: gemini-2.5-flash-lite
preprocessing_enabled: true

llm_pipeline_mode: mega_bundled
cloud_llm_structured_min_output_tokens: 4096

gi_insight_source: provider
gi_max_insights: 12
gi_require_grounding: true

kg_extraction_source: provider
kg_max_topics: 10
kg_max_entities: 15

vector_search: false

language: en
