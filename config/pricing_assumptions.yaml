# USD pricing assumptions for pipeline LLM cost *estimates* (optional).
#
# Enable by setting in your run config or environment:
#   pricing_assumptions_file: config/pricing_assumptions.yaml
#   # or: export PRICING_ASSUMPTIONS_FILE=config/pricing_assumptions.yaml
#
# When pricing_assumptions_file is empty, estimates use built-in Python constants only.
# Values in this file override matching keys from built-ins (merge: YAML wins per field).
#
# --- Staleness (advisory; does not change math) ---
# Set metadata.last_reviewed (YYYY-MM-DD) when you last checked vendor pricing pages.
# Set metadata.stale_review_after_days to a positive integer (e.g. 90).
# Stale when: (today's date - last_reviewed) > stale_review_after_days  (whole days).
# If last_reviewed or stale_review_after_days is missing/invalid, no staleness warning.
#
# Commands:
#   python -m podcast_scraper.cli pricing-assumptions          # human-readable report
#   python -m podcast_scraper.cli pricing-assumptions --strict # exit 1 if stale (CI)
#   make check-pricing-assumptions
#   make check-pricing-assumptions ARGS='--strict'
#
# After updating rates: bump last_reviewed (and optionally pricing_effective_date).
# Docs: docs/api/CONFIGURATION.md#llm-cost-estimate-assumptions-optional-yaml
#       docs/api/CLI.md#pricing-assumptions-command
#
schema_version: 1
metadata:
  last_reviewed: "2026-04-22"
  pricing_effective_date: "2026-02-01"
  stale_review_after_days: 90
  notes: >
    Vendor pages change often; treat totals as approximate. This file is the
    single source of truth for pipeline cost estimates (#650/#651) — provider
    Python constants have been removed. Missing a model here = $0 cost +
    warning at runtime; a CI guard fails PRs that add a profile referencing a
    model without a rate row.
  source_urls:
    openai: https://openai.com/pricing
    gemini: https://ai.google.dev/pricing
    anthropic: https://www.anthropic.com/pricing
    mistral: https://docs.mistral.ai/pricing/
    deepgram: https://deepgram.com/pricing
    deepseek: https://platform.deepseek.com/pricing
    grok: https://docs.x.ai

providers:
  openai:
    transcription:
      whisper-1:
        cost_per_minute: 0.006
    text:
      gpt-4o-mini:
        input_cost_per_1m_tokens: 0.15
        output_cost_per_1m_tokens: 0.60
      gpt-4o:
        input_cost_per_1m_tokens: 2.5
        output_cost_per_1m_tokens: 10.0
      # Local DGX-served vLLM via the OpenAI-compat path. The `model` field in
      # autoresearch-on-DGX profiles is the served-model-name on the vLLM slot
      # (e.g. Qwen3.5-35B-A3B, Moonlight-16B-A3B, etc.), not an OpenAI cloud
      # model. Cost is electricity-only — $0/token at the API layer. Pin to 0
      # so the pricing coverage gate accepts the reference; real cost is
      # tracked via DGX power monitoring (#923 / #943).
      autoresearch:
        input_cost_per_1m_tokens: 0.0
        output_cost_per_1m_tokens: 0.0
      # gpt-5 series (list-price ESTIMATES — verify against the OpenAI pricing page and update).
      # Tokens are captured exactly regardless; these rates only drive the derived-cost projection.
      # cache_hit rate is the OpenAI cached-input tier (~10% of input).
      gpt-5.4-mini:
        input_cost_per_1m_tokens: 0.25
        output_cost_per_1m_tokens: 2.00
        cache_hit_input_cost_per_1m_tokens: 0.025
      gpt-5.4-nano:
        input_cost_per_1m_tokens: 0.05
        output_cost_per_1m_tokens: 0.40
        cache_hit_input_cost_per_1m_tokens: 0.005
      gpt-5.4:
        input_cost_per_1m_tokens: 1.25
        output_cost_per_1m_tokens: 10.00
        cache_hit_input_cost_per_1m_tokens: 0.125
      gpt-5.5:
        input_cost_per_1m_tokens: 1.25
        output_cost_per_1m_tokens: 10.00
        cache_hit_input_cost_per_1m_tokens: 0.125
      gpt-5:
        input_cost_per_1m_tokens: 1.25
        output_cost_per_1m_tokens: 10.00
        cache_hit_input_cost_per_1m_tokens: 0.125
      gpt-5-mini:
        input_cost_per_1m_tokens: 0.25
        output_cost_per_1m_tokens: 2.00
        cache_hit_input_cost_per_1m_tokens: 0.025
      # NB: OpenAI has NO ``default`` row on purpose — an unlisted model returns {} (cost unknown),
      # which is honest (tokens are still captured; cost is just not projected) and keeps the
      # ``cost_appears_uninstrumented`` signal meaningful. Add real models above as we adopt them.

  gemini:
    transcription:
      default:
        cost_per_second: 0.00025
    text:
      gemini-2.5-pro:
        input_cost_per_1m_tokens: 1.25
        output_cost_per_1m_tokens: 10.00
      gemini-2.5-flash:
        input_cost_per_1m_tokens: 0.30
        output_cost_per_1m_tokens: 2.50
      gemini-2.5-flash-lite:
        input_cost_per_1m_tokens: 0.10
        output_cost_per_1m_tokens: 0.40
      gemini-2.0-flash:
        input_cost_per_1m_tokens: 0.10
        output_cost_per_1m_tokens: 0.40
      gemini-1.5-pro:
        input_cost_per_1m_tokens: 1.25
        output_cost_per_1m_tokens: 5.00
      gemini-1.5-flash:
        input_cost_per_1m_tokens: 0.075
        output_cost_per_1m_tokens: 0.30
      default:
        input_cost_per_1m_tokens: 0.10
        output_cost_per_1m_tokens: 0.40

  anthropic:
    transcription:
      default:
        cost_per_second: 0.0
    text:
      # Claude 4.x generation
      claude-opus-4:
        input_cost_per_1m_tokens: 15.00
        output_cost_per_1m_tokens: 75.00
      claude-opus-4-5:
        # Source: https://claude.com/pricing (verified 2026-04-22).
        # Opus 4.5 and above are priced lower than Opus 4 / Opus 4.1.
        input_cost_per_1m_tokens: 5.00
        output_cost_per_1m_tokens: 25.00
      claude-opus-4-7:
        # Source: https://claude.com/pricing (verified 2026-06-09 via #939).
        # Opus 4.7 — thinking-model variant; deprecates non-1.0 temperature.
        # Same headline rates as Opus 4.5/4.6 tier.
        input_cost_per_1m_tokens: 5.00
        output_cost_per_1m_tokens: 25.00
      claude-sonnet-4:
        input_cost_per_1m_tokens: 3.00
        output_cost_per_1m_tokens: 15.00
      claude-sonnet-4-5:
        input_cost_per_1m_tokens: 3.00
        output_cost_per_1m_tokens: 15.00
        # Anthropic prompt caching: cache-read ~0.1x input, cache-write ~1.25x input.
        cache_hit_input_cost_per_1m_tokens: 0.30
        cache_write_cost_per_1m_tokens: 3.75
      # Claude 5 generation (list-price ESTIMATES — verify + update; tokens captured exactly).
      claude-sonnet-5:
        input_cost_per_1m_tokens: 3.00
        output_cost_per_1m_tokens: 15.00
        cache_hit_input_cost_per_1m_tokens: 0.30
        cache_write_cost_per_1m_tokens: 3.75
      claude-opus-4-8:
        input_cost_per_1m_tokens: 5.00
        output_cost_per_1m_tokens: 25.00
        cache_hit_input_cost_per_1m_tokens: 0.50
        cache_write_cost_per_1m_tokens: 6.25
      claude-haiku-4-5:
        input_cost_per_1m_tokens: 1.00
        output_cost_per_1m_tokens: 5.00
        cache_hit_input_cost_per_1m_tokens: 0.10
        cache_write_cost_per_1m_tokens: 1.25
      # Claude 3.x generation
      claude-3-5-sonnet:
        input_cost_per_1m_tokens: 3.00
        output_cost_per_1m_tokens: 15.00
      claude-3-5-haiku:
        input_cost_per_1m_tokens: 0.80
        output_cost_per_1m_tokens: 4.00
      claude-3-opus:
        input_cost_per_1m_tokens: 15.00
        output_cost_per_1m_tokens: 75.00
      claude-3-haiku:
        input_cost_per_1m_tokens: 0.25
        output_cost_per_1m_tokens: 1.25
      default:
        input_cost_per_1m_tokens: 3.00
        output_cost_per_1m_tokens: 15.00

  mistral:
    transcription:
      voxtral-mini-latest:
        cost_per_minute: 0.001
      voxtral-small-latest:
        cost_per_minute: 0.001
      default:
        cost_per_minute: 0.006
    text:
      mistral-small:
        input_cost_per_1m_tokens: 0.20
        output_cost_per_1m_tokens: 0.60
      mistral-small-latest:
        input_cost_per_1m_tokens: 0.20
        output_cost_per_1m_tokens: 0.60
      mistral-medium:
        # mistral-medium-3 tier (list-price ESTIMATE — verify + update).
        input_cost_per_1m_tokens: 0.40
        output_cost_per_1m_tokens: 2.00
      mistral-medium-latest:
        input_cost_per_1m_tokens: 0.40
        output_cost_per_1m_tokens: 2.00
      mistral-large:
        input_cost_per_1m_tokens: 2.00
        output_cost_per_1m_tokens: 6.00
      mistral-large-latest:
        input_cost_per_1m_tokens: 2.00
        output_cost_per_1m_tokens: 6.00
      default:
        input_cost_per_1m_tokens: 0.20
        output_cost_per_1m_tokens: 0.60

  deepgram:
    transcription:
      nova-3:
        cost_per_minute: 0.0043
      default:
        cost_per_minute: 0.0043

  deepseek:
    # Source: https://api-docs.deepseek.com/quick_start/pricing (verified
    # 2026-04-22). DeepSeek-V3.2 unified pricing: deepseek-chat and
    # deepseek-reasoner share identical rates; only context length and
    # max output differ.
    text:
      deepseek-chat:
        input_cost_per_1m_tokens: 0.28
        output_cost_per_1m_tokens: 0.42
        cache_hit_input_cost_per_1m_tokens: 0.028
      deepseek-reasoner:
        input_cost_per_1m_tokens: 0.28
        output_cost_per_1m_tokens: 0.42
        cache_hit_input_cost_per_1m_tokens: 0.028
      # deepseek-v4 family (v4-flash is a reasoning model); same V3.2 unified rates.
      deepseek-v4:
        input_cost_per_1m_tokens: 0.28
        output_cost_per_1m_tokens: 0.42
        cache_hit_input_cost_per_1m_tokens: 0.028
      deepseek-v4-flash:
        input_cost_per_1m_tokens: 0.28
        output_cost_per_1m_tokens: 0.42
        cache_hit_input_cost_per_1m_tokens: 0.028
      default:
        input_cost_per_1m_tokens: 0.28
        output_cost_per_1m_tokens: 0.42
        cache_hit_input_cost_per_1m_tokens: 0.028

  grok:
    # Rates per xAI public pricing. grok-4 is the flagship; grok-3 family
    # remains available. Mini variants are substantially cheaper.
    text:
      grok-4:
        input_cost_per_1m_tokens: 3.00
        output_cost_per_1m_tokens: 15.00
      grok-4.3:
        # Judge model (#939); same tier as grok-4.
        input_cost_per_1m_tokens: 3.00
        output_cost_per_1m_tokens: 15.00
      grok-4-fast:
        input_cost_per_1m_tokens: 0.20
        output_cost_per_1m_tokens: 0.50
      grok-3:
        input_cost_per_1m_tokens: 3.00
        output_cost_per_1m_tokens: 15.00
      grok-3-mini:
        input_cost_per_1m_tokens: 0.30
        output_cost_per_1m_tokens: 0.50
      grok-2:
        input_cost_per_1m_tokens: 2.00
        output_cost_per_1m_tokens: 10.00
      grok-beta:
        input_cost_per_1m_tokens: 5.00
        output_cost_per_1m_tokens: 15.00
      default:
        input_cost_per_1m_tokens: 3.00
        output_cost_per_1m_tokens: 15.00

  ollama:
    text:
      default:
        input_cost_per_1m_tokens: 0.0
        output_cost_per_1m_tokens: 0.0
