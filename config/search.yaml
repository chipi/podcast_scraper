# Two-tier hybrid search backend configuration (RFC-090 §3.10 / ADR-099).
# NOTE: `backend` and `lancedb.path` below are RESERVED — the live serving path
# (`search.hybrid_search`) instantiates LanceDB unconditionally at a per-corpus path
# (`<corpus>/search/lance_index`), so it does not read these two keys. Only the
# `router` block is read. Keep this in mind until a backend factory honors `backend`.

backend: lancedb  # reserved: only LanceDB is implemented; not yet read by code

# Live serving path (RFC-090 Phase 2 / ADR-099, #995). The LanceDB two-tier index is
# the single search path — there is no toggle and no FAISS fallback. GET /api/search
# routes through the two-tier hybrid RetrievalLayer (BM25 + dense → RRF); when no
# usable index exists the response is `no_index`.
#
# The full-coverage aux tier (kg_entity/kg_topic/quote/summary) spans every doc type.
# A fair LLM-judged eval found hybrid >= the old FAISS path on every query class
# (decisively on named-entity/exact-phrase, ~par on semantic), which justified retiring
# FAISS (#995). NOTE: KG-proximity is intentionally NOT wired into RetrievalLayer here —
# it was empirically refuted as a retrieval signal (see RFC-091 decision record); the
# KG's value is meaning-bearing relational edges (Person->Insight, #874), not proximity.

lancedb:
  path: ./data/lance_index  # reserved: live path is <corpus>/search/lance_index (not read)

# Query router (RFC-092 / #860): how a query's intent is classified, which drives
# the per-intent signal/tier weights. `rules` is deterministic and dependency-free;
# `ml` loads a trained classifier (scripts/train_query_router.py) and degrades to
# rules if the model is absent. Stay on `rules` until the model is trained.
router:
  mode: rules  # rules | ml
  model_path: ./data/query_router.joblib

