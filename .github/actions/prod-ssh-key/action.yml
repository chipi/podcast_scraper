name: Prod deploy SSH identity
description: |
  Writes a CI SSH private key (full PEM) to a runner-local file and exports an
  env var (default SSH_PROD_IDENTITY) for ssh -i … as deploy@ on a VPS after
  Tailscale join. Used by deploy-prod.yml; drill-deploy.yml passes a custom
  identity_env_name.

inputs:
  ssh_private_key:
    description: Full PEM contents of the CI-only key trusted by deploy@ on the target host.
    required: true
  identity_env_name:
    description: Name of the environment variable set to the key file path (A-Z, digits, underscore only).
    required: false
    default: SSH_PROD_IDENTITY

runs:
  using: composite
  steps:
    - name: Write PEM to isolated file
      shell: bash
      env:
        KEY_MATERIAL: ${{ inputs.ssh_private_key }}
        IDENTITY_ENV_NAME: ${{ inputs.identity_env_name }}
      run: |
        set -euo pipefail
        if [ -z "${KEY_MATERIAL}" ]; then
          echo "::error::prod-ssh-key: ssh_private_key input is empty"
          exit 1
        fi
        if [[ ! "${IDENTITY_ENV_NAME}" =~ ^[A-Z][A-Z0-9_]*$ ]]; then
          echo "::error::prod-ssh-key: identity_env_name must match ^[A-Z][A-Z0-9_]*$"
          exit 1
        fi
        key_file="${RUNNER_TEMP}/gha_deploy_ssh_ed25519"
        printenv KEY_MATERIAL > "$key_file"
        chmod 600 "$key_file"
        echo "${IDENTITY_ENV_NAME}=${key_file}" >> "${GITHUB_ENV}"
