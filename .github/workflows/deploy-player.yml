# Deploy the PUBLIC consumer player (#1163 / ADR-116) to the always-on VPS.
#
# Standalone from deploy-prod.yml: brings up compose/docker-compose.player-public.yml
# (a low-privilege app-only backend — no docker.sock, no keys — + the player PWA) and
# drops the player.caddy vhost into the shared Caddy edge (ADR-114). The operator/kg-gi
# surface is untouched. Manual (workflow_dispatch); typed confirm; tailnet-only SSH.
#
# Prereqs (stage once, like deploy-prod #714):
#   secrets: TS_AUTHKEY, PROD_SSH_PRIVATE_KEY, PLAYER_APP_SESSION_SECRET,
#            PLAYER_GOOGLE_CLIENT_SECRET
#   vars:    PROD_TAILNET_FQDN, PLAYER_DOMAIN, PODCAST_CORPUS_VOLUME, PLAYER_GOOGLE_CLIENT_ID
# The Caddy edge + firewall 80/443 must already be live on the box, and DNS for
# PLAYER_DOMAIN must point at the VPS (see docs/guides/PLAYER_PUBLIC_LAUNCH.md).

name: Deploy player (public)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PLAYER_DEPLOY to confirm'
        required: true
      override_image_sha:
        description: 'Optional api image sha-<7> to deploy (blank = newest published from main)'
        required: false

concurrency:
  group: deploy-player
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: prod
    steps:
      - name: Confirm PLAYER_DEPLOY
        run: |
          if [ "${{ inputs.confirm }}" != "PLAYER_DEPLOY" ]; then
            echo "::error::Must type PLAYER_DEPLOY to confirm. Got: '${{ inputs.confirm }}'"
            exit 1
          fi

      - name: Pre-flight — required secrets/variables present?
        id: preflight
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_TAILNET_FQDN: ${{ vars.PROD_TAILNET_FQDN }}
          PLAYER_DOMAIN: ${{ vars.PLAYER_DOMAIN }}
          PODCAST_CORPUS_VOLUME: ${{ vars.PODCAST_CORPUS_VOLUME }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${TS_AUTHKEY:-}" ] && MISSING="$MISSING TS_AUTHKEY"
          [ -z "${PROD_SSH_PRIVATE_KEY:-}" ] && MISSING="$MISSING PROD_SSH_PRIVATE_KEY"
          [ -z "${PROD_TAILNET_FQDN:-}" ] && MISSING="$MISSING PROD_TAILNET_FQDN"
          [ -z "${PLAYER_DOMAIN:-}" ] && MISSING="$MISSING PLAYER_DOMAIN"
          [ -z "${PODCAST_CORPUS_VOLUME:-}" ] && MISSING="$MISSING PODCAST_CORPUS_VOLUME"
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing prereqs:$MISSING — stage them then re-run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (resolver scripts)
        if: steps.preflight.outputs.skip != 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Join the tailnet
        if: steps.preflight.outputs.skip != 'true'
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:gha-deployer
          version: 1.96.4

      - name: Install SSH identity for deploy@ (PROD_SSH_PRIVATE_KEY)
        if: steps.preflight.outputs.skip != 'true'
        uses: ./.github/actions/prod-ssh-key
        with:
          ssh_private_key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Resolve prod MagicDNS host
        id: ts_host
        if: steps.preflight.outputs.skip != 'true'
        env:
          PROD_TAILNET_FQDN: ${{ vars.PROD_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          R=$(bash scripts/ops/resolve_prod_tailnet_host.sh)
          echo "resolved_fqdn=$R" >> "$GITHUB_OUTPUT"

      - name: Refresh repo on the box to this ref
        if: steps.preflight.outputs.skip != 'true'
        env:
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
          # Deploy the ref the workflow was dispatched on — NOT a hardcoded branch. The edge
          # / player work lives on `production`; hardcoding origin/main silently deployed the
          # wrong commit (chmod + conf.d fixes on production never reached the box; 2026-07-23).
          # Via env (not inline ${{ }}) to keep the ref out of the shell-injection surface.
          DEPLOY_REF: ${{ github.ref_name }}
        run: |
          ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            "set -euo pipefail; cd /srv/podcast-scraper; \
             git fetch --depth=50 origin '+refs/heads/*:refs/remotes/origin/*'; \
             git reset --hard 'origin/$DEPLOY_REF'"

      - name: Resolve api image tag
        id: imgsha
        if: steps.preflight.outputs.skip != 'true'
        env:
          OVERRIDE: ${{ inputs.override_image_sha }}
        run: |
          set -euo pipefail
          # "One engine, two surfaces" (ADR-116): by DEFAULT the player runs the EXACT same
          # api image the operator stack is currently running — resolved on the box by
          # deploy-player.sh from the live operator api container. So the default here is to
          # emit an EMPTY tag and let the script pin it. An explicit override_image_sha still
          # wins (validated below + staged). Never the literal :main tag (CI stopped updating
          # it 2026-05-28 -> pre-ADR-116, no /api/app/* surface -> the player 404s).
          SHA_SHORT="${OVERRIDE:-}"; SHA_SHORT="${SHA_SHORT#sha-}"
          if [ -n "$SHA_SHORT" ]; then
            if ! [[ "$SHA_SHORT" =~ ^[a-f0-9]{7,40}$ ]]; then
              echo "::error::override_image_sha must match ^[a-f0-9]{7,40}$ (got: ${SHA_SHORT})"; exit 1
            fi
            echo "tag=sha-$SHA_SHORT" >> "$GITHUB_OUTPUT"
            echo "::notice::Player api image pinned to override sha-$SHA_SHORT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "::notice::No override — deploy-player.sh will pin the player to the operator stack's running engine sha"
          fi

      - name: Validate GHCR api image manifest exists (override only, pre-SSH)
        if: steps.preflight.outputs.skip != 'true' && steps.imgsha.outputs.tag != ''
        env:
          TAG: ${{ steps.imgsha.outputs.tag }}
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker manifest inspect "ghcr.io/chipi/podcast-scraper-stack-api:${TAG}" >/dev/null

      - name: Stage .env.player (secrets via /dev/shm scp, never inline over ssh)
        if: steps.preflight.outputs.skip != 'true'
        env:
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
          PLAYER_DOMAIN: ${{ vars.PLAYER_DOMAIN }}
          PODCAST_CORPUS_VOLUME: ${{ vars.PODCAST_CORPUS_VOLUME }}
          # Empty by default -> deploy-player.sh pins to the operator's running engine sha.
          PODCAST_IMAGE_TAG: ${{ steps.imgsha.outputs.tag }}
          GOOGLE_CLIENT_ID: ${{ vars.PLAYER_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.PLAYER_GOOGLE_CLIENT_SECRET }}
          APP_SESSION_SECRET: ${{ secrets.PLAYER_APP_SESSION_SECRET }}
          # Player's browser error DSN → self-hosted GlitchTip (own project) via the
          # public ingest edge. Empty until the project + edge exist → Sentry no-op.
          PROD_SENTRY_DSN_PLAYER: ${{ secrets.PROD_SENTRY_DSN_PLAYER }}
          # Umami website UUID (public — ships in the bundle; a var, not a secret).
          PLAYER_UMAMI_WEBSITE_ID: ${{ vars.PLAYER_UMAMI_WEBSITE_ID }}
        run: |
          set -euo pipefail
          ENVTMP="$(mktemp -p /dev/shm)"
          {
            echo "PLAYER_DOMAIN=${PLAYER_DOMAIN}"
            echo "PODCAST_CORPUS_VOLUME=${PODCAST_CORPUS_VOLUME}"
            # Tags backend Sentry events (+ any env-gated behaviour) as prod — matches the
            # operator api. Without it the backend defaults to environment=dev (sentry_init).
            echo "PODCAST_ENV=prod"
            # Pin the api image to the resolved newest-published sha (never stale :main).
            echo "PODCAST_IMAGE_TAG=${PODCAST_IMAGE_TAG}"
            echo "APP_OAUTH_PROVIDER=google"
            echo "APP_OAUTH_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "APP_OAUTH_GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
            echo "APP_SESSION_SECRET=${APP_SESSION_SECRET}"
            echo "PLAYER_PORT=8092"
            # Build-time DSN for the player bundle (compose build-arg reads this
            # from --env-file .env.player). Empty = Sentry stays a no-op.
            # ⚠ Use the DASHLESS GlitchTip key in PROD_SENTRY_DSN_PLAYER — the
            # browser @sentry SDK rejects dashed-UUID keys ("Invalid Dsn") and
            # silently drops errors (GlitchTip ingest accepts both, so a curl test
            # misleads). See the same note in stack-test.yml (viewer). 2026-07-22.
            echo "VITE_SENTRY_DSN_PLAYER=${PROD_SENTRY_DSN_PLAYER}"
            # Player BACKEND (server-side) errors -> the SAME GlitchTip project 5 as the
            # browser errors (the SDK tags them by runtime). Reuses the player DSN; the
            # app-only api ships via the public telemetry ingest edge (it has no tailnet).
            echo "PODCAST_SENTRY_DSN_API=${PROD_SENTRY_DSN_PLAYER}"
            # Umami analytics build args. website-id from a GH var; the tracking
            # script URL is derived from the player domain (analytics.<domain>).
            # Both empty -> the bundle's Umami injection stays a no-op.
            echo "VITE_UMAMI_WEBSITE_ID=${PLAYER_UMAMI_WEBSITE_ID}"
            echo "VITE_UMAMI_SRC=${PLAYER_UMAMI_WEBSITE_ID:+https://analytics.${PLAYER_DOMAIN}/script.js}"
          } > "$ENVTMP"
          scp -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            "$ENVTMP" "${SSH_TARGET}:/srv/podcast-scraper/.env.player.staged"
          rm -f "$ENVTMP"
          ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            "set -euo pipefail; cd /srv/podcast-scraper; \
             mv .env.player.staged .env.player; chmod 600 .env.player"

      - name: Deploy (build + up + vhost drop + reload + health)
        if: steps.preflight.outputs.skip != 'true'
        env:
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            "/srv/podcast-scraper/infra/deploy/deploy-player.sh"

      - name: External health probe (public player domain)
        if: steps.preflight.outputs.skip != 'true'
        env:
          # Probe the public ROOT (edge + Cloudflare + TLS reachability), NOT an app path.
          # During the pre-launch coming-soon phase the edge gate returns the coming-soon
          # page (200) for every path incl. /api/app/*, so an app-path probe validates
          # nothing extra; and the backend itself is already validated in-container by the
          # deploy step's /api/health check. A 200 here means DNS+CF+origin-lock+TLS+edge
          # are all serving. (Earlier red runs were the origin lock blocking direct :443
          # before Cloudflare fronted the domain — not a deploy failure.)
          PROBE: https://${{ vars.PLAYER_DOMAIN }}/
        run: |
          set -euo pipefail
          for _ in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$PROBE" || echo 000)
            if [ "$code" = "200" ]; then echo "player public edge OK ($PROBE)"; exit 0; fi
            sleep 5
          done
          echo "::error::public player edge probe did not return 200 ($PROBE)"; exit 1
