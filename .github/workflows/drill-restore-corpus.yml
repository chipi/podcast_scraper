name: DR drill — restore corpus (backup → host)

# Downloads ``snapshot.tgz`` from ``chipi/podcast_scraper-backup`` (or
# override repo), uploads to the drill VPS, extracts under
# ``/srv/podcast-scraper/corpus``, recreates api+viewer. Tag default: newest
# **compatible** ``snapshot-prod-*`` with sibling ``snapshot.manifest.json``
# (ADR-092); optional pin ``backup_tag``. RFC-082 / #752.
#
# Prerequisites (same tailnet + SSH contract as drill-deploy / drill-e2e):
#   secrets: TS_AUTHKEY, DRILL_DEPLOY_SSH_PRIVATE_KEY
#            BACKUP_REPO_TOKEN (optional — use when backup repo is private;
#            else ``github.token`` is tried)
#   vars:    DRILL_TAILNET_FQDN
#
# Manual dispatch: type DRILL_RESTORE in ``confirm``.
# Called from ``drill-exercise.yml``: no extra confirm (orchestrator gates).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DRILL_RESTORE" to confirm overwriting drill corpus'
        required: true
        default: ''
      backup_tag:
        description: "Release tag (e.g. snapshot-prod-YYYYMMDD). Empty = newest compatible snapshot-prod-* (manifest required)."
        required: false
        default: ''
      backup_repo:
        description: "GitHub owner/repo for backup releases"
        required: false
        default: chipi/podcast_scraper-backup
      skip_confirm:
        description: "Leave false for manual runs. Orchestrator sets true via workflow_call."
        type: boolean
        required: false
        default: false
  workflow_call:
    secrets:
      TS_AUTHKEY:
        required: true
      DRILL_DEPLOY_SSH_PRIVATE_KEY:
        required: true
      BACKUP_REPO_TOKEN:
        required: false
    inputs:
      backup_tag:
        type: string
        required: false
        default: ''
      backup_repo:
        type: string
        required: false
        default: chipi/podcast_scraper-backup
      skip_confirm:
        description: "True when drill-exercise already gated on DRILL_FULL_CYCLE"
        type: boolean
        required: true

permissions:
  contents: read

concurrency:
  group: drill-restore-corpus
  cancel-in-progress: false

jobs:
  restore:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: drill
    steps:
      # See drill-infra-destroy.yml — caller event stays workflow_dispatch inside reuse.
      - name: "DR drill — confirm input (manual dispatch only)"
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_confirm != true }}
        run: |
          if [ "${{ inputs.confirm }}" != "DRILL_RESTORE" ]; then
            echo "::error::Must type DRILL_RESTORE to confirm. Got: '${{ inputs.confirm }}'"
            exit 1
          fi

      - name: "DR drill — pre-flight: secrets and variables"
        env:
          TS_AUTHKEY:                  ${{ secrets.TS_AUTHKEY }}
          DRILL_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DRILL_DEPLOY_SSH_PRIVATE_KEY }}
          DRILL_TAILNET_FQDN:          ${{ vars.DRILL_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${TS_AUTHKEY:-}" ]                    && MISSING="$MISSING TS_AUTHKEY"
          [ -z "${DRILL_DEPLOY_SSH_PRIVATE_KEY:-}" ] && MISSING="$MISSING DRILL_DEPLOY_SSH_PRIVATE_KEY"
          [ -z "${DRILL_TAILNET_FQDN:-}" ]          && MISSING="$MISSING DRILL_TAILNET_FQDN"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing prereqs:$MISSING Stage per drill-deploy / infra/README.md (#752)."
            exit 1
          fi

      - name: "DR drill — checkout: shallow (resolver scripts + prod-ssh-key action)"
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: "DR drill — SSH: install identity (deploy@, DRILL_DEPLOY_SSH_PRIVATE_KEY)"
        uses: ./.github/actions/prod-ssh-key
        with:
          ssh_private_key:   ${{ secrets.DRILL_DEPLOY_SSH_PRIVATE_KEY }}
          identity_env_name: SSH_DRILL_IDENTITY

      - name: "DR drill — join: tailnet (tag:gha-deployer)"
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags:    tag:gha-deployer
          version: 1.96.4

      - name: "DR drill — resolve: tailnet host (MagicDNS)"
        id: ts_host
        env:
          DRILL_TAILNET_FQDN: ${{ vars.DRILL_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          R=$(bash scripts/ops/resolve_drill_tailnet_host.sh)
          echo "resolved_fqdn=$R" >> "$GITHUB_OUTPUT"
          WANT="${{ vars.DRILL_TAILNET_FQDN }}"
          if [ "$(printf '%s' "$R" | tr '[:upper:]' '[:lower:]')" != "$(printf '%s' "$WANT" | tr '[:upper:]' '[:lower:]')" ]; then
            echo "::notice::Tailscale live host ($R) differs from vars.DRILL_TAILNET_FQDN ($WANT). Using $R for SSH."
          fi

      - name: "DR drill — restore: resolve backup release tag"
        id: tag
        env:
          BACKUP_REPO: ${{ inputs.backup_repo }}
          BACKUP_TAG:  ${{ inputs.backup_tag }}
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash scripts/ops/resolve_latest_snapshot_prod_tag.sh

      - name: "DR drill — restore: download and verify snapshot release assets"
        env:
          BACKUP_REPO_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${BACKUP_REPO_TOKEN:-}" ]; then
            export GH_TOKEN="$BACKUP_REPO_TOKEN"
          else
            export GH_TOKEN="${{ github.token }}"
          fi
          export BACKUP_REPO="${{ steps.tag.outputs.repo }}"
          bash scripts/ops/corpus_snapshot/download_and_verify_snapshot.sh \
            --tag "${{ steps.tag.outputs.tag }}" \
            --output-dir .
          if [ -f snapshot.manifest.json ]; then
            jq -r '"corpus_format_version=\(.corpus_format_version) producer_git_sha=\(.producer.git_sha // "n/a") archive_sha256=\(.archive.sha256 // "n/a")"' \
              snapshot.manifest.json
          fi
          ls -la snapshot.tgz
          test -f snapshot.tgz

      - name: "DR drill — restore: upload tarball and restore script to drill host"
        env:
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          set -euo pipefail
          scp -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            snapshot.tgz "${SSH_TARGET}:/tmp/snapshot-restore-drill.tgz"
          scp -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            scripts/ops/restore_corpus_from_tarball_host.sh \
            "${SSH_TARGET}:/tmp/restore_corpus_from_tarball_host.sh"

      - name: "DR drill — restore: extract on drill and recreate api + viewer"
        env:
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          set -euo pipefail
          ssh -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            'bash /tmp/restore_corpus_from_tarball_host.sh /tmp/snapshot-restore-drill.tgz'
