# Post-deploy live smoke for the public player (#43). Runs the Playwright live smoke
# (web/learning-player/e2e/live) against the DEPLOYED closelistening.app after a successful
# "Deploy player (public)" run — and on demand via workflow_dispatch. Read-only vs prod
# (passes the coming-soon gate with the preview basic-auth; never mutates data).
name: Smoke player (live)

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Deploy player (public)"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: smoke-player
  cancel-in-progress: false

jobs:
  smoke:
    # Manual runs always fire; auto runs only when the deploy actually succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/learning-player
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/learning-player/package-lock.json
      - run: npm ci
      - name: Install Playwright Chromium
        run: ./node_modules/.bin/playwright install --with-deps chromium
      - name: Live smoke vs closelistening.app
        env:
          LIVE_BASE_URL: https://${{ vars.PLAYER_DOMAIN || 'closelistening.app' }}
          PLAYER_PREVIEW_USER: ${{ vars.PLAYER_PREVIEW_USER || 'marko' }}
          # Gate password (preview basic-auth). Without it the gated specs skip; the
          # public coming-soon assertion still runs.
          PLAYER_PREVIEW_PASS: ${{ secrets.PLAYER_PREVIEW_PASS }}
        run: npm run test:e2e:live
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-live-report
          path: web/learning-player/playwright-report/
          retention-days: 7
