name: Stack test

# End-to-end stack-test against the Docker compose stack.
#
# Single sequence: build images → bring up api + viewer + mock-feeds →
# seed feeds.spec.yaml + viewer_operator.yaml into the corpus_data
# volume → run Playwright (smoke + full UI flow). The full UI flow
# spec drives the API job factory, which spawns one-shot
# ``docker compose run pipeline`` containers that produce the corpus
# artifacts the smoke + UI assertions then validate.
#
# Profile: ``airgapped_thin`` (Whisper tiny.en, transformers
# bart-base + led-base, spaCy en_core_web_sm; no cloud calls).
#
# Cloud-thin (OpenAI Whisper + Gemini providers) is **local-only** —
# we don't run it on public CI to avoid recurring API costs on every
# push / nightly. ``make stack-test-build-cloud`` plus
# ``make stack-test-seed STACK_TEST_OPERATOR_VARIANT=cloud-thin`` plus
# ``STACK_TEST_OPERATOR_PROFILE=cloud_thin make stack-test-playwright``
# exists for developers to validate the cloud path against their own
# ``.env`` keys before pushing changes that touch ``[llm]`` extras /
# Gemini providers / OpenAI Whisper.

on:
  # Sequential next gate: only run after the upstream "Python application"
  # workflow has completed successfully on the same branch + SHA. The two
  # workflows used to run in parallel on every push, but stack-test's Docker
  # build path tripping on a viewer or Python regression that ``Python
  # application`` would have caught was wasteful (and surfaced the failure
  # twice in the PR view). Running stack-test only after Python application
  # succeeds keeps it as a true post-Python integration gate.
  workflow_run:
    workflows: ["Python application"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  # ``workflow_run`` events run with the upstream's permissions context;
  # be explicit so this still works if the upstream tightens its own.
  # The ``publish`` job below adds its own narrower ``packages: write``
  # at the job level to keep ``stack-test`` from carrying that scope.
  contents: read
  actions: read
  checks: write

jobs:
  stack-test:
    runs-on: ubuntu-latest
    # Skip when the upstream "Python application" run did not succeed
    # (workflow_run fires on completion regardless of conclusion).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      # ``STACK_PIPELINE_PRELOAD_ML`` is intentionally NOT set here. The
      # ``make stack-test-build`` recipe forces it to ``true`` (Makefile)
      # because the ``airgapped_thin`` profile expects the ML model
      # cache to be baked into the pipeline image — without it the
      # pipeline subprocess errors at Transformers load time. Setting
      # ``false`` here used to override the recipe and ship a useless
      # image; the Makefile is now the single source of truth.
      STACK_TEST_VIEWER_PORT: 8090
      STACK_TEST_BASE_URL: http://127.0.0.1:8090
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
    steps:
      - uses: actions/checkout@v6
        with:
          # workflow_run runs against the default branch by default; pin to
          # the upstream's SHA so a subsequent push doesn't shift this run
          # off-target. ``workflow_dispatch`` falls back to default ref.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Free disk space
        # #703: existing dotnet/android/ghc/linuxbrew removal (~16 GB) is not
        # enough for the cold pipeline (ml) image build (~15.5 GB). Add
        # /opt/hostedtoolcache (CodeQL, Java, etc.) — ~10-15 GB more — and
        # apt list cleanup. The stack-test-build step is all docker; we
        # don't need any hosted-tool runtimes for it.
        run: |
          echo "before:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /home/linuxbrew/.linuxbrew \
            /opt/hostedtoolcache /usr/share/swift /usr/local/share/boost || true
          sudo apt-get clean || true
          sudo rm -rf /var/lib/apt/lists/* || true
          docker image prune -af || true
          echo "after:"
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build stack images
        run: make stack-test-build

      - name: Bring up api + viewer + mock-feeds
        run: make stack-test-up

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8090/api/health" >/dev/null; then
              echo "health ok"
              exit 0
            fi
            sleep 2
          done
          echo "timeout waiting for /api/health"
          exit 1

      - name: Seed corpus_data volume (feeds.spec.yaml + viewer_operator.yaml, ml variant)
        run: make stack-test-seed

      - name: Run Playwright (smoke + full UI flow)
        run: make stack-test-playwright

      - name: Dump compose logs on failure
        if: failure()
        run: |
          echo "::group::api container logs"
          docker compose -f compose/docker-compose.stack.yml -f compose/docker-compose.stack-test.yml logs --no-color --tail=400 api || true
          echo "::endgroup::"
          echo "::group::viewer container logs"
          docker compose -f compose/docker-compose.stack.yml -f compose/docker-compose.stack-test.yml logs --no-color --tail=200 viewer || true
          echo "::endgroup::"
          # Pipeline runs as a one-shot ``docker compose run --rm pipeline …``
          # container spawned by the API job factory; ``--rm`` removes it the
          # moment it exits, so ``docker compose logs pipeline`` prints
          # nothing here. Fetch the captured subprocess stderr/stdout from
          # the API instead — it persists job logs and exposes them via
          # ``GET /api/jobs/<id>/log`` (and ``…/subprocess-log``). This
          # surfaces the actual pipeline ``exit_code_1`` reason in the
          # workflow log.
          echo "::group::pipeline subprocess logs (via /api/jobs/<id>/log)"
          API_BASE="${STACK_TEST_BASE_URL:-http://127.0.0.1:8090}"
          CORPUS_PATH="$(printf %s '/app/output' | jq -sRr @uri)"
          jobs_json="$(curl -fsS "${API_BASE}/api/jobs?path=${CORPUS_PATH}" 2>/dev/null || echo '{}')"
          job_ids="$(printf %s "${jobs_json}" | jq -r '.jobs // [] | .[] | .job_id' 2>/dev/null || true)"
          if [ -z "${job_ids}" ]; then
            echo "(no jobs reported by /api/jobs)"
          else
            echo "${job_ids}" | while IFS= read -r jid; do
              [ -n "${jid}" ] || continue
              echo "----- job ${jid} status -----"
              curl -fsS "${API_BASE}/api/jobs/${jid}?path=${CORPUS_PATH}" 2>/dev/null \
                | jq -r '. | "status=\(.status // "?")\nexit_code=\(.exit_code // "?")\nerror_reason=\(.error_reason // "")\nstarted_at=\(.started_at // "")\nfinished_at=\(.finished_at // "")"' \
                || echo "(failed to read job ${jid} status)"
              echo "----- job ${jid} subprocess log (full) -----"
              curl -fsS "${API_BASE}/api/jobs/${jid}/log?path=${CORPUS_PATH}" 2>/dev/null \
                || echo "(failed to read /api/jobs/${jid}/log)"
              echo "----- end job ${jid} -----"
            done
          fi
          echo "::endgroup::"

      - name: Tear down compose stack
        if: always()
        run: make stack-test-down || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: stack-test-playwright-report
          path: tests/stack-test/playwright-report
          if-no-files-found: ignore

  # ============================================================
  # publish — gated on stack-test success on main.
  #
  # Pushes api / viewer / pipeline-llm to GHCR with two tags:
  #   * :main         — the always-track-latest-green-main tag
  #   * :sha-<short>  — for incident-response pinning + rollback
  #
  # NEVER pushes pipeline-ml — that image bakes in models with
  # restrictive licenses (Llama 3.2 community license) and is
  # built on CI runners only for stack-test consumption.
  # See RFC-081 §Layer 1 for the published-image-set decision.
  #
  # Each image is built locally first, runs the no-secrets-in-image
  # assertion (scripts/check/no-secrets-in-image.sh), and then
  # gets the two tags pushed only after the assertion passes.
  # ============================================================
  publish:
    needs: stack-test
    runs-on: ubuntu-latest
    # Strict gate: only on main pushes (workflow_run from main) AND
    # when stack-test succeeded AND in the canonical repo (avoid
    # forks accidentally pushing).
    if: |
      github.repository == 'chipi/podcast_scraper'
      && github.ref == 'refs/heads/main'
      && (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        || github.event_name == 'workflow_dispatch'
      )
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_BUILDKIT: 1
      REGISTRY: ghcr.io
      OWNER: chipi
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      # #712: arm64 builds run via QEMU emulation on this amd64 runner.
      # setup-qemu-action must come before setup-buildx-action so the
      # builder picks up the registered binfmt_misc handlers.
      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT="${SHA:0:7}"
          echo "short_sha=${SHORT}" >> "$GITHUB_OUTPUT"
          echo "ref_main=:main" >> "$GITHUB_OUTPUT"
          echo "ref_sha=:sha-${SHORT}" >> "$GITHUB_OUTPUT"

      # #712: each publish step does two buildx invocations.
      # Step 1: build linux/amd64 only with --load so the no-secrets-in-image
      # script can ``docker run`` against a real local image. Multi-arch
      # buildx output can't be --load'd (the local Docker daemon is
      # single-arch), so we keep the secrets gate on amd64 — it inspects
      # bake-time COPY surfaces which are arch-identical.
      # Step 2: build linux/amd64,linux/arm64 with --push directly to GHCR,
      # tagging both :main and :sha-<short> in one shot. Cache from step 1
      # makes the amd64 layer near-instant; arm64 is the only new build cost.
      - name: Build + assert + push (api)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.OWNER }}/podcast-scraper-stack-api
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --tag "${IMAGE}:build-${SHORT_SHA}" \
            --load \
            --cache-from "type=gha,scope=publish-api" \
            --cache-to "type=gha,scope=publish-api,mode=max" \
            -f docker/api/Dockerfile .
          scripts/check/no-secrets-in-image.sh "${IMAGE}:build-${SHORT_SHA}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "${IMAGE}:main" \
            --tag "${IMAGE}:sha-${SHORT_SHA}" \
            --push \
            --cache-from "type=gha,scope=publish-api" \
            --cache-to "type=gha,scope=publish-api,mode=max" \
            -f docker/api/Dockerfile .

      - name: Build + assert + push (viewer)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.OWNER }}/podcast-scraper-stack-viewer
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
          # Sentry DSN bakes into the SPA bundle at build time; reach
          # for the GHA secret. Other VITE_* vars are optional.
          VITE_SENTRY_DSN_VIEWER: ${{ secrets.VITE_SENTRY_DSN_VIEWER }}
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --tag "${IMAGE}:build-${SHORT_SHA}" \
            --load \
            --cache-from "type=gha,scope=publish-viewer" \
            --cache-to "type=gha,scope=publish-viewer,mode=max" \
            --build-arg "VITE_SENTRY_DSN_VIEWER=${VITE_SENTRY_DSN_VIEWER}" \
            --build-arg "VITE_PODCAST_RELEASE=podcast-scraper@sha-${SHORT_SHA}" \
            -f docker/viewer/Dockerfile .
          scripts/check/no-secrets-in-image.sh "${IMAGE}:build-${SHORT_SHA}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "${IMAGE}:main" \
            --tag "${IMAGE}:sha-${SHORT_SHA}" \
            --push \
            --cache-from "type=gha,scope=publish-viewer" \
            --cache-to "type=gha,scope=publish-viewer,mode=max" \
            --build-arg "VITE_SENTRY_DSN_VIEWER=${VITE_SENTRY_DSN_VIEWER}" \
            --build-arg "VITE_PODCAST_RELEASE=podcast-scraper@sha-${SHORT_SHA}" \
            -f docker/viewer/Dockerfile .

      - name: Build + assert + push (pipeline-llm — cloud variant only)
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.OWNER }}/podcast-scraper-stack-pipeline-llm
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
        run: |
          set -euo pipefail
          # INSTALL_EXTRAS=llm = cloud-thin variant (OpenAI/Gemini SDKs).
          # PRELOAD_ML_MODELS=false because this image has no local ML models.
          docker buildx build \
            --platform linux/amd64 \
            --tag "${IMAGE}:build-${SHORT_SHA}" \
            --load \
            --cache-from "type=gha,scope=publish-pipeline-llm" \
            --cache-to "type=gha,scope=publish-pipeline-llm,mode=max" \
            --build-arg "INSTALL_EXTRAS=llm" \
            --build-arg "PRELOAD_ML_MODELS=false" \
            -f docker/pipeline/Dockerfile .
          scripts/check/no-secrets-in-image.sh "${IMAGE}:build-${SHORT_SHA}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag "${IMAGE}:main" \
            --tag "${IMAGE}:sha-${SHORT_SHA}" \
            --push \
            --cache-from "type=gha,scope=publish-pipeline-llm" \
            --cache-to "type=gha,scope=publish-pipeline-llm,mode=max" \
            --build-arg "INSTALL_EXTRAS=llm" \
            --build-arg "PRELOAD_ML_MODELS=false" \
            -f docker/pipeline/Dockerfile .

      - name: Verify multi-arch manifests
        env:
          IMAGE_API: ${{ env.REGISTRY }}/${{ env.OWNER }}/podcast-scraper-stack-api
          IMAGE_VIEWER: ${{ env.REGISTRY }}/${{ env.OWNER }}/podcast-scraper-stack-viewer
          IMAGE_PIPELINE: ${{ env.REGISTRY }}/${{ env.OWNER }}/podcast-scraper-stack-pipeline-llm
          SHORT_SHA: ${{ steps.tags.outputs.short_sha }}
        run: |
          set -euo pipefail
          # #712 acceptance gate: assert each pushed :main manifest lists both
          # linux/amd64 and linux/arm64 digests. Belt-and-suspenders against
          # silent platform regressions (someone removes --platform later).
          for IMAGE in "$IMAGE_API" "$IMAGE_VIEWER" "$IMAGE_PIPELINE"; do
            echo "==> Inspecting ${IMAGE}:sha-${SHORT_SHA}"
            MANIFEST=$(docker buildx imagetools inspect "${IMAGE}:sha-${SHORT_SHA}" --raw)
            for ARCH in amd64 arm64; do
              if ! echo "$MANIFEST" | grep -q "\"architecture\": \"${ARCH}\""; then
                echo "::error::${IMAGE}:sha-${SHORT_SHA} missing linux/${ARCH} in manifest"
                echo "$MANIFEST"
                exit 1
              fi
            done
            echo "  ${IMAGE}:sha-${SHORT_SHA} OK (amd64 + arm64)"
          done

      - name: Summary
        run: |
          set -euo pipefail
          SHORT="${{ steps.tags.outputs.short_sha }}"
          {
            echo "## GHCR publish complete (multi-arch)"
            echo ""
            echo "Pushed three images with tags ``:main`` + ``:sha-${SHORT}``,"
            echo "each as a multi-arch manifest covering ``linux/amd64`` +"
            echo "``linux/arm64`` (#712 — unblocks Hetzner CAX prod target)."
            echo ""
            echo "* ``ghcr.io/${{ env.OWNER }}/podcast-scraper-stack-api:main``"
            echo "* ``ghcr.io/${{ env.OWNER }}/podcast-scraper-stack-viewer:main``"
            echo "* ``ghcr.io/${{ env.OWNER }}/podcast-scraper-stack-pipeline-llm:main``"
            echo ""
            echo "The ``pipeline-ml`` image (with HuggingFace cache + SummLlama)"
            echo "is intentionally NOT published — RFC-081 §Layer 1 license"
            echo "decision; never redistribute restricted-license model bundles."
            echo "It also stays amd64-only — no current consumer needs ARM ML,"
            echo "and torch / sentence-transformers / spaCy on arm64 is a"
            echo "separate (non-trivial) port."
          } >> "$GITHUB_STEP_SUMMARY"
