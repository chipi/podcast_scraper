name: Stack smoke test

on:
  push:
    branches: [main]
    paths:
      - 'compose/**'
      - 'docker/**'
      - 'config/ci/**'
      - 'tests/smoke/**'
      - 'Makefile'
      - 'pyproject.toml'
      - 'docker/pipeline/**'
      - '.github/workflows/smoke-test.yml'
      - 'scripts/tools/gil_quality_metrics.py'
      - 'scripts/tools/kg_quality_metrics.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      STACK_PIPELINE_PRELOAD_ML: false
      SMOKE_VIEWER_PORT: 8090
      SMOKE_BASE_URL: http://127.0.0.1:8090
      DOCKER_BUILDKIT: 1
      COMPOSE_DOCKER_CLI_BUILD: 1
      SMOKE_EXPORT_DIR: ${{ github.workspace }}/.smoke-corpus
      SMOKE_CORPUS_ROOT: ${{ github.workspace }}/.smoke-corpus
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /home/linuxbrew/.linuxbrew || true
          docker image prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build stack + smoke images
        run: make smoke-build

      - name: Run pipeline (fixture RSS, airgapped profile)
        run: make smoke-run-pipeline

      - name: Assert pipeline log (layer 2)
        run: make smoke-assert-logs

      - name: Export corpus from smoke volume (layer 1 prep)
        run: make smoke-export-corpus

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python deps (GIL/KG metric scripts)
        run: pip install -e '.[dev]'

      - name: Artifact quality gates (layer 1)
        run: make smoke-assert-artifacts

      - name: Start viewer + API
        run: make smoke-up

      - name: Wait for Nginx → API health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8090/api/health" >/dev/null; then
              echo "health ok"
              exit 0
            fi
            sleep 2
          done
          echo "timeout waiting for /api/health"
          exit 1

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Playwright smoke tests
        run: make smoke-test-playwright

      - name: Tear down
        if: always()
        run: make smoke-down || true

      - name: Upload pipeline log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-pipeline-log
          path: .smoke/pipeline.log
          if-no-files-found: ignore
