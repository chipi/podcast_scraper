# RFC-015 Phase 4 — AI experiment pipeline run.
#
# Standalone operator-triggered eval. NOT a CI gate and NOT called
# from any other workflow (per operator directive 2026-06-24).
# Surfaces a "Run experiment" button the operator can connect to the
# release process when ready.
#
# Inputs the operator picks at run-time:
#   config:   eval config YAML under data/eval/configs/ (default: a
#             local-only ML smoke config — no cloud LLM keys per
#             [[feedback_no_llm_in_ci]])
#   baseline: optional baseline_id to compare against (predictions
#             vs gold)
#   force:    delete the existing run dir before starting (re-run)
#
# Artifacts (uploaded on completion): the run dir under
# data/eval/runs/<run_id>/ + any rendered comparison JSON.

name: AI experiment pipeline (RFC-015)

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'Eval config YAML (relative to repo root)'
        required: true
        default: 'data/eval/configs/ml/baseline_ml_dev_authority_benchmark_v1.yaml'
      baseline:
        description: 'Optional baseline_id for comparison'
        required: false
        default: ''
      force:
        description: 'Force-rerun (delete existing run dir first)'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: ai-experiment-pipeline-${{ inputs.config }}
  cancel-in-progress: false

jobs:
  experiment:
    name: Experiment runner
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.8'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify config exists
        run: |
          if [ ! -f "${{ inputs.config }}" ]; then
            echo "::error::Config not found: ${{ inputs.config }}"
            find data/eval/configs/ml -maxdepth 1 -type f -name '*.yaml' | head -20
            exit 1
          fi
          echo "Using config: ${{ inputs.config }}"

      - name: Run experiment
        env:
          # Per [[feedback_no_llm_in_ci]] — no cloud LLM keys are
          # injected here. Configs targeting local providers
          # (hf_local / transformers / spacy) work without keys;
          # configs targeting cloud providers would need a separate
          # opt-in workflow with secrets gating.
          LOG_LEVEL: INFO
        run: |
          ARGS=""
          if [ -n "${{ inputs.baseline }}" ]; then
            ARGS="${ARGS} BASELINE=${{ inputs.baseline }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="${ARGS} FORCE=1"
          fi
          # shellcheck disable=SC2086
          make experiment-run CONFIG="${{ inputs.config }}" ${ARGS}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-run-${{ github.run_id }}
          path: |
            data/eval/runs/**
            !data/eval/runs/**/*.bin
          if-no-files-found: warn
          retention-days: 30
