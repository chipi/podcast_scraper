# Weekly autoresearch sweep on DGX self-hosted runner (RFC-089 P3).
#
# Three phases:
#   1. setup   — checkout, install [dev,llm], probe Ollama, materialize dataset
#   2. sweep   — run the cohort (data/autoresearch_baselines/cohort.yaml),
#                produce per-candidate breakdown JSONs, write the weekly
#                ledger autoresearch-YYYY-WNN.json, commit it back to main
#   3. drift   — compare this week's ledger to last week's, open/update/close
#                a single "autoresearch drift detected" GH issue per week
#
# Mirrors nightly-data-baseline.yml's setup → snapshot → drift → issue
# pattern. The cohort + thresholds + judge models are all data-driven via
# YAML in data/autoresearch_baselines/; edit those to scope without
# touching this workflow.

name: Autoresearch eval nightly (DGX)

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write   # commits the weekly ledger back to main
  issues: write     # open/update/close the weekly drift issue

concurrency:
  group: autoresearch-eval-nightly
  cancel-in-progress: true

jobs:
  dgx-sweep:
    name: DGX autoresearch sweep (allow-listed)
    runs-on: [self-hosted, dgx-spark]
    timeout-minutes: 120
    # Same env as nightly-data-baseline — gives this workflow access to
    # INFRA_STATE_COMMIT_TOKEN (the fine-grained PAT that bypasses main's
    # pull_request rule). One env, two consumers, single secret to rotate.
    environment: baselines
    # Each step below carries an explicit ``timeout-minutes`` so a wedged
    # phase surfaces as a step failure with a clear name instead of
    # eating the full 120-min job budget. Modular breakdown:
    #   [Setup]   checkout, install deps, probe Ollama    ~20 min budget
    #   [GPU]     stop vLLM (Ollama needs the whole GPU)   ~5  min budget
    #   [Data]    materialize the smoke dataset            ~5  min budget
    #   [Sweep]   run the cohort + render leaderboard      ~95 min budget
    #   [Persist] commit ledger to main + upload artifact  ~8  min budget
    #   [GPU]     restart vLLM (always run)                ~8  min budget
    steps:
      # --- [Setup] ---------------------------------------------------
      - name: '[Setup] Checkout repo'
        id: checkout
        timeout-minutes: 3
        uses: actions/checkout@v7
        # Same persist-credentials trick as nightly-data-baseline.yml —
        # the commit-snapshot step pushes via INFRA_STATE_COMMIT_TOKEN-like
        # pattern (here just GITHUB_TOKEN scoped to contents:write); a
        # persisted credential would shadow it.
        with:
          persist-credentials: false

      - name: '[Setup] Set up Python 3.11'
        id: setup_python
        timeout-minutes: 3
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.8"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: '[Setup] Install package (dev + llm)'
        id: install
        timeout-minutes: 15
        # [llm] carries openai/anthropic/google-genai/mistralai/httpx —
        # OllamaProvider uses the OpenAI SDK against Ollama's /v1 endpoint.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,llm]"

      - name: '[Setup] Ollama health (tailnet)'
        id: ollama_health
        timeout-minutes: 2
        env:
          DGX_TAILNET_FQDN: ${{ vars.DGX_TAILNET_FQDN }}
        run: |
          if [ -z "${DGX_TAILNET_FQDN}" ]; then
            echo "DGX_TAILNET_FQDN repo variable unset; sweep cannot proceed"
            exit 1
          fi
          host=$(bash scripts/ops/resolve_dgx_tailnet_host.sh)
          curl -fsS --max-time 5 "http://${host}:11434/api/tags" | head -c 200
          echo

      # --- [GPU] Ollama gets the whole GPU during the sweep ----------
      - name: '[GPU] Stop vllm-autoresearch (free ~73 GB for Ollama)'
        id: stop_vllm
        # The persistent vllm-autoresearch container holds 73 GB of the
        # 128 GB GPU 24/7, leaving only ~55 GB for Ollama which causes
        # CUDA OOM cascades across the cohort. Stop it for the duration
        # of the sweep; restore in the matching always-run step below.
        #
        # We can't use gpu-mode-swap.sh because that uses ``docker compose
        # down`` which finds nothing (the container has no compose labels
        # — it was started via ``docker run``, not ``docker compose up``).
        # Just stop+start by container name directly. gha-runner is in
        # the docker group so it can manage containers without sudo.
        timeout-minutes: 3
        run: |
          echo "  before:"
          docker container inspect vllm-autoresearch --format '{{.State.Status}}'
          nvidia-smi --query-gpu=memory.used,memory.free --format=csv,noheader
          docker stop vllm-autoresearch
          echo "  after stop:"
          docker container inspect vllm-autoresearch --format '{{.State.Status}}'
          sleep 8
          nvidia-smi --query-gpu=memory.used,memory.free --format=csv,noheader

      # --- [Data] Prepare the dataset the cohort scores against ------
      - name: '[Data] Materialize smoke dataset'
        id: materialize
        timeout-minutes: 5
        # curated_5feeds_smoke_v2 is the dataset every cohort candidate
        # scores against. Materialized tree is gitignored; sources are
        # tracked — same pattern as nightly-data-baseline.yml.
        run: |
          make dataset-materialize DATASET_ID=curated_5feeds_smoke_v2

      # --- [Sweep] Run the cohort ------------------------------------
      # Split from leaderboard rendering so a wedged/OOM'd sweep doesn't
      # eat the leaderboard step's short timeout (the rendering is what
      # populates the GH job summary — it's cheap and should complete
      # even if the sweep partially succeeded).
      - name: '[Sweep] Run sweep across cohort'
        id: sweep
        # 95 min covers the full 7-candidate cohort at the current
        # scalar Ollama pace (~13 min/candidate). Pairwise + bigger
        # judges will push this — bump if needed after the next real run.
        timeout-minutes: 95
        env:
          OLLAMA_API_BASE: ${{ vars.DGX_OLLAMA_API_BASE }}
        run: |
          if [ -z "${OLLAMA_API_BASE}" ]; then
            echo "DGX_OLLAMA_API_BASE unset; sweep cannot proceed"
            exit 1
          fi

          # The sweep driver reads data/autoresearch_baselines/cohort.yaml
          # for candidates + default_limit. To override the phased rollout
          # limit on a manual dispatch, set AUTORESEARCH_SWEEP_LIMIT in env.
          if [ -n "${AUTORESEARCH_SWEEP_LIMIT:-}" ]; then
            python3 scripts/baselines/autoresearch_sweep.py \
              --limit "${AUTORESEARCH_SWEEP_LIMIT}"
          else
            python3 scripts/baselines/autoresearch_sweep.py
          fi

      - name: '[Sweep] Render leaderboard summary'
        id: leaderboard
        # ``if: always()`` so we still get the leaderboard even when
        # the sweep partially failed — per-candidate ``status`` rows in
        # the ledger are exactly what the operator wants to see in that
        # case (which candidates ran, which failed, what the ok ones
        # scored).
        if: always()
        timeout-minutes: 2
        run: |
          # Surface the cohort attribution table in the job summary.
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import datetime as dt, json, glob, os
          files = sorted(glob.glob("data/autoresearch_baselines/autoresearch-*.json"))
          if not files:
              print("(no ledger written)"); raise SystemExit(0)
          d = json.load(open(files[-1]))
          ja, jb = d["judges"]["judge_a"], d["judges"]["judge_b"]
          print(f"## Autoresearch weekly sweep — {d['week_id']}")
          print()
          print(f"**Silver:** `{d['silver']}`  (Anthropic)")
          print(f"**Dataset:** `{d['dataset']}`")
          print(f"**Judge A:** `{ja.get('model')}`  (provider=`{ja.get('provider')}`)")
          print(f"**Judge B:** `{jb.get('model')}`  (provider=`{jb.get('provider')}`)")
          print()
          print("### Leaderboard")
          print()
          print("| candidate | family | final | rougeL | jA | jB | Δjudges | p95 (ms) | flag |")
          print("|---|---|---:|---:|---:|---:|---:|---:|---|")
          for r in sorted(d["cohort"], key=lambda x: -(x.get("scores",{}).get("final") or -1)):
              sc = r.get("scores") or {}; lat = r.get("latency_ms") or {}
              if r.get("status") != "ok":
                  print(f"| `{r['model']}` | {r.get('family','?')} | — | — | — | — | — | — | ⚠ {r.get('status')} |"); continue
              flag = ""
              if r.get("same_family_judge"):
                  ja_v, jb_v = sc.get("judge_a_mean"), sc.get("judge_b_mean")
                  if ja_v is not None and jb_v is not None:
                      if r.get("family") == ja.get("model","").split(":")[0].split("-")[0].title() or "gemma" in r.get("family","").lower():
                          flag = "⚠ jA same-family"
                      else:
                          flag = "⚠ jB same-family"
                  else:
                      flag = "⚠ same-family"
              print(f"| `{r['model']}` | {r.get('family','?')} | {sc.get('final',0):.4f} | {sc.get('rougeL_f1',0):.4f} | {sc.get('judge_a_mean') or 0:.3f} | {sc.get('judge_b_mean') or 0:.3f} | {sc.get('judges_delta') or 0:.3f} | {lat.get('p95') or 0:.0f} | {flag} |")
          PY

      # --- [Persist] Commit ledger + artifact -----------------------
      - name: '[Persist] Commit weekly ledger to main'
        id: commit_ledger
        timeout-minutes: 5
        # Pushes via INFRA_STATE_COMMIT_TOKEN — fine-grained PAT scoped to
        # this repo, bypass actor on the main ruleset. Same pattern as
        # nightly-data-baseline.yml. The actions/checkout step above has
        # ``persist-credentials: false`` so the default GITHUB_TOKEN
        # extraheader doesn't shadow this PAT (the bug that wasted half
        # a session earlier today).
        env:
          INFRA_STATE_COMMIT_TOKEN: ${{ secrets.INFRA_STATE_COMMIT_TOKEN }}
        run: |
          set -e
          if [ -z "${INFRA_STATE_COMMIT_TOKEN:-}" ]; then
            echo "::error::INFRA_STATE_COMMIT_TOKEN missing in 'baselines' env."
            exit 1
          fi
          git config user.name  "baselines-commit-bot"
          git config user.email "baselines-commit-bot@noreply.github.com"
          if [ -z "$(git status --porcelain -- data/autoresearch_baselines/)" ]; then
            echo "no changes under data/autoresearch_baselines/; skipping commit"
            exit 0
          fi
          WEEK=$(date -u +'%G-W%V')
          git add data/autoresearch_baselines/
          OUTSIDE=$(git diff --cached --name-only | grep -v '^data/autoresearch_baselines/' || true)
          if [ -n "$OUTSIDE" ]; then
            echo "::error::staged paths outside data/autoresearch_baselines/ — refusing to push:"
            echo "$OUTSIDE"
            exit 1
          fi
          git commit -m "chore(autoresearch): weekly sweep ledger ${WEEK}"
          REMOTE="https://x-access-token:${INFRA_STATE_COMMIT_TOKEN}@github.com/${{ github.repository }}.git"
          for attempt in 1 2 3; do
            if git push "$REMOTE" HEAD:main 2>&1; then
              echo "push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "push rejected — fetch + rebase (attempt ${attempt})"
            git fetch "$REMOTE" main
            git stash push -u -m "autoresearch-rebase-${attempt}" --quiet || true
            if ! git rebase FETCH_HEAD; then
              echo "::error::rebase conflict under data/autoresearch_baselines/"
              git rebase --abort
              git stash drop --quiet || true
              exit 1
            fi
            git stash drop --quiet || true
          done
          echo "::error::push still failing after 3 rebase attempts"
          exit 1

      # --- [GPU] Restore vLLM regardless of sweep outcome ------------
      - name: '[GPU] Start vllm-autoresearch (restore vLLM, free Ollama GPU back)'
        id: start_vllm
        # ``if: always()`` so even a failed sweep restores vLLM — other
        # autoresearch consumers shouldn't pay for our sweep's failure.
        if: always()
        timeout-minutes: 5
        run: |
          echo "  current container state:"
          docker container inspect vllm-autoresearch --format '{{.State.Status}}'
          docker start vllm-autoresearch
          echo "  after start:"
          docker container inspect vllm-autoresearch --format '{{.State.Status}}'
          # vLLM takes ~30-60s to load model + serve; wait but don't fail
          # the workflow if it's not ready by the timeout (the post-sweep
          # restore is best-effort).
          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 http://localhost:8003/health >/dev/null 2>&1; then
              echo "  vLLM healthy after ${i}×2s"
              break
            fi
            sleep 2
          done
          nvidia-smi --query-gpu=memory.used,memory.free --format=csv,noheader

      - name: '[Persist] Upload sweep ledger artifact'
        id: upload_artifact
        if: always()
        timeout-minutes: 3
        uses: actions/upload-artifact@v4
        with:
          name: autoresearch-sweep-${{ github.run_id }}
          path: data/autoresearch_baselines/
          if-no-files-found: warn
          retention-days: 90

  drift-and-issue:
    # Cheap follow-on job: reads the just-committed ledger from main,
    # runs the drift check, opens/updates/closes the weekly drift issue.
    # Lives on ubuntu-latest because the DGX self-hosted runner doesn't
    # have ``gh`` CLI; ubuntu-latest ships with it preinstalled and the
    # GH-only operations are cheap. Depends on dgx-sweep having pushed
    # the ledger to main.
    name: Drift check + GH issue
    runs-on: ubuntu-latest
    needs: dgx-sweep
    timeout-minutes: 10
    steps:
      - name: '[Setup] Checkout main'
        id: checkout
        timeout-minutes: 2
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: '[Setup] Set up Python 3.11'
        id: setup_python
        timeout-minutes: 2
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.8"

      - name: '[Setup] Install drift-script deps only (no [llm], no [ml])'
        id: install
        timeout-minutes: 2
        # check_autoresearch_drift.py only needs pyyaml — keep this job
        # fast (don't pull the LLM SDK extras that dgx-sweep needs).
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: '[Drift] Check drift vs previous week'
        id: drift
        timeout-minutes: 2
        run: |
          python3 scripts/baselines/check_autoresearch_drift.py \
            --ledger-dir data/autoresearch_baselines \
            --thresholds data/autoresearch_baselines/drift_thresholds.yaml \
            --output /tmp/autoresearch-drift-report.json
          BREACH_COUNT=$(jq '.breaches | length' /tmp/autoresearch-drift-report.json)
          STATUS=$(jq -r '.status' /tmp/autoresearch-drift-report.json)
          echo "status=${STATUS}"            >> "$GITHUB_OUTPUT"
          echo "breach_count=${BREACH_COUNT}" >> "$GITHUB_OUTPUT"
          {
            echo "## Autoresearch drift check"
            echo
            echo "- status: \`${STATUS}\`"
            echo "- breaches: ${BREACH_COUNT}"
            echo
            echo "<details><summary>Full drift report</summary>"
            echo
            echo '```json'
            cat /tmp/autoresearch-drift-report.json
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: '[Drift] Open / update / close drift issue'
        id: manage_issue
        timeout-minutes: 3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:    ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DRIFT_STATUS:       ${{ steps.drift.outputs.status }}
          DRIFT_BREACH_COUNT: ${{ steps.drift.outputs.breach_count }}
        run: |
          set -euo pipefail
          OPEN_NUM=$(gh issue list --repo "$REPO" --state open \
            --search 'in:title "autoresearch drift detected:"' --json number --limit 1 \
            | jq -r '.[0].number // empty')
          case "$DRIFT_STATUS" in
            no_breaches)
              if [ -n "$OPEN_NUM" ]; then
                gh issue close "$OPEN_NUM" --repo "$REPO" \
                  --comment "Autoresearch drift resolved on $(date -u +%Y-%m-%dT%H:%MZ). Run: ${RUN_URL}"
              else
                echo "no drift, no open issue — nothing to do"
              fi
              ;;
            first_week|no_ledger)
              echo "skipping issue management: status=${DRIFT_STATUS}"
              ;;
            breaches)
              BODY_FILE=$(mktemp)
              python3 - <<'PY' > "$BODY_FILE"
          import json, os
          r = json.load(open("/tmp/autoresearch-drift-report.json"))
          print("**Autoresearch drift detected** by scheduled weekly sweep.")
          print()
          print(f"- This week: `{r.get('this_week_id')}` (`{r.get('this_path')}`)")
          print(f"- Prev week: `{r.get('prev_week_id')}` (`{r.get('prev_path')}`)")
          print(f"- Workflow run: {os.environ['RUN_URL']}")
          print()
          print("## Breaches by candidate")
          print()
          by_model = {}
          for b in r["breaches"]:
              by_model.setdefault(b.get("model","?"), []).append(b)
          for model, breaches in by_model.items():
              print(f"### `{model}`")
              print()
              for b in breaches:
                  sev = b.get("severity","low")
                  print(f"- **{b['category']}** ({sev}) — {b['message']}")
                  for k in ("drop_ratio","growth_ratio"):
                      if k in b: print(f"  - `{k}` = `{b[k]}`")
                  print()
          notes = r.get("informational") or []
          if notes:
              print("## Informational")
              print()
              for n in notes: print(f"- {n}")
              print()
          print("---")
          print("_Auto-managed by `autoresearch-eval-nightly.yml`. Tune thresholds at `data/autoresearch_baselines/drift_thresholds.yaml`. Edit cohort at `data/autoresearch_baselines/cohort.yaml`._")
          PY
              if [ -n "$OPEN_NUM" ]; then
                gh issue edit "$OPEN_NUM" --repo "$REPO" \
                  --title "autoresearch drift detected: $(date -u +%Y-%m-%d)" \
                  --body-file "$BODY_FILE"
                gh issue comment "$OPEN_NUM" --repo "$REPO" \
                  --body "Drift re-detected (${DRIFT_BREACH_COUNT} breaches). Run: ${RUN_URL}"
              else
                gh issue create --repo "$REPO" \
                  --title "autoresearch drift detected: $(date -u +%Y-%m-%d)" \
                  --body-file "$BODY_FILE" \
                  --label "autoresearch,observability" 2>&1 || \
                gh issue create --repo "$REPO" \
                  --title "autoresearch drift detected: $(date -u +%Y-%m-%d)" \
                  --body-file "$BODY_FILE"
              fi
              rm -f "$BODY_FILE"
              ;;
          esac
