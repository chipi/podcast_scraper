name: DR drill — stack Playwright (stack-test)

# GitHub #752 — runs **existing** ``tests/stack-test/stack-viewer.spec.ts`` against
# the live drill viewer over Tailscale (same contract as local ``make stack-test-playwright``,
# with ``STACK_TEST_BASE_URL`` pointing at MagicDNS HTTPS). Validates SPA + nginx
# proxy + API + restored corpus (``/app/output``) after deploy + restore + smoke.
#
# Prerequisites: ``TS_AUTHKEY``, ``DRILL_DEPLOY_SSH_PRIVATE_KEY`` (drill env gate),
# ``vars.DRILL_TAILNET_FQDN``, ACL **tag:gha-deployer** → **tag:dr-drill** for **HTTPS :443**
# (MagicDNS / ``tailscale serve``) in addition to SSH **:22** used by other drill jobs.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DRILL_STACK_PLAYWRIGHT" to confirm stack-test against drill'
        required: true
        default: ''
      skip_confirm:
        description: "Leave false for manual runs. Orchestrator sets true."
        type: boolean
        required: false
        default: false
  workflow_call:
    secrets:
      TS_AUTHKEY:
        required: true
      DRILL_DEPLOY_SSH_PRIVATE_KEY:
        required: true
    inputs:
      skip_confirm:
        description: "True when drill-exercise already gated on DRILL_FULL_CYCLE"
        type: boolean
        required: true

permissions:
  contents: read

concurrency:
  group: drill-stack-playwright
  cancel-in-progress: false

jobs:
  stack-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: drill
    steps:
      - name: "DR drill — confirm input (manual dispatch only)"
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_confirm != true }}
        run: |
          if [ "${{ inputs.confirm }}" != "DRILL_STACK_PLAYWRIGHT" ]; then
            echo "::error::Must type DRILL_STACK_PLAYWRIGHT to confirm. Got: '${{ inputs.confirm }}'"
            exit 1
          fi

      - name: "DR drill — pre-flight: secrets and variables"
        env:
          TS_AUTHKEY:                  ${{ secrets.TS_AUTHKEY }}
          DRILL_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DRILL_DEPLOY_SSH_PRIVATE_KEY }}
          DRILL_TAILNET_FQDN:          ${{ vars.DRILL_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${TS_AUTHKEY:-}" ]                    && MISSING="$MISSING TS_AUTHKEY"
          [ -z "${DRILL_DEPLOY_SSH_PRIVATE_KEY:-}" ] && MISSING="$MISSING DRILL_DEPLOY_SSH_PRIVATE_KEY"
          [ -z "${DRILL_TAILNET_FQDN:-}" ]          && MISSING="$MISSING DRILL_TAILNET_FQDN"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing prereqs:$MISSING Stage per drill-stack-playwright header."
            exit 1
          fi

      - name: "DR drill — checkout: shallow (Playwright + resolver scripts)"
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: "DR drill — SSH: install identity (deploy@, DRILL_DEPLOY_SSH_PRIVATE_KEY)"
        uses: ./.github/actions/prod-ssh-key
        with:
          ssh_private_key:   ${{ secrets.DRILL_DEPLOY_SSH_PRIVATE_KEY }}
          identity_env_name: SSH_DRILL_IDENTITY

      - name: "DR drill — join: tailnet (tag:gha-deployer)"
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags:    tag:gha-deployer
          version: 1.96.4

      - name: "DR drill — resolve: viewer base URL (HTTPS MagicDNS)"
        id: base
        env:
          DRILL_TAILNET_FQDN: ${{ vars.DRILL_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          R=$(bash scripts/ops/resolve_drill_tailnet_host.sh)
          # Nginx viewer + API via tailscale serve (HTTPS :443); matches operator browser.
          echo "stack_test_base_url=https://${R}" >> "$GITHUB_OUTPUT"
          echo "::notice::STACK_TEST_BASE_URL will be https://${R}"

      # deploy.sh refreshes serve after health, but ``sudo -n`` or a missed path
      # can leave :443 closed while :8080 works (drill-e2e). Belt-and-suspenders
      # before Playwright hits MagicDNS HTTPS from the runner (see GH run logs).
      - name: "DR drill — tailscale: install canonical serve script + probe HTTPS :443"
        env:
          DRILL_TAILNET_FQDN: ${{ vars.DRILL_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          R=$(bash scripts/ops/resolve_drill_tailnet_host.sh)
          SSH_TARGET="deploy@${R}"
          scp -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            infra/cloud-init/podcast-tailscale-serve.sh "${SSH_TARGET}:/tmp/podcast-tailscale-serve.ci"
          if ! ssh -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            'sudo -n /usr/bin/install -m 0755 -o root -g root /tmp/podcast-tailscale-serve.ci /usr/local/sbin/podcast-tailscale-serve.sh'; then
            echo "::warning::sudo install of podcast-tailscale-serve.sh failed (expected until the drill host has the updated sudoers install rule from cloud-init)."
          fi
          ssh -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            'sudo -n /usr/local/sbin/podcast-tailscale-serve.sh' \
            || echo "::warning::podcast-tailscale-serve.sh exited non-zero on drill host; probing HTTPS :443 anyway (same belt-and-suspenders as drill-deploy.yml)."
          for i in $(seq 1 15); do
            if curl -fsS -k "https://${R}/api/health" | jq -e '.status == "ok"' >/dev/null 2>&1; then
              echo "::notice::HTTPS :443 /api/health OK from runner (attempt ${i})"
              exit 0
            fi
            sleep 4
          done
          echo "::error::https://${R}/api/health did not return ok from runner (tailscale serve / ACL :443). drill-e2e can still pass via SSH :8080 - fix serve on host."
          exit 1

      - name: "DR drill — stack Playwright: stack-viewer.spec.ts (firefox)"
        working-directory: tests/stack-test
        env:
          STACK_TEST_BASE_URL: ${{ steps.base.outputs.stack_test_base_url }}
          STACK_TEST_INSECURE_TLS: "1"
        run: |
          set -euo pipefail
          npm install
          ./node_modules/.bin/playwright install firefox
          ./node_modules/.bin/playwright test stack-viewer.spec.ts
