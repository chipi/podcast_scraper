name: Drill infra destroy (manual)

# GitHub #752 — manual ``tofu destroy`` for OpenTofu workspace ``drill`` only.
# Same secrets and state encryption contract as ``drill-infra-apply.yml``.
# Destroys Hetzner resources managed by the drill workspace (typically the
# drill VPS). Does **not** SSH to the host to run ``docker compose down`` first;
# operators may do that manually if they want a graceful stop before destroy.
#
# Manual: type **DRILL_DESTROY** in ``confirm``.
# Called from ``dr-drill-exercise.yml`` after the finalize job with
# ``skip_confirm: true`` (full-cycle orchestrator always tears down).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DRILL_DESTROY" to confirm destroy in workspace drill'
        required: true
        default: ''
  workflow_call:
    secrets:
      HCLOUD_TOKEN_DRILL:
        required: true
      TS_API_KEY:
        required: true
      TFSTATE_AGE_KEY:
        required: true
      OPERATOR_SSH_PUBLIC_KEY:
        required: true
    inputs:
      skip_confirm:
        description: "True when dr-drill-exercise already gated on DRILL_FULL_CYCLE / DRILL_EXERCISE"
        type: boolean
        required: true

permissions:
  contents: read

concurrency:
  group: drill-infra-destroy
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: drill
    steps:
      - name: Confirm input (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.confirm }}" != "DRILL_DESTROY" ]; then
            echo "::error::Must type DRILL_DESTROY to confirm. Got: '${{ inputs.confirm }}'"
            exit 1
          fi

      - name: Reject workflow_call without orchestrator gate
        if: github.event_name == 'workflow_call' && inputs.skip_confirm != true
        run: |
          echo "::error::workflow_call requires skip_confirm=true (orchestrated teardown from dr-drill-exercise only)."
          exit 1

      - uses: actions/checkout@v5

      - name: Pre-flight — required secrets present?
        env:
          HCLOUD_TOKEN_DRILL:       ${{ secrets.HCLOUD_TOKEN_DRILL }}
          TS_API_KEY:               ${{ secrets.TS_API_KEY }}
          TFSTATE_AGE_KEY:          ${{ secrets.TFSTATE_AGE_KEY }}
          OPERATOR_SSH_PUBLIC_KEY:  ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${HCLOUD_TOKEN_DRILL:-}" ]      && MISSING="$MISSING HCLOUD_TOKEN_DRILL"
          [ -z "${TS_API_KEY:-}" ]            && MISSING="$MISSING TS_API_KEY"
          [ -z "${TFSTATE_AGE_KEY:-}" ]       && MISSING="$MISSING TFSTATE_AGE_KEY"
          [ -z "${OPERATOR_SSH_PUBLIC_KEY:-}" ] && MISSING="$MISSING OPERATOR_SSH_PUBLIC_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing prereqs:$MISSING. Stage them per infra/README.md (#752)."
            exit 1
          fi

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.0

      - name: Install sops + age
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 age/age age/age-keygen

      - name: Decrypt drill state (if any prior apply has happened)
        working-directory: infra
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          if [ -f terraform/terraform.tfstate.enc.drill ]; then
            mkdir -p terraform/terraform.tfstate.d/drill
            sops -d terraform/terraform.tfstate.enc.drill \
              > terraform/terraform.tfstate.d/drill/terraform.tfstate
          fi

      - name: tofu init + workspace drill + destroy
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token:      ${{ secrets.HCLOUD_TOKEN_DRILL }}
          TF_VAR_tailscale_api_key: ${{ secrets.TS_API_KEY }}
          TF_VAR_ssh_public_key:    ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_tailnet: ${{ vars.TAILNET_NAME }}
        run: |
          tofu init -input=false
          tofu workspace select -or-create drill
          tofu destroy -auto-approve -input=false -var-file=terraform.drill.ci.tfvars

      - name: Re-encrypt drill state (always — even if destroy failed)
        if: always()
        working-directory: infra
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          if [ -f terraform/terraform.tfstate.d/drill/terraform.tfstate ]; then
            sops -e terraform/terraform.tfstate.d/drill/terraform.tfstate \
              > terraform/terraform.tfstate.enc.drill.new
            mv terraform/terraform.tfstate.enc.drill.new \
              terraform/terraform.tfstate.enc.drill
          fi

      - name: Upload encrypted drill state as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-after-destroy-drill
          path: infra/terraform/terraform.tfstate.enc.drill
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup plaintext drill state
        if: always()
        run: |
          rm -rf infra/terraform/terraform.tfstate.d/drill
          shred -u infra/terraform/terraform.tfstate 2>/dev/null \
            || rm -f infra/terraform/terraform.tfstate
