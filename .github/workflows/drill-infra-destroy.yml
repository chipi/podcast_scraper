name: DR drill — infra destroy (OpenTofu)

# GitHub #752 — manual ``tofu destroy`` for OpenTofu workspace ``drill`` only.
# Same secrets and state encryption contract as ``drill-infra-apply.yml``.
#
# **State (no git commit required for orchestrator):** when this workflow runs
# after ``drill-exercise``'s ``drill-tfstate-bridge`` job, it downloads artifact
# ``drill-tfstate-for-teardown`` (a copy of apply output on the **caller** run).
# It also tries ``terraform-state-after-apply-drill`` (direct from apply) for
# compatibility. Optional downloads use ``gh api`` first so missing artifacts
# do not surface as download-action errors. Without those artifacts (standalone
# destroy), it uses the encrypted file from the git checkout; commit
# ``terraform.tfstate.enc.drill`` when you apply outside the orchestrator and
# need destroy to match.
#
# After ``tofu destroy`` (or if destroy fails), always runs a **Hetzner hcloud
# orphan sweep** in the drill-token project, then **Tailscale API** removal of devices tagged
# ``tag:dr-drill`` or whose hostname matches ``tailnet_hostname`` in
# ``terraform.drill.ci.tfvars`` (stops orphaned MagicDNS entries after repeated
# drills).
#
# Does **not** SSH to the host to run ``docker compose down`` first; operators
# may do that manually for a graceful stop before destroy.
#
# Manual: type **DRILL_DESTROY** in ``confirm``.
# Called from ``drill-exercise.yml`` after the finalize job with
# ``skip_confirm: true`` (full-cycle orchestrator always tears down).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DRILL_DESTROY" to confirm destroy in workspace drill'
        required: true
        default: ''
      skip_confirm:
        description: "Leave false for manual runs. Orchestrator sets true via workflow_call."
        type: boolean
        required: false
        default: false
  workflow_call:
    secrets:
      HCLOUD_TOKEN_DRILL:
        required: true
      TS_API_KEY:
        required: true
      TFSTATE_AGE_KEY:
        required: true
      OPERATOR_SSH_PUBLIC_KEY:
        required: true
    inputs:
      skip_confirm:
        description: "True when drill-exercise already gated on DRILL_FULL_CYCLE / DRILL_EXERCISE"
        type: boolean
        required: true

permissions:
  contents: read
  actions: write

concurrency:
  group: drill-infra-destroy
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: drill
    steps:
      # Reusable workflows inherit the *caller's* github.event_name (often
      # workflow_dispatch). Gate manual confirmation on skip_confirm, not on
      # github.event_name, so drill-exercise does not leak DRILL_FULL_CYCLE
      # into inputs.confirm here.
      - name: "DR drill — confirm input (manual dispatch only)"
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_confirm != true }}
        run: |
          if [ "${{ inputs.confirm }}" != "DRILL_DESTROY" ]; then
            echo "::error::Must type DRILL_DESTROY to confirm. Got: '${{ inputs.confirm }}'"
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: "DR drill — tfstate bridge: download teardown artifact"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          name="drill-tfstate-for-teardown"
          dest=".downloaded-teardown-drill-state"
          repo="${{ github.repository }}"
          rid="${{ github.run_id }}"
          n="$(gh api "repos/${repo}/actions/runs/${rid}/artifacts" \
            --jq "[.artifacts[] | select(.name==\"${name}\")] | length")"
          if [ "${n:-0}" -eq 0 ]; then
            echo "::notice::No ${name} artifact (bridge did not publish or apply failed)."
            exit 0
          fi
          mkdir -p "${dest}"
          gh run download "${rid}" -R "${repo}" -n "${name}" -D "${dest}"

      - name: "DR drill — tfstate: download apply artifact (same-run fallback)"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          name="terraform-state-after-apply-drill"
          dest=".downloaded-apply-drill-state"
          repo="${{ github.repository }}"
          rid="${{ github.run_id }}"
          n="$(gh api "repos/${repo}/actions/runs/${rid}/artifacts" \
            --jq "[.artifacts[] | select(.name==\"${name}\")] | length")"
          if [ "${n:-0}" -eq 0 ]; then
            echo "::notice::No ${name} artifact (apply did not upload successfully)."
            exit 0
          fi
          mkdir -p "${dest}"
          gh run download "${rid}" -R "${repo}" -n "${name}" -D "${dest}"

      - name: "DR drill — tfstate: prefer bridge or apply artifact over git"
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          DEST="infra/terraform/terraform.tfstate.enc.drill"
          FOUND=""
          for base in .downloaded-teardown-drill-state .downloaded-apply-drill-state; do
            [ -d "$base" ] || continue
            for cand in \
              "$base/terraform.tfstate.enc.drill" \
              "$base/infra/terraform/terraform.tfstate.enc.drill"; do
              if [ -f "$cand" ]; then
                FOUND="$cand"
                break
              fi
            done
            if [ -n "$FOUND" ]; then
              break
            fi
            MORE=$(find "$base" -type f \
              \( -name 'terraform.tfstate.enc.drill' -o -name '*.enc.drill' \) \
              2>/dev/null | head -1 || true)
            if [ -n "$MORE" ] && [ -f "$MORE" ]; then
              FOUND="$MORE"
              break
            fi
          done
          if [ -n "$FOUND" ] && [ -f "$FOUND" ]; then
            mkdir -p "$(dirname "$DEST")"
            cp "$FOUND" "$DEST"
            echo "Using encrypted drill state from workflow artifact(s) (orchestrator or retry path)."
          else
            echo "No bridged/apply artifact in this run — using terraform.tfstate.enc.drill from git (standalone destroy)."
          fi

      - name: "DR drill — pre-flight: secrets and tokens (OpenTofu provider)"
        env:
          HCLOUD_TOKEN_DRILL:       ${{ secrets.HCLOUD_TOKEN_DRILL }}
          TS_API_KEY:               ${{ secrets.TS_API_KEY }}
          TFSTATE_AGE_KEY:          ${{ secrets.TFSTATE_AGE_KEY }}
          OPERATOR_SSH_PUBLIC_KEY:  ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${HCLOUD_TOKEN_DRILL:-}" ]      && MISSING="$MISSING HCLOUD_TOKEN_DRILL"
          [ -z "${TS_API_KEY:-}" ]            && MISSING="$MISSING TS_API_KEY"
          [ -z "${TFSTATE_AGE_KEY:-}" ]       && MISSING="$MISSING TFSTATE_AGE_KEY"
          [ -z "${OPERATOR_SSH_PUBLIC_KEY:-}" ] && MISSING="$MISSING OPERATOR_SSH_PUBLIC_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing prereqs:$MISSING. Stage them per infra/README.md (#752)."
            exit 1
          fi

      - name: "DR drill — install: OpenTofu CLI"
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.6.0

      - name: "DR drill — install: sops + age"
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 age/age age/age-keygen

      - name: "DR drill — tofu: decrypt state (if prior apply exists)"
        working-directory: infra
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          if [ -f terraform/terraform.tfstate.enc.drill ]; then
            mkdir -p terraform/terraform.tfstate.d/drill
            sops -d terraform/terraform.tfstate.enc.drill \
              > terraform/terraform.tfstate.d/drill/terraform.tfstate
          fi

      - name: "DR drill — tofu: init + workspace drill + destroy"
        id: tofu_destroy
        continue-on-error: true
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token:      ${{ secrets.HCLOUD_TOKEN_DRILL }}
          TF_VAR_tailscale_api_key: ${{ secrets.TS_API_KEY }}
          TF_VAR_ssh_public_key:    ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_tailnet: ${{ vars.TAILNET_NAME }}
        run: |
          set -euo pipefail
          export TF_INPUT=0
          # Fresh ``.terraform`` avoids stale provider/backend metadata that can
          # trigger interactive state-migration prompts (``input is disabled``).
          rm -rf .terraform
          # Pipe answers for rare init prompts; disable pipefail around ``yes |``
          # so SIGPIPE on ``yes`` after tofu exits does not fail the step.
          set +o pipefail
          yes | tofu init -input=false -upgrade
          set -o pipefail
          tofu workspace select -or-create drill
          tofu destroy -auto-approve -input=false -var-file=terraform.drill.ci.tfvars

      - name: "DR drill — hcloud: install CLI (drill orphan sweep)"
        if: always()
        run: |
          set -euo pipefail
          HCLOUD_VER="1.46.0"
          cd /tmp
          curl -fsSLO "https://github.com/hetznercloud/cli/releases/download/v$HCLOUD_VER/hcloud-linux-amd64.tar.gz"
          tar -xzf hcloud-linux-amd64.tar.gz
          sudo install -m755 hcloud /usr/local/bin/hcloud
          hcloud version

      - name: "DR drill — hcloud: orphan sweep (API, empty state safe)"
        id: hetzner_sweep
        if: always()
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN_DRILL }}
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          DRILL_HOST=$(grep -E '^[[:space:]]*tailnet_hostname[[:space:]]*=' \
            infra/terraform/terraform.drill.ci.tfvars \
            | sed -E 's/^[[:space:]]*tailnet_hostname[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "Drill tailnet hostname / Hetzner server name match: $DRILL_HOST"

          echo "Matching servers (label drill+project OR name)..."
          IDS=$(hcloud server list -o json | jq -r --arg h "$DRILL_HOST" '
            [.[] | select(
              ((.labels.environment? // "") == "drill"
                and (.labels.project? // "") == "podcast-scraper")
              or (.name == $h)
            ) | .id] | unique | .[]')
          if [ -z "$(echo "$IDS" | tr -d '[:space:]')" ]; then
            echo "No matching servers in this Hetzner project."
          else
            for id in $IDS; do
              echo "Deleting server id=$id"
              hcloud server delete "$id"
            done
            sleep 5
          fi

          echo "Matching corpus volumes..."
          hcloud volume list -o json | jq -r '.[] | select(.name == "podcast-scraper-corpus") | .id' \
            | while read -r vid; do
              [ -z "$vid" ] && continue
              echo "Deleting volume id=$vid"
              hcloud volume delete "$vid" || true
            done

          if hcloud firewall describe podcast-scraper-prod >/dev/null 2>&1; then
            echo "Deleting firewall podcast-scraper-prod"
            hcloud firewall delete podcast-scraper-prod || true
          fi

          if hcloud network describe podcast-scraper-prod >/dev/null 2>&1; then
            echo "Removing subnets from podcast-scraper-prod (if any)"
            hcloud network describe podcast-scraper-prod -o json \
              | jq -r '.subnets[]? | "\(.ip_range)\t\(.network_zone)"' \
              | while IFS="$(printf '\t')" read -r ipr zone; do
                  [ -z "$ipr" ] && continue
                  echo "remove-subnet $ipr zone=$zone"
                  hcloud network remove-subnet podcast-scraper-prod \
                    --ip-range "$ipr" --network-zone "$zone" || true
                done
            echo "Deleting network podcast-scraper-prod"
            hcloud network delete podcast-scraper-prod || true
          fi

          if hcloud ssh-key describe operator-laptop >/dev/null 2>&1; then
            echo "Deleting ssh-key operator-laptop"
            hcloud ssh-key delete operator-laptop || true
          fi

          LEFT=$(hcloud server list -o json | jq --arg h "$DRILL_HOST" '
            [.[] | select(
              ((.labels.environment? // "") == "drill")
              or (.name == $h)
            )] | length')
          echo "remaining=${LEFT}" >> "$GITHUB_OUTPUT"
          if [ "$LEFT" != "0" ]; then
            echo "::error::After OpenTofu destroy + hcloud sweep, $LEFT drill server(s) still exist in this project."
            hcloud server list -o columns
            exit 1
          fi
          echo "Hetzner drill orphan sweep complete (no matching servers remain)."

      - name: "DR drill — tailscale: remove drill devices (tag or hostname)"
        if: always()
        env:
          TS_API_KEY: ${{ secrets.TS_API_KEY }}
          TAILNET: ${{ vars.TAILNET_NAME }}
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          DRILL_HOST=$(grep -E '^[[:space:]]*tailnet_hostname[[:space:]]*=' \
            infra/terraform/terraform.drill.ci.tfvars \
            | sed -E 's/^[[:space:]]*tailnet_hostname[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "Tailscale cleanup for tailnet=$TAILNET hostname=$DRILL_HOST (tag:dr-drill or hostname match)"

          RESP=$(curl -fsS -H "Authorization: Bearer $TS_API_KEY" \
            "https://api.tailscale.com/api/v2/tailnet/$TAILNET/devices?fields=all")

          IDS=$(echo "$RESP" | jq -r --arg h "$DRILL_HOST" '
            (if .devices then .devices elif type == "array" then . else [] end)
            | .[]
            | select(
                ((.tags // []) | index("tag:dr-drill")) != null
                or (.hostname == $h)
              )
            | .id')

          if [ -z "$(echo "$IDS" | tr -d '[:space:]')" ]; then
            echo "No Tailscale devices matched tag:dr-drill or hostname=$DRILL_HOST."
            exit 0
          fi

          for id in $IDS; do
            echo "DELETE device id=$id"
            curl -fsS -X DELETE -H "Authorization: Bearer $TS_API_KEY" \
              "https://api.tailscale.com/api/v2/device/$id" \
              || echo "::warning::Tailscale DELETE failed for $id (may already be gone)."
          done
          echo "Tailscale drill device cleanup finished."

      # ``tofu destroy`` can still exit non-zero when state drifts (e.g. server
      # already removed manually) while the Hetzner sweep shows **no** drill VMs.
      # Treat that as OK; fail only when the sweep reports servers still left.
      - name: "DR drill — tofu: reconcile destroy outcome with Hetzner sweep"
        if: ${{ always() && !cancelled() && steps.hetzner_sweep.outcome == 'success' }}
        env:
          TOFU_OUTCOME: ${{ steps.tofu_destroy.outcome }}
          REMAINING: ${{ steps.hetzner_sweep.outputs.remaining }}
        run: |
          set -euo pipefail
          rem="${REMAINING:-}"
          if [ -z "$rem" ]; then
            echo "::warning::Hetzner sweep did not emit remaining count; cannot reconcile destroy."
            exit 0
          fi
          if [ "$rem" != "0" ]; then
            echo "::error::Hetzner still lists $rem drill server(s) after sweep (should have been caught in sweep step)."
            exit 1
          fi
          if [ "$TOFU_OUTCOME" = "failure" ]; then
            echo "::notice::OpenTofu destroy failed, but Hetzner has no matching drill servers — infra already gone; teardown OK."
          fi

      - name: "DR drill — tofu: re-encrypt state (always, even if destroy failed)"
        if: always()
        working-directory: infra
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          if [ -f terraform/terraform.tfstate.d/drill/terraform.tfstate ]; then
            sops -e terraform/terraform.tfstate.d/drill/terraform.tfstate \
              > terraform/terraform.tfstate.enc.drill.new
            mv terraform/terraform.tfstate.enc.drill.new \
              terraform/terraform.tfstate.enc.drill
          fi

      - name: "DR drill — tofu: upload encrypted state artifact"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-state-after-destroy-drill
          path: infra/terraform/terraform.tfstate.enc.drill
          if-no-files-found: ignore
          retention-days: 30

      - name: "DR drill — tofu: cleanup plaintext drill state"
        if: always()
        run: |
          rm -rf infra/terraform/terraform.tfstate.d/drill
          shred -u infra/terraform/terraform.tfstate 2>/dev/null \
            || rm -f infra/terraform/terraform.tfstate
