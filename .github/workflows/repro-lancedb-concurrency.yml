# Manual, x86_64-only reproduction of the api SIGSEGV under concurrent LanceDB sync queries (#1205).
#
# The bug is in the x86_64 native (AVX/SIMD) code path of the lance/pyarrow wheels. It does NOT
# reproduce on arm64 (macOS or Linux) nor under x86_64 emulation on an arm64 host (Rosetta/qemu
# SIGILLs on the AVX instructions). GitHub's ubuntu runners are x86_64, so this job is the cheap,
# deterministic repro — no compose stack, no Playwright, no pipeline; just the concurrency that
# crashes. Use it to confirm the bug and to validate the eventual async-API fix that removes the lock.
name: repro-lancedb-concurrency

on:
  workflow_dispatch:
    inputs:
      threads:
        description: "Concurrent query threads"
        default: "32"
      rounds:
        description: "Stress rounds (higher = more reliably hits the race)"
        default: "300"
      queries:
        description: "Queries per round"
        default: "64"

permissions:
  contents: read

jobs:
  repro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the crashing wheels (match the api image)
        run: pip install "lancedb==0.34.0" "pyarrow==25.0.0"
      - name: Unfixed fan-out — expected to SIGSEGV (the #1205 repro)
        run: |
          set +e
          USE_LOCK=0 THREADS='${{ inputs.threads }}' ROUNDS='${{ inputs.rounds }}' QUERIES='${{ inputs.queries }}' \
            python scripts/repro/lancedb_concurrency_repro.py
          code=$?
          echo "unfixed exit code: $code"
          if [ "$code" -ge 128 ]; then
            echo "::notice::REPRODUCED — process killed by signal $((code - 128)) (139 = SIGSEGV). This is #1205."
          elif [ "$code" -ne 0 ]; then
            echo "::warning::Non-zero exit ($code) but not a signal — inspect the log above."
          else
            echo "::warning::No crash this run — the race is intermittent. Re-dispatch with higher rounds/threads."
          fi
      - name: Serialized (lock) — must NOT crash
        run: |
          USE_LOCK=1 THREADS='${{ inputs.threads }}' ROUNDS='${{ inputs.rounds }}' QUERIES='${{ inputs.queries }}' \
            python scripts/repro/lancedb_concurrency_repro.py
