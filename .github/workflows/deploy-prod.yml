name: Deploy to prod VPS

# RFC-082 Decision 3: deploy to the always-on Hetzner VPS over Tailscale.
#
# Manual-trigger only at first land. After the operator's first `tofu apply`
# (#714 + #716) and a few green manual runs, a follow-up PR adds the
# `workflow_run: ["Stack test"]` trigger to complete the GitOps deploy loop
# (RFC-082 Decision 6).
#
# Closes #718 (workflow scaffold), #720 (post-deploy /api/health smoke),
# #721 (PODCAST_RELEASE=sha-<short> wiring for Sentry release grouping),
# #744 (resolve prod MagicDNS host after Tailscale join; suffix drift),
# #796 (typed confirm, SHA validation, deploy.sh/git/image alignment).
#
# Operator prerequisites (#714):
#   - secrets: TS_AUTHKEY (see PROD_RUNBOOK.md "Tailscale credentials");
#              PROD_SSH_PRIVATE_KEY (Ed25519 PEM for deploy@ — see PROD_RUNBOOK
#              "GitHub Actions SSH to prod")
#   - vars:    PROD_TAILNET_FQDN (e.g. "prod-podcast.example.ts.net")
#
# Operator: type **PROD_DEPLOY** in ``confirm`` exactly.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "PROD_DEPLOY" to confirm deploying to production'
        required: true
        default: ''
      override_image_sha:
        description: "Image :sha-<7> tag to deploy (blank = current workflow SHA short)"
        required: false
        default: ""

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  # Serialize prod deploys. A second deploy waits for the first; we don't
  # cancel-in-progress because cancelling mid-`compose up` leaves the stack
  # in an unknown state.
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: prod
    steps:
      - name: Confirm PROD_DEPLOY
        run: |
          if [ "${{ inputs.confirm }}" != "PROD_DEPLOY" ]; then
            echo "::error::Must type PROD_DEPLOY to confirm. Got: '${{ inputs.confirm }}'"
            exit 1
          fi

      - name: Pre-flight — required secrets/variables present?
        id: preflight
        env:
          TS_AUTHKEY:              ${{ secrets.TS_AUTHKEY }}
          PROD_SSH_PRIVATE_KEY:     ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_TAILNET_FQDN: ${{ vars.PROD_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${TS_AUTHKEY:-}" ]            && MISSING="$MISSING TS_AUTHKEY"
          [ -z "${PROD_SSH_PRIVATE_KEY:-}" ] && MISSING="$MISSING PROD_SSH_PRIVATE_KEY"
          [ -z "${PROD_TAILNET_FQDN:-}" ]    && MISSING="$MISSING PROD_TAILNET_FQDN"
          if [ -n "$MISSING" ]; then
            # Fail loud, not fake-green: a soft skip=true here exited 0 and marked
            # the GH Environment deployment "successful" while deploying NOTHING —
            # an operator who rotated a secret would think the deploy worked
            # (review 2026-07-17 M25). The environment:prod gate + typed confirm
            # already make this a deliberate run, so failing fast is safe.
            echo "::error::Missing required prereqs:$MISSING — stage them per #714 then re-run."
            exit 1
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Checkout (resolver script; GH-744)
        if: steps.preflight.outputs.skip != 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Resolve target image SHA
        id: sha
        if: steps.preflight.outputs.skip != 'true'
        env:
          # `inputs.*` (not `github.event.inputs.*`) so this stays correct if a
          # `workflow_call` trigger is ever added (RFC-082 Decision 6); equivalent
          # under the current workflow_dispatch trigger.
          OVERRIDE: ${{ inputs.override_image_sha }}
        run: |
          set -euo pipefail
          SHA_SHORT="${OVERRIDE:-}"
          if [ -z "$SHA_SHORT" ]; then
            SHA_SHORT=$(echo "${{ github.event.workflow_run.head_sha || github.sha }}" | cut -c1-7)
          fi
          if ! [[ "$SHA_SHORT" =~ ^[a-f0-9]{7,40}$ ]]; then
            echo "::error::override_image_sha must match ^[a-f0-9]{7,40}$ (got: ${SHA_SHORT})"
            exit 1
          fi
          echo "short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "git_ref=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "::notice::Deploying image tag sha-$SHA_SHORT (git reset target: $SHA_SHORT)"

      - name: Validate GHCR image manifest exists (pre-SSH)
        if: steps.preflight.outputs.skip != 'true'
        env:
          SHA_SHORT: ${{ steps.sha.outputs.short }}
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for svc in api viewer pipeline-llm; do
            ref="ghcr.io/chipi/podcast-scraper-stack-${svc}:sha-${SHA_SHORT}"
            echo "::notice::Checking manifest: ${ref}"
            docker manifest inspect "$ref" >/dev/null
          done

      - name: Join the tailnet
        if: steps.preflight.outputs.skip != 'true'
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags:    tag:gha-deployer
          # Pinned — `version: latest` broke sha256 verification in GHA (May 2026).
          version: 1.96.4

      - name: Install SSH identity for deploy@ (PROD_SSH_PRIVATE_KEY)
        if: steps.preflight.outputs.skip != 'true'
        uses: ./.github/actions/prod-ssh-key
        with:
          ssh_private_key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Resolve prod MagicDNS host (GH-744)
        id: ts_host
        if: steps.preflight.outputs.skip != 'true'
        env:
          PROD_TAILNET_FQDN: ${{ vars.PROD_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          R=$(bash scripts/ops/resolve_prod_tailnet_host.sh)
          echo "resolved_fqdn=$R" >> "$GITHUB_OUTPUT"
          WANT="${{ vars.PROD_TAILNET_FQDN }}"
          if [ "$(printf '%s' "$R" | tr '[:upper:]' '[:lower:]')" != "$(printf '%s' "$WANT" | tr '[:upper:]' '[:lower:]')" ]; then
            echo "::notice::Tailscale live host ($R) differs from vars.PROD_TAILNET_FQDN ($WANT). Using $R for SSH and probes. See PROD_RUNBOOK (suffix drift)."
          fi

      - name: Stage /srv/podcast-scraper/.env from GH Secrets (#841)
        # Renders the host-side .env from PROD_* GH Secrets at deploy time.
        # GH Secrets is the source of truth; .env becomes a transient
        # artifact regenerated on every deploy. Missing secrets → empty
        # values → compose's ${VAR:-} defaults take over (feature off);
        # the stack still starts.
        #
        # Atomic delivery: tmpfile in /dev/shm (RAM-backed, never disk),
        # SCP to .env.deploy-staged on host, then ssh mv .env-staged → .env
        # so the host never sees a partial file.
        if: steps.preflight.outputs.skip != 'true'
        env:
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
          # LLM provider keys
          PROD_OPENAI_API_KEY:          ${{ secrets.PROD_OPENAI_API_KEY }}
          PROD_ANTHROPIC_API_KEY:       ${{ secrets.PROD_ANTHROPIC_API_KEY }}
          PROD_GEMINI_API_KEY:          ${{ secrets.PROD_GEMINI_API_KEY }}
          PROD_MISTRAL_API_KEY:         ${{ secrets.PROD_MISTRAL_API_KEY }}
          PROD_DEEPSEEK_API_KEY:        ${{ secrets.PROD_DEEPSEEK_API_KEY }}
          PROD_GROK_API_KEY:            ${{ secrets.PROD_GROK_API_KEY }}
          # Sentry DSNs (one per project)
          PROD_SENTRY_DSN_API:          ${{ secrets.PROD_SENTRY_DSN_API }}
          PROD_SENTRY_DSN_PIPELINE:     ${{ secrets.PROD_SENTRY_DSN_PIPELINE }}
          PROD_SENTRY_DSN_VIEWER:       ${{ secrets.PROD_SENTRY_DSN_VIEWER }}
          # Grafana Cloud — separate Prom + Loki user IDs
          PROD_GRAFANA_CLOUD_API_KEY:   ${{ secrets.PROD_GRAFANA_CLOUD_API_KEY }}
          PROD_GRAFANA_CLOUD_LOKI_URL:  ${{ secrets.PROD_GRAFANA_CLOUD_LOKI_URL }}
          PROD_GRAFANA_CLOUD_LOKI_USER: ${{ secrets.PROD_GRAFANA_CLOUD_LOKI_USER }}
          PROD_GRAFANA_CLOUD_PROM_URL:  ${{ secrets.PROD_GRAFANA_CLOUD_PROM_URL }}
          PROD_GRAFANA_CLOUD_PROM_USER: ${{ secrets.PROD_GRAFANA_CLOUD_PROM_USER }}
          # Optional outbound webhook
          PROD_JOB_WEBHOOK_URL:         ${{ secrets.PROD_JOB_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          ENVTMP=$(mktemp -p /dev/shm prod-env.XXXXXX)
          trap 'shred -u "$ENVTMP" 2>/dev/null || rm -f "$ENVTMP"' EXIT
          chmod 600 "$ENVTMP"
          # ``printf '%s=%s\n'`` is shell-safe regardless of characters in
          # secret values (no shell interpolation of the value).
          {
            # Static ingress + paths (per PROD_RUNBOOK env reference)
            printf '%s=%s\n' PODCAST_DOCKER_PROJECT_DIR /srv/podcast-scraper
            printf '%s=%s\n' PODCAST_CORPUS_HOST_PATH   /srv/podcast-scraper/corpus
            printf '%s=%s\n' PODCAST_DEFAULT_CORPUS_PATH /app/output
            printf '%s=%s\n' PODCAST_ENV                 prod
            printf '%s=%s\n' PODCAST_AVAILABLE_PROFILES  cloud_balanced,cloud_thin
            printf '%s=%s\n' PODCAST_DEFAULT_PROFILE     cloud_balanced
            # LLM provider keys
            printf '%s=%s\n' OPENAI_API_KEY     "$PROD_OPENAI_API_KEY"
            printf '%s=%s\n' ANTHROPIC_API_KEY  "$PROD_ANTHROPIC_API_KEY"
            printf '%s=%s\n' GEMINI_API_KEY     "$PROD_GEMINI_API_KEY"
            printf '%s=%s\n' MISTRAL_API_KEY    "$PROD_MISTRAL_API_KEY"
            printf '%s=%s\n' DEEPSEEK_API_KEY   "$PROD_DEEPSEEK_API_KEY"
            printf '%s=%s\n' GROK_API_KEY       "$PROD_GROK_API_KEY"
            # Sentry
            printf '%s=%s\n' PODCAST_SENTRY_DSN_API      "$PROD_SENTRY_DSN_API"
            printf '%s=%s\n' PODCAST_SENTRY_DSN_PIPELINE "$PROD_SENTRY_DSN_PIPELINE"
            printf '%s=%s\n' VITE_SENTRY_DSN_VIEWER      "$PROD_SENTRY_DSN_VIEWER"
            # Grafana Cloud
            printf '%s=%s\n' GRAFANA_CLOUD_API_KEY   "$PROD_GRAFANA_CLOUD_API_KEY"
            printf '%s=%s\n' GRAFANA_CLOUD_LOKI_URL  "$PROD_GRAFANA_CLOUD_LOKI_URL"
            printf '%s=%s\n' GRAFANA_CLOUD_LOKI_USER "$PROD_GRAFANA_CLOUD_LOKI_USER"
            printf '%s=%s\n' GRAFANA_CLOUD_PROM_URL  "$PROD_GRAFANA_CLOUD_PROM_URL"
            printf '%s=%s\n' GRAFANA_CLOUD_PROM_USER "$PROD_GRAFANA_CLOUD_PROM_USER"
            # Webhook
            printf '%s=%s\n' PODCAST_JOB_WEBHOOK_URL "$PROD_JOB_WEBHOOK_URL"
          } > "$ENVTMP"
          scp -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            "$ENVTMP" "${SSH_TARGET}:/srv/podcast-scraper/.env.deploy-staged"
          ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            "set -euo pipefail; cd /srv/podcast-scraper; \
             mv .env.deploy-staged .env; \
             chmod 600 .env; \
             chown deploy:deploy .env; \
             test -f .bootstrap-needs-env && rm -f .bootstrap-needs-env || true"

      - name: Wire PODCAST_RELEASE into host .env (#721 — Sentry release grouping)
        # Idempotent: prior PODCAST_RELEASE=... line is removed before the new
        # one is appended, so re-runs don't accumulate duplicates.
        # init_sentry() already reads PODCAST_RELEASE per
        # src/podcast_scraper/utils/sentry_init.py, so no app code change needed.
        if: steps.preflight.outputs.skip != 'true'
        env:
          SHA_SHORT:  ${{ steps.sha.outputs.short }}
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            "set -euo pipefail; cd /srv/podcast-scraper; \
             test -f .env || install -m 600 /dev/null .env; \
             sed -i '/^PODCAST_RELEASE=/d' .env; \
             echo 'PODCAST_RELEASE=sha-${SHA_SHORT}' >> .env; \
             chmod 600 .env"

      - name: Pre-deploy corpus path preflight (#808)
        if: steps.preflight.outputs.skip != 'true'
        env:
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          set -euo pipefail
          bash scripts/ops/preflight_prod_corpus_path.sh "$SSH_TARGET"
          HOST_CORPUS=$(ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            "grep '^PODCAST_CORPUS_HOST_PATH=' /srv/podcast-scraper/.env | cut -d= -f2-")
          CONTAINER_CORPUS=$(ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            "grep '^PODCAST_DEFAULT_CORPUS_PATH=' /srv/podcast-scraper/.env | cut -d= -f2-")
          {
            echo "### Corpus path preflight (#808)"
            echo "- Host \`PODCAST_CORPUS_HOST_PATH\`: \`$HOST_CORPUS\`"
            echo "- Container \`PODCAST_DEFAULT_CORPUS_PATH\` (smoke \`path=\`): \`$CONTAINER_CORPUS\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record deploy start time (#803 D1)
        id: deploy_t0
        if: steps.preflight.outputs.skip != 'true'
        run: echo "ms=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - name: Deploy (git reset + compose pull + compose up + VPS-local /api/health)
        # deploy.sh on the VPS exits 0 only on healthy stack — failures here
        # surface red within the SSH session. VPS-local probe is
        # container-local (docker compose exec api curl 127.0.0.1:8000), not
        # host loopback :8000 (GH-745).
        if: steps.preflight.outputs.skip != 'true'
        env:
          SHA_SHORT:  ${{ steps.sha.outputs.short }}
          GIT_REF:    ${{ steps.sha.outputs.git_ref }}
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            "DEPLOY_GIT_SHA='${GIT_REF}' DEPLOY_IMAGE_SHA='${SHA_SHORT}' /srv/podcast-scraper/infra/deploy/deploy.sh"

      - name: External /api/health probe over Tailscale (#720)
        # Belt-and-suspenders: deploy.sh already hit /api/health inside the api
        # container; this probes via tailnet MagicDNS to catch nginx / serve /
        # cert issues. 60s timeout (12 × 5s). See PROD_RUNBOOK "API health
        # checks by context" (GH-745).
        if: steps.preflight.outputs.skip != 'true'
        env:
          PROBE_URL: https://${{ steps.ts_host.outputs.resolved_fqdn }}/api/health
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            if curl -fsS "$PROBE_URL" | jq -e '.status == "ok"' >/dev/null 2>&1; then
              echo "::notice::/api/health OK over tailnet after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "::error::/api/health did not return ok within 60s over tailnet"
          ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            "deploy@${{ steps.ts_host.outputs.resolved_fqdn }}" \
            'docker logs --tail 50 compose-api-1' 2>&1 || true
          exit 1

      - name: Post-deploy smoke (six API surfaces)
        # Two paths matter:
        #   PODCAST_CORPUS_HOST_PATH    = on-host directory (e.g. /srv/podcast-scraper/corpus)
        #   PODCAST_DEFAULT_CORPUS_PATH = bind-mount target inside the api container (e.g. /app/output)
        # The probe over tailnet hits the api process inside the container,
        # so the ``path=`` query param MUST be the in-container path. Sending
        # the host path used to 422 with "path must be the configured corpus
        # root or a subdirectory of it." Validate the host dir exists
        # separately so we still catch the case where the host bind source
        # is missing.
        if: steps.preflight.outputs.skip != 'true'
        env:
          PROBE_FQDN: ${{ steps.ts_host.outputs.resolved_fqdn }}
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          set -euo pipefail
          HOST_CORPUS=$(ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            "grep '^PODCAST_CORPUS_HOST_PATH=' /srv/podcast-scraper/.env | cut -d= -f2-")
          CONTAINER_CORPUS=$(ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            "grep '^PODCAST_DEFAULT_CORPUS_PATH=' /srv/podcast-scraper/.env | cut -d= -f2-")
          if [ -z "${HOST_CORPUS:-}" ]; then
            echo "::error::PODCAST_CORPUS_HOST_PATH missing from host .env"
            exit 1
          fi
          if [ -z "${CONTAINER_CORPUS:-}" ]; then
            echo "::error::PODCAST_DEFAULT_CORPUS_PATH missing from host .env (smoke probe needs the in-container path)"
            exit 1
          fi
          if ! ssh -i "$SSH_PROD_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            "test -d '$HOST_CORPUS'"; then
            echo "::error::PODCAST_CORPUS_HOST_PATH is not a directory on host: $HOST_CORPUS"
            exit 1
          fi
          {
            echo "### Post-deploy smoke corpus paths"
            echo "- Host: \`$HOST_CORPUS\`"
            echo "- Smoke probe \`path=\`: \`$CONTAINER_CORPUS\`"
          } >> "$GITHUB_STEP_SUMMARY"
          bash scripts/ops/post_deploy_smoke.sh "$PROBE_FQDN" --corpus-path "$CONTAINER_CORPUS"

      - name: Emit deploy event to Loki (#803 D1)
        # Pushed directly to Loki: the GHA runner's logs don't reach it. Fires on success AND
        # failure (feeds the failure-rate / MTTR panels). Non-fatal — never turns a deploy red.
        if: always() && steps.preflight.outputs.skip != 'true'
        env:
          LOKI_PUSH_URL: ${{ secrets.PROD_GRAFANA_CLOUD_LOKI_URL }}
          LOKI_USER: ${{ secrets.PROD_GRAFANA_CLOUD_LOKI_USER }}
          LOKI_TOKEN: ${{ secrets.PROD_GRAFANA_CLOUD_API_KEY }}
          START_MS: ${{ steps.deploy_t0.outputs.ms }}
          JOB_STATUS: ${{ job.status }}
          SHA_SHORT: ${{ steps.sha.outputs.short }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          if [ -z "${LOKI_PUSH_URL:-}" ] || [ -z "${LOKI_TOKEN:-}" ]; then
            echo "::warning::Grafana Loki creds absent; skipping deploy-event emission"
            exit 0
          fi
          duration_ms=$(( $(date +%s%3N) - ${START_MS:-$(date +%s%3N)} ))
          bash scripts/ops/emit_deploy_event.sh \
            --status "$JOB_STATUS" --sha "$SHA_SHORT" \
            --duration-ms "$duration_ms" --triggered-by "$ACTOR" \
            || echo "::warning::deploy-event emission failed (non-fatal)"

      - name: Mark Sentry release boundary (#803 D2)
        # Draws the release boundary on the Sentry error timeline. Only on a fully green deploy.
        # Needs secrets.SENTRY_AUTH_TOKEN (Internal Integration, Release: Admin) + vars.SENTRY_ORG.
        if: success() && steps.preflight.outputs.skip != 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECTS: ${{ vars.SENTRY_PROJECTS }}
          SHA_SHORT: ${{ steps.sha.outputs.short }}
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ] || [ -z "${SENTRY_ORG:-}" ] || [ -z "${SENTRY_PROJECTS:-}" ]; then
            echo "::warning::SENTRY_AUTH_TOKEN/SENTRY_ORG/SENTRY_PROJECTS absent; skipping Sentry release boundary"
            exit 0
          fi
          bash scripts/ops/mark_sentry_release.sh \
            --org "$SENTRY_ORG" --version "sha-$SHA_SHORT" \
            --environment prod --projects "$SENTRY_PROJECTS" \
            || echo "::warning::Sentry release boundary failed (non-fatal)"

      # #1176 — after a green prod deploy, bump the prod-state marker + pinned
      # fixture so the CI net C "prod-gap" test measures gap-to-current-prod
      # rather than gap-to-some-old-baseline. Opens a PR against main (no direct
      # push) so a human eyeballs any fixture-shape drift the marker+ledger
      # bump cannot repair. The migration-guard workflow and
      # test_pinned_fixture_shape.py provide the second layer of safety.
      - name: Bump prod-state marker + pinned fixture (open PR)
        if: success() && steps.preflight.outputs.skip != 'true'
        env:
          SHA_SHORT: ${{ steps.sha.outputs.short }}
        run: |
          set -euo pipefail
          python -V >/dev/null 2>&1 || { echo "::warning::python missing; skipping prod-marker bump"; exit 0; }
          # Install just enough to import the registry — no test deps.
          python -m pip install --quiet -e . >/dev/null 2>&1 || {
            echo "::warning::pip install -e . failed; skipping prod-marker bump"
            exit 0
          }
          CODE_VERSION="$(python -c 'import podcast_scraper as p; print(p.__version__)')"
          python scripts/ops/bump_prod_marker.py \
            --code-version "$CODE_VERSION" \
            --sha "$SHA_SHORT"

      - name: Open PR with prod-marker bump
        if: success() && steps.preflight.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          # PAT with contents:write + pull-requests:write, or org-configured
          # GITHUB_TOKEN with the same. If unset, the action falls back to
          # GITHUB_TOKEN — which cannot push to main-protected branches but
          # CAN open PRs from branches it creates.
          token: ${{ secrets.PROD_MARKER_PR_TOKEN || secrets.GITHUB_TOKEN }}
          branch: chore/prod-marker-${{ steps.sha.outputs.short }}
          base: main
          delete-branch: true
          commit-message: |
            chore(prod-marker): bump to ${{ steps.sha.outputs.short }} after prod deploy

            Auto-generated by .github/workflows/deploy-prod.yml (#1176). Updates:
              - config/last_deployed_prod_version.json
              - tests/fixtures/upgrade/corpus_at_last_prod_release/upgrade_ledger.json
              - tests/fixtures/upgrade/corpus_at_last_prod_release/corpus_manifest.json
          title: |
            chore(prod-marker): bump to sha-${{ steps.sha.outputs.short }} after prod deploy
          body: |
            Automated bump after a green prod deploy (#1176).

            **What changed automatically:**

            - `config/last_deployed_prod_version.json` — new `code_version`, `sha`,
              `deployed_at`, and `applied_migrations` list (from the registry at the
              deployed SHA).
            - `tests/fixtures/upgrade/corpus_at_last_prod_release/upgrade_ledger.json` —
              ledger updated to record every registered migration at its declared
              `to_version`.
            - `tests/fixtures/upgrade/corpus_at_last_prod_release/corpus_manifest.json` —
              `produced_by.code_version` bumped to match.

            **What the bump script CANNOT do (please verify):**

            - On-disk artifact shapes in the fixture
              (`metadata/ep1.gi.json` and any others). If this deploy included a
              migration that changes a `.gi.json` / `.kg.json` shape, the fixture
              still carries the pre-deploy shape and
              `tests/unit/upgrade/test_pinned_fixture_shape.py` will fail on this PR.
            - Fix by hand-editing the fixture to reflect the post-migration shape
