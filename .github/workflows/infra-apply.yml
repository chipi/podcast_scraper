name: Infra apply (manual)

# RFC-082 Decision 6 — GitOps loop, apply side. Manual dispatch only (NOT
# auto on merge) so a typo in main.tf can't accidentally tofu destroy prod.
# The PR's plan comment (from infra-ci.yml) is the preview; this is the
# explicit "yes, do it" gate.
#
# Modes:
#   apply              — normal apply against the current encrypted state.
#   destroy-then-apply — tofu destroy + tofu apply. Uses current state.
#   wipe-then-apply    — API-enumerate-and-DELETE every Hetzner resource in
#                        the project + delete every prod-tagged Tailscale
#                        device + wipe local state. Apply runs from empty.
#                        Use for clean-slate recovery when state and reality
#                        have diverged badly enough that surgical orphan
#                        cleanup is impractical (incident 2026-05-29).
#
# State persistence: post-apply ``terraform.tfstate.enc`` is uploaded as a
# workflow artifact. Operator downloads + commits to main manually.
# Auto-commit-back is deferred (needs branch-protection bypass via PAT).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "APPLY" / "DESTROY_THEN_APPLY" / "WIPE_THEN_APPLY" matching mode below'
        required: true
        default: ''
      mode:
        description: 'apply / destroy-then-apply / wipe-then-apply (full nuke + rebuild)'
        type: choice
        options:
          - apply
          - destroy-then-apply
          - wipe-then-apply
        default: apply
      override_server_type:
        description: 'Optional override: hcloud server_type (cx43 / cax31 / ccx23 / cx33 / ccx13 / cpx32). Empty = use tfvar default. Use when Hetzner reports resource_unavailable at placement.'
        required: false
        default: ''
      override_location:
        description: 'Optional override: hcloud location (fsn1 / nbg1 / hel1). Empty = use tfvar default. Use when current location has no capacity.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: infra-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Use a `prod` Environment so the operator can configure required-reviewer
    # protection in repo Settings → Environments → prod. If the environment
    # doesn't exist, GitHub creates it on first run with no protection — the
    # operator should add themselves as a required reviewer post-merge.
    environment: prod
    steps:
      - name: Confirm input
        run: |
          MODE='${{ github.event.inputs.mode }}'
          CONFIRM='${{ github.event.inputs.confirm }}'
          case "$MODE" in
            apply)
              [ "$CONFIRM" = "APPLY" ] || { echo "::error::mode=apply requires confirm=APPLY. Got: '$CONFIRM'"; exit 1; }
              ;;
            destroy-then-apply)
              [ "$CONFIRM" = "DESTROY_THEN_APPLY" ] || { echo "::error::mode=destroy-then-apply requires confirm=DESTROY_THEN_APPLY. Got: '$CONFIRM'"; exit 1; }
              ;;
            wipe-then-apply)
              [ "$CONFIRM" = "WIPE_THEN_APPLY" ] || { echo "::error::mode=wipe-then-apply requires confirm=WIPE_THEN_APPLY. Got: '$CONFIRM'"; exit 1; }
              ;;
            *)
              echo "::error::Unknown mode: '$MODE'"; exit 1 ;;
          esac
          echo "mode=$MODE confirmed"

      - uses: actions/checkout@v6

      - name: Pre-flight — required secrets present?
        env:
          HCLOUD_TOKEN:            ${{ secrets.HCLOUD_TOKEN }}
          TS_API_KEY:              ${{ secrets.TS_API_KEY }}
          TFSTATE_AGE_KEY:         ${{ secrets.TFSTATE_AGE_KEY }}
          OPERATOR_SSH_PUBLIC_KEY: ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${HCLOUD_TOKEN:-}" ]            && MISSING="$MISSING HCLOUD_TOKEN"
          [ -z "${TS_API_KEY:-}" ]              && MISSING="$MISSING TS_API_KEY"
          [ -z "${TFSTATE_AGE_KEY:-}" ]         && MISSING="$MISSING TFSTATE_AGE_KEY"
          [ -z "${OPERATOR_SSH_PUBLIC_KEY:-}" ] && MISSING="$MISSING OPERATOR_SSH_PUBLIC_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing prereqs:$MISSING. Stage them per #714 first."
            exit 1
          fi

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.6.0

      - name: Install sops + age
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 age/age age/age-keygen

      - name: Wipe Hetzner project + prod Tailscale devices + local state (wipe-then-apply only)
        if: ${{ github.event.inputs.mode == 'wipe-then-apply' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          TS_API_KEY:   ${{ secrets.TS_API_KEY }}
          TAILNET:      ${{ vars.TAILNET_NAME }}
        run: |
          set -euo pipefail
          AUTH_H="Authorization: Bearer ${HCLOUD_TOKEN}"
          AUTH_TS="Authorization: Bearer ${TS_API_KEY}"

          delete_each() {
            local kind="$1"; local plural="$2"
            local ids
            ids=$(curl -fsS -H "$AUTH_H" "https://api.hetzner.cloud/v1/${plural}?per_page=50" | jq -r ".${plural}[].id" || true)
            if [ -z "$ids" ]; then
              echo "  no ${plural} to delete"; return
            fi
            for id in $ids; do
              echo "  delete ${kind} id=${id}"
              S=$(curl -s -o /tmp/del.body -w '%{http_code}' \
                -X DELETE "https://api.hetzner.cloud/v1/${plural}/${id}" \
                -H "$AUTH_H")
              case "$S" in
                200|201|202|204|404) echo "    status=$S OK" ;;
                *) echo "    status=$S body:"; cat /tmp/del.body; echo
                   echo "::warning::failed to delete ${kind} ${id} (status $S) — continuing" ;;
              esac
            done
          }

          echo "::group::Hetzner servers (deleting cascades vol-attachments)"
          delete_each server servers
          # Wait briefly so subsequent volume / network deletes don't race
          # against still-detaching attachments
          sleep 5
          echo "::endgroup::"

          echo "::group::Hetzner volumes"
          delete_each volume volumes
          echo "::endgroup::"

          echo "::group::Hetzner networks (cascades subnets)"
          delete_each network networks
          echo "::endgroup::"

          echo "::group::Hetzner firewalls"
          delete_each firewall firewalls
          echo "::endgroup::"

          echo "::group::Hetzner ssh_keys"
          delete_each ssh_key ssh_keys
          echo "::endgroup::"

          echo "::group::Tailscale devices (tag:prod / tag:dr-drill / tag:gha-deployer)"
          DEVICES=$(curl -fsS -H "$AUTH_TS" "https://api.tailscale.com/api/v2/tailnet/${TAILNET}/devices" \
                    | jq -r '.devices[]
                             | select((.tags // []) | any(. == "tag:prod" or . == "tag:dr-drill" or . == "tag:gha-deployer"))
                             | (.nodeId // .id)' || true)
          if [ -z "$DEVICES" ]; then
            echo "  no tagged devices to delete"
          else
            for d in $DEVICES; do
              echo "  delete tailscale device ${d}"
              S=$(curl -s -o /tmp/tsdel.body -w '%{http_code}' \
                -X DELETE "https://api.tailscale.com/api/v2/device/${d}" \
                -H "$AUTH_TS")
              case "$S" in
                200|201|202|204|404) echo "    status=$S OK" ;;
                *) echo "    status=$S body:"; cat /tmp/tsdel.body; echo
                   echo "::warning::failed to delete tailscale device ${d} (status $S) — continuing" ;;
              esac
            done
          fi
          echo "::endgroup::"

          echo "::group::Wipe local encrypted + plaintext state files"
          rm -f infra/terraform/terraform.tfstate.enc infra/terraform/terraform.tfstate
          echo "  state files removed; tofu will start from empty state"
          echo "::endgroup::"

      - name: Decrypt state (apply / destroy-then-apply)
        if: ${{ github.event.inputs.mode != 'wipe-then-apply' }}
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          if [ -f infra/terraform/terraform.tfstate.enc ]; then
            sops -d infra/terraform/terraform.tfstate.enc > infra/terraform/terraform.tfstate
          fi

      - name: tofu init + (destroy +) apply
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token:      ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_tailscale_api_key: ${{ secrets.TS_API_KEY }}
          TF_VAR_ssh_public_key:    ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_tailnet: ${{ vars.TAILNET_NAME }}
          MODE:                     ${{ github.event.inputs.mode }}
          OVERRIDE_SERVER_TYPE:     ${{ github.event.inputs.override_server_type }}
          OVERRIDE_LOCATION:        ${{ github.event.inputs.override_location }}
        run: |
          set -euo pipefail
          # Placement overrides — only export TF_VAR_* when set, so tfvar
          # defaults + validation rules apply otherwise.
          if [ -n "${OVERRIDE_SERVER_TYPE:-}" ]; then
            export TF_VAR_server_type="$OVERRIDE_SERVER_TYPE"
            echo "TF_VAR_server_type=$OVERRIDE_SERVER_TYPE"
          fi
          if [ -n "${OVERRIDE_LOCATION:-}" ]; then
            export TF_VAR_location="$OVERRIDE_LOCATION"
            echo "TF_VAR_location=$OVERRIDE_LOCATION"
          fi
          tofu init -input=false
          if [ "$MODE" = "destroy-then-apply" ]; then
            echo "::group::tofu destroy"
            tofu destroy -auto-approve -input=false
            echo "::endgroup::"
          fi
          # Tailscale ACL has no real "delete" on the provider API. If it's
          # missing from state (post-destroy, post-wipe, or after a manual
          # state sync), the apply's create attempt fails with 412 "invalid
          # old hash". Import first so the operation becomes an update.
          if ! tofu state list 2>/dev/null | grep -q '^tailscale_acl\.main\['; then
            echo "::group::tofu import tailscale_acl (not in state)"
            tofu import 'tailscale_acl.main[0]' acl
            echo "::endgroup::"
          fi
          tofu apply -auto-approve -input=false

      - name: Re-encrypt state (always — even if apply failed; preserves partial state)
        if: always()
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          if [ -f infra/terraform/terraform.tfstate ]; then
            sops --config infra/.sops.yaml -e infra/terraform/terraform.tfstate > infra/terraform/terraform.tfstate.enc.new
            mv infra/terraform/terraform.tfstate.enc.new infra/terraform/terraform.tfstate.enc
          fi

      - name: Upload new encrypted state as artifact
        # OPERATOR: download terraform.tfstate.enc from this run's artifacts
        # and commit to main. Auto-commit-back is a future follow-up.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-state-after-apply
          path: infra/terraform/terraform.tfstate.enc
          retention-days: 30

      - name: Cleanup plaintext state
        if: always()
        run: |
          shred -u infra/terraform/terraform.tfstate 2>/dev/null \
            || rm -f infra/terraform/terraform.tfstate
