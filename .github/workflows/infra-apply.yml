name: Infra apply (manual)

# RFC-082 Decision 6 — GitOps loop, apply side. Manual dispatch only (NOT
# auto on merge) so a typo in main.tf can't accidentally tofu destroy prod.
# The PR's plan comment (from infra-ci.yml) is the preview; this is the
# explicit "yes, do it" gate.
#
# Closes #719 (apply half).
#
# State persistence model: this workflow uploads the post-apply
# `terraform.tfstate.enc` as a workflow artifact (30-day retention). The
# operator downloads it and commits to main manually. Auto-commit-back is
# deferred to a follow-up (needs branch-protection bypass via PAT or
# deploy key, which adds vendor surface).

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "APPLY" (apply mode) or "DESTROY_THEN_APPLY" (full rebuild) to confirm'
        required: true
        default: ''
      mode:
        description: 'apply (default) or destroy-then-apply (full clean-slate recreate)'
        type: choice
        options:
          - apply
          - destroy-then-apply
        default: apply
      orphan_server_id:
        description: 'Optional: Hetzner server ID to force-delete via API before tofu runs. Use when state diverged (e.g. failed re-encrypt left a server tofu does not know about, blocking subnet destroy).'
        required: false
        default: ''
      orphan_ssh_key_ids:
        description: 'Optional CSV: Hetzner ssh_key IDs to force-delete via API before tofu runs. Use when an orphan ssh_key with the same fingerprint as the current operator key blocks creation (Hetzner 409 uniqueness_error).'
        required: false
        default: ''
      orphan_network_ids:
        description: 'Optional CSV: Hetzner network IDs to force-delete via API before tofu runs. Deletes subnets as a cascade. Use to clear name-conflict orphans (409 uniqueness_error on hcloud_network).'
        required: false
        default: ''
      orphan_firewall_ids:
        description: 'Optional CSV: Hetzner firewall IDs to force-delete via API before tofu runs. Use to clear name-conflict orphans (409 uniqueness_error on hcloud_firewall).'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: infra-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Use a `prod` Environment so the operator can configure required-reviewer
    # protection in repo Settings → Environments → prod. If the environment
    # doesn't exist, GitHub creates it on first run with no protection — the
    # operator should add themselves as a required reviewer post-merge.
    environment: prod
    steps:
      - name: Confirm input
        run: |
          MODE='${{ github.event.inputs.mode }}'
          CONFIRM='${{ github.event.inputs.confirm }}'
          case "$MODE" in
            apply)
              if [ "$CONFIRM" != "APPLY" ]; then
                echo "::error::mode=apply requires confirm=APPLY. Got: '$CONFIRM'"
                exit 1
              fi
              ;;
            destroy-then-apply)
              if [ "$CONFIRM" != "DESTROY_THEN_APPLY" ]; then
                echo "::error::mode=destroy-then-apply requires confirm=DESTROY_THEN_APPLY. Got: '$CONFIRM'"
                exit 1
              fi
              ;;
            *)
              echo "::error::Unknown mode: '$MODE'"
              exit 1
              ;;
          esac
          echo "mode=$MODE confirmed"

      - uses: actions/checkout@v6

      - name: Pre-flight — required secrets present?
        env:
          HCLOUD_TOKEN:            ${{ secrets.HCLOUD_TOKEN }}
          TS_API_KEY:              ${{ secrets.TS_API_KEY }}
          TFSTATE_AGE_KEY:         ${{ secrets.TFSTATE_AGE_KEY }}
          OPERATOR_SSH_PUBLIC_KEY: ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${HCLOUD_TOKEN:-}" ]            && MISSING="$MISSING HCLOUD_TOKEN"
          [ -z "${TS_API_KEY:-}" ]              && MISSING="$MISSING TS_API_KEY"
          [ -z "${TFSTATE_AGE_KEY:-}" ]         && MISSING="$MISSING TFSTATE_AGE_KEY"
          [ -z "${OPERATOR_SSH_PUBLIC_KEY:-}" ] && MISSING="$MISSING OPERATOR_SSH_PUBLIC_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing prereqs:$MISSING. Stage them per #714 first."
            exit 1
          fi

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.6.0

      - name: Install sops + age
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 age/age age/age-keygen

      - name: Decrypt state (if any prior apply has happened)
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          if [ -f infra/terraform/terraform.tfstate.enc ]; then
            sops -d infra/terraform/terraform.tfstate.enc > infra/terraform/terraform.tfstate
          fi

      - name: Force-delete orphan Hetzner ssh_keys (state-divergence recovery)
        if: ${{ github.event.inputs.orphan_ssh_key_ids != '' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          IDS:          ${{ github.event.inputs.orphan_ssh_key_ids }}
        run: |
          set -euo pipefail
          IFS=',' read -ra ID_ARR <<< "$IDS"
          for raw in "${ID_ARR[@]}"; do
            id=$(echo "$raw" | tr -d ' ')
            [ -z "$id" ] && continue
            echo "Deleting Hetzner ssh_key id=$id"
            STATUS=$(curl -s -o /tmp/sk.body -w '%{http_code}' \
              -X DELETE "https://api.hetzner.cloud/v1/ssh_keys/${id}" \
              -H "Authorization: Bearer ${HCLOUD_TOKEN}")
            echo "  API status: $STATUS"
            cat /tmp/sk.body; echo
            case "$STATUS" in
              200|201|202|204) echo "  delete OK" ;;
              404)             echo "  already gone (404) — OK" ;;
              *)               echo "::error::unexpected status $STATUS deleting ssh_key $id"; exit 1 ;;
            esac
          done

      - name: Force-delete orphan Hetzner networks (state-divergence recovery)
        if: ${{ github.event.inputs.orphan_network_ids != '' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          IDS:          ${{ github.event.inputs.orphan_network_ids }}
        run: |
          set -euo pipefail
          IFS=',' read -ra ID_ARR <<< "$IDS"
          for raw in "${ID_ARR[@]}"; do
            id=$(echo "$raw" | tr -d ' ')
            [ -z "$id" ] && continue
            echo "Deleting Hetzner network id=$id (subnets cascade)"
            STATUS=$(curl -s -o /tmp/nw.body -w '%{http_code}' \
              -X DELETE "https://api.hetzner.cloud/v1/networks/${id}" \
              -H "Authorization: Bearer ${HCLOUD_TOKEN}")
            echo "  API status: $STATUS"
            cat /tmp/nw.body; echo
            case "$STATUS" in
              200|201|202|204) echo "  delete OK" ;;
              404)             echo "  already gone (404) — OK" ;;
              *)               echo "::error::unexpected status $STATUS deleting network $id"; exit 1 ;;
            esac
          done

      - name: Force-delete orphan Hetzner firewalls (state-divergence recovery)
        if: ${{ github.event.inputs.orphan_firewall_ids != '' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          IDS:          ${{ github.event.inputs.orphan_firewall_ids }}
        run: |
          set -euo pipefail
          IFS=',' read -ra ID_ARR <<< "$IDS"
          for raw in "${ID_ARR[@]}"; do
            id=$(echo "$raw" | tr -d ' ')
            [ -z "$id" ] && continue
            echo "Deleting Hetzner firewall id=$id"
            STATUS=$(curl -s -o /tmp/fw.body -w '%{http_code}' \
              -X DELETE "https://api.hetzner.cloud/v1/firewalls/${id}" \
              -H "Authorization: Bearer ${HCLOUD_TOKEN}")
            echo "  API status: $STATUS"
            cat /tmp/fw.body; echo
            case "$STATUS" in
              200|201|202|204) echo "  delete OK" ;;
              404)             echo "  already gone (404) — OK" ;;
              *)               echo "::error::unexpected status $STATUS deleting firewall $id"; exit 1 ;;
            esac
          done

      - name: Force-delete orphan Hetzner server (recovery from state divergence)
        if: ${{ github.event.inputs.orphan_server_id != '' }}
        env:
          HCLOUD_TOKEN:     ${{ secrets.HCLOUD_TOKEN }}
          ORPHAN_SERVER_ID: ${{ github.event.inputs.orphan_server_id }}
        run: |
          set -euo pipefail
          echo "Force-deleting Hetzner server id=$ORPHAN_SERVER_ID via API"
          STATUS=$(curl -s -o /tmp/del.body -w '%{http_code}' \
            -X DELETE "https://api.hetzner.cloud/v1/servers/${ORPHAN_SERVER_ID}" \
            -H "Authorization: Bearer ${HCLOUD_TOKEN}")
          echo "API status: $STATUS"
          cat /tmp/del.body
          echo
          case "$STATUS" in
            200|201|202|204) echo "delete request accepted" ;;
            404)             echo "server already gone (404) — OK, no-op" ;;
            *)               echo "::error::unexpected status $STATUS deleting server $ORPHAN_SERVER_ID"; exit 1 ;;
          esac
          # Poll until Hetzner reports the server as deleted (or 60s timeout)
          for i in $(seq 1 30); do
            S=$(curl -s -o /dev/null -w '%{http_code}' \
              "https://api.hetzner.cloud/v1/servers/${ORPHAN_SERVER_ID}" \
              -H "Authorization: Bearer ${HCLOUD_TOKEN}")
            if [ "$S" = "404" ]; then
              echo "confirmed gone after ${i} poll(s)"; break
            fi
            sleep 2
          done

      - name: tofu init + (destroy +) apply
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token:      ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_tailscale_api_key: ${{ secrets.TS_API_KEY }}
          TF_VAR_ssh_public_key:    ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_tailnet: ${{ vars.TAILNET_NAME }}
          MODE:                     ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          tofu init -input=false
          if [ "$MODE" = "destroy-then-apply" ]; then
            echo "::group::tofu destroy (clean-slate rebuild)"
            tofu destroy -auto-approve -input=false
            echo "::endgroup::"
            # tailscale_acl has no real "delete" semantic on the Tailscale API
            # — destroy removes it from tofu state but the ACL persists on the
            # tailnet. A subsequent ``apply`` that tries to ``create`` it then
            # fails with "412 invalid old hash" because the create has no
            # etag. Re-importing post-destroy turns the next operation into
            # an ``update`` (with the correct etag), which works.
            echo "::group::tofu import tailscale_acl post-destroy"
            tofu import 'tailscale_acl.main[0]' acl
            echo "::endgroup::"
          fi
          tofu apply -auto-approve -input=false

      - name: Re-encrypt state (always — even if apply failed; preserves partial state)
        if: always()
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          # ``--config`` makes sops find creation_rules deterministically
          # regardless of CWD. Walking-up from terraform/terraform.tfstate
          # to find infra/.sops.yaml previously failed on the GH runner.
          if [ -f infra/terraform/terraform.tfstate ]; then
            sops --config infra/.sops.yaml -e infra/terraform/terraform.tfstate > infra/terraform/terraform.tfstate.enc.new
            mv infra/terraform/terraform.tfstate.enc.new infra/terraform/terraform.tfstate.enc
          fi

      - name: Upload new encrypted state as artifact
        # OPERATOR: download terraform.tfstate.enc from this run's artifacts
        # and commit to main. Auto-commit-back is a future follow-up
        # (needs PAT or deploy key with branch-protection bypass).
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-state-after-apply
          path: infra/terraform/terraform.tfstate.enc
          retention-days: 30

      - name: Cleanup plaintext state
        if: always()
        run: |
          shred -u infra/terraform/terraform.tfstate 2>/dev/null \
            || rm -f infra/terraform/terraform.tfstate
