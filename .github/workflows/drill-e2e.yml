name: DR drill — smoke (post_deploy_smoke)

# GitHub #752 / #799 — read-only smoke against the Hetzner **drill** stack from GHA.
# Joins the tailnet as tag:gha-deployer, resolves dr-podcast MagicDNS (suffix
# drift), then runs scripts/ops/post_deploy_smoke.sh over HTTPS (same probes as
# prod make smoke-prod).
#
# Prerequisites:
#   secrets: TS_AUTHKEY, DRILL_DEPLOY_SSH_PRIVATE_KEY (deploy@ PEM, same as drill-deploy)
#   vars:    DRILL_TAILNET_FQDN (e.g. dr-podcast.tail-xxxx.ts.net)
#
# Tailscale ACL must allow tag:gha-deployer → tag:dr-drill:443 for HTTPS in
# addition to :22 for SSH-heavy jobs. Apply **prod** infra (`infra-apply.yml`) so
# the ACL reaches the tailnet before expecting this workflow to pass.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DRILL_SMOKE" to confirm read-only drill smoke'
        required: true
        default: ''
  workflow_call:
    secrets:
      TS_AUTHKEY:
        required: true
      DRILL_DEPLOY_SSH_PRIVATE_KEY:
        required: true
    inputs:
      confirm:
        description: 'Must be DRILL_SMOKE (orchestrator passes this after DRILL_EXERCISE gate)'
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: drill-e2e
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: drill
    steps:
      - name: "DR drill — confirm: DRILL_SMOKE"
        run: |
          if [ "${{ inputs.confirm }}" != "DRILL_SMOKE" ]; then
            echo "::error::Must type DRILL_SMOKE to confirm. Got: '${{ inputs.confirm }}'"
            exit 1
          fi

      - name: "DR drill — pre-flight: secrets and variables"
        env:
          TS_AUTHKEY:                  ${{ secrets.TS_AUTHKEY }}
          DRILL_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DRILL_DEPLOY_SSH_PRIVATE_KEY }}
          DRILL_TAILNET_FQDN:          ${{ vars.DRILL_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${TS_AUTHKEY:-}" ]                    && MISSING="$MISSING TS_AUTHKEY"
          [ -z "${DRILL_DEPLOY_SSH_PRIVATE_KEY:-}" ] && MISSING="$MISSING DRILL_DEPLOY_SSH_PRIVATE_KEY"
          [ -z "${DRILL_TAILNET_FQDN:-}" ]          && MISSING="$MISSING DRILL_TAILNET_FQDN"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing prereqs:$MISSING Stage per workflow header and infra/README.md (#752)."
            exit 1
          fi

      - name: "DR drill — checkout: shallow (smoke + resolver scripts)"
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: "DR drill — SSH: install identity (deploy@, DRILL_DEPLOY_SSH_PRIVATE_KEY)"
        uses: ./.github/actions/prod-ssh-key
        with:
          ssh_private_key:   ${{ secrets.DRILL_DEPLOY_SSH_PRIVATE_KEY }}
          identity_env_name: SSH_DRILL_IDENTITY

      - name: "DR drill — join: tailnet (tag:gha-deployer)"
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags:    tag:gha-deployer
          # Pinned — `version: latest` broke sha256 verification in GHA (May 2026).
          version: 1.96.4

      - name: "DR drill — resolve: tailnet host (MagicDNS)"
        id: ts_host
        env:
          DRILL_TAILNET_FQDN: ${{ vars.DRILL_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          R=$(bash scripts/ops/resolve_drill_tailnet_host.sh)
          echo "resolved_fqdn=$R" >> "$GITHUB_OUTPUT"
          WANT="${{ vars.DRILL_TAILNET_FQDN }}"
          if [ "$(printf '%s' "$R" | tr '[:upper:]' '[:lower:]')" != "$(printf '%s' "$WANT" | tr '[:upper:]' '[:lower:]')" ]; then
            echo "::notice::Tailscale live host ($R) differs from vars.DRILL_TAILNET_FQDN ($WANT). Using $R for probes."
          fi

      - name: "DR drill — smoke: post_deploy_smoke.sh (HTTPS + corpus path)"
        env:
          DRILL_FQDN: ${{ steps.ts_host.outputs.resolved_fqdn }}
          # The /api/corpus/episodes ``path=`` is validated against the api's
          # configured corpus root, which is the IN-CONTAINER path (CLI
          # ``serve --output-dir /app/output``; PODCAST_DEFAULT_CORPUS_PATH=/app/output).
          # The host path /srv/podcast-scraper/corpus is the bind-mount SOURCE and
          # is rejected ("path must be the configured corpus root..."). deploy-prod.yml
          # passes the in-container path the same way (--corpus-path $CONTAINER_CORPUS).
          SMOKE_CORPUS_PATH: /app/output
        run: |
          set -euo pipefail
          bash scripts/ops/post_deploy_smoke.sh "$DRILL_FQDN" \
            --corpus-path "$SMOKE_CORPUS_PATH"
