# Weekly data + setup baseline ledger (operator option 4 / 2026-06-25).
#
# NOT a test run. Captures the project's data + setup state plus a
# fresh eval + benchmark run, commits the snapshot to
# ``data/baselines/baseline-YYYY-WNN.json`` on main. release.yml diffs
# against the most recent snapshot for the "what changed since last
# week" block in the release notes draft.
#
# Cadence: Monday 04:00 UTC. Operator can also fire manually.

name: Weekly data baseline

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write   # commits the snapshot back to main

concurrency:
  group: weekly-data-baseline
  cancel-in-progress: false

jobs:
  capture-baseline:
    name: Capture weekly snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11.8'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ffmpeg (torchcodec via [ml] needs libav* shared libs to import)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install package (dev + ml)
        # The smoke experiment config references the ml baseline
        # (``baseline_ml_dev_authority_benchmark_v1.yaml``), which loads
        # the summarization + NLI models via the ml provider on import
        # — needs ``transformers`` / ``torch`` / ``spacy`` from the
        # ``[ml]`` extra. ``.[dev]`` alone hits
        # ``ModuleNotFoundError: No module named 'transformers'``;
        # ``[ml]`` pulls torchaudio→torchcodec, which needs ffmpeg's
        # libav* shared libs at import time (installed in the prior step).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml]"

      - name: Setup probe (data + config + git state)
        env:
          DGX_VLLM_ENDPOINT: ${{ vars.DGX_VLLM_ENDPOINT }}
        run: |
          python scripts/baselines/capture_setup_probe.py \
              --output /tmp/probe.json
          {
            echo '## Setup probe'
            echo '```json'
            head -40 /tmp/probe.json
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Prepare smoke dataset
        run: make dataset-smoke

      - name: Run experiment (smoke)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          make experiment-run \
              CONFIG=data/eval/configs/ml/baseline_ml_dev_authority_benchmark_v1.yaml

      - name: Resolve latest run dir
        id: latest_run
        run: |
          LATEST=$(find data/eval/runs -mindepth 1 -maxdepth 1 -type d \
                   | sort | tail -n 1)
          echo "path=${LATEST}" >> "${GITHUB_OUTPUT}"
          echo "experiment + benchmark share the smoke output: ${LATEST}"

      - name: Compose weekly snapshot
        run: |
          python scripts/baselines/compose_weekly_snapshot.py \
              --probe /tmp/probe.json \
              --experiment-run-dir "${{ steps.latest_run.outputs.path }}" \
              --benchmark-run-dir "${{ steps.latest_run.outputs.path }}"

      - name: Commit snapshot to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet --exit-code -- data/baselines/; then
            echo "no changes under data/baselines/; skipping commit"
            exit 0
          fi
          WEEK=$(date -u +'%G-W%V')
          git add data/baselines/
          git commit -m "chore(baselines): weekly snapshot ${WEEK}"
          git push origin HEAD:main

      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-baseline-${{ github.run_id }}
          path: data/baselines/
          if-no-files-found: warn
          retention-days: 90
