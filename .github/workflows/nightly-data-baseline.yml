# Weekly data + setup baseline ledger (operator option 4 / 2026-06-25).
#
# NOT a test run. Captures the project's data + setup state plus a
# fresh eval + benchmark run, commits the snapshot to
# ``data/baselines/baseline-YYYY-WNN.json`` on main. release.yml diffs
# against the most recent snapshot for the "what changed since last
# week" block in the release notes draft.
#
# Cadence: Monday 04:00 UTC. Operator can also fire manually.

name: Weekly data baseline

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write   # commits the snapshot back to main
  issues: write     # open/update/close the weekly baseline-drift issue

concurrency:
  group: weekly-data-baseline
  cancel-in-progress: false

jobs:
  capture-baseline:
    name: Capture weekly snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: baselines
    steps:
      - name: Checkout main
        uses: actions/checkout@v7
        # Don't persist GITHUB_TOKEN as a git credential — the
        # ``Commit snapshot to main`` step below pushes via
        # INFRA_STATE_COMMIT_TOKEN. A persisted GITHUB_TOKEN
        # http.extraheader shadows the PAT auth in the push URL,
        # attributing the push to ``github-actions[bot]`` (not a
        # bypass actor) instead of the PAT bearer → GH013. This
        # was the actual cause of every "PAT auth'd but push got
        # rejected" failure we chased.
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: '3.11.8'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ffmpeg (torchcodec via [ml] needs libav* shared libs to import)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install package (dev + ml)
        # The smoke experiment config references the ml baseline
        # (``baseline_ml_dev_authority_benchmark_v1.yaml``), which loads
        # the summarization + NLI models via the ml provider on import
        # — needs ``transformers`` / ``torch`` / ``spacy`` from the
        # ``[ml]`` extra. ``.[dev]`` alone hits
        # ``ModuleNotFoundError: No module named 'transformers'``;
        # ``[ml]`` pulls torchaudio→torchcodec, which needs ffmpeg's
        # libav* shared libs at import time (installed in the prior step).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,ml]"

      - name: Setup probe (data + config + git state)
        env:
          DGX_VLLM_ENDPOINT: ${{ vars.DGX_VLLM_ENDPOINT }}
        run: |
          python scripts/baselines/capture_setup_probe.py \
              --output /tmp/probe.json
          {
            echo '## Setup probe'
            echo '```json'
            head -40 /tmp/probe.json
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Prepare benchmark dataset (materialize transcripts)
        # The smoke config (baseline_ml_dev_authority_benchmark_v1.yaml) references
        # ``curated_5feeds_benchmark_v1``; ``data/eval/materialized/`` is gitignored,
        # so it must be rebuilt from the (tracked) sources before experiment-run.
        run: |
          make dataset-benchmark
          make dataset-materialize DATASET_ID=curated_5feeds_benchmark_v1

      - name: Run experiment (smoke)
        # HF_HOME / HF_HUB_CACHE pin the cache path so the model_loader
        # preload and transformers from_pretrained agree (otherwise
        # local_files_only=True load misses → checkpoint_files=[None] →
        # AttributeError at modeling_utils.py:4924). Mirrors nightly.yml.
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HOME: /home/runner/.cache/huggingface
          HF_HUB_CACHE: /home/runner/.cache/huggingface/hub
        run: |
          make experiment-run \
              CONFIG=data/eval/configs/ml/baseline_ml_dev_authority_benchmark_v1.yaml

      - name: Resolve latest run dir
        id: latest_run
        run: |
          LATEST=$(find data/eval/runs -mindepth 1 -maxdepth 1 -type d \
                   | sort | tail -n 1)
          echo "path=${LATEST}" >> "${GITHUB_OUTPUT}"
          echo "experiment + benchmark share the smoke output: ${LATEST}"

      - name: Compose weekly snapshot
        run: |
          python scripts/baselines/compose_weekly_snapshot.py \
              --probe /tmp/probe.json \
              --experiment-run-dir "${{ steps.latest_run.outputs.path }}" \
              --benchmark-run-dir "${{ steps.latest_run.outputs.path }}"

      - name: Commit snapshot to main
        # Pushes via INFRA_STATE_COMMIT_TOKEN (fine-grained PAT in the
        # ``baselines`` environment; same identity already used by
        # infra-apply.yml against the ``prod`` env). The PAT bypasses
        # the main ruleset by inheriting the owning user's admin role.
        #
        # KEY: the checkout step above MUST have ``persist-credentials:
        # false`` or the GITHUB_TOKEN http.extraheader shadows this
        # PAT auth → push attributed to github-actions[bot] → GH013.
        #
        # Path-scoping enforced HERE in code: staged-paths guard fails
        # the job if anything outside data/baselines/ slipped into
        # staging. Combined with the CODEOWNERS gate on
        # .github/workflows/**, the only way to expand the bot's write
        # surface is a PR you approve.
        env:
          INFRA_STATE_COMMIT_TOKEN: ${{ secrets.INFRA_STATE_COMMIT_TOKEN }}
        run: |
          set -e
          if [ -z "${INFRA_STATE_COMMIT_TOKEN:-}" ]; then
            echo "::error::INFRA_STATE_COMMIT_TOKEN secret missing in the 'baselines' environment."
            exit 1
          fi
          git config user.name  "baselines-commit-bot"
          git config user.email "baselines-commit-bot@noreply.github.com"
          # ``git status --porcelain`` covers untracked + modified; ``git diff``
          # alone (tracked-only) silently skips brand-new snapshot files.
          if [ -z "$(git status --porcelain -- data/baselines/)" ]; then
            echo "no changes under data/baselines/; skipping commit"
            exit 0
          fi
          WEEK=$(date -u +'%G-W%V')
          git add data/baselines/
          # Defense-in-depth: refuse to push anything outside data/baselines/.
          # The only legitimate side-effect of this job is a new baseline
          # JSON. If staging picked up anything else, that's a tamper signal
          # — fail loudly before we ever talk to GitHub.
          OUTSIDE=$(git diff --cached --name-only | grep -v '^data/baselines/' || true)
          if [ -n "$OUTSIDE" ]; then
            echo "::error::staged paths outside data/baselines/ — refusing to push:"
            echo "$OUTSIDE"
            exit 1
          fi
          git commit -m "chore(baselines): weekly snapshot ${WEEK}"
          REMOTE="https://x-access-token:${INFRA_STATE_COMMIT_TOKEN}@github.com/${{ github.repository }}.git"
          # Rebase-on-conflict (concurrent commits to main during our compose).
          # Stash any working-tree changes the earlier pipeline steps left
          # behind (e.g. regenerated dataset descriptors) — ``git rebase``
          # refuses with "cannot rebase: You have unstaged changes" if the
          # working tree isn't clean. The stash is dropped after.
          for attempt in 1 2 3; do
            if git push "$REMOTE" HEAD:main 2>&1; then
              echo "push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "push rejected — pulling main with rebase (attempt ${attempt})"
            git fetch "$REMOTE" main
            git stash push -u -m "baseline-rebase-${attempt}" --quiet || true
            if ! git rebase FETCH_HEAD; then
              echo "::error::rebase conflict under data/baselines/ — another snapshot pushed concurrently. Aborting."
              git rebase --abort
              git stash drop --quiet || true
              exit 1
            fi
            git stash drop --quiet || true
          done
          echo "::error::push still failing after 3 rebase attempts"
          exit 1

      - name: Check drift vs previous baseline
        # Runs AFTER the commit step so this-week + prev-week both live
        # under data/baselines/ in the workspace. Always exits 0 — the
        # next step inspects the JSON report to decide issue actions.
        id: drift
        run: |
          # Pull origin/main with rebase first — the commit step's push
          # already landed our snapshot remotely; make sure our local tree
          # reflects that before counting "the two most recent" files.
          git fetch origin main --quiet || true
          # Refresh data/baselines/ from the just-pushed remote (commit
          # step pushed via the PAT URL; local tree may lack the new SHA).
          git checkout origin/main -- data/baselines/ || true
          python3 scripts/baselines/check_drift.py \
            --baselines-dir data/baselines \
            --thresholds data/baselines/drift_thresholds.yaml \
            --output /tmp/drift-report.json
          BREACH_COUNT=$(jq '.breaches | length' /tmp/drift-report.json)
          STATUS=$(jq -r '.status' /tmp/drift-report.json)
          echo "status=${STATUS}"           >> "$GITHUB_OUTPUT"
          echo "breach_count=${BREACH_COUNT}" >> "$GITHUB_OUTPUT"
          {
            echo "## Baseline drift check"
            echo
            echo "- status: \`${STATUS}\`"
            echo "- breaches: ${BREACH_COUNT}"
            echo
            echo "<details><summary>Full drift report</summary>"
            echo
            echo '```json'
            cat /tmp/drift-report.json
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open / update / close weekly drift issue
        # Mirrors infra-drift.yml's idempotent pattern:
        # - status=breaches → open new issue OR update the existing open one
        # - status=no_breaches → close the open issue (if any) with "resolved"
        # - status=first_snapshot / no_snapshot → no-op
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:    ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DRIFT_STATUS:       ${{ steps.drift.outputs.status }}
          DRIFT_BREACH_COUNT: ${{ steps.drift.outputs.breach_count }}
        run: |
          set -euo pipefail
          OPEN_NUM=$(gh issue list --repo "$REPO" --state open \
            --search 'in:title "baseline drift detected:"' --json number --limit 1 \
            | jq -r '.[0].number // empty')
          case "$DRIFT_STATUS" in
            no_breaches)
              if [ -n "$OPEN_NUM" ]; then
                echo "drift resolved — closing #${OPEN_NUM}"
                gh issue close "$OPEN_NUM" --repo "$REPO" \
                  --comment "Baseline drift resolved on $(date -u +%Y-%m-%dT%H:%MZ). Closing automatically. Run: ${RUN_URL}"
              else
                echo "no drift, no open issue — nothing to do"
              fi
              ;;
            first_snapshot|no_snapshot)
              echo "skipping issue management: status=${DRIFT_STATUS}"
              ;;
            breaches)
              BODY_FILE=$(mktemp)
              python3 - <<'PY' > "$BODY_FILE"
          import json, os
          r = json.load(open("/tmp/drift-report.json"))
          print(f"**Baseline drift detected** by scheduled `nightly-data-baseline.yml`.")
          print()
          print(f"- This week: `{r.get('this_week_id')}` (`{r.get('this_path')}`)")
          print(f"- Prev week: `{r.get('prev_week_id')}` (`{r.get('prev_path')}`)")
          print(f"- Workflow run: {os.environ['RUN_URL']}")
          print()
          print("## Breaches to investigate")
          print()
          # Group by category, ordered by severity.
          severities = {"high": [], "medium": [], "low": []}
          for b in r["breaches"]:
              severities.setdefault(b.get("severity", "low"), []).append(b)
          for sev in ("high", "medium", "low"):
              for b in severities[sev]:
                  print(f"### `{b['category']}` / `{b['signal']}`  ({sev})")
                  print()
                  print(b["message"])
                  print()
                  print(f"- This week: `{b.get('this_value')}`")
                  print(f"- Prev week: `{b.get('prev_value')}`")
                  for k in ("ratio", "drift_ratio", "threshold_ratio"):
                      if k in b:
                          print(f"- `{k}`: `{b[k]}`")
                  print()
          notes = r.get("informational") or []
          if notes:
              print("## Informational context (not breaches)")
              print()
              for n in notes:
                  print(f"- {n}")
              print()
          print("---")
          print()
          print("_Auto-managed by `nightly-data-baseline.yml` → `scripts/baselines/check_drift.py`._")
          print("_Updated weekly while drift persists; auto-closes when next snapshot clears all thresholds._")
          print("_Tune thresholds at `data/baselines/drift_thresholds.yaml`._")
          PY
              if [ -n "$OPEN_NUM" ]; then
                echo "updating existing drift issue #${OPEN_NUM}"
                gh issue edit "$OPEN_NUM" --repo "$REPO" \
                  --title "baseline drift detected: $(date -u +%Y-%m-%d)" \
                  --body-file "$BODY_FILE"
                gh issue comment "$OPEN_NUM" --repo "$REPO" \
                  --body "Drift re-detected on scheduled run (${DRIFT_BREACH_COUNT} breaches). Run: ${RUN_URL}"
              else
                echo "opening new drift issue (${DRIFT_BREACH_COUNT} breaches)"
                gh issue create --repo "$REPO" \
                  --title "baseline drift detected: $(date -u +%Y-%m-%d)" \
                  --body-file "$BODY_FILE" \
                  --label "baselines,observability" 2>&1 | tee /tmp/issue-create.log || \
                gh issue create --repo "$REPO" \
                  --title "baseline drift detected: $(date -u +%Y-%m-%d)" \
                  --body-file "$BODY_FILE"
              fi
              rm -f "$BODY_FILE"
              ;;
            *)
              echo "::warning::unknown drift status '${DRIFT_STATUS}' — skipping"
              ;;
          esac

      - name: Upload snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-baseline-${{ github.run_id }}
          path: data/baselines/
          if-no-files-found: warn
          retention-days: 90
