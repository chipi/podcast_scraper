# RFC-041 Phase 4 — ML benchmarking framework run.
#
# Standalone operator-triggered benchmark. NOT a CI gate and NOT
# called from any other workflow (per operator directive
# 2026-06-24). Surfaces a "Run benchmark" button the operator can
# connect to the release process when ready.
#
# Inputs the operator picks at run-time:
#   dataset_size:  smoke (curated_5feeds_smoke_v1, 5 episodes,
#                  ~3-5 min) or benchmark (curated_5feeds_benchmark_v1,
#                  ~10 episodes, ~15-20 min)
#   config:       ML eval config YAML under data/eval/configs/ml/
#                 (local-only providers per [[feedback_no_llm_in_ci]])
#
# Artifacts (uploaded on completion): the run dir + a top-of-summary
# JSON (ROUGE / cosine / runtime) for paste-into-release-notes.

name: ML benchmark (RFC-041)

on:
  workflow_dispatch:
    inputs:
      dataset_size:
        description: 'Dataset size: smoke (fast) | benchmark (full)'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - benchmark
      config:
        description: 'ML eval config YAML (must target local providers)'
        required: true
        default: 'data/eval/configs/ml/baseline_ml_dev_authority_benchmark_v1.yaml'
  # Reusable from release.yml + nightly-data-baseline.yml. Per
  # operator directive: NOT a CI gate; only called from workflows
  # the operator explicitly authored.
  workflow_call:
    inputs:
      dataset_size:
        type: string
        required: true
      config:
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: ml-benchmark-${{ inputs.dataset_size }}-${{ inputs.config }}
  cancel-in-progress: false

jobs:
  benchmark:
    name: Benchmark runner
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v7
        with:
          python-version: '3.11.8'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify config exists
        run: |
          if [ ! -f "${{ inputs.config }}" ]; then
            echo "::error::Config not found: ${{ inputs.config }}"
            find data/eval/configs/ml -maxdepth 1 -type f -name '*.yaml' | head -20
            exit 1
          fi
          echo "Using config: ${{ inputs.config }}"

      - name: Prepare dataset
        run: |
          if [ "${{ inputs.dataset_size }}" = "smoke" ]; then
            make dataset-smoke
          else
            make dataset-benchmark
          fi

      - name: Run benchmark
        env:
          LOG_LEVEL: INFO
        run: |
          make experiment-run CONFIG="${{ inputs.config }}"

      - name: Summarise top-line metrics
        if: always()
        run: |
          # Render top-line metrics into the job summary for the
          # release-notes paste.
          python -c "
          import json, pathlib, sys
          runs = sorted(pathlib.Path('data/eval/runs').glob('*'),
                       key=lambda p: p.stat().st_mtime, reverse=True)
          if not runs:
              print('no runs found'); sys.exit(0)
          latest = runs[0]
          metrics_path = latest / 'metrics.json'
          if not metrics_path.is_file():
              print(f'no metrics.json under {latest}'); sys.exit(0)
          metrics = json.loads(metrics_path.read_text())
          print(f'Run: {latest.name}')
          print(json.dumps(metrics, indent=2))
          " >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-benchmark-${{ inputs.dataset_size }}-${{ github.run_id }}
          path: |
            data/eval/runs/**
            !data/eval/runs/**/*.bin
          if-no-files-found: warn
          retention-days: 30
