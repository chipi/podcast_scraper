name: DR drill — deploy VPS

# RFC-082 / #752 — same deploy path as deploy-prod.yml but targets the DR
# drill Hetzner stack (Tailscale + deploy@ + infra/deploy/deploy.sh).
# Proves the deploy pipeline is parameterized by host/secret names, not only
# hard-coded prod values.
#
# Prerequisites:
#   - secrets: TS_AUTHKEY, DRILL_DEPLOY_SSH_PRIVATE_KEY (Ed25519 PEM for
#              deploy@ on the drill host — same pattern as PROD_SSH_PRIVATE_KEY;
#              public half must be in deploy@ ~/.ssh/authorized_keys; can be
#              the same keypair as prod if you appended the same .pub to drill)
#   - vars:    DRILL_TAILNET_FQDN (e.g. dr-podcast.tail-xxxx.ts.net)
#
# SSH note: ``Permission denied (publickey,password)`` means TCP + host key
# worked but the server rejected the offered key (see Wire step retries for
# first-boot race vs permanent key mismatch in README / PROD_RUNBOOK).
#
# Host prerequisites: staged /srv/podcast-scraper/.env and removed
# .bootstrap-needs-env so docker compose can run (see PROD_RUNBOOK / cloud-init).

on:
  workflow_dispatch:
    inputs:
      override_image_sha:
        description: "Image :sha-<7> tag to deploy (blank = current main HEAD short SHA)"
        required: false
        default: ""
  workflow_call:
    secrets:
      TS_AUTHKEY:
        required: true
      DRILL_DEPLOY_SSH_PRIVATE_KEY:
        required: true
    inputs:
      override_image_sha:
        description: "Image :sha-<7> tag (blank = caller workflow github.sha short)"
        type: string
        required: false
        default: ""

permissions:
  actions: read
  contents: read
  packages: read

concurrency:
  group: drill-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: drill
    steps:
      - name: "DR drill — pre-flight: secrets and variables"
        id: preflight
        env:
          TS_AUTHKEY:                  ${{ secrets.TS_AUTHKEY }}
          DRILL_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DRILL_DEPLOY_SSH_PRIVATE_KEY }}
          DRILL_TAILNET_FQDN:          ${{ vars.DRILL_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${TS_AUTHKEY:-}" ]                    && MISSING="$MISSING TS_AUTHKEY"
          [ -z "${DRILL_DEPLOY_SSH_PRIVATE_KEY:-}" ] && MISSING="$MISSING DRILL_DEPLOY_SSH_PRIVATE_KEY"
          [ -z "${DRILL_TAILNET_FQDN:-}" ]          && MISSING="$MISSING DRILL_TAILNET_FQDN"
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing prereqs:$MISSING"
            echo "::warning::Stage DRILL_DEPLOY_SSH_PRIVATE_KEY + vars per workflow header and infra/README.md (#752)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "DR drill — checkout: shallow (resolver scripts)"
        if: steps.preflight.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: "DR drill — resolve: deploy image SHA (GHCR tag)"
        id: sha
        if: steps.preflight.outputs.skip != 'true'
        env:
          OVERRIDE: ${{ inputs.override_image_sha }}
        run: |
          set -euo pipefail
          SHA_SHORT="${OVERRIDE:-}"
          if [ -z "$SHA_SHORT" ]; then
            SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          fi
          if ! [[ "$SHA_SHORT" =~ ^[a-f0-9]{7,40}$ ]]; then
            echo "::error::override_image_sha must match ^[a-f0-9]{7,40}$ (got: ${SHA_SHORT})"
            exit 1
          fi
          echo "short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "git_ref=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "::notice::Deploying to drill — image tag sha-$SHA_SHORT (git reset target: $SHA_SHORT)"

      - name: "DR drill — validate: GHCR image manifest exists (pre-SSH)"
        if: steps.preflight.outputs.skip != 'true'
        env:
          SHA_SHORT: ${{ steps.sha.outputs.short }}
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          for svc in api viewer pipeline-llm; do
            ref="ghcr.io/chipi/podcast-scraper-stack-${svc}:sha-${SHA_SHORT}"
            echo "::notice::Checking manifest: ${ref}"
            docker manifest inspect "$ref" >/dev/null
          done

      - name: "DR drill — join: tailnet (tag:gha-deployer)"
        if: steps.preflight.outputs.skip != 'true'
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags:    tag:gha-deployer
          version: 1.96.4

      - name: "DR drill — SSH: install identity (deploy@, DRILL_DEPLOY_SSH_PRIVATE_KEY)"
        if: steps.preflight.outputs.skip != 'true'
        uses: ./.github/actions/prod-ssh-key
        with:
          ssh_private_key:   ${{ secrets.DRILL_DEPLOY_SSH_PRIVATE_KEY }}
          identity_env_name: SSH_DRILL_IDENTITY

      - name: "DR drill — resolve: tailnet host (MagicDNS, poll until online)"
        id: ts_host
        if: steps.preflight.outputs.skip != 'true'
        env:
          DRILL_TAILNET_FQDN: ${{ vars.DRILL_TAILNET_FQDN }}
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          # After a fresh ``tofu apply``, cloud-init + ``tailscale up`` can lag
          # behind the deploy job; poll until the drill host is **Online** in
          # ``tailscale status`` (see scripts/ops/resolve_drill_tailnet_host.sh).
          max_wait=480
          interval=15
          elapsed=0
          R=""
          while [ "$elapsed" -lt "$max_wait" ]; do
            if R=$(bash scripts/ops/resolve_drill_tailnet_host.sh 2>/dev/null); then
              echo "::notice::Drill host visible on tailnet after ${elapsed}s."
              break
            fi
            echo "::notice::Drill host not on tailnet yet (${elapsed}s / ${max_wait}s); sleeping ${interval}s."
            sleep "$interval"
            elapsed=$((elapsed + interval))
          done
          if [ -z "$R" ]; then
            R=$(bash scripts/ops/resolve_drill_tailnet_host.sh)
          fi
          echo "resolved_fqdn=$R" >> "$GITHUB_OUTPUT"
          WANT="${{ vars.DRILL_TAILNET_FQDN }}"
          if [ "$(printf '%s' "$R" | tr '[:upper:]' '[:lower:]')" != "$(printf '%s' "$WANT" | tr '[:upper:]' '[:lower:]')" ]; then
            echo "::notice::Tailscale live host ($R) differs from vars.DRILL_TAILNET_FQDN ($WANT). Using $R for SSH and probes."
          fi

      # The drill host's /srv/podcast-scraper/.env is NOT written by cloud-init
      # (infra/cloud-init/prod.user-data:41 — deploy workflows stage it, #841).
      # Prod's deploy-prod.yml stages it from PROD_* secrets; the drill is a
      # throwaway, so we stage just the static paths + profiles the stack and the
      # #808 corpus-path preflight need. Missing LLM/Sentry/Grafana keys fall
      # through to compose ${VAR:-} defaults, so the stack still starts. Atomic:
      # tmpfile in /dev/shm (RAM, never disk) -> scp -> mv on host. Retries the
      # same first-boot publickey race the PODCAST_RELEASE wire step handles.
      - name: "DR drill — deploy: stage host /srv/podcast-scraper/.env (#808/#841)"
        if: steps.preflight.outputs.skip != 'true'
        env:
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          set -euo pipefail
          ENVTMP=$(mktemp -p /dev/shm drill-env.XXXXXX)
          trap 'shred -u "$ENVTMP" 2>/dev/null || rm -f "$ENVTMP"' EXIT
          chmod 600 "$ENVTMP"
          {
            printf '%s=%s\n' PODCAST_DOCKER_PROJECT_DIR /srv/podcast-scraper
            printf '%s=%s\n' PODCAST_CORPUS_HOST_PATH   /srv/podcast-scraper/corpus
            printf '%s=%s\n' PODCAST_DEFAULT_CORPUS_PATH /app/output
            printf '%s=%s\n' PODCAST_ENV                 prod
            printf '%s=%s\n' PODCAST_AVAILABLE_PROFILES  cloud_balanced,cloud_thin
            printf '%s=%s\n' PODCAST_DEFAULT_PROFILE     cloud_balanced
          } > "$ENVTMP"
          mx=12
          it=10
          for a in $(seq 1 "$mx"); do
            if scp -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
                 -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
                 "$ENVTMP" "${SSH_TARGET}:/srv/podcast-scraper/.env.deploy-staged" \
               && ssh -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
                 -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
                 "set -euo pipefail; cd /srv/podcast-scraper; \
                  mv .env.deploy-staged .env; chmod 600 .env; \
                  chown deploy:deploy .env 2>/dev/null || true; \
                  test -f .bootstrap-needs-env && rm -f .bootstrap-needs-env || true"; then
              echo "::notice::Staged host .env on SSH attempt ${a} of ${mx}"
              exit 0
            fi
            echo "::notice::stage .env attempt ${a}/${mx} failed; sleeping ${it}s (first-boot publickey race)."
            sleep "$it"
          done
          echo "::error::Failed to stage host .env after ${mx} attempts (publickey?)."
          exit 1

      # First-boot race: Tailscale can show the node Online before cloud-init
      # finishes writing ``deploy@`` ``authorized_keys``. ``publickey`` then is
      # often transient; retry before concluding a keypair mismatch.
      - name: "DR drill — deploy: wire PODCAST_RELEASE into host .env"
        if: steps.preflight.outputs.skip != 'true'
        env:
          SHA_SHORT:  ${{ steps.sha.outputs.short }}
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          set -euo pipefail
          mx=12
          it=10
          for a in $(seq 1 "$mx"); do
            if ssh -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
              "set -euo pipefail; cd /srv/podcast-scraper; \
               test -f .env || install -m 600 /dev/null .env; \
               sed -i '/^PODCAST_RELEASE=/d' .env; \
               echo 'PODCAST_RELEASE=sha-${SHA_SHORT}' >> .env; \
               chmod 600 .env"; then
              echo "::notice::Wired PODCAST_RELEASE on SSH attempt ${a} of ${mx}"
              exit 0
            fi
            echo "::notice::SSH wire attempt ${a}/${mx} failed; sleeping ${it}s (see workflow header — publickey vs bootstrap)."
            sleep "$it"
          done
          echo "::error::SSH still failing after ${mx} attempts (publickey). If every attempt fails, key mismatch is likely — see infra README / PROD_RUNBOOK drill SSH."
          exit 1

      # Broken first-boot ``write_files`` / Terraform ``$$((`` can leave
      # ``/usr/local/sbin/podcast-tailscale-serve.sh`` invalid; deploy.sh then
      # cannot refresh MagicDNS HTTPS. Push the repo canonical script before
      # ``git pull`` on the host (same pattern as ``drill-stack-playwright.yml``).
      - name: "DR drill — tailscale: install canonical serve script (pre-deploy)"
        if: steps.preflight.outputs.skip != 'true'
        env:
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          set -euo pipefail
          scp -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            infra/cloud-init/podcast-tailscale-serve.sh "${SSH_TARGET}:/tmp/podcast-tailscale-serve.ci"
          if ! ssh -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            'sudo -n /usr/bin/install -m 0755 -o root -g root /tmp/podcast-tailscale-serve.ci /usr/local/sbin/podcast-tailscale-serve.sh'; then
            echo "::warning::sudo install of podcast-tailscale-serve.sh failed (expected until sudoers on the drill host allows install from /tmp)."
          fi
          ssh -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            'sudo -n /usr/local/sbin/podcast-tailscale-serve.sh' \
            || echo "::warning::podcast-tailscale-serve.sh exited non-zero; deploy.sh will retry after health"

      - name: "DR drill — pre-deploy corpus path preflight (#808)"
        if: steps.preflight.outputs.skip != 'true'
        env:
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
          SSH_DRILL_IDENTITY: ${{ env.SSH_DRILL_IDENTITY }}
        run: |
          set -euo pipefail
          bash scripts/ops/preflight_prod_corpus_path.sh "$SSH_TARGET"

      - name: "DR drill — deploy: git pull + compose + VPS-local /api/health"
        if: steps.preflight.outputs.skip != 'true'
        env:
          SHA_SHORT:  ${{ steps.sha.outputs.short }}
          GIT_REF:    ${{ steps.sha.outputs.git_ref }}
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          set -euo pipefail
          mx=12
          it=10
          for a in $(seq 1 "$mx"); do
            if ssh -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
              "DEPLOY_GIT_SHA='${GIT_REF}' DEPLOY_IMAGE_SHA='${SHA_SHORT}' /srv/podcast-scraper/infra/deploy/deploy.sh"; then
              echo "::notice::deploy.sh succeeded on SSH attempt ${a} of ${mx}"
              exit 0
            fi
            echo "::notice::SSH deploy attempt ${a}/${mx} failed; sleeping ${it}s."
            sleep "$it"
          done
          echo "::error::deploy.sh SSH failed after ${mx} attempts."
          exit 1

      # MagicDNS https://…/ needs ``tailscale serve`` on the VPS. ``deploy.sh``
      # refreshes it after container health; ``drill-stack-playwright`` also SSH-refreshes
      # before Playwright. This step curls host loopback :8080 (no serve required).
      - name: "DR drill — smoke: /api/health via SSH (viewer on host :8080)"
        if: steps.preflight.outputs.skip != 'true'
        env:
          SSH_TARGET: deploy@${{ steps.ts_host.outputs.resolved_fqdn }}
        run: |
          set -euo pipefail
          for i in $(seq 1 12); do
            if ssh -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
              'curl -fsS http://127.0.0.1:8080/api/health' \
              | jq -e '.status == "ok"' >/dev/null 2>&1; then
              echo "::notice::/api/health OK via tailnet SSH after $((i * 5))s (drill)"
              exit 0
            fi
            sleep 5
          done
          echo "::error::/api/health did not return ok within 60s (SSH → host :8080 viewer, drill)"
          ssh -i "$SSH_DRILL_IDENTITY" -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$SSH_TARGET" \
            'docker logs --tail 50 compose-api-1' 2>&1 || true
          exit 1
