name: Drill infra apply (manual)

# GitHub #752 — manual apply for OpenTofu workspace `drill` only. Uses
# HCLOUD_TOKEN_DRILL and GitHub Environment `drill` for approval gates.
# State is encrypted to terraform.tfstate.enc.drill (parallel to prod
# terraform.tfstate.enc for the default workspace). Each run uploads artifact
# ``terraform-state-after-apply-drill`` so ``drill-infra-destroy`` in the same
# ``dr-drill-exercise`` run can ``tofu destroy`` without a git commit. The same
# artifact is downloaded at the start of this job (``continue-on-error``) so a
# **re-run failed apply** in the same workflow run picks up prior state.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "APPLY" to confirm apply in workspace drill'
        required: true
        default: ''
      skip_confirm:
        description: "Leave false for manual runs. Orchestrator sets true via workflow_call."
        type: boolean
        required: false
        default: false
  workflow_call:
    secrets:
      HCLOUD_TOKEN_DRILL:
        required: true
      TS_API_KEY:
        required: true
      TFSTATE_AGE_KEY:
        required: true
      OPERATOR_SSH_PUBLIC_KEY:
        required: true
    inputs:
      skip_confirm:
        description: "True when dr-drill-exercise already gated on DRILL_FULL_CYCLE"
        type: boolean
        required: true

permissions:
  contents: read
  actions: write

concurrency:
  group: drill-infra-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: drill
    steps:
      # See drill-infra-destroy.yml — caller event stays workflow_dispatch inside reuse.
      - name: Confirm input (manual dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_confirm != true }}
        run: |
          if [ "${{ inputs.confirm }}" != "APPLY" ]; then
            echo "::error::Must type APPLY to confirm. Got: '${{ inputs.confirm }}'"
            exit 1
          fi

      - uses: actions/checkout@v5

      - name: Restore drill state from earlier apply attempt (same workflow run)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: terraform-state-after-apply-drill
          path: .downloaded-self-apply-drill-state

      - name: Prefer prior apply artifact over git for encrypted drill state
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          DEST="infra/terraform/terraform.tfstate.enc.drill"
          FOUND=""
          for cand in \
            ".downloaded-self-apply-drill-state/terraform.tfstate.enc.drill" \
            ".downloaded-self-apply-drill-state/infra/terraform/terraform.tfstate.enc.drill"; do
            if [ -f "$cand" ]; then FOUND="$cand"; break; fi
          done
          if [ -z "$FOUND" ] && [ -d .downloaded-self-apply-drill-state ]; then
            FOUND=$(find .downloaded-self-apply-drill-state -type f \
              \( -name 'terraform.tfstate.enc.drill' -o -name '*.enc.drill' \) \
              2>/dev/null | head -1 || true)
          fi
          if [ -n "$FOUND" ] && [ -f "$FOUND" ]; then
            mkdir -p "$(dirname "$DEST")"
            cp "$FOUND" "$DEST"
            echo "Using encrypted drill state from prior apply attempt in this workflow run."
          fi

      - name: Pre-flight — required secrets present?
        env:
          HCLOUD_TOKEN_DRILL:        ${{ secrets.HCLOUD_TOKEN_DRILL }}
          TS_API_KEY:                ${{ secrets.TS_API_KEY }}
          TFSTATE_AGE_KEY:           ${{ secrets.TFSTATE_AGE_KEY }}
          OPERATOR_SSH_PUBLIC_KEY:   ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${HCLOUD_TOKEN_DRILL:-}" ]      && MISSING="$MISSING HCLOUD_TOKEN_DRILL"
          [ -z "${TS_API_KEY:-}" ]            && MISSING="$MISSING TS_API_KEY"
          [ -z "${TFSTATE_AGE_KEY:-}" ]       && MISSING="$MISSING TFSTATE_AGE_KEY"
          [ -z "${OPERATOR_SSH_PUBLIC_KEY:-}" ] && MISSING="$MISSING OPERATOR_SSH_PUBLIC_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing prereqs:$MISSING. Stage them per infra/README.md (#752)."
            exit 1
          fi

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.0

      - name: Install sops + age
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 age/age age/age-keygen

      - name: Decrypt drill state (if any prior apply has happened)
        working-directory: infra
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          if [ -f terraform/terraform.tfstate.enc.drill ]; then
            mkdir -p terraform/terraform.tfstate.d/drill
            sops -d terraform/terraform.tfstate.enc.drill \
              > terraform/terraform.tfstate.d/drill/terraform.tfstate
          fi

      - name: tofu init + workspace drill + apply
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token:      ${{ secrets.HCLOUD_TOKEN_DRILL }}
          TF_VAR_tailscale_api_key: ${{ secrets.TS_API_KEY }}
          TF_VAR_ssh_public_key:    ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_tailnet: ${{ vars.TAILNET_NAME }}
        run: |
          set -euo pipefail
          set +o pipefail
          yes | tofu init -input=false
          set -o pipefail
          # -or-create avoids exit 1 on first run; the opentofu/setup-opentofu
          # tofu_wrapper logs ##[error] for any non-zero child tofu exit.
          tofu workspace select -or-create drill
          tofu apply -auto-approve -input=false -var-file=terraform.drill.ci.tfvars

      - name: Re-encrypt drill state (always — even if apply failed)
        if: always()
        working-directory: infra
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          if [ -f terraform/terraform.tfstate.d/drill/terraform.tfstate ]; then
            sops -e terraform/terraform.tfstate.d/drill/terraform.tfstate \
              > terraform/terraform.tfstate.enc.drill.new
            mv terraform/terraform.tfstate.enc.drill.new \
              terraform/terraform.tfstate.enc.drill
          fi

      - name: Upload encrypted drill state as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state-after-apply-drill
          path: infra/terraform/terraform.tfstate.enc.drill
          if-no-files-found: ignore
          retention-days: 30

      - name: Cleanup plaintext drill state
        if: always()
        run: |
          rm -rf infra/terraform/terraform.tfstate.d/drill
          shred -u infra/terraform/terraform.tfstate 2>/dev/null \
            || rm -f infra/terraform/terraform.tfstate
