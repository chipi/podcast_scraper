name: Infra CI

# RFC-082 Decision 6 — GitOps loop, PR side. On any PR touching infra/** or
# tailscale/policy.hujson, run `tofu fmt -check && validate && plan` and post
# the plan as a PR comment so the reviewer sees what `tofu apply` would do.
#
# Closes #719 (PR-CI half). The infra-apply.yml workflow handles the manual
# dispatch side.
#
# Operator prerequisites (#714):
#   secrets: HCLOUD_TOKEN, TS_API_KEY (Free-plan substitute for OAuth — used by
#            the tailscale Terraform provider; see PROD_RUNBOOK.md "Tailscale
#            credentials"), TFSTATE_AGE_KEY
#   secrets: OPERATOR_SSH_PUBLIC_KEY (same value as laptop pubkey; secret so GHA masks logs)
#   vars:    TAILNET_NAME

on:
  pull_request:
    # Scope intentionally narrow: only Terraform sources + the ACL file the
    # tailscale provider consumes. ``infra/**`` was too broad — infra/ now
    # contains pyinfra (dgx/converge/), cloud-init/, deploy/, env templates,
    # etc. that have no relation to ``tofu plan`` (#897).
    paths:
      - 'infra/terraform/**'
      - 'infra/.sops.yaml'
      - 'tailscale/policy.hujson'

permissions:
  contents: read
  pull-requests: write  # required to post the plan comment

concurrency:
  group: infra-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Pre-flight — required secrets present?
        id: preflight
        env:
          HCLOUD_TOKEN:            ${{ secrets.HCLOUD_TOKEN }}
          TS_API_KEY:              ${{ secrets.TS_API_KEY }}
          TFSTATE_AGE_KEY:         ${{ secrets.TFSTATE_AGE_KEY }}
          OPERATOR_SSH_PUBLIC_KEY: ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${HCLOUD_TOKEN:-}" ]            && MISSING="$MISSING HCLOUD_TOKEN"
          [ -z "${TS_API_KEY:-}" ]              && MISSING="$MISSING TS_API_KEY"
          [ -z "${TFSTATE_AGE_KEY:-}" ]         && MISSING="$MISSING TFSTATE_AGE_KEY"
          [ -z "${OPERATOR_SSH_PUBLIC_KEY:-}" ] && MISSING="$MISSING OPERATOR_SSH_PUBLIC_KEY"
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing prereqs:$MISSING — skipping live plan."
            echo '::warning::Stage them per #714 and PROD_RUNBOOK (OPERATOR_SSH_PUBLIC_KEY is a repo Actions secret; remove legacy repo variable with the same name if present).'
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install OpenTofu
        if: steps.preflight.outputs.skip != 'true'
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.6.0

      - name: Install sops + age
        if: steps.preflight.outputs.skip != 'true'
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 age/age age/age-keygen

      - name: tofu fmt -check
        if: steps.preflight.outputs.skip != 'true'
        working-directory: infra/terraform
        run: tofu fmt -check -diff

      - name: tofu init + validate
        if: steps.preflight.outputs.skip != 'true'
        working-directory: infra/terraform
        run: |
          tofu init -input=false
          tofu validate

      - name: Decrypt state (if any prior apply has happened)
        if: steps.preflight.outputs.skip != 'true'
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          if [ -f infra/terraform/terraform.tfstate.enc ]; then
            sops -d infra/terraform/terraform.tfstate.enc > infra/terraform/terraform.tfstate
          fi

      - name: tofu plan
        if: steps.preflight.outputs.skip != 'true'
        id: plan
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token:      ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_tailscale_api_key: ${{ secrets.TS_API_KEY }}
          TF_VAR_ssh_public_key:    ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_tailnet: ${{ vars.TAILNET_NAME }}
        run: |
          set +e
          tofu plan -no-color -input=false 2>&1 | tee plan.txt
          PLAN_EXIT="${PIPESTATUS[0]}"
          # Cap to GitHub's 65k comment-body limit, leaving headroom for our wrapper.
          head -c 60000 plan.txt > plan.trunc.txt
          exit "$PLAN_EXIT"

      - name: Post plan as PR comment
        if: steps.preflight.outputs.skip != 'true' && always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let plan;
            try { plan = fs.readFileSync('infra/terraform/plan.trunc.txt', 'utf8'); }
            catch (e) { plan = '(plan output unavailable — see workflow logs)'; }
            const body = '## OpenTofu plan\n\n```\n' + plan + '\n```\n\n' +
                         '_Workflow run: ' + context.runId + '_';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Cleanup plaintext state
        if: always() && steps.preflight.outputs.skip != 'true'
        run: |
          shred -u infra/terraform/terraform.tfstate 2>/dev/null \
            || rm -f infra/terraform/terraform.tfstate
          rm -f infra/terraform/plan.bin infra/terraform/plan.txt infra/terraform/plan.trunc.txt

  # Renders ``infra/cloud-init/prod.user-data`` with sample inputs, parses
  # through ``yaml.safe_load`` (catches plain-scalar-as-mapping bugs that
  # crash cloud-init's runcmd module — see #842 / 2026-05-29 incident),
  # type-checks every runcmd entry as ``str|list`` (cloud-init ``shellify``
  # contract), and runs cloud-init's own JSON-Schema validator.
  #
  # Decoupled from the tofu-plan job above: no secrets required, so it
  # gives reviewer-visible coverage even when the live-plan job skips.
  cloud-init-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.6.0

      - name: Install cloud-init + pyyaml
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cloud-init python3-yaml

      - name: Render cloud-init template with sample inputs
        run: |
          set -euo pipefail
          mkdir -p /tmp/cloud-init-render
          cp -r infra /tmp/cloud-init-render/infra
          cat > /tmp/cloud-init-render/main.tf <<'TF'
          output "rendered" {
            value = templatefile("infra/cloud-init/prod.user-data", {
              tailnet_hostname             = "ci-test"
              tailscale_auth_key           = "tskey-FAKE"
              ssh_public_key               = "ssh-ed25519 AAAACI ci-test"
              additional_authorized_keys   = ["ssh-ed25519 AAAAORRERY gha-orrery-deploy"]
              tailscale_advertise_tags_cli = "tag:prod"
              alloy_enabled                = false
              grafana_cloud_metrics_remote_write_url = ""
              grafana_cloud_metrics_username         = ""
              grafana_cloud_metrics_password         = ""
              podcast_tailscale_serve_body = indent(6, chomp(file("infra/cloud-init/podcast-tailscale-serve.sh")))
              orrery_tailscale_serve_body  = indent(6, chomp(file("infra/cloud-init/orrery-tailscale-serve.sh")))
            })
          }
          TF
          cd /tmp/cloud-init-render
          tofu init -backend=false -input=false >/dev/null
          tofu apply -auto-approve -input=false >/dev/null
          tofu output -raw rendered > /tmp/rendered-cloudinit.yaml

      - name: yaml.safe_load + type-check runcmd entries (shellify contract)
        run: |
          python3 <<'PY'
          import sys, yaml
          with open('/tmp/rendered-cloudinit.yaml') as f:
              doc = yaml.safe_load(f)
          rc = doc.get('runcmd', [])
          bad = [(i, type(x).__name__, str(x)[:120])
                 for i, x in enumerate(rc)
                 if not isinstance(x, (str, list))]
          if bad:
              print('ERROR: runcmd has non-string/list entries (cloud-init shellify will fail):')
              for i, t, p in bad:
                  print(f'  [{i}] ({t}): {p}')
              sys.exit(1)
          print(f'OK: {len(rc)} runcmd entries, all string/list (shellify-safe)')
          PY

      - name: cloud-init schema validation
        # Catches the broader class of bugs beyond runcmd shellify:
        # deprecated keys, structural errors, write_files content issues.
        run: |
          set -euo pipefail
          cloud-init schema --config-file /tmp/rendered-cloudinit.yaml
          echo "OK: cloud-init schema validation passed"
