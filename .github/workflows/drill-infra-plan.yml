name: DR drill — infra plan (OpenTofu)

# GitHub #752 — OpenTofu workspace `drill` plan on PRs touching infra (parallel
# to infra-ci.yml which plans the default / prod workspace). Posts a separate
# PR comment so reviewers see drill-scoped changes without switching workspaces
# locally.
#
# Prerequisites: secrets HCLOUD_TOKEN_DRILL, TS_API_KEY, TFSTATE_AGE_KEY; optional
# committed infra/terraform/terraform.tfstate.enc.drill (sops+age).
# Job uses ``environment: drill`` so the same env-scoped secrets as apply/destroy
# are visible when this workflow is reused from ``drill-exercise`` (inherit
# alone does not expose environment secrets to jobs without an environment).
# Keep the ``drill`` environment free of required reviewers if you want PR plans
# to run without a manual approval gate.

on:
  pull_request:
    paths:
      - 'infra/**'
      - 'tailscale/policy.hujson'
  workflow_dispatch:
  workflow_call:
    secrets:
      HCLOUD_TOKEN_DRILL:
        required: true
      TS_API_KEY:
        required: true
      TFSTATE_AGE_KEY:
        required: true
      OPERATOR_SSH_PUBLIC_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: drill-infra-plan-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: drill
    steps:
      - uses: actions/checkout@v6

      - name: "DR drill — pre-flight: secrets and tokens (OpenTofu provider)"
        id: preflight
        env:
          HCLOUD_TOKEN_DRILL:      ${{ secrets.HCLOUD_TOKEN_DRILL }}
          TS_API_KEY:              ${{ secrets.TS_API_KEY }}
          TFSTATE_AGE_KEY:         ${{ secrets.TFSTATE_AGE_KEY }}
          OPERATOR_SSH_PUBLIC_KEY: ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          MISSING=""
          [ -z "${HCLOUD_TOKEN_DRILL:-}" ]      && MISSING="$MISSING HCLOUD_TOKEN_DRILL"
          [ -z "${TS_API_KEY:-}" ]            && MISSING="$MISSING TS_API_KEY"
          [ -z "${TFSTATE_AGE_KEY:-}" ]       && MISSING="$MISSING TFSTATE_AGE_KEY"
          [ -z "${OPERATOR_SSH_PUBLIC_KEY:-}" ] && MISSING="$MISSING OPERATOR_SSH_PUBLIC_KEY"
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing prereqs:$MISSING — skipping drill workspace plan."
            echo "::warning::Add missing secrets per infra/README.md (#752) and PROD_RUNBOOK (OPERATOR_SSH_PUBLIC_KEY is a repo Actions secret for log masking)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "DR drill — install: OpenTofu CLI"
        if: steps.preflight.outputs.skip != 'true'
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: 1.6.0

      - name: "DR drill — install: sops + age"
        if: steps.preflight.outputs.skip != 'true'
        run: |
          set -euo pipefail
          sudo curl -fsSL -o /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          sudo chmod +x /usr/local/bin/sops
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.2.1/age-v1.2.1-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 age/age age/age-keygen

      - name: "DR drill — tofu: fmt -check"
        if: steps.preflight.outputs.skip != 'true'
        working-directory: infra/terraform
        run: tofu fmt -check -diff

      - name: "DR drill — tofu: init"
        if: steps.preflight.outputs.skip != 'true'
        working-directory: infra/terraform
        run: |
          set -euo pipefail
          set +o pipefail
          yes | tofu init -input=false
          set -o pipefail

      - name: "DR drill — tofu: select workspace drill"
        if: steps.preflight.outputs.skip != 'true'
        working-directory: infra/terraform
        run: tofu workspace select -or-create drill

      - name: "DR drill — tofu: decrypt state (if prior apply exists)"
        if: steps.preflight.outputs.skip != 'true'
        working-directory: infra
        env:
          SOPS_AGE_KEY: ${{ secrets.TFSTATE_AGE_KEY }}
        run: |
          set -euo pipefail
          if [ -f terraform/terraform.tfstate.enc.drill ]; then
            mkdir -p terraform/terraform.tfstate.d/drill
            sops -d terraform/terraform.tfstate.enc.drill \
              > terraform/terraform.tfstate.d/drill/terraform.tfstate
          fi

      - name: "DR drill — tofu: validate"
        if: steps.preflight.outputs.skip != 'true'
        working-directory: infra/terraform
        run: tofu validate

      - name: "DR drill — tofu: plan (workspace drill)"
        if: steps.preflight.outputs.skip != 'true'
        id: plan
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token:      ${{ secrets.HCLOUD_TOKEN_DRILL }}
          TF_VAR_tailscale_api_key: ${{ secrets.TS_API_KEY }}
          TF_VAR_ssh_public_key:    ${{ secrets.OPERATOR_SSH_PUBLIC_KEY }}
          TF_VAR_tailscale_tailnet: ${{ vars.TAILNET_NAME }}
        run: |
          set +e
          tofu plan -no-color -input=false -var-file=terraform.drill.ci.tfvars 2>&1 | tee plan.txt
          PLAN_EXIT="${PIPESTATUS[0]}"
          head -c 60000 plan.txt > plan.trunc.txt
          exit "$PLAN_EXIT"

      - name: "DR drill — tofu: post plan as PR comment"
        if: >
          github.event_name == 'pull_request' &&
          steps.preflight.outputs.skip != 'true' &&
          always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan;
            try { plan = fs.readFileSync('infra/terraform/plan.trunc.txt', 'utf8'); }
            catch (e) { plan = '(plan output unavailable — see workflow logs)'; }
            const body = '## OpenTofu plan (workspace `drill`)\n\n```\n' + plan + '\n```\n\n' +
                         '_Workflow run: ' + context.runId + '_';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: "DR drill — tofu: cleanup plaintext drill state"
        if: always() && steps.preflight.outputs.skip != 'true'
        run: |
          rm -rf infra/terraform/terraform.tfstate.d/drill
          shred -u infra/terraform/terraform.tfstate 2>/dev/null \
            || rm -f infra/terraform/terraform.tfstate
          rm -f infra/terraform/plan.txt infra/terraform/plan.trunc.txt
